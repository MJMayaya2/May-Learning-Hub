<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Life Sciences Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Life Sciences Hangman Challenge</h1>
        <p class="game-subtitle">Grade 10: Tour of the Cell (Chapter 2)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "ORGANELLE", topic: "Basics", hint: "A specialized structure within a cell that performs a specific function." },
            { word: "PROKARYOTIC", topic: "Cell Types", hint: "Simple cells that lack a true nucleus (e.g., bacteria)." },
            { word: "EUKARYOTIC", topic: "Cell Types", hint: "Complex cells that contain a true nucleus and membrane-bound organelles." },
            { word: "CELL THEORY", topic: "Basics", hint: "Scientific theory stating all living things are made of cells." },
            { word: "CYTOPLASM", topic: "Structure", hint: "The jelly-like fluid that fills the cell and surrounds organelles." },
            { word: "CELL WALL", topic: "Plant Cells", hint: "Rigid outer layer in plant cells made of cellulose." },
            { word: "MEMBRANE", topic: "Structure", hint: "The selectively permeable boundary of the cell." },
            { word: "PHOSPHOLIPID", topic: "Membrane", hint: "The main molecule forming the double layer of the cell membrane." },
            { word: "NUCLEUS", topic: "Organelles", hint: "The 'brain' of the cell that contains DNA." },
            { word: "NUCLEOLUS", topic: "Nucleus", hint: "Small, dense region in the nucleus where ribosomes are made." },
            { word: "CHROMOSOME", topic: "Nucleus", hint: "Thread-like structure of DNA that carries genetic information." },
            { word: "MITOCHONDRIA", topic: "Organelles", hint: "The powerhouse of the cell where ATP (energy) is produced." },
            { word: "RIBOSOME", topic: "Organelles", hint: "Small organelles responsible for protein synthesis." },
            { word: "ENDOPLASMIC", topic: "Organelles", hint: "The ____ Reticulum (ER) transports substances through the cell." },
            { word: "GOLGI BODY", topic: "Organelles", hint: "Apparatus that modifies, sorts, and packages proteins." },
            { word: "VACUOLE", topic: "Organelles", hint: "Large in plants, small in animals; used for storage of water/nutrients." },
            { word: "CHLOROPLAST", topic: "Plant Cells", hint: "Organelle containing chlorophyll where photosynthesis occurs." },
            { word: "LYSOSOME", topic: "Animal Cells", hint: "Organelle containing enzymes to break down waste (cell's 'stomach')." },
            { word: "CENTRIOLE", topic: "Animal Cells", hint: "Structure that helps in cell division (mitosis) in animal cells." },
            { word: "FLUID MOSAIC", topic: "Membrane", hint: "The model used to describe the structure of the cell membrane." },
            { word: "SELECTIVELY", topic: "Membrane", hint: "The membrane is ____ permeable (chooses what enters/leaves)." },
            { word: "CRISTAE", topic: "Mitochondria", hint: "The inner folds of the mitochondria that increase surface area." },
            { word: "GRANA", topic: "Chloroplast", hint: "Stacks of thylakoids found inside the chloroplast." },
            { word: "STROMA", topic: "Chloroplast", hint: "The fluid-filled space inside the chloroplast." },
            { word: "CELLULOSE", topic: "Cell Wall", hint: "The complex carbohydrate that makes the cell wall rigid." },
            { word: "TURGID", topic: "Plant Cells", hint: "When a plant cell is swollen and firm due to water pressure." },
            { word: "PLASMOLYSIS", topic: "Plant Cells", hint: "When the cell membrane pulls away from the cell wall due to water loss." },
            { word: "VESICLE", topic: "Structure", hint: "A small fluid-filled sac used for transport." },
            { word: "CYTOSKELETON", topic: "Structure", hint: "Network of protein fibers that helps the cell keep its shape." },
            { word: "CILIA", topic: "Movement", hint: "Short, hair-like projections used for movement or filtering." },
            { word: "FLAGELLA", topic: "Movement", hint: "Long, whip-like tail used for movement (e.g., sperm cell)." },
            { word: "DNA", topic: "Nucleus", hint: "Deoxyribonucleic acid; the genetic blueprint of life." },
            { word: "MICROSCOPE", topic: "Basics", hint: "Instrument used to view cells that are too small for the naked eye." },
            { word: "MAGNIFICATION", topic: "Basics", hint: "The ability of a microscope to make an image appear larger." },
            { word: "RESOLUTION", topic: "Basics", hint: "The ability of a microscope to show clear detail." },
            { word: "TONOPLAST", topic: "Vacuole", hint: "The membrane that surrounds the large central vacuole in plants." },
            { word: "CELL SAP", topic: "Vacuole", hint: "The liquid found inside the plant vacuole." },
            { word: "ATP", topic: "Mitochondria", hint: "Adenosine Triphosphate; the chemical energy of the cell." },
            { word: "SYNTHESIS", topic: "Processes", hint: "The process of 'building up' or making something (e.g., protein ____)." },
            { word: "LUMEN", topic: "ER", hint: "The internal space or channel of the Endoplasmic Reticulum." },
            { word: "ROUGH ER", topic: "ER", hint: "Endoplasmic reticulum that has ribosomes attached to it." },
            { word: "SMOOTH ER", topic: "ER", hint: "Endoplasmic reticulum that lacks ribosomes; makes lipids." },
            { word: "PERMEABLE", topic: "Membrane", hint: "Allowing liquids or gases to pass through it." },
            { word: "CHROMATIN", topic: "Nucleus", hint: "The uncoiled form of DNA found in the nucleus during interphase." },
            { word: "PORE", topic: "Nucleus", hint: "A nuclear ____ allows mRNA to leave the nucleus." },
            { word: "CHLOROPHYLL", topic: "Chloroplast", hint: "The green pigment that traps sunlight for photosynthesis." },
            { word: "LEUCOPLAST", topic: "Plastids", hint: "Colorless plastid used for starch storage in plants." },
            { word: "CHROMOPLAST", topic: "Plastids", hint: "Plastid containing pigments giving fruits/flowers their color." },
            { word: "DIFFUSION", topic: "Transport", hint: "Movement of molecules from high to low concentration." },
            { word: "OSMOSIS", topic: "Transport", hint: "The diffusion of water across a membrane." },
            { word: "ACTIVE", topic: "Transport", hint: "____ transport requires energy to move substances against a gradient." },
            { word: "PASSIVE", topic: "Transport", hint: "____ transport does NOT require energy." },
            { word: "CENTROSOME", topic: "Animal Cells", hint: "The region near the nucleus where centrioles are located." },
            { word: "MIDDLE LAMELLA", topic: "Plant Cells", hint: "Pectin layer that 'glues' adjacent plant cells together." },
            { word: "PLASMODESMATA", topic: "Plant Cells", hint: "Channels between plant cell walls for communication." },
            { word: "MICROVILLI", topic: "Animal Cells", hint: "Finger-like folds on some cell membranes to increase surface area." },
            { word: "SECRETION", topic: "Golgi", hint: "The release of substances (like enzymes) from the cell." },
            { word: "MATRIX", topic: "Mitochondria", hint: "The fluid-filled space inside the inner membrane of mitochondria." },
            { word: "GENE", topic: "Nucleus", hint: "A segment of DNA that codes for a specific trait." },
            { word: "UNICELLULAR", topic: "Basics", hint: "An organism consisting of only one cell." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Cell Biology Expert!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for the Tour of the Cell!";
            document.getElementById('modalWord').innerText = "CYTOLOGY MASTER";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
