<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Life Sciences Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Life Sciences Hangman Challenge</h1>
        <p class="game-subtitle">Grade 10: Cell Division (Chapter 3)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "CELL CYCLE", topic: "Intro", hint: "The continuous sequence of growth and division in a cell." },
            { word: "MITOSIS", topic: "Intro", hint: "The process of nuclear division that results in two identical daughter cells." },
            { word: "INTERPHASE", topic: "Cell Cycle", hint: "The longest phase where the cell grows and replicates its DNA." },
            { word: "CYTOKINESIS", topic: "Cell Cycle", hint: "The division of the cytoplasm to form two separate cells." },
            { word: "REPLICATION", topic: "Interphase", hint: "The process of copying DNA during the S-phase." },
            { word: "PROPHASE", topic: "Mitosis", hint: "First stage: chromatin thickens into chromosomes and nuclear membrane disappears." },
            { word: "METAPHASE", topic: "Mitosis", hint: "Second stage: chromosomes line up at the cell's equator." },
            { word: "ANAPHASE", topic: "Mitosis", hint: "Third stage: sister chromatids are pulled apart to opposite poles." },
            { word: "TELOPHASE", topic: "Mitosis", hint: "Final stage: two new nuclei form and chromosomes uncoil." },
            { word: "CHROMOSOME", topic: "Genetics", hint: "Structure made of DNA and protein that carries genetic information." },
            { word: "CHROMATID", topic: "Genetics", hint: "One of the two identical halves of a replicated chromosome." },
            { word: "CENTROMERE", topic: "Genetics", hint: "The region where two sister chromatids are joined together." },
            { word: "SPINDLE FIBRE", topic: "Mitosis", hint: "Protein structures that move chromosomes during division." },
            { word: "CENTRIOLE", topic: "Animal Cells", hint: "Organelle in animal cells that produces spindle fibres." },
            { word: "EQUATOR", topic: "Metaphase", hint: "The imaginary line in the middle of the cell where chromosomes align." },
            { word: "POLES", topic: "Mitosis", hint: "The opposite ends of the cell toward which chromatids move." },
            { word: "DAUGHTER CELL", topic: "Outcome", hint: "One of the two identical cells produced by mitosis." },
            { word: "PARENT CELL", topic: "Outcome", hint: "The original cell that divides during mitosis." },
            { word: "DIPLOID", topic: "Outcome", hint: "A cell containing a full set of chromosomes (2n)." },
            { word: "GROWTH", topic: "Role", hint: "Adding more cells allows an organism to get bigger." },
            { word: "REPAIR", topic: "Role", hint: "Replacing damaged or dead cells, like healing a wound." },
            { word: "ASEXUAL", topic: "Reproduction", hint: "Mitosis is used for this type of reproduction in simple organisms." },
            { word: "CANCER", topic: "Health", hint: "Disease caused by uncontrolled and rapid cell division." },
            { word: "TUMOUR", topic: "Health", hint: "A mass of cells formed by uncontrolled division." },
            { word: "CARCINOGEN", topic: "Health", hint: "Any substance or agent that causes cancer (e.g., UV rays or chemicals)." },
            { word: "MUTATION", topic: "Health", hint: "A change in the DNA sequence that can lead to cancer." },
            { word: "BENIGN", topic: "Health", hint: "A non-cancerous tumour that does not spread." },
            { word: "MALIGNANT", topic: "Health", hint: "A cancerous tumour that can spread to other parts of the body." },
            { word: "METASTASIS", topic: "Health", hint: "The spread of cancer cells from the primary site to other areas." },
            { word: "RADIOTHERAPY", topic: "Treatment", hint: "Using high-energy radiation to kill cancer cells." },
            { word: "CHEMOTHERAPY", topic: "Treatment", hint: "Using chemical drugs to stop cancer cells from dividing." },
            { word: "CELL PLATE", topic: "Plant Cells", hint: "Structure that forms during cytokinesis in plant cells to create a new wall." },
            { word: "CLEAVAGE FURROW", topic: "Animal Cells", hint: "The 'pinch' in the cell membrane during cytokinesis in animal cells." },
            { word: "S PHASE", topic: "Interphase", hint: "The specific part of interphase when DNA is synthesized." },
            { word: "G1 PHASE", topic: "Interphase", hint: "The first growth phase of the cell cycle." },
            { word: "G2 PHASE", topic: "Interphase", hint: "The second growth phase, preparing for mitosis." },
            { word: "CHROMATIN", topic: "Genetics", hint: "The thin, thread-like form of DNA during interphase." },
            { word: "NUCLEOLUS", topic: "Prophase", hint: "This small structure inside the nucleus disappears during prophase." },
            { word: "NUCLEAR MEMBRANE", topic: "Mitosis", hint: "This breaks down in prophase and reforms in telophase." },
            { word: "IDENTICAL", topic: "Outcome", hint: "Mitosis produces cells that are genetically ____." },
            { word: "REGENERATE", topic: "Role", hint: "To replace lost body parts, like a lizard's tail, using mitosis." },
            { word: "CLONING", topic: "Biotechnology", hint: "Producing a genetically identical copy of an organism." },
            { word: "SYNTHESIS", topic: "Interphase", hint: "What the 'S' in S-phase stands for." },
            { word: "ORGANISM", topic: "Intro", hint: "A living thing made of one or more cells." },
            { word: "MICROSCOPE", topic: "Basics", hint: "Used to observe the different stages of mitosis." },
            { word: "VEGETATIVE", topic: "Reproduction", hint: "____ reproduction in plants relies on mitosis." },
            { word: "CONTINUOUS", topic: "Intro", hint: "Mitosis is a ____ process, even though we study it in stages." },
            { word: "ASTERS", topic: "Animal Cells", hint: "Star-shaped structures that form around centrioles." },
            { word: "GENETIC", topic: "Outcome", hint: "Mitosis ensures the ____ code is passed correctly to new cells." },
            { word: "UV RADIATION", topic: "Health", hint: "A common carcinogen from the sun that can cause skin cancer." },
            { word: "CIGARETTE SMOKE", topic: "Health", hint: "A chemical carcinogen known to cause lung cancer." },
            { word: "BIOPSY", topic: "Health", hint: "Medical procedure to test a tissue sample for cancer." },
            { word: "TISSUE", topic: "Basics", hint: "A group of similar cells working together." },
            { word: "CONTRACTILE RING", topic: "Animal Cells", hint: "Structure that causes the membrane to pinch during cytokinesis." },
            { word: "UNCOIL", topic: "Telophase", hint: "What chromosomes do to return to chromatin form." },
            { word: "SISTER", topic: "Genetics", hint: "The two identical parts of a chromosome are ____ chromatids." },
            { word: "VISIBLE", topic: "Prophase", hint: "Chromosomes become ____ under a microscope during this phase." },
            { word: "REPAIR", topic: "Role", hint: "Healing a skin cut is an example of mitosis for ____." },
            { word: "MASS", topic: "Health", hint: "A tumor is a solid ____ of cells." },
            { word: "BIO-TECHNOLOGY", topic: "Biotechnology", hint: "Field that uses mitosis for cloning and stem cell research." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Mitosis Master!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for the Cell Cycle!";
            document.getElementById('modalWord').innerText = "GENETICS GENIUS";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
