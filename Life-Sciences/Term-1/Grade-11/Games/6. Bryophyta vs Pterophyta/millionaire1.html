<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Plant Diversity Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Life Sciences Challenge</h1>
        <p class="game-subtitle">Bryophyta vs Pterophyta (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the primary function of the waxy cuticle in land plants?", options: ["Gas exchange", "Reducing water loss", "Absorption of nutrients", "Anchorage"], a: 1, hint: "It forms a waterproof layer on the leaves." },
            { q: "Which structure enables gas exchange in plants with a waxy cuticle?", options: ["Xylem", "Phloem", "Stomata", "Rhizoids"], a: 2, hint: "These are small pores usually found on the underside of leaves." },
            { q: "Vascular tissue in plants is composed of which two types of tissue?", options: ["Epidermis and Pith", "Xylem and Phloem", "Stems and Roots", "Spores and Seeds"], a: 1, hint: "They are responsible for transport and support." },
            { q: "Which of the following describes Bryophytes (Mosses)?", options: ["Vascular and seed-bearing", "Non-vascular and spore-bearing", "Vascular and fruit-bearing", "Non-vascular and seed-bearing"], a: 1, hint: "They lack xylem and phloem and reproduce using spores." },
            { q: "Moss plants are 'thallus' structures. This means they lack...", options: ["DNA", "Chloroplasts", "True roots, stems, and leaves", "Nuclei"], a: 2, hint: "They have structures that look like these organs but aren't 'true' organs." },
            { q: "In Mosses, what are the root-like structures called that provide anchorage?", options: ["Rhizomes", "Rhizoids", "Stolons", "Taproots"], a: 1, hint: "They are simple, thread-like structures." },
            { q: "Why are Mosses limited to growing in moist, shady areas?", options: ["They need sunlight to die", "They depend on water for the sperm to swim to the egg", "They eat water", "They lack a cell wall"], a: 1, hint: "External water is necessary for fertilization." },
            { q: "Which generation is dominant in the life cycle of a Moss (Bryophyta)?", options: ["Gametophyte", "Sporophyte", "Zygote", "Pollen"], a: 0, hint: "This is the green, leafy part of the moss we see." },
            { q: "What is the function of the 'Sporangium' in a Moss plant?", options: ["Photosynthesis", "Anchorage", "Producing and storing spores", "Absorbing water"], a: 2, hint: "It is the capsule-like structure at the top of the stalk." },
            { q: "The group Pterophyta consists of which type of plants?", options: ["Mosses", "Ferns", "Conifers", "Flowering plants"], a: 1, hint: "These plants have vascular tissue but no seeds." },
            { q: "What is the horizontal, underground stem of a fern called?", options: ["Rhizoid", "Rhizome", "Stolon", "Frond"], a: 1, hint: "It grows under the surface and produces roots." },
            { q: "In a fern plant, the leaves are specifically known as...", options: ["Pinnae", "Fronds", "Blades", "Needles"], a: 1, hint: "These are large, compound leaves." },
            { q: "What are the individual leaflets of a fern frond called?", options: ["Rhizomes", "Pinnae", "Sori", "Stomata"], a: 1, hint: "A frond is made up of many of these." },
            { q: "Where are 'Sori' found on a fern plant?", options: ["On the roots", "On the top of the frond", "On the underside of mature pinnae", "Inside the stem"], a: 2, hint: "They look like small brown dots." },
            { q: "Each sorus on a fern contains many structures that produce spores called...", options: ["Rhizoids", "Sporangia", "Gametophytes", "Seeds"], a: 1, hint: "Singular is sporangium." },
            { q: "The heart-shaped structure that grows from a fern spore is called a...", options: ["Rhizome", "Prothallus", "Frond", "Seedling"], a: 1, hint: "This is the gametophyte generation of the fern." },
            { q: "Ferns are more advanced than mosses because they possess...", options: ["Flowers", "True roots, stems, leaves, and vascular tissue", "Seeds", "Fruit"], a: 1, hint: "They are 'vascular' plants." },
            { q: "What are 'Adventitious Roots' in a fern?", options: ["Roots that grow from the frond", "Roots that arise from the rhizome", "Roots that grow in the air", "Roots that contain seeds"], a: 1, hint: "They provide anchorage and absorption." },
            { q: "A young, tightly coiled fern leaf is called a...", options: ["Sorus", "Fiddlehead/Crozier", "Rhizome", "Bud"], a: 1, hint: "It is often hairy to reduce transpiration." },
            { q: "Like Mosses, Ferns are still dependent on water for...", options: ["Photosynthesis", "Pollination", "The sperm to swim to the ova", "Seed dispersal"], a: 2, hint: "Sexual reproduction still requires a film of moisture." },
            { q: "Which generation is dominant in the life cycle of a Fern (Pterophyta)?", options: ["Gametophyte", "Sporophyte", "Prothallus", "Spore"], a: 1, hint: "This is the large, green leafy plant we recognize." },
            { q: "What happens when fern spores land in a suitable moist habitat?", options: ["They die", "They grow into a prothallus", "They become seeds", "They turn into roots"], a: 1, hint: "They germinate into the gametophyte." },
            { q: "Male and female reproductive organs develop on which part of the fern life cycle?", options: ["Under the frond", "On the rhizome", "On the underside of the prothallus", "Inside the sporangium"], a: 2, hint: "This heart-shaped structure produces gametes." },
            { q: "Which tissue is responsible for transporting water and minerals in Pterophytes?", options: ["Phloem", "Epidermis", "Xylem", "Cuticle"], a: 2, hint: "It also provides structural support." },
            { q: "Which tissue is responsible for transporting manufactured food (sugars) in Pterophytes?", options: ["Xylem", "Phloem", "Rhizome", "Stomata"], a: 1, hint: "It carries products of photosynthesis." },
            { q: "What is the main difference between reproduction in Bryophytes and Angiosperms?", options: ["Bryophytes use seeds", "Angiosperms use spores", "Bryophytes use spores and Angiosperms use seeds", "There is no difference"], a: 2, hint: "Think about the level of complexity and protection." },
            { q: "The production of fruit in Angiosperms is important because it...", options: ["Makes the plant heavy", "Aids in dispersal and protects the embryo", "Stops the plant from growing", "Is only for humans to eat"], a: 1, hint: "It ensures the next generation can spread and survive." },
            { q: "Plants are grouped into Bryophytes, Pteridophytes, Gymnosperms, and Angiosperms based on...", options: ["Height", "Vascular tissue, seeds, and fruits", "Color of flowers", "Type of soil"], a: 1, hint: "These are structural and reproductive evolutionary traits." },
            { q: "What do mosses use to prevent water loss, even if they are not perfectly adapted to land?", options: ["Huge roots", "A simple waxy cuticle", "Living underwater only", "Growing only in winter"], a: 1, hint: "It is a waxy coating." },
            { q: "The term 'Sorus' refers to a cluster of...", options: ["Leaves", "Sporangia", "Roots", "Seeds"], a: 1, hint: "Found on the back of fern leaves." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Life Sciences Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Science Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
