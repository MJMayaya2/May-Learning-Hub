<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Spermatophyta Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Life Sciences Challenge</h1>
        <p class="game-subtitle">Gymnosperms vs Angiosperms (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the most advanced group of plants, which reproduce using seeds?", options: ["Bryophytes", "Pteridophytes", "Spermatophytes", "Algae"], a: 2, hint: "The name comes from the Greek word for 'seed'." },
            { q: "Spermatophytes are divided into which two subgroups?", options: ["Mosses and Ferns", "Gymnosperms and Angiosperms", "Monocots and Dicots", "Algae and Fungi"], a: 1, hint: "One has 'naked' seeds, the other has seeds in fruit." },
            { q: "What is the protective outer coat of a seed called?", options: ["Capsid", "Testa", "Cuticle", "Columella"], a: 1, hint: "It allows the seed to lie dormant until conditions are right." },
            { q: "Why do seeds have a greater chance of survival than spores?", options: ["They are smaller", "They contain stored food to nourish the embryo", "They don't need water", "They are always green"], a: 1, hint: "This stored food supports the plant during early germination." },
            { q: "What does the word 'Gymnosperm' literally mean?", options: ["Flowering seed", "Naked seed", "Hidden seed", "Large seed"], a: 1, hint: "Their seeds are not enclosed in a fruit." },
            { q: "Which of the following is an example of a Gymnosperm?", options: ["Rose bush", "Maize plant", "Pine tree", "Moss"], a: 2, hint: "They often produce cones." },
            { q: "Conifers, such as Pine trees, belong to which subgroup?", options: ["Angiosperms", "Gymnosperms", "Pteridophytes", "Bryophytes"], a: 1, hint: "They have needle-like leaves and naked seeds." },
            { q: "What type of root system do Pine trees have?", options: ["Fibrous roots", "Adventitious roots", "Tap root system", "Rhizoids"], a: 2, hint: "It consists of a main central root with smaller lateral roots." },
            { q: "Why do Pine trees lack root hairs?", options: ["They don't need water", "They have a mutualistic relationship with fungi (mycorrhizae)", "The roots are too thick", "They grow in sand"], a: 1, hint: "Fungi help them absorb water and minerals." },
            { q: "How are the needle-like leaves of a Pine tree adapted to dry conditions?", options: ["They have no stomata", "They have a small surface area and thick waxy cuticle", "They are very soft", "They fall off in summer"], a: 1, hint: "This helps to significantly reduce transpiration." },
            { q: "Pine trees are 'monoecious'. What does this mean?", options: ["They have only one leaf", "Male and female cones occur on the same tree", "They only reproduce once", "They need two trees to reproduce"], a: 1, hint: "Both genders are present on a single plant." },
            { q: "In Gymnosperms, which structure transfers male gametes to the female gamete?", options: ["Water film", "Pollen grains", "Insects", "Spores"], a: 1, hint: "This removes the dependence on external water for fertilization." },
            { q: "How is pollen usually dispersed in Pine trees?", options: ["By birds", "By wind", "By water", "By bees"], a: 1, hint: "They produce massive amounts of yellow dust in the air." },
            { q: "What is the primary characteristic of Angiosperms?", options: ["Naked seeds", "Seeds enclosed in fruit", "No vascular tissue", "Reproducing by spores"], a: 1, hint: "They are the flowering plants." },
            { q: "Reproductive organs in Angiosperms are housed in which structure?", options: ["Cones", "Sori", "Flowers", "Rhizomes"], a: 2, hint: "These are often colorful to attract pollinators." },
            { q: "Which group of plants is the most diverse and widespread on Earth?", options: ["Gymnosperms", "Angiosperms", "Ferns", "Mosses"], a: 1, hint: "They include everything from grasses to oak trees." },
            { q: "What is the function of fruit in Angiosperms?", options: ["To feed the plant", "To protect the seed and aid in dispersal", "To store water for photosynthesis", "To attract predators"], a: 1, hint: "It ensures the seeds move away from the parent plant." },
            { q: "In seed plants, what is the role of the 'endosperm' or 'cotyledon'?", options: ["Protection", "Food storage", "Gas exchange", "Anchorage"], a: 1, hint: "It provides nutrients to the developing embryo." },
            { q: "Seeds can lie 'dormant'. What does this mean?", options: ["They are dead", "They are growing rapidly", "They are in a state of reduced metabolic activity", "They are underwater"], a: 2, hint: "It waits for the right temperature and moisture." },
            { q: "Why are seeds important as a food source for humans?", options: ["They are only found in summer", "They are rich in energy, oils, and vitamins", "They contain no calories", "They are always sweet"], a: 1, hint: "Grains like wheat and maize are the staple diet for millions." },
            { q: "Which of the following is a cereal grain?", options: ["Pine nut", "Sunflower seed", "Maize", "Peanut"], a: 2, hint: "It is a member of the grass family." },
            { q: "What is the purpose of a 'Seed Bank'?", options: ["To sell seeds for profit", "To conserve plant biodiversity and prevent extinction", "To grow large forests", "To study soil"], a: 1, hint: "They store seeds from all over the world under controlled conditions." },
            { q: "Why are 'wild types' of crops conserved in seed banks?", options: ["They taste better", "To preserve genetic diversity for future breeding", "They are easier to grow", "They don't need water"], a: 1, hint: "Original varieties may have resistance to diseases that modern crops lack." },
            { q: "Which process is NOT dependent on water in Spermatophytes?", options: ["Photosynthesis", "Germination", "Fertilization (sperm traveling to egg)", "Transpiration"], a: 2, hint: "The pollen tube grows to the egg instead of sperm swimming." },
            { q: "Which generation is dominant in all Spermatophytes?", options: ["Gametophyte", "Sporophyte", "Prothallus", "Pollen"], a: 1, hint: "This is the actual tree or plant we see." },
            { q: "Cones in gymnosperms are equivalent to what in angiosperms?", options: ["Leaves", "Flowers", "Roots", "Stems"], a: 1, hint: "They are the reproductive structures." },
            { q: "What is the name of the 'vulnerable' status of many plant species today?", options: ["Extinct", "Dormant", "Endangered", "Vascular"], a: 2, hint: "They are at risk of disappearing due to human activity." },
            { q: "Which plant group has the most 'agents of pollination' (wind, insects, birds)?", options: ["Mosses", "Ferns", "Gymnosperms", "Angiosperms"], a: 3, hint: "Flowers are specially adapted for these different carriers." },
            { q: "Pine wood is economically important for which industries?", options: ["Food and medicine", "Furniture and building", "Clothing and textiles", "Electronics"], a: 1, hint: "It is a widely used 'softwood'." },
            { q: "The 'testa' develops from which part of the ovule?", options: ["Ovary", "Integuments", "Stigma", "Style"], a: 1, hint: "It is the protective envelope around the embryo." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Life Sciences Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Science Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
