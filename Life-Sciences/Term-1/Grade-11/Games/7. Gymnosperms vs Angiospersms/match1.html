<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Spermatophyta</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.9rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Life Sciences: Spermatophyta</h1>
        <p class="game-subtitle">Match Gymnosperms, Angiosperms, and the significance of seeds!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Seed Significance</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Gymnosperms</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Angiosperms</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Seed Banks & Food</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "The most highly advanced group of plants." }, { id: 1, text: "Spermatophytes" },
                { id: 2, text: "Protective outer coat of a seed." }, { id: 2, text: "Testa" },
                { id: 3, text: "Seeds store this to nourish the embryo during germination." }, { id: 3, text: "Food/Nutrients" },
                { id: 4, text: "The ability of seeds to remain inactive until conditions are right." }, { id: 4, text: "Dormancy" },
                { id: 5, text: "Seeds allow plants to reduce this by moving away from parents." }, { id: 5, text: "Competition" },
                { id: 6, text: "Spermatophytes are divided into these two subgroups." }, { id: 6, text: "Gymno- & Angiosperms" },
                { id: 7, text: "Seeds have a greater chance of survival than these." }, { id: 7, text: "Spores" },
                { id: 8, text: "The process of spreading seeds to new locations." }, { id: 8, text: "Dispersal" },
                { id: 9, text: "Found inside the seed; the beginning of a new plant." }, { id: 9, text: "Embryo" },
                { id: 10, text: "Seeds are highly adapted for this to ensure species survival." }, { id: 10, text: "Propagation" }
            ],
            'topic2': [
                { id: 1, text: "Plants that produce 'naked' seeds, not enclosed in fruit." }, { id: 1, text: "Gymnosperms" },
                { id: 2, text: "Group including conifers, cycads, and ginkgoes." }, { id: 2, text: "Gymnosperms" },
                { id: 3, text: "The most diverse group of gymnosperms." }, { id: 3, text: "Conifers" },
                { id: 4, text: "Gymnosperms have this type of root system." }, { id: 4, text: "Tap Root" },
                { id: 5, text: "Pine trees belong to this species name." }, { id: 5, text: "Pinus" },
                { id: 6, text: "Used to transfer male gametes; water is not required." }, { id: 6, text: "Pollen Grains" },
                { id: 7, text: "Relationship between pine roots and fungi." }, { id: 7, text: "Mutualism" },
                { id: 8, text: "The wood from these trees is used in the furniture industry." }, { id: 8, text: "Pine Trees" },
                { id: 9, text: "Structure where gymnosperm seeds are often held." }, { id: 9, text: "Cones" },
                { id: 10, text: "Gymnosperms lack these structures for seed protection." }, { id: 10, text: "Ovaries/Fruit" }
            ],
            'topic3': [
                { id: 1, text: "Plants where seeds form inside a protective fruit." }, { id: 1, text: "Angiosperms" },
                { id: 2, text: "General name for all flowering plants." }, { id: 2, text: "Angiosperms" },
                { id: 3, text: "Structures that house reproductive organs in angiosperms." }, { id: 3, text: "Flowers" },
                { id: 4, text: "Angiosperms use these to attract pollinators." }, { id: 4, text: "Flowers/Nectar" },
                { id: 5, text: "The fruit aids in the dispersal of this." }, { id: 5, text: "The Seed" },
                { id: 6, text: "Tissue present for support and transport." }, { id: 6, text: "Vascular Tissue" },
                { id: 7, text: "The ripened ovary of a flower." }, { id: 7, text: "Fruit" },
                { id: 8, text: "Water is not required for this process in angiosperms." }, { id: 8, text: "Fertilisation" },
                { id: 9, text: "Male gametes are carried by these." }, { id: 9, text: "Pollen Grains" },
                { id: 10, text: "Angiosperms have true roots, stems, and..." }, { id: 10, text: "Leaves" }
            ],
            'topic4': [
                { id: 1, text: "Established to conserve seeds from all plant species." }, { id: 1, text: "Seed Banks" },
                { id: 2, text: "Seeds of cereal grasses like maize, wheat, and rice." }, { id: 2, text: "Grains" },
                { id: 3, text: "Provide a major part of energy requirements for humans." }, { id: 3, text: "Grains" },
                { id: 4, text: "Reason for establishing seed banks." }, { id: 4, text: "Conserve Biodiversity" },
                { id: 5, text: "Grains are a rich source of this nutrient." }, { id: 5, text: "Carbohydrates" },
                { id: 6, text: "Seeds like nuts and sunflowers are rich sources of..." }, { id: 6, text: "Oils" },
                { id: 7, text: "Seed banks help protect these types of plants." }, { id: 7, text: "Endangered/Vulnerable" },
                { id: 8, text: "Condition in which seeds are stored in banks." }, { id: 8, text: "Dormant" },
                { id: 9, text: "Strain put on plant resources by humans." }, { id: 9, text: "Population Growth" },
                { id: 10, text: "Seeds of these plants form the staple diet of many." }, { id: 10, text: "Cereal Grasses" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Life Sciences Spermatophyta Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
