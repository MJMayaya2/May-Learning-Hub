<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Roles of Micro-organisms Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Life Sciences Challenge</h1>
        <p class="game-subtitle">Roles of Micro-organisms (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What medical technique uses viruses to deliver healthy genes into cells to treat genetic disorders?", options: ["Radiotherapy", "Gene Therapy", "Chemotherapy", "Physiotherapy"], a: 1, hint: "A virus acts as a 'vector' to carry genetic information." },
            { q: "In an ecosystem, micro-organisms that break down dead organic matter are known as...", options: ["Producers", "Autotrophs", "Decomposers", "Consumers"], a: 2, hint: "They include many bacteria and fungi." },
            { q: "Which gas is a common by-product of the decomposition process?", options: ["Oxygen", "Carbon Dioxide", "Helium", "Neon"], a: 1, hint: "It is returned to the atmosphere to be used in photosynthesis." },
            { q: "Plants cannot use nitrogen directly from the air. What do they use instead?", options: ["Nitrites", "Nitrates", "Nitrogen gas", "Ammonia gas"], a: 1, hint: "Bacteria convert atmospheric nitrogen into this form." },
            { q: "Nitrogen-fixing bacteria convert atmospheric nitrogen into nitrates. Where are they often found in legumes?", options: ["Leaves", "Flowers", "Root nodules", "Stem nodes"], a: 2, hint: "Small swellings on the roots of beans and peas." },
            { q: "The relationship between nitrogen-fixing bacteria and legume plants is an example of...", options: ["Parasitism", "Commensalism", "Mutualism", "Competition"], a: 2, hint: "Both organisms benefit from the interaction." },
            { q: "How does a legume plant benefit from nitrogen-fixing bacteria?", options: ["It gets carbohydrates", "It gets oxygen", "It gets nitrates for protein production", "It gets protection from pests"], a: 2, hint: "Nitrogen is a key part of proteins." },
            { q: "Bacteria in the gut of herbivores (like cows) help break down which tough substance?", options: ["Protein", "Starch", "Cellulose", "Fats"], a: 2, hint: "This is found in plant cell walls." },
            { q: "Which vitamins are released by mutualistic bacteria in the human intestine?", options: ["Vitamin A & C", "Vitamin B12, E, & K", "Vitamin D & A", "Vitamin C & B1"], a: 1, hint: "These are then absorbed into the human blood system." },
            { q: "What is the primary role of 'saprophytes' in the environment?", options: ["Producing food", "Killing hosts", "Recycling nutrients", "Storing water"], a: 2, hint: "They secrete enzymes to digest dead matter." },
            { q: "Weakened or dead forms of a virus used to stimulate the immune system are called...", options: ["Antibiotics", "Hormones", "Vaccines", "Antiseptics"], a: 2, hint: "They help the body produce antibodies." },
            { q: "Which process uses bacteria to turn milk into yogurt or cheese?", options: ["Photosynthesis", "Fermentation", "Respiration", "Nitrogen fixation"], a: 1, hint: "An anaerobic process that produces lactic acid." },
            { q: "Viruses used as 'biological control agents' help in...", options: ["Treating cancer", "Managing plant and animal pests", "Producing insulin", "Digesting cellulose"], a: 1, hint: "They target specific pest populations in nature." },
            { q: "In the context of 'Gene Therapy', what is the virus used to target?", options: ["Healthy tissue", "Unhealthy or malfunctioning tissue", "Bacteria", "Blood cells only"], a: 1, hint: "It incorporates a healthy gene into the DNA of these cells." },
            { q: "Which medical condition is specifically mentioned as a target for gene therapy in the document?", options: ["Diabetes", "Cystic Fibrosis", "Influenza", "Anemia"], a: 1, hint: "A genetic disorder affecting the lungs and digestion." },
            { q: "Herbivorous animals obtain which benefit from bacteria in their rumen?", options: ["Heat energy", "Simple sugars from cellulose", "Oxygen", "Water"], a: 1, hint: "Bacteria digest the plant fiber for them." },
            { q: "Autotrophic bacteria play a role in food chains by acting as...", options: ["Secondary consumers", "Primary producers", "Decomposers", "Apex predators"], a: 1, hint: "They make their own food, often via chemosynthesis or photosynthesis." },
            { q: "What do gut bacteria obtain from their host in a mutualistic relationship?", options: ["Oxygen", "Safe habitat and nutrients", "Antibodies", "Light"], a: 1, hint: "The host provides the 'home' and the 'food'." },
            { q: "Nitrogenous wastes returned to the environment by bacteria are used by...", options: ["Animals", "Viruses", "Other organisms (like plants)", "Fungi only"], a: 2, hint: "It is part of the nutrient cycle." },
            { q: "Why are viral diseases sometimes beneficial in the wild?", options: ["They provide food", "They help control host population numbers", "They clean the water", "They make hosts stronger"], a: 1, hint: "Ensures a 'healthy population' by removing weak individuals." },
            { q: "Vaccines stimulate the immune system to produce...", options: ["Antigens", "Antibodies", "Red blood cells", "Insulin"], a: 1, hint: "These proteins identify and neutralize the virus." },
            { q: "Which bacteria are mentioned as free-living in the soil to help the nitrogen cycle?", options: ["E. coli", "Nitrogen-fixing bacteria", "Saprophytes", "Lactobacillus"], a: 1, hint: "They work outside of plant roots as well." },
            { q: "The production of insulin can be achieved using genes from which animal, as mentioned in the text?", options: ["Pigs and sheep", "Cows and goats", "Chickens", "Fish"], a: 0, hint: "Biotechnology allows us to use these animal genes." },
            { q: "What is the result of bacteria breaking down cellulose in a herbivore's gut?", options: ["Lactic acid", "Nitrates", "VFA (Volatile Fatty Acids)", "Oxygen"], a: 2, hint: "Short-chain fatty acids used for energy." },
            { q: "In a food web, where are bacteria that decompose dead matter usually placed?", options: ["At the start", "At the top", "At every level (as decomposers)", "They are not part of food webs"], a: 2, hint: "Everything eventually dies and is broken down." },
            { q: "The term 'Mutualism' implies that...", options: ["One organism benefits, the other is harmed", "Both organisms benefit", "Neither organism is affected", "One benefits, the other is unaffected"], a: 1, hint: "A 'win-win' situation." },
            { q: "Nitrogen-fixing bacteria convert nitrogen gas into which compounds first?", options: ["Proteins", "Nitrates", "Carbohydrates", "Amino acids"], a: 1, hint: "These are then absorbed by plant roots." },
            { q: "Biological technology refers to...", options: ["Ancient farming", "The use of organisms or their products for human benefit", "Studying rocks", "Natural selection"], a: 1, hint: "Includes medicine and food production." },
            { q: "Bacteria found in the human intestine also help by obtaining nutrients from...", options: ["The blood", "Partially digested food", "The liver", "The skin"], a: 1, hint: "They take a 'small share' of what we eat." },
            { q: "Micro-organisms are essential for life because they ensure the cycling of...", options: ["Electricity", "Nutrients and chemical elements", "Wind", "Magnetic fields"], a: 1, hint: "They prevent the 'locking up' of nutrients in dead bodies." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Life Sciences Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Science Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
