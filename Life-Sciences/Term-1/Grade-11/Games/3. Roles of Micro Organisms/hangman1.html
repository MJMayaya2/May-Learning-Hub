<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Life Sciences Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Life Sciences Hangman Challenge</h1>
        <p class="game-subtitle">Grade 11: Roles of Micro-Organisms (Chapter 3)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "DECOMPOSERS", topic: "Bacteria", hint: "Saprophytic micro-organisms that break down dead organic matter." },
            { word: "SAPROPHYTES", topic: "Bacteria", hint: "Organisms that secrete digestive enzymes to break down and absorb nutrients from dead matter." },
            { word: "NITROGEN FIXATION", topic: "Mutualism", hint: "Process where bacteria convert atmospheric nitrogen into nitrates for plants." },
            { word: "NITRATES", topic: "Mutualism", hint: "The chemical form of nitrogen that plants can actually absorb." },
            { word: "LEGUMES", topic: "Mutualism", hint: "Type of plants (like beans/peas) that have nitrogen-fixing bacteria in their root nodules." },
            { word: "NODULES", topic: "Mutualism", hint: "Small swellings on legume roots where nitrogen-fixing bacteria live." },
            { word: "MUTUALISM", topic: "Symbiosis", hint: "A relationship where both organisms benefit, like bacteria in a cow's stomach." },
            { word: "CELLULOSE", topic: "Mutualism", hint: "The tough plant material that bacteria help herbivores digest." },
            { word: "RUMEN", topic: "Mutualism", hint: "The part of a herbivore's stomach where bacteria ferment plant matter." },
            { word: "VITAMINS", topic: "Bacteria", hint: "Substances like Vitamin K and B12 produced by bacteria in the human gut." },
            { word: "GENE THERAPY", topic: "Viruses", hint: "Using reprogrammed viruses to deliver healthy genes into human cells." },
            { word: "CYSTIC FIBROSIS", topic: "Viruses", hint: "A medical disorder often targeted by gene therapy." },
            { word: "VACCINES", topic: "Viruses", hint: "Weakened or inactive forms of a pathogen used to stimulate immunity." },
            { word: "ANTIBODIES", topic: "Viruses", hint: "Proteins made by the immune system to fight off infections." },
            { word: "PATHOGENS", topic: "General", hint: "Micro-organisms that cause disease and help control species numbers in nature." },
            { word: "BIOLOGICAL CONTROL", topic: "Viruses", hint: "Using micro-organisms to manage pests instead of chemicals." },
            { word: "ENZYMES", topic: "Bacteria", hint: "Chemicals secreted by bacteria for external digestion." },
            { word: "BYPRODUCTS", topic: "Environment", hint: "Substances like CO2 and water released during decomposition." },
            { word: "FERMENTATION", topic: "Bacteria", hint: "The process used by rumen bacteria to break down plant food." },
            { word: "SYMBIOTIC", topic: "General", hint: "A close and long-term biological interaction between two different species." },
            { word: "ATMOSPHERIC", topic: "Mutualism", hint: "Type of nitrogen that plants cannot use directly." },
            { word: "CARBOHYDRATES", topic: "Mutualism", hint: "What plants provide to nitrogen-fixing bacteria in exchange for nitrates." },
            { word: "HERBIVORES", topic: "Mutualism", hint: "Animals that rely on bacteria to digest the cellulose in their diet." },
            { word: "INTESTINE", topic: "Bacteria", hint: "Where beneficial bacteria live in humans to release vitamins." },
            { word: "MALFUNCTIONING", topic: "Viruses", hint: "Gene therapy replaces these types of genes with healthy ones." },
            { word: "STIMULATE", topic: "Viruses", hint: "What vaccines do to the immune system." },
            { word: "REPROGRAMMED", topic: "Viruses", hint: "How viruses are modified for use in gene therapy." },
            { word: "NITROGENOUS", topic: "Environment", hint: "Decomposition returns ____ wastes back to the environment." },
            { word: "NATURE", topic: "Viruses", hint: "In ____, viruses help maintain healthy populations by removing the weak." },
            { word: "CULTIVATED", topic: "General", hint: "Pathogens control both wild and ____ species in nature." },
            { word: "EXTERNAL", topic: "Nutrition", hint: "Type of digestion performed by saprophytic bacteria." },
            { word: "NUTRIENTS", topic: "Environment", hint: "Decomposition ensures these are recycled in an ecosystem." },
            { word: "MICROBIOLOGY", topic: "General", hint: "The study of microscopic organisms." },
            { word: "BIOTECHNOLOGY", topic: "General", hint: "Using living systems and organisms to develop products." },
            { word: "ORGANISM", topic: "General", hint: "A living thing that micro-organisms interact with." },
            { word: "HEALTHY", topic: "Viruses", hint: "By killing host species, viral diseases help ensure ____ populations." },
            { word: "PESTS", topic: "Viruses", hint: "Organisms targeted by biological control agents." },
            { word: "ABSORB", topic: "Bacteria", hint: "Bacteria ____ nutrients after they have been digested externally." },
            { word: "RECYCLE", topic: "Environment", hint: "The main ecological role of decomposers is to ____ nutrients." },
            { word: "CLIMATE", topic: "General", hint: "Decomposition contributes to the carbon cycle which affects ____." },
            { word: "PROTEINS", topic: "Mutualism", hint: "Plants use nitrates to manufacture these." },
            { word: "AMMONIA", topic: "Mutualism", hint: "A nitrogen compound involved in the nitrogen cycle." },
            { word: "ECOLOGICAL", topic: "General", hint: "Relating to the relation of living organisms to one another and their surroundings." },
            { word: "RELATIONSHIP", topic: "General", hint: "The connection between micro-organisms and their hosts." },
            { word: "FERTILIZER", topic: "Mutualism", hint: "Nitrogen fixation acts as a natural ____ for plants." },
            { word: "DIGESTIVE TRACT", topic: "Mutualism", hint: "Where bacteria are found in herbivores for cellulose breakdown." },
            { word: "ABSORBED", topic: "Mutualism", hint: "How simple sugars and vitamins enter the host's blood system." },
            { word: "IMMUNE SYSTEM", topic: "Viruses", hint: "The body's defense system targeted by vaccines." },
            { word: "DNA", topic: "Viruses", hint: "Where healthy genes are incorporated during gene therapy." },
            { word: "ABNORMAL", topic: "Viruses", hint: "Gene therapy compensates for ____ genes." },
            { word: "TISSUE", topic: "Viruses", hint: "A virus in gene therapy can be made to target specific unhealthy ____." },
            { word: "RECYCLE", topic: "Environment", hint: "Micro-organisms help ____ matter in food webs." },
            { word: "AUTOTROPHIC", topic: "Environment", hint: "Bacteria that are producers in a food chain." },
            { word: "HETEROTROPHIC", topic: "Environment", hint: "Bacteria that are consumers or decomposers in a food chain." },
            { word: "VFA", topic: "Mutualism", hint: "Short-chain fatty acids produced by fermenting bacteria." },
            { word: "HABITAT", topic: "Mutualism", hint: "The rumen provides a safe ____ and food for bacteria." },
            { word: "BENEFICIAL", topic: "General", hint: "The opposite of pathogenic; describing helpful bacteria." },
            { word: "COMMUNITY", topic: "General", hint: "A group of different species living in the same area." },
            { word: "ECOSYSTEM", topic: "General", hint: "A biological community of interacting organisms and their environment." },
            { word: "BIODIVERSITY", topic: "General", hint: "The variety of life in the world or in a particular habitat." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Ecological Master!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for the Roles of Micro-Organisms!";
            document.getElementById('modalWord').innerText = "BIOLOGY CHAMPION";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
