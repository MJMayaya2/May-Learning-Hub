    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Roles of Micro-organisms</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Life Sciences: Roles of Micro-organisms</h1>
        <p class="game-subtitle">Match the ecological benefits, medicinal uses, and mutualistic relationships!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Viral Roles & Tech</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Bacteria & Ecosystems</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Nitrogen & Plant Mutualism</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Bacteria & Animal Mutualism</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Weakened forms of a virus used to stimulate the immune system." }, { id: 1, text: "Vaccines" },
                { id: 2, text: "Reprogramming viruses to deliver healthy genes to cells." }, { id: 2, text: "Gene Therapy" },
                { id: 3, text: "In nature, viral diseases help control these to keep them healthy." }, { id: 3, text: "Host Populations" },
                { id: 4, text: "Viruses used to manage specific plant or animal pests." }, { id: 4, text: "Biological Control Agents" },
                { id: 5, text: "Substance produced by the body to fight off viral infections." }, { id: 5, text: "Antibodies" },
                { id: 6, text: "Gene therapy has been developed for sufferers of this condition." }, { id: 6, text: "Cystic Fibrosis" },
                { id: 7, text: "Healthy genes are incorporated into this part of the cell." }, { id: 7, text: "DNA" },
                { id: 8, text: "Viruses can compensate for genes that are..." }, { id: 8, text: "Malfunctioning" },
                { id: 9, text: "Viral roles can be pathogens or tools for..." }, { id: 9, text: "Biotechnology" },
                { id: 10, text: "Vaccines prevent infection by triggering..." }, { id: 10, text: "Immune Response" }
            ],
            'topic2': [
                { id: 1, text: "Bacteria that break down dead organic matter into nutrients." }, { id: 1, text: "Decomposers (Saprophytes)" },
                { id: 2, text: "Chemicals secreted by bacteria to digest dead matter." }, { id: 2, text: "Digestive Enzymes" },
                { id: 3, text: "Gaseous by-product of the decomposition process." }, { id: 3, text: "Carbon Dioxide" },
                { id: 4, text: "Waste by-product of decomposition containing nitrogen." }, { id: 4, text: "Nitrogenous Waste" },
                { id: 5, text: "Where decomposition by-products are returned for reuse." }, { id: 5, text: "The Environment" },
                { id: 6, text: "Bacteria that produce their own food are..." }, { id: 6, text: "Autotrophic" },
                { id: 7, text: "Bacteria play a vital role at the start of these." }, { id: 7, text: "Food Chains" },
                { id: 8, text: "Mode of nutrition for saprophytic bacteria." }, { id: 8, text: "Heterotrophic" },
                { id: 9, text: "A by-product of decomposition alongside $CO_2$ and waste." }, { id: 9, text: "Water" },
                { id: 10, text: "Essential process for nutrient recycling in nature." }, { id: 10, text: "Decomposition" }
            ],
            'topic3': [
                { id: 1, text: "Form of nitrogen that plants are able to use." }, { id: 1, text: "Nitrates" },
                { id: 2, text: "Bacteria that convert atmospheric nitrogen into nitrates." }, { id: 2, text: "Nitrogen-fixing Bacteria" },
                { id: 3, text: "Relationship where both organisms benefit." }, { id: 3, text: "Mutualism" },
                { id: 4, text: "Swelling on legume roots where these bacteria live." }, { id: 4, text: "Root Nodules" },
                { id: 5, text: "Example of a plant with a mutualistic bacterial relationship." }, { id: 5, text: "Legumes (Beans/Peas)" },
                { id: 6, text: "Plants use nitrates to manufacture these." }, { id: 6, text: "Proteins" },
                { id: 7, text: "What the bacteria receive from the plant in return." }, { id: 7, text: "Carbohydrates" },
                { id: 8, text: "Plants cannot use nitrogen in this form." }, { id: 8, text: "Atmospheric Nitrogen" },
                { id: 9, text: "Type of bacteria that can be free-living or mutualistic." }, { id: 9, text: "Nitrogen Fixers" },
                { id: 10, text: "Benefit for the plant in the nitrogen relationship." }, { id: 10, text: "Getting Nitrates" }
            ],
            'topic4': [
                { id: 1, text: "Component of plant cell walls that bacteria help herbivores digest." }, { id: 1, text: "Cellulose" },
                { id: 2, text: "Simple nutrients produced when bacteria break down cellulose." }, { id: 2, text: "Sugars" },
                { id: 3, text: "Part of the human body where mutualistic bacteria live." }, { id: 3, text: "Intestine / Digestive Tract" },
                { id: 4, text: "Vitamin released by bacteria in the human intestine." }, { id: 4, text: "Vitamin B12 / K / E" },
                { id: 5, text: "A stomach chamber in cattle where bacteria ferment food." }, { id: 5, text: "Rumen" },
                { id: 6, text: "What herbivores provide to bacteria in return for digestion." }, { id: 6, text: "Safe Habitat / Food" },
                { id: 7, text: "Relationship between gut bacteria and their hosts." }, { id: 7, text: "Mutualism" },
                { id: 8, text: "Bacteria obtain these from partially digested food." }, { id: 8, text: "Nutrients" },
                { id: 9, text: "The process of breaking down cellulose into simple sugars." }, { id: 9, text: "Fermentation / Digestion" },
                { id: 10, text: "Necessary for animals that eat only plants." }, { id: 10, text: "Cellulose-digesting Bacteria" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Life Sciences Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
