<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Diseases</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Life Sciences: Micro-organism Diseases</h1>
        <p class="game-subtitle">Match the symptoms, treatments, and biological impacts of HIV and TB!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">HIV Biology & Impact</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">HIV Treatments</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Tuberculosis Basics</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Drug Resistance (MDR/XDR)</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Virus that enters blood via body fluids or open wounds." }, { id: 1, text: "HIV" },
                { id: 2, text: "Specific blood cells attacked and destroyed by HIV." }, { id: 2, text: "White Blood Cells" },
                { id: 3, text: "Proteins normally produced by WBCs to fight disease." }, { id: 3, text: "Antibodies" },
                { id: 4, text: "Condition when an HIV+ person has an opportunistic disease." }, { id: 4, text: "AIDS" },
                { id: 5, text: "AIDS stands for Acquired Immune... Syndrome." }, { id: 5, text: "Deficiency" },
                { id: 6, text: "State of being highly vulnerable to other infections." }, { id: 6, text: "Susceptible" },
                { id: 7, text: "Common co-infection that accelerates AIDS progression." }, { id: 7, text: "Tuberculosis" },
                { id: 8, text: "HIV does not currently have this medical outcome." }, { id: 8, text: "A Cure" },
                { id: 9, text: "Acronym for the virus causing immune destruction." }, { id: 9, text: "HIV" },
                { id: 10, text: "White blood cells are also known as..." }, { id: 10, text: "Leukocytes" }
            ],
            'topic2': [
                { id: 1, text: "Emergency treatment following accidental HIV exposure." }, { id: 1, text: "PEP" },
                { id: 2, text: "Long-term medication to inhibit the HIV life cycle." }, { id: 2, text: "ART" },
                { id: 3, text: "PEP must be started within this many hours." }, { id: 3, text: "24 Hours" },
                { id: 4, text: "Duration of the PEP treatment course (days)." }, { id: 4, text: "28 Days" },
                { id: 5, text: "ART stands for Anti-... Therapy." }, { id: 5, text: "Retroviral" },
                { id: 6, text: "Medication that prevents the rapid reproduction of HIV." }, { id: 6, text: "ART Drugs" },
                { id: 7, text: "Treatment specifically for rape survivors or needle-sticks." }, { id: 7, text: "PEP" },
                { id: 8, text: "Goal of ART: allowing patients to live... lives." }, { id: 8, text: "Long and Healthy" },
                { id: 9, text: "PEP stands for Post-... Prophylaxis." }, { id: 9, text: "Exposure" },
                { id: 10, text: "Term for the consistent use of medication as prescribed." }, { id: 10, text: "Adherence" }
            ],
            'topic3': [
                { id: 1, text: "Bacterium that causes Tuberculosis." }, { id: 1, text: "Mycobacterium" },
                { id: 2, text: "Primary organ targeted by the TB bacterium." }, { id: 2, text: "Lungs" },
                { id: 3, text: "Mode of TB transmission through air droplets." }, { id: 3, text: "Coughing/Sneezing" },
                { id: 4, text: "Strategy: Directly Observed Treatment Short-course." }, { id: 4, text: "DOTS" },
                { id: 5, text: "A common symptom: persistent cough and..." }, { id: 5, text: "Weight Loss" },
                { id: 6, text: "When TB bacteria are present but not causing disease." }, { id: 6, text: "Latent TB" },
                { id: 7, text: "Standard duration for a normal TB drug course." }, { id: 7, text: "6 Months" },
                { id: 8, text: "Person who ensures a TB patient takes their pills." }, { id: 8, text: "DOTS Supporter" },
                { id: 9, text: "Major reason for TB drug failure." }, { id: 9, text: "Non-adherence" },
                { id: 10, text: "Tuberculosis is caused by a..." }, { id: 10, text: "Bacterium" }
            ],
            'topic4': [
                { id: 1, text: "Multi-Drug Resistant Tuberculosis." }, { id: 1, text: "MDR TB" },
                { id: 2, text: "Extensively Drug Resistant Tuberculosis." }, { id: 2, text: "XDR TB" },
                { id: 3, text: "Primary cause of TB becoming drug-resistant." }, { id: 3, text: "Stopping treatment early" },
                { id: 4, text: "A change in DNA that allows bacteria to survive drugs." }, { id: 4, text: "Mutation" },
                { id: 5, text: "TB strain often considered 'untreatable'." }, { id: 5, text: "XDR TB" },
                { id: 6, text: "MDR TB can cause death in a few... for HIV+ people." }, { id: 6, text: "Weeks" },
                { id: 7, text: "Key strategy to prevent the spread of XDR TB." }, { id: 7, text: "Isolation" },
                { id: 8, text: "South African province with high XDR TB rates." }, { id: 8, text: "KZN" },
                { id: 9, text: "Resistant bacteria pass this ability to offspring." }, { id: 9, text: "Resistance" },
                { id: 10, text: "MDR and XDR can be passed from... to..." }, { id: 10, text: "Person to Person" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Life Sciences Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
