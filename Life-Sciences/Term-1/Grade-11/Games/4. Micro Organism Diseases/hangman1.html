<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Life Sciences Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Life Sciences Hangman Challenge</h1>
        <p class="game-subtitle">Grade 11: HIV/AIDS & TB (Chapter 4)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "HIV", topic: "Virus", hint: "Human Immuno-deficiency Virus; attacks white blood cells." },
            { word: "AIDS", topic: "Health", hint: "Acquired Immune Deficiency Syndrome; state of severe immune destruction." },
            { word: "ANTIBODIES", topic: "Immunity", hint: "Proteins made by WBCs to fight disease-causing organisms." },
            { word: "WHITE BLOOD CELLS", topic: "Immunity", hint: "Cells in the blood that are the main targets of HIV." },
            { word: "SUSCEPTIBLE", topic: "Health", hint: "When the immune system is destroyed, a person becomes highly ____ to diseases." },
            { word: "PEP", topic: "Treatment", hint: "Post-exposure prophylaxis; emergency treatment within 24-72 hours." },
            { word: "ART", topic: "Treatment", hint: "Anti-retroviral therapy; long-term medication to inhibit HIV replication." },
            { word: "INHIBIT", topic: "ART", hint: "ART drugs ____ the life cycle of the HIV to prevent rapid reproduction." },
            { word: "MYCOBACTERIUM", topic: "TB", hint: "The genus of the bacterium that causes Tuberculosis (TB)." },
            { word: "TUBERCULOSIS", topic: "TB", hint: "A bacterial disease that primarily attacks the lungs." },
            { word: "PULMONARY", topic: "TB", hint: "Term relating to the lungs, where TB is most common." },
            { word: "AEROSOL", topic: "TB", hint: "TB is spread through ____ droplets when an infected person coughs or sneezes." },
            { word: "LATENT", topic: "TB", hint: "TB infection where the bacteria are 'sleeping' and the person is not sick or infectious." },
            { word: "ACTIVE", topic: "TB", hint: "TB disease where bacteria are multiplying and the person has symptoms." },
            { word: "ANTIBIOTICS", topic: "Treatment", hint: "Type of medication used to kill the TB bacteria." },
            { word: "RESISTANCE", topic: "TB", hint: "When bacteria mutate so that standard drugs no longer kill them." },
            { word: "MDR TB", topic: "TB", hint: "Multi-drug resistant TB; resistant to the two most powerful first-line drugs." },
            { word: "XDR TB", topic: "TB", hint: "Extensively drug-resistant TB; resistant to almost all available TB drugs." },
            { word: "MUTATE", topic: "TB", hint: "Standard TB can ____ into drug-resistant forms over time." },
            { word: "DOTS", topic: "Treatment", hint: "Directly Observed Treatment Short-course; a strategy to ensure patients take their meds." },
            { word: "KWAZULU NATAL", topic: "TB", hint: "SA province (KZN) where a severe XDR TB outbreak was identified." },
            { word: "ISOLATE", topic: "Prevention", hint: "The only way to prevent the spread of XDR TB is to ____ carriers." },
            { word: "COMPROMISING", topic: "HIV/AIDS", hint: "HIV acts by ____ the body's immune system." },
            { word: "ACCELERATE", topic: "HIV/TB", hint: "HIV does not cause resistance, but it does ____ the progression of TB." },
            { word: "FLUIDS", topic: "HIV", hint: "HIV enters the blood through open wounds or via body ____." },
            { word: "PROPHYLAXIS", topic: "Treatment", hint: "The 'P' in PEP; treatment intended to prevent disease." },
            { word: "ADHERED", topic: "Treatment", hint: "Treatment must be strictly ____ to for it to be effective." },
            { word: "SYMPTOMS", topic: "TB", hint: "Fever, night sweats, and weight loss are common TB ____." },
            { word: "TRANSMITTED", topic: "TB", hint: "MDR and XDR TB can be ____ from person to person." },
            { word: "SYNDROME", topic: "AIDS", hint: "The 'S' in AIDS; a group of symptoms that occur together." },
            { word: "IMMUNE SYSTEM", topic: "Immunity", hint: "The body's defense against infectious organisms." },
            { word: "PATHOGEN", topic: "General", hint: "Any micro-organism that causes disease." },
            { word: "OPPORTUNISTIC", topic: "HIV/AIDS", hint: "Infections that take advantage of a weak immune system." },
            { word: "CHRONIC", topic: "Treatment", hint: "With ART, HIV is managed as a ____ but liveable condition." },
            { word: "SNEEZE", topic: "TB", hint: "One way TB bacteria are released into the air." },
            { word: "COUGH", topic: "TB", hint: "The most common way TB bacteria are spread from the lungs." },
            { word: "BACTERIUM", topic: "TB", hint: "The type of micro-organism that causes Tuberculosis." },
            { word: "VIRUS", topic: "HIV", hint: "The type of micro-organism that causes HIV." },
            { word: "BLOOD", topic: "HIV", hint: "One of the primary body fluids that transmits HIV." },
            { word: "WOUNDS", topic: "HIV", hint: "HIV can enter the body through open ____." },
            { word: "NIGHT SWEATS", topic: "TB", hint: "A common symptom of active TB disease." },
            { word: "WEIGHT LOSS", topic: "TB", hint: "A common symptom of active TB disease." },
            { word: "PERSISTENT", topic: "TB", hint: "A ____ cough lasting more than two weeks is a TB warning sign." },
            { word: "PHLEGM", topic: "TB", hint: "Infected ____ is tested in a lab to diagnose TB." },
            { word: "FIRST LINE", topic: "TB", hint: "The standard, most effective drugs used to treat normal TB." },
            { word: "SECOND LINE", topic: "TB", hint: "Drugs used to treat MDR TB; they have more side effects." },
            { word: "UNTREATABLE", topic: "TB", hint: "XDR TB is often considered an almost ____ form of the disease." },
            { word: "KZN", topic: "Geography", hint: "Abbreviation for the province where XDR TB was first widely reported in SA." },
            { word: "HIV POSITIVE", topic: "Health", hint: "When a person's blood test shows they have the HIV virus." },
            { word: "HIV NEGATIVE", topic: "Health", hint: "When a person's blood test shows they do NOT have the HIV virus." },
            { word: "CARRIER", topic: "General", hint: "A person who has a pathogen and can pass it to others." },
            { word: "CONTAGIOUS", topic: "General", hint: "Able to be passed easily from one person to another." },
            { word: "INFECTIOUS", topic: "General", hint: "Likely to spread or cause an infection." },
            { word: "PREVENTION", topic: "Public Health", hint: "Steps taken to stop a disease from spreading." },
            { word: "DIAGNOSIS", topic: "Health", hint: "The identification of a disease from its symptoms or tests." },
            { word: "SIDE EFFECTS", topic: "Treatment", hint: "Unwanted physical effects caused by a drug." },
            { word: "REPLICATION", topic: "Virus", hint: "The process of a virus making copies of itself inside a cell." },
            { word: "MUTATION", topic: "Biology", hint: "A change in genetic material that can lead to drug resistance." },
            { word: "EPIDEMIC", topic: "Public Health", hint: "A widespread occurrence of an infectious disease in a community." },
            { word: "PANDEMIC", topic: "Public Health", hint: "An epidemic that has spread across several countries or continents." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Public Health Master!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for HIV/AIDS and TB!";
            document.getElementById('modalWord').innerText = "EXAM READY";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
