<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Diseases Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Life Sciences Challenge</h1>
        <p class="game-subtitle">HIV, AIDS, and TB (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What does HIV stand for?", options: ["Human Immune-deficiency Virus", "Human Infection Virus", "Highly Infectious Virus", "Hidden Immune Virus"], a: 0, hint: "It targets the immune system." },
            { q: "Which cells in the human body does HIV primarily attack?", options: ["Red blood cells", "White blood cells", "Nerve cells", "Skin cells"], a: 1, hint: "These cells are responsible for producing antibodies." },
            { q: "When a person's immune system is destroyed and they contract an additional disease like TB, they are said to have...", options: ["HIV+", "Flu", "AIDS", "Malaria"], a: 2, hint: "Acquired Immune Deficiency Syndrome." },
            { q: "Which of the following is NOT a way HIV enters the human body?", options: ["Open wounds", "Body fluids", "Unprotected sex", "Touching dry skin"], a: 3, hint: "The virus cannot survive long outside body fluids." },
            { q: "What is the primary function of white blood cells (WBCs)?", options: ["Carrying oxygen", "Producing antibodies to fight disease", "Clotting blood", "Digesting food"], a: 1, hint: "They are the body's 'soldiers'." },
            { q: "What does PEP stand for in HIV treatment?", options: ["Permanent Energy Pill", "Post Exposure Prophylaxis", "Primary Emergency Prevention", "Patient Evaluation Program"], a: 1, hint: "Used 'after' a potential exposure." },
            { q: "Within how many hours must PEP treatment ideally start after exposure?", options: ["24 hours", "48 hours", "72 hours", "One week"], a: 0, hint: "Speed is critical for effectiveness." },
            { q: "What does ART stand for in long-term HIV management?", options: ["Advanced Relief Therapy", "Anti-Retroviral Therapy", "Active Resistance Treatment", "Antibody Recovery Tool"], a: 1, hint: "It targets the 'retrovirus' lifecycle." },
            { q: "How does ART medication help HIV+ patients?", options: ["It kills all HIV in the body", "It inhibits the lifecycle and slows reproduction", "It fixes the damaged DNA", "It makes the person immune to all flu"], a: 1, hint: "It keeps the viral load low so the immune system stays strong." },
            { q: "Is there currently a complete cure for HIV/AIDS?", options: ["Yes, but it is expensive", "No, it can only be managed", "Only for children", "Only in Europe"], a: 1, hint: "Medication allows for a long life, but the virus stays in the body." },
            { q: "What is the causative agent of Tuberculosis (TB)?", options: ["A virus", "A bacterium", "A fungus", "A protist"], a: 1, hint: "It is Mycobacterium tuberculosis." },
            { q: "What is the main way TB is spread from person to person?", options: ["Sharing food", "Droplets in the air (coughing/sneezing)", "Touching used clothes", "Bathing in the same water"], a: 1, hint: "It is an airborne infection." },
            { q: "What is 'Latent TB'?", options: ["When a person is dying of TB", "When a person has the bacteria but is not sick or infectious", "When the bacteria is only in the skin", "When the bacteria is dead"], a: 1, hint: "More than half of adult South Africans in KZN have this." },
            { q: "How does HIV affect the progression of a TB infection?", options: ["It slows it down", "It has no effect", "It accelerates it into active TB disease", "It makes TB impossible to catch"], a: 2, hint: "A weakened immune system cannot keep the TB bacteria 'dormant'." },
            { q: "What does MDR-TB stand for?", options: ["Many Disease Resistance", "Multi-Drug Resistant TB", "Medical Drastic Recovery", "Mildly Dangerous Resistance"], a: 1, hint: "This strain doesn't respond to standard TB drugs." },
            { q: "What is the main cause of TB drug resistance?", options: ["Taking too much medicine", "Not finishing the full course of TB medication", "Eating unhealthy food", "Being too young"], a: 1, hint: "Bacteria that survive a partial treatment become stronger." },
            { q: "What does XDR-TB stand for?", options: ["Extra Dangerous Resistance", "Extensively Drug-Resistant TB", "X-ray Detected Resistance", "External Drug Recovery"], a: 1, hint: "This is a very aggressive and hard-to-treat strain." },
            { q: "In which South African province was a major XDR-TB strain identified in the mid-2000s?", options: ["Gauteng", "Western Cape", "KwaZulu-Natal (KZN)", "Limpopo"], a: 2, hint: "The document mentions a specific hospital in Tugela Ferry." },
            { q: "How can XDR-TB be transmitted?", options: ["Only through blood", "Person to person via air", "Only in hospitals", "By eating contaminated beef"], a: 1, hint: "It spreads just like normal TB but is much more dangerous." },
            { q: "Why is MDR-TB particularly dangerous for persons with HIV/AIDS?", options: ["It causes hair loss", "It can cause death within a few weeks", "It only affects the heart", "It makes them immune to ARTs"], a: 1, hint: "The immune system is too weak to fight the aggressive strain." },
            { q: "The first known case of XDR-TB worldwide occurred at which hospital?", options: ["Groote Schuur", "Chris Hani Baragwanath", "Sizwe Hospital in Johannesburg", "Addington Hospital"], a: 2, hint: "It happened in the late 1990s." },
            { q: "What is a major way to prevent the spread of XDR-TB according to the text?", options: ["Giving everyone antibiotics", "Isolating carriers of the strain", "Washing hands twice a day", "Burning all old clothes"], a: 1, hint: "Quarantine prevents the airborne spread to healthy people." },
            { q: "Can a person with normal TB be infected by someone with XDR-TB?", options: ["No, they are already sick", "Yes, the aggressive strain can override them", "Only if they are elderly", "Only in winter"], a: 1, hint: "The resistant strain can still infect others." },
            { q: "What percentage of adult South Africans in KZN are estimated to have latent TB?", options: ["10%", "25%", "More than 50%", "90%"], a: 2, hint: "It is a very high proportion of the population." },
            { q: "How long must the PEP treatment be adhered to?", options: ["7 days", "14 days", "28 days", "6 months"], a: 2, hint: "Almost a full month of medication." },
            { q: "Does HIV itself increase the chance of drug resistance in TB?", options: ["Yes, directly", "No, but it accelerates active disease", "Only in women", "Only in children"], a: 1, hint: "The resistance comes from the bacteria's mutation, not the virus." },
            { q: "MDR and XDR strains are a result of which biological process?", options: ["Photosynthesis", "Mutation of the bacteria", "Human evolution", "Cloning"], a: 1, hint: "The bacteria change their genetic makeup to survive treatment." },
            { q: "What was the identified fatality rate of the first XDR patients at Sizwe Hospital?", options: ["50%", "75%", "All of them subsequently died", "They all recovered"], a: 2, hint: "It showed how untreatable the form was initially." },
            { q: "Tuberculosis primarily attacks which organ system?", options: ["Digestive system", "Respiratory system (Lungs)", "Nervous system", "Skeletal system"], a: 1, hint: "It causes persistent coughing and chest pain." },
            { q: "Why are antibodies important?", options: ["They provide energy", "They identify and neutralize pathogens", "They build muscle", "They help you sleep"], a: 1, hint: "They are the 'keys' that fit into the 'locks' of germs." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Life Sciences Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Science Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
