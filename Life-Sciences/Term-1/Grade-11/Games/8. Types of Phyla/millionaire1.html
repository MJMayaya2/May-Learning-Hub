<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Animal Diversity Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Life Sciences Challenge</h1>
        <p class="game-subtitle">Animal Diversity & Phyla (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the taxonomic rank located immediately below Kingdom and above Class?", options: ["Order", "Family", "Phylum", "Genus"], a: 2, hint: "Organisms in this group share a similar body plan." },
            { q: "Organisms that can be divided into two identical halves along only one plane have...", options: ["Radial symmetry", "Bilateral symmetry", "Asymmetry", "Spherical symmetry"], a: 1, hint: "Think of humans or insects." },
            { q: "What term describes the concentration of sense organs and a brain at the front end of the body?", options: ["Coelom", "Symmetry", "Cephalisation", "Segmentation"], a: 2, hint: "It refers to having a distinct 'head'." },
            { q: "Animals that develop from three embryonic tissue layers are called...", options: ["Diploblastic", "Triploblastic", "Monoblastic", "Acoelomate"], a: 1, hint: "Ectoderm, mesoderm, and endoderm are the layers." },
            { q: "Which phylum is characterized by being asymmetrical and having no distinct head?", options: ["Cnidaria", "Porifera", "Annelida", "Chordata"], a: 1, hint: "These are the sponges." },
            { q: "What is a 'coelom'?", options: ["A digestive opening", "A fluid-filled body cavity within the mesoderm", "A type of nerve cell", "An outer skin layer"], a: 1, hint: "It provides space for complex organs to grow." },
            { q: "Which phylum has radial symmetry and is diploblastic?", options: ["Porifera", "Platyhelminthes", "Cnidaria", "Arthropoda"], a: 2, hint: "Examples include jellyfish and sea anemones." },
            { q: "What is a 'blind-ending gut'?", options: ["A gut with two openings", "A gut with only one opening for both ingestion and egestion", "A gut that doesn't work", "A gut found only in birds"], a: 1, hint: "Food goes in and waste comes out the same way." },
            { q: "Flatworms belong to which phylum?", options: ["Annelida", "Arthropoda", "Platyhelminthes", "Chordata"], a: 2, hint: "They are bilaterally symmetrical and acoelomate." },
            { q: "Which of these phyla was the first to show a 'through-gut' (mouth and anus)?", options: ["Cnidaria", "Porifera", "Annelida", "Platyhelminthes"], a: 2, hint: "These are the segmented worms like earthworms." },
            { q: "Animals in Phylum Porifera are 'sessile'. What does this mean?", options: ["They swim fast", "They do not move and are attached to a surface", "They hunt at night", "They live in trees"], a: 1, hint: "They stay in one place their whole adult life." },
            { q: "Which phylum is characterized by jointed appendages and a chitinous exoskeleton?", options: ["Annelida", "Arthropoda", "Chordata", "Cnidaria"], a: 1, hint: "This is the largest phylum, including insects and crabs." },
            { q: "What is the defining feature of Phylum Chordata?", options: ["An exoskeleton", "A notochord (or backbone in vertebrates)", "Radial symmetry", "No tissue layers"], a: 1, hint: "Humans, birds, and fish belong here." },
            { q: "An animal that develops from only two tissue layers (ectoderm and endoderm) is...", options: ["Triploblastic", "Diploblastic", "Acoelomate", "Coelomate"], a: 1, hint: "Common in simpler animals like jellyfish." },
            { q: "Which phylum contains segmented worms with a true coelom and a closed blood system?", options: ["Platyhelminthes", "Annelida", "Porifera", "Arthropoda"], a: 1, hint: "Earthworms are the classic example." },
            { q: "Cephalisation is most commonly associated with which type of symmetry?", options: ["Asymmetry", "Radial symmetry", "Bilateral symmetry", "No symmetry"], a: 2, hint: "Moving head-first requires senses at the front." },
            { q: "In which phylum does digestion happen 'intracellularly' because there is no gut?", options: ["Porifera", "Cnidaria", "Annelida", "Chordata"], a: 0, hint: "Cells filter food directly from the water." },
            { q: "What is the disadvantage of a blind-ending gut?", options: ["It is too long", "Ingestion and egestion cannot happen at the same time", "It uses too much energy", "It has no sense organs"], a: 1, hint: "It is less efficient than a continuous tube." },
            { q: "Which phylum has the most diverse range of habitats, from deep sea to high mountains?", options: ["Porifera", "Arthropoda", "Cnidaria", "Platyhelminthes"], a: 1, hint: "Their adaptable body plan allows them to live almost anywhere." },
            { q: "The 'mesoderm' tissue layer is responsible for developing which structures?", options: ["Skin and nerves", "Digestive lining", "Muscles and some internal organs", "Hair and feathers"], a: 2, hint: "It is the middle layer in triploblastic animals." },
            { q: "Which phylum includes both free-living and parasitic organisms like tapeworms?", options: ["Porifera", "Platyhelminthes", "Cnidaria", "Chordata"], a: 1, hint: "They are flat and lack a body cavity." },
            { q: "Acoelomate animals lack what?", options: ["A head", "A mouth", "A fluid-filled body cavity", "Tissue layers"], a: 2, hint: "Their bodies are solid tissue between the gut and skin." },
            { q: "Which phylum uses a 'hydrostatic skeleton' for movement?", options: ["Arthropoda", "Annelida", "Porifera", "Chordata"], a: 1, hint: "They use fluid pressure within their segments." },
            { q: "What is the primary mode of living for Phylum Porifera?", options: ["Terrestrial", "Aquatic (mainly marine)", "Parasitic", "Aerial"], a: 1, hint: "They are found in the ocean." },
            { q: "Which of these is NOT one of the five key aspects of a body plan?", options: ["Symmetry", "Coelom", "Blood Systems", "Coloration"], a: 3, hint: "Look at the primary structural features mentioned in Chapter 8." },
            { q: "Arthropods must undergo 'moulting'. Why?", options: ["To change color", "To grow, as their exoskeleton does not expand", "To lay eggs", "To breathe better"], a: 1, hint: "The hard outer shell is fixed in size." },
            { q: "Which phylum shows radial symmetry and has no cephalisation?", options: ["Cnidaria", "Arthropoda", "Annelida", "Chordata"], a: 0, hint: "The body parts are arranged around a central axis like a wheel." },
            { q: "Human beings are members of which Phylum?", options: ["Arthropoda", "Chordata", "Annelida", "Porifera"], a: 1, hint: "We have a vertebral column." },
            { q: "What describes the blood system of Phylum Annelida?", options: ["No blood system", "Open blood system", "Closed blood system with vessels", "Blood only in the gut"], a: 2, hint: "Blood stays within tubes throughout the body." },
            { q: "Which embryonic layer develops into the central nervous system?", options: ["Endoderm", "Mesoderm", "Ectoderm", "Coelom"], a: 2, hint: "It is the outermost layer." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Life Sciences Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Science Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
