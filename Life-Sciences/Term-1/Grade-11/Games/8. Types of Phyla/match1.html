<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Animal Body Plans</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.9rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Life Sciences: Animal Phyla</h1>
        <p class="game-subtitle">Match the body plans and characteristics of the 6 major phyla!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Body Plan Concepts</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Porifera & Cnidaria</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Worms & Arthropods</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Phyla Comparison</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Symmetry where the body can be divided into two identical halves in any plane." }, { id: 1, text: "Radial Symmetry" },
                { id: 2, text: "Symmetry where the body can be divided into right and left halves in only one plane." }, { id: 2, text: "Bilateral Symmetry" },
                { id: 3, text: "The concentration of sense organs and a brain at the front (head) end." }, { id: 3, text: "Cephalisation" },
                { id: 4, text: "Animals developing from only two tissue layers: ectoderm and endoderm." }, { id: 4, text: "Diploblastic" },
                { id: 5, text: "Animals developing from three tissue layers, including the mesoderm." }, { id: 5, text: "Triploblastic" },
                { id: 6, text: "A fluid-filled body cavity located within the mesoderm." }, { id: 6, text: "Coelom" },
                { id: 7, text: "Animals that lack a body cavity entirely." }, { id: 7, text: "Acoelomate" },
                { id: 8, text: "A gut with only one opening for both ingestion and egestion." }, { id: 8, text: "Blind-ending Gut" },
                { id: 9, text: "A gut with two openings: a mouth and an anus." }, { id: 9, text: "Through Gut" },
                { id: 10, text: "An organism that remains fixed in one place and does not move." }, { id: 10, text: "Sessile" }
            ],
            'topic2': [
                { id: 1, text: "Phylum containing sponges; asymmetrical and sessile." }, { id: 1, text: "Porifera" },
                { id: 2, text: "Phylum containing jellyfish and sea anemones; radial symmetry." }, { id: 2, text: "Cnidaria" },
                { id: 3, text: "Porifera lack this type of specialized digestive system." }, { id: 3, text: "Gut" },
                { id: 4, text: "Cnidaria have this type of gut with one opening." }, { id: 4, text: "Blind-ending" },
                { id: 5, text: "The two tissue layers found in Cnidaria." }, { id: 5, text: "Ectoderm & Endoderm" },
                { id: 6, text: "Sponges are aquatic and mainly live in this environment." }, { id: 6, text: "Marine" },
                { id: 7, text: "Cnidaria have no distinct head, meaning no..." }, { id: 7, text: "Cephalisation" },
                { id: 8, text: "How Porifera digest their food." }, { id: 8, text: "Intracellularly" },
                { id: 9, text: "Cnidaria use these to capture prey (not named in text, but implied)." }, { id: 9, text: "Stinging Cells" },
                { id: 10, text: "Porifera body plan classification regarding tissue layers." }, { id: 10, text: "Diploblastic" }
            ],
            'topic3': [
                { id: 1, text: "Phylum of flatworms; bilateral symmetry and acoelomate." }, { id: 1, text: "Platyhelminthes" },
                { id: 2, text: "Phylum of segmented worms (earthworms); coelomate." }, { id: 2, text: "Annelida" },
                { id: 3, text: "Phylum including insects and crabs; jointed appendages." }, { id: 3, text: "Arthropoda" },
                { id: 4, text: "The middle tissue layer present in triploblastic animals." }, { id: 4, text: "Mesoderm" },
                { id: 5, text: "Arthropoda have this type of skeleton on the outside." }, { id: 5, text: "Exoskeleton" },
                { id: 6, text: "Annelids and Arthropods both have this type of complete gut." }, { id: 6, text: "Through Gut" },
                { id: 7, text: "Platyhelminthes lack a body cavity, so they are..." }, { id: 7, text: "Acoelomate" },
                { id: 8, text: "The presence of a coelom allows for a more complex..." }, { id: 8, text: "Blood System" },
                { id: 9, text: "Bilateral symmetry is usually associated with the development of a..." }, { id: 9, text: "Head (Cephalisation)" },
                { id: 10, text: "Arthropods are the most successful phylum because they are so..." }, { id: 10, text: "Diverse" }
            ],
            'topic4': [
                { id: 1, text: "Phylum that includes humans and other vertebrates." }, { id: 1, text: "Chordata" },
                { id: 2, text: "Feature shared by Annelida, Arthropoda, and Chordata." }, { id: 2, text: "Coelomate" },
                { id: 3, text: "Symmetry found in all phyla except Porifera and Cnidaria." }, { id: 3, text: "Bilateral" },
                { id: 4, text: "Only Porifera is described as having this symmetry." }, { id: 4, text: "Asymmetrical" },
                { id: 5, text: "Number of openings in the gut of a Chordate." }, { id: 5, text: "Two (Through Gut)" },
                { id: 6, text: "Porifera and Cnidaria are both..." }, { id: 6, text: "Diploblastic" },
                { id: 7, text: "Platyhelminthes to Chordata are all..." }, { id: 7, text: "Triploblastic" },
                { id: 8, text: "Phylum classification based on relatedness through history." }, { id: 8, text: "Evolutionary History" },
                { id: 9, text: "Highest taxonomic rank mentioned in the document." }, { id: 9, text: "Kingdom" },
                { id: 10, text: "The concept of phyla groups organisms with a similar..." }, { id: 10, text: "Body Plan" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Life Sciences Phyla Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
