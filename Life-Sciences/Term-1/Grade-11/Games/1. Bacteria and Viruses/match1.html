    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Micro-organisms</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Life Sciences: Micro-organisms</h1>
        <p class="game-subtitle">Match the features of bacteria, viruses, and their impact on life!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Virus Characteristics</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Bacteria Structure</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Roles & Diseases</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Bacteria vs Viruses</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Considered non-living as they require a host cell to replicate." }, { id: 1, text: "Viruses" },
                { id: 2, text: "Outer protein coat enclosing the nucleic acid core." }, { id: 2, text: "Capsid" },
                { id: 3, text: "Viruses that must live inside a host cell are called..." }, { id: 3, text: "Obligate Endoparasites" },
                { id: 4, text: "The core of a virus consists of either DNA or this." }, { id: 4, text: "RNA" },
                { id: 5, text: "Organisms that cause diseases." }, { id: 5, text: "Pathogenic" },
                { id: 6, text: "Viruses are only visible using this type of microscope." }, { id: 6, text: "Electron Microscope" },
                { id: 7, text: "Viruses usually attack only certain tissues, making them..." }, { id: 7, text: "Host Specific" },
                { id: 8, text: "Viruses do not eat, breathe, or do this." }, { id: 8, text: "Respire" },
                { id: 9, text: "Example of a virus: SARS-CoV-2 causes this." }, { id: 9, text: "COVID-19" },
                { id: 10, text: "Viruses lack their own metabolic..." }, { id: 10, text: "Machinery" }
            ],
            'topic2': [
                { id: 1, text: "Unicellular living organisms with no true nucleus." }, { id: 1, text: "Bacteria" },
                { id: 2, text: "Asexual reproduction where one cell splits into two." }, { id: 2, text: "Binary Fission" },
                { id: 3, text: "The protective layer outside the bacterial cell wall." }, { id: 3, text: "Slime Capsule" },
                { id: 4, text: "Whip-like structure used for movement." }, { id: 4, text: "Flagellum" },
                { id: 5, text: "Small circular DNA molecules found in bacteria." }, { id: 5, text: "Plasmids" },
                { id: 6, text: "General size range of bacteria (micrometers)." }, { id: 6, text: "0.2 to 2" },
                { id: 7, text: "Bacteria that help with digestion in the gut." }, { id: 7, text: "Gut Flora" },
                { id: 8, text: "Structure used by bacteria for protein synthesis." }, { id: 8, text: "Ribosomes" },
                { id: 9, text: "Cell wall of bacteria is made primarily of this." }, { id: 9, text: "Peptidoglycan" },
                { id: 10, text: "Bacteria that convert nitrogen for plants." }, { id: 10, text: "Nitrogen Fixers" }
            ],
            'topic3': [
                { id: 1, text: "Bacterial infections are typically treated with these." }, { id: 1, text: "Antibiotics" },
                { id: 2, text: "Used to manage or prevent viral infections." }, { id: 2, text: "Vaccines" },
                { id: 3, text: "A beneficial role of bacteria in the food industry." }, { id: 3, text: "Fermentation" },
                { id: 4, text: "Example of a bacterium causing food poisoning." }, { id: 4, text: "Salmonella" },
                { id: 5, text: "Bacteria that break down dead organic matter." }, { id: 5, text: "Decomposers" },
                { id: 6, text: "Example of a viral disease that attacks the immune system." }, { id: 6, text: "HIV" },
                { id: 7, text: "Special viruses that target and kill harmful bacteria." }, { id: 7, text: "Bacteriophages" },
                { id: 8, text: "Antibiotics are ineffective against these." }, { id: 8, text: "Viruses" },
                { id: 9, text: "Using bacteria to produce insulin is an example of..." }, { id: 9, text: "Biotechnology" },
                { id: 10, text: "Bacteria used to make yogurt." }, { id: 10, text: "Lactobacillus" }
            ],
            'topic4': [
                { id: 1, text: "Size: 20 to 400 nanometers (smaller)." }, { id: 1, text: "Viruses" },
                { id: 2, text: "Size: 0.2 to 2 micrometers (larger)." }, { id: 2, text: "Bacteria" },
                { id: 3, text: "Living nature: Unicellular organisms." }, { id: 3, text: "Bacteria" },
                { id: 4, text: "Living nature: Non-living particles." }, { id: 4, text: "Viruses" },
                { id: 5, text: "Structure: Cytoplasm, ribosomes, and DNA/RNA." }, { id: 5, text: "Bacteria" },
                { id: 6, text: "Structure: Genetic material in a protein coat." }, { id: 6, text: "Viruses" },
                { id: 7, text: "Metabolism: Have their own energy machinery." }, { id: 7, text: "Bacteria" },
                { id: 8, text: "Metabolism: Lack machinery to generate energy." }, { id: 8, text: "Viruses" },
                { id: 9, text: "Treatment: Antivirals or symptom relief." }, { id: 9, text: "Viruses" },
                { id: 10, text: "Treatment: Antibiotics." }, { id: 10, text: "Bacteria" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Well done! Grade 11 Life Sciences Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
