    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Protista & Fungi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Life Sciences: Protista & Fungi</h1>
        <p class="game-subtitle">Match the organisms, their structures, and ecological roles!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Kingdom Protista</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Amoeba Structure</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Kingdom Fungi</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Rhizopus Anatomy</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Plant-like protists that are autotrophic, such as green algae." }, { id: 1, text: "Algae" },
                { id: 2, text: "Unicellular heterotrophic, animal-like protists." }, { id: 2, text: "Protozoa" },
                { id: 3, text: "Fungus-like protists that are heterotrophic decomposers." }, { id: 3, text: "Slime Moulds" },
                { id: 4, text: "The sub-group that Amoeba belongs to." }, { id: 4, text: "Protozoa" },
                { id: 5, text: "The sub-group that Seaweed belongs to." }, { id: 5, text: "Algae" },
                { id: 6, text: "The environment where most protists are found." }, { id: 6, text: "Water/Damp Soil" },
                { id: 7, text: "Protists are eukaryotic because they have a true..." }, { id: 7, text: "Nucleus" },
                { id: 8, text: "A diverse kingdom including diatoms and protozoans." }, { id: 8, text: "Kingdom Protista" },
                { id: 9, text: "Protists that produce their own food using sunlight." }, { id: 9, text: "Autotrophic" },
                { id: 10, text: "Protists that must consume other organic matter." }, { id: 10, text: "Heterotrophic" }
            ],
            'topic2': [
                { id: 1, text: "False feet used by Amoeba for movement and feeding." }, { id: 1, text: "Pseudopodia" },
                { id: 2, text: "Organelle that controls water balance (osmo-regulation)." }, { id: 2, text: "Contractile Vacuole" },
                { id: 3, text: "Where engulfed food is digested within the Amoeba." }, { id: 3, text: "Food Vacuole" },
                { id: 4, text: "Outer, semi-solid part of the Amoeba's cytoplasm." }, { id: 4, text: "Ectoplasm" },
                { id: 5, text: "Inner, more liquid part of the Amoeba's cytoplasm." }, { id: 5, text: "Endoplasm" },
                { id: 6, text: "Organelle that controls all cell activities." }, { id: 6, text: "Nucleus" },
                { id: 7, text: "The boundary that allows for gaseous exchange." }, { id: 7, text: "Plasma Membrane" },
                { id: 8, text: "Amoeba lacks a fixed shape, making it..." }, { id: 8, text: "Asymmetrical" },
                { id: 9, text: "Process of engulfing prey using pseudopodia." }, { id: 9, text: "Phagocytosis" },
                { id: 10, text: "Type of asexual reproduction in Amoeba." }, { id: 10, text: "Binary Fission" }
            ],
            'topic3': [
                { id: 1, text: "Fungi that live on dead organic matter." }, { id: 1, text: "Saprophytes" },
                { id: 2, text: "Network of thread-like filaments making up a fungus." }, { id: 2, text: "Hyphae" },
                { id: 3, text: "The collective term for all the hyphae of a fungus." }, { id: 3, text: "Mycelium" },
                { id: 4, text: "An example of a unicellular fungus." }, { id: 4, text: "Yeast" },
                { id: 5, text: "Fungi cell walls are made of this material." }, { id: 5, text: "Chitin" },
                { id: 6, text: "Fungi that live on or in living hosts, causing harm." }, { id: 6, text: "Parasites" },
                { id: 7, text: "A fungal body without true roots, stems, or leaves." }, { id: 7, text: "Thallus" },
                { id: 8, text: "Fungi cannot photosynthesize because they lack..." }, { id: 8, text: "Chloroplasts" },
                { id: 9, text: "Method by which fungi obtain nutrients externally." }, { id: 9, text: "Extracellular Digestion" },
                { id: 10, text: "Mode of nutrition for all fungi." }, { id: 10, text: "Heterotrophic" }
            ],
            'topic4': [
                { id: 1, text: "Root-like structures that anchor and absorb nutrients." }, { id: 1, text: "Rhizoids" },
                { id: 2, text: "Horizontal hyphae that spread across the substrate." }, { id: 2, text: "Stolons" },
                { id: 3, text: "Upright hyphae that support the spore cases." }, { id: 3, text: "Sporangiophores" },
                { id: 4, text: "Structure where spores are produced." }, { id: 4, text: "Sporangium" },
                { id: 5, text: "The cross wall separating the sporangium." }, { id: 5, text: "Columella" },
                { id: 6, text: "Reproductive cells that germinate into new mycelia." }, { id: 6, text: "Spores" },
                { id: 7, text: "Common name for the fungus Rhizopus." }, { id: 7, text: "Bread Mould" },
                { id: 8, text: "Rhizoids secrete these to digest bread." }, { id: 8, text: "Enzymes" },
                { id: 9, text: "Hyphae containing many nuclei but no cross walls." }, { id: 9, text: "Aseptate/Multinucleate" },
                { id: 10, text: "The surface (like bread) that the fungus grows on." }, { id: 10, text: "Substrate" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Well done! Grade 11 Life Sciences Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
