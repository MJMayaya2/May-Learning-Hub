    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Life Sciences: Immunity</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Life Sciences: Immunity</h1>
        <p class="game-subtitle">Match the immune responses, types of immunity, and vaccination concepts!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Immune Response Basics</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Natural & Passive Immunity</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Active Immunity & Vaccines</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Antibodies & Protection</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "The body's ability to resist infection and disease." }, { id: 1, text: "Immunity" },
                { id: 2, text: "Blood cells that produce antibodies to fight microbes." }, { id: 2, text: "White Blood Cells" },
                { id: 3, text: "Specific proteins produced by the body to attack a particular microbe." }, { id: 3, text: "Antibodies" },
                { id: 4, text: "The immune system recognizes and rejects these outside tissues." }, { id: 4, text: "Foreign Cells" },
                { id: 5, text: "A disease-causing micro-organism." }, { id: 5, text: "Microbe/Pathogen" },
                { id: 6, text: "Proteins on the surface of pathogens that trigger an immune response." }, { id: 6, text: "Antigens" },
                { id: 7, text: "Once produced, these stay in the body for life to fight reinfection." }, { id: 7, text: "Antibodies" },
                { id: 8, text: "Body's inherent ability to produce antibodies." }, { id: 8, text: "Natural Immunity" },
                { id: 9, text: "The term for something that causes a reaction from the immune system." }, { id: 9, text: "Stimulus" },
                { id: 10, text: "The type of cell that 'eats' or engulfs bacteria." }, { id: 10, text: "Phagocyte" }
            ],
            'topic2': [
                { id: 1, text: "Immunity obtained without using the person's own immune system." }, { id: 1, text: "Passive Immunity" },
                { id: 2, text: "Immunity passed from a mother to a baby via breast milk." }, { id: 2, text: "Passively Acquired" },
                { id: 3, text: "Ready-made antibodies supplied in a medical serum." }, { id: 3, text: "Artificial Passive" },
                { id: 4, text: "Does not require the body to make its own antibodies." }, { id: 4, text: "Passive Immunity" },
                { id: 5, text: "Source of natural passive immunity for newborns." }, { id: 5, text: "Maternal Antibodies" },
                { id: 6, text: "Serum containing antibodies is often called..." }, { id: 6, text: "Antiserum" },
                { id: 7, text: "Passive immunity provides protection that is..." }, { id: 7, text: "Immediate but Short-term" },
                { id: 8, text: "Obtained naturally from breast milk or the placenta." }, { id: 8, text: "Passive Immunity" },
                { id: 9, text: "Ready-made antibodies are also known as..." }, { id: 9, text: "Monoclonal Antibodies" },
                { id: 10, text: "A key benefit of passive immunity for a sick person." }, { id: 10, text: "Rapid Protection" }
            ],
            'topic3': [
                { id: 1, text: "Immunity obtained through natural infection or vaccination." }, { id: 1, text: "Active Immunity" },
                { id: 2, text: "A liquid containing proteins of a specific pathogen." }, { id: 2, text: "Vaccine" },
                { id: 3, text: "Active immunity resulting from surviving a disease." }, { id: 3, text: "Natural Active" },
                { id: 4, text: "Active immunity resulting from a medical injection." }, { id: 4, text: "Artificial Active" },
                { id: 5, text: "Vaccines stimulate the body to produce these." }, { id: 5, text: "Own Antibodies" },
                { id: 6, text: "The immune system 'remembers' the pathogen after this." }, { id: 6, text: "Vaccination" },
                { id: 7, text: "Artificial active immunity is commonly called..." }, { id: 7, text: "Immunisation" },
                { id: 8, text: "Process of introducing a vaccine into the body." }, { id: 8, text: "Vaccination" },
                { id: 9, text: "Wait time for active immunity to become effective." }, { id: 9, text: "Days or Weeks" },
                { id: 10, text: "The protection from active immunity usually lasts..." }, { id: 10, text: "Long-term/For Life" }
            ],
            'topic4': [
                { id: 1, text: "Antibodies are specific; they only attack a particular..." }, { id: 1, text: "Microbe" },
                { id: 2, text: "What WBCs do when a foreign protein enters the body." }, { id: 2, text: "Produce Antibodies" },
                { id: 3, text: "Vaccines contain proteins from micro-organisms that are..." }, { id: 3, text: "Weakened/Dead" },
                { id: 4, text: "Result of antibodies remaining in the blood system." }, { id: 4, text: "Lifelong Protection" },
                { id: 5, text: "Recognizing and rejecting foreign tissues is the job of the..." }, { id: 5, text: "Immune System" },
                { id: 6, text: "Immunity obtained through monoclonal antibodies." }, { id: 6, text: "Artificial Passive" },
                { id: 7, text: "Immunity obtained through a natural infection." }, { id: 7, text: "Natural Active" },
                { id: 8, text: "Immunity obtained through a vaccination." }, { id: 8, text: "Artificial Active" },
                { id: 9, text: "Ready-made antibodies provided in a serum." }, { id: 9, text: "Passive Artificial" },
                { id: 10, text: "Natural passive immunity comes from mother's..." }, { id: 10, text: "Breast Milk" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Life Sciences Immunity Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
