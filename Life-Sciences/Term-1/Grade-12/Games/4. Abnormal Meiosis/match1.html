<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Life Sciences: Abnormal Meiosis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.9rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Life Sciences: Abnormal Meiosis</h1>
        <p class="game-subtitle">Match the causes, results, and characteristics of chromosomal errors!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Non-Disjunction</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Down Syndrome</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Mitosis vs Meiosis</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">General Commonalities</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "The failure of homologous chromosomes or chromatids to separate." }, { id: 1, text: "Non-disjunction" },
                { id: 2, text: "Failure of bivalent chromosomes to separate during this phase." }, { id: 2, text: "Anaphase I" },
                { id: 3, text: "Failure of sister chromatids to separate during this phase." }, { id: 3, text: "Anaphase II" },
                { id: 4, text: "Result of non-disjunction where a gamete has an extra chromosome." }, { id: 4, text: "Abnormal Gamete" },
                { id: 5, text: "Result of non-disjunction where a gamete lacks a copy of a chromosome." }, { id: 5, text: "Abnormal Gamete" },
                { id: 6, text: "Caused by the failure of the centromere to split." }, { id: 6, text: "Non-disjunction in Anaphase II" },
                { id: 7, text: "Mistakes in meiosis often lead to __________ abnormalities." }, { id: 7, text: "Chromosomal" },
                { id: 8, text: "Phase where spindle fibers normally pull chromosomes apart." }, { id: 8, text: "Anaphase" },
                { id: 9, text: "A consequence of non-disjunction in pair 21." }, { id: 9, text: "Down Syndrome" },
                { id: 10, text: "When abnormal gametes fuse with normal ones, it results in..." }, { id: 10, text: "Genetic Disorders" }
            ],
            'topic2': [
                { id: 1, text: "A condition where the embryo has three copies of chromosome 21." }, { id: 1, text: "Down Syndrome" },
                { id: 2, text: "The medical term for having three copies of a chromosome." }, { id: 2, text: "Trisomy" },
                { id: 3, text: "Down Syndrome is also referred to as __________ 21." }, { id: 3, text: "Trisomy" },
                { id: 4, text: "Probability of Down Syndrome: affects 1 out of every __________ babies." }, { id: 4, text: "800" },
                { id: 5, text: "Symptom: Slow development and mental __________." }, { id: 5, text: "Retardation" },
                { id: 6, text: "Physical symptom: Distinctive __________ features." }, { id: 6, text: "Facial" },
                { id: 7, text: "Down Syndrome is the most common disorder caused by __________ abnormalities." }, { id: 7, text: "Chromosomal" },
                { id: 8, text: "Non-disjunction can occur during development of either the egg or __________." }, { id: 8, text: "Sperm" },
                { id: 9, text: "The chromosome number of a Down Syndrome individual is..." }, { id: 9, text: "47" },
                { id: 10, text: "Total number of chromosomes in a normal human cell." }, { id: 10, text: "46" }
            ],
            'topic3': [
                { id: 1, text: "Division occurring only in somatic (body) cells." }, { id: 1, text: "Mitosis" },
                { id: 2, text: "Division occurring in sex organs to form gametes." }, { id: 2, text: "Meiosis" },
                { id: 3, text: "Produces two genetically identical daughter cells." }, { id: 3, text: "Mitosis" },
                { id: 4, text: "Produces four genetically different daughter cells." }, { id: 4, text: "Meiosis" },
                { id: 5, text: "Chromosomes are NOT arranged in pairs during prophase." }, { id: 5, text: "Mitosis" },
                { id: 6, text: "Chromosomes are arranged in homologous pairs during Prophase I." }, { id: 6, text: "Meiosis" },
                { id: 7, text: "Resulting cells are diploid (same as parent)." }, { id: 7, text: "Mitosis" },
                { id: 8, text: "Resulting cells are haploid (half of parent)." }, { id: 8, text: "Meiosis" },
                { id: 9, text: "Phase where the nucleus divides twice." }, { id: 9, text: "Meiosis" },
                { id: 10, text: "Phase where the nucleus divides once." }, { id: 10, text: "Mitosis" }
            ],
            'topic4': [
                { id: 1, text: "DNA replication occurs before both processes." }, { id: 1, text: "Similarity" },
                { id: 2, text: "Spindle fibers are formed in both processes." }, { id: 2, text: "Similarity" },
                { id: 3, text: "Term for the division of the nucleus." }, { id: 3, text: "Karyokinesis" },
                { id: 4, text: "Term for the division of the cytoplasm." }, { id: 4, text: "Cytokinesis" },
                { id: 5, text: "Both processes involve the division of __________." }, { id: 5, text: "Cells" },
                { id: 6, text: "New cells are always formed at the end of the __________." }, { id: 6, text: "Division" },
                { id: 7, text: "Commonality: Both use a __________ equator during metaphase." }, { id: 7, text: "Metaphase Plate" },
                { id: 8, text: "Both involve the movement of __________ to opposite poles." }, { id: 8, text: "Chromatids/Chromosomes" },
                { id: 9, text: "Both start with a __________ parent cell." }, { id: 9, text: "Diploid" },
                { id: 10, text: "Commonality: Both are types of __________ division." }, { id: 10, text: "Nuclear" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 12 Life Sciences: Abnormal Meiosis Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
