<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Life Sciences Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Life Sciences Hangman Challenge</h1>
        <p class="game-subtitle">Grade 12: Menstrual Cycle & Development (Chapter 7)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "MENSTRUATION", topic: "Cycle", hint: "The breaking down and shedding of the endometrium via the vagina." },
            { word: "ENDOMETRIUM", topic: "Cycle", hint: "The blood-rich inner lining of the uterus where implantation occurs." },
            { word: "PROGESTERONE", topic: "Hormones", hint: "Hormone produced by the corpus luteum to maintain the uterine wall." },
            { word: "OESTROGEN", topic: "Hormones", hint: "Hormone responsible for the repair and thickening of the endometrium." },
            { word: "FSH", topic: "Hormones", hint: "Hormone that stimulates the development of a follicle in the ovary." },
            { word: "LH", topic: "Hormones", hint: "Hormone that triggers ovulation on approximately the 14th day." },
            { word: "OVULATION", topic: "Cycle", hint: "The release of a mature ovum from the Graafian follicle." },
            { word: "CORPUS LUTEUM", topic: "Cycle", hint: "The 'yellow body' formed from an empty follicle that secretes progesterone." },
            { word: "FERTILISATION", topic: "Development", hint: "The fusion of sperm and egg nuclei to form a diploid zygote." },
            { word: "IMPLANTATION", topic: "Development", hint: "The attachment of a fertilised egg into the endometrium." },
            { word: "PLACENTA", topic: "Development", hint: "Organ through which food and oxygen pass from mother to embryo." },
            { word: "UMBILICAL CORD", topic: "Development", hint: "The structure containing blood vessels that joins the foetus to the placenta." },
            { word: "AMNION", topic: "Membranes", hint: "The inner fluid-filled sac that surrounds and protects the embryo." },
            { word: "CHORION", topic: "Membranes", hint: "The outer membrane that covers the amnion." },
            { word: "AMNIOTIC FLUID", topic: "Protection", hint: "Acts as a shock absorber and protects the embryo from dehydration." },
            { word: "CHORIONIC VILLI", topic: "Development", hint: "Finger-like outgrowths that project into the uterine blood spaces." },
            { word: "UMBILICAL ARTERY", topic: "Circulation", hint: "Carries carbon dioxide and nitrogenous wastes to the placenta." },
            { word: "UMBILICAL VEIN", topic: "Circulation", hint: "Carries oxygen and nutrients from the placenta to the foetus." },
            { word: "MORULA", topic: "Development", hint: "A solid ball of cells formed after several mitotic divisions of the zygote." },
            { word: "BLASTOCYST", topic: "Development", hint: "The hollow ball of cells stage that implants into the uterus." },
            { word: "PITUITARY", topic: "Hormones", hint: "The master gland that secretes FSH and LH." },
            { word: "GRAAFIAN FOLLICLE", topic: "Cycle", hint: "The mature follicle that secretes oestrogen." },
            { word: "FALLOPIAN TUBE", topic: "Location", hint: "The tube where fertilisation and the early stages of mitosis occur." },
            { word: "VAGINA", topic: "Cycle", hint: "The canal through which menstrual blood and mucus are discharged." },
            { word: "DISINTEGRATE", topic: "Cycle", hint: "What the corpus luteum does if fertilisation does not occur." },
            { word: "PREGNANCY", topic: "Hormones", hint: "If this occurs, the corpus luteum remains to keep progesterone levels high." },
            { word: "TWENTY EIGHT", topic: "Cycle", hint: "The average number of days in a menstrual cycle." },
            { word: "FIVE DAYS", topic: "Cycle", hint: "The average duration of menstrual discharge." },
            { word: "FOURTEEN", topic: "Cycle", hint: "Ovulation typically occurs on day ____ of the cycle." },
            { word: "NITROGENOUS", topic: "Development", hint: "Type of waste removed from the foetus via the umbilical artery." },
            { word: "DEHYDRATION", topic: "Protection", hint: "The amniotic fluid prevents the embryo from ____." },
            { word: "SHOCK ABSORBER", topic: "Protection", hint: "A major physical function of the amniotic fluid." },
            { word: "PASSIVE IMMUNITY", topic: "Placenta", hint: "The placenta produces antibodies to provide this to the foetus." },
            { word: "DIFFUSION", topic: "Placenta", hint: "Process by which nutrients move from mother's blood to foetal blood." },
            { word: "COWPER GLAND", topic: "Male", hint: "Accessory gland that produces alkaline fluid." },
            { word: "SEMINAL VESICLE", topic: "Male", hint: "Gland that provides fructose for sperm energy." },
            { word: "ACROSOME", topic: "Sperm", hint: "Contains enzymes to penetrate the ovum." },
            { word: "CERVIX", topic: "Female", hint: "The lower narrow part of the uterus." },
            { word: "OOGENESIS", topic: "Gametogenesis", hint: "The process of forming a haploid ovum." },
            { word: "SPERMATOGENESIS", topic: "Gametogenesis", hint: "The process of forming haploid sperm cells." },
            { word: "GERMINAL", topic: "Gametogenesis", hint: "The ____ epithelium is where gamete production begins." },
            { word: "MEIOSIS", topic: "Gametogenesis", hint: "The type of cell division that produces haploid gametes." },
            { word: "DIPLOID", topic: "Genetics", hint: "The zygote is a ____ cell (46 chromosomes)." },
            { word: "HAPLOID", topic: "Genetics", hint: "Gametogenesis produces ____ cells (23 chromosomes)." },
            { word: "UREA", topic: "Placenta", hint: "One of the waste products that pass out from the embryo." },
            { word: "MUSCULAR", topic: "Uterus", hint: "The uterine walls are thick and ____ to protect the embryo." },
            { word: "FINGER LIKE", topic: "Placenta", hint: "Shape of the chorionic villi." },
            { word: "ATTACHMENT", topic: "Placenta", hint: "The placenta forms the ____ of the embryo to the mother." },
            { word: "OXYGEN", topic: "Circulation", hint: "Essential gas carried to the foetus by the umbilical vein." },
            { word: "DISCHARGE", topic: "Cycle", hint: "Menstruation involves the ____ of blood and mucus." },
            { word: "STIMULATES", topic: "Hormones", hint: "FSH ____ the maturation of the Graafian follicle." },
            { word: "MATURATION", topic: "Hormones", hint: "FSH is responsible for the ____ of the primary follicle." },
            { word: "TRIGGER", topic: "Hormones", hint: "A sudden rise in LH is the ____ for ovulation." },
            { word: "ANTIBODIES", topic: "Placenta", hint: "Proteins provided by the placenta for immunity." },
            { word: "BARRIER", topic: "Placenta", hint: "The placenta acts as a ____ against some pathogens." },
            { word: "REPAIR", topic: "Hormones", hint: "Oestrogen helps to ____ the uterine wall after menstruation." },
            { word: "THICKENS", topic: "Hormones", hint: "The endometrium ____ under the influence of progesterone." },
            { word: "FOETAL", topic: "Membranes", hint: "The extra-embryonic membranes are also called ____ membranes." },
            { word: "CAPS", topic: "Intro", hint: "South African curriculum for Life Sciences." },
            { word: "THICKNESS", topic: "Cycle", hint: "The ____ of the endometrium varies during the cycle." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Embryology Master!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for the Menstrual Cycle and Development!";
            document.getElementById('modalWord').innerText = "LIFE SCIENCES PRO";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
