<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Life Sciences: Meiosis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Life Sciences: Meiosis</h1>
        <p class="game-subtitle">Match the phases, variation mechanisms, and chromosomal concepts!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Basic Concepts</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Meiosis I</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Meiosis II</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Variation & Errors</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Type of cell division that produces four genetically different sex cells." }, { id: 1, text: "Meiosis" },
                { id: 2, text: "General term for sex cells (sperm and eggs)." }, { id: 2, text: "Gametes" },
                { id: 3, text: "Normal body cells that divide by mitosis." }, { id: 3, text: "Somatic Cells" },
                { id: 4, text: "A cell containing two sets of chromosomes (2n)." }, { id: 4, text: "Diploid" },
                { id: 5, text: "A cell containing one set of chromosomes (n)." }, { id: 5, text: "Haploid" },
                { id: 6, text: "Pairs of chromosomes that are similar in shape and size." }, { id: 6, text: "Homologous Pairs" },
                { id: 7, text: "The diploid chromosome number in humans." }, { id: 7, text: "46" },
                { id: 8, text: "The haploid chromosome number in humans." }, { id: 8, text: "23" },
                { id: 9, text: "Point of attachment for two sister chromatids." }, { id: 9, text: "Centromere" },
                { id: 10, text: "Division that halves the chromosome number." }, { id: 10, text: "Meiosis" }
            ],
            'topic2': [
                { id: 1, text: "Homologous chromosomes pair up and crossing-over occurs." }, { id: 1, text: "Prophase I" },
                { id: 2, text: "Homologous pairs line up at the equator." }, { id: 2, text: "Metaphase I" },
                { id: 3, text: "Whole homologous chromosomes are pulled to opposite poles." }, { id: 3, text: "Anaphase I" },
                { id: 4, text: "The point where chromatids touch during crossing-over." }, { id: 4, text: "Chiasma" },
                { id: 5, text: "Process where genetic material is exchanged." }, { id: 5, text: "Crossing-over" },
                { id: 6, text: "Nuclear membrane reforms and two haploid nuclei are formed." }, { id: 6, text: "Telophase I" },
                { id: 7, text: "Phase that results in the reduction of chromosome number." }, { id: 7, text: "Meiosis I" },
                { id: 8, text: "Fibers that pull chromosomes apart." }, { id: 8, text: "Spindle Fibers" },
                { id: 9, text: "Chromosomes of maternal and paternal origin." }, { id: 9, text: "Homologous Pair" },
                { id: 10, text: "Exchange of segments between non-sister chromatids." }, { id: 10, text: "Crossing-over" }
            ],
            'topic3': [
                { id: 1, text: "Spindle fibers reform in two haploid cells." }, { id: 1, text: "Prophase II" },
                { id: 2, text: "Individual chromosomes line up at the equator." }, { id: 2, text: "Metaphase II" },
                { id: 3, text: "Centromeres split and sister chromatids move to poles." }, { id: 3, text: "Anaphase II" },
                { id: 4, text: "Four unique haploid daughter cells are formed." }, { id: 4, text: "Telophase II" },
                { id: 5, text: "Meiosis II is very similar to this type of division." }, { id: 5, text: "Mitosis" },
                { id: 6, text: "Chromatids are now called __________ once separated." }, { id: 6, text: "Daughter Chromosomes" },
                { id: 7, text: "Cytoplasm divides to finish the process." }, { id: 7, text: "Cytokinesis" },
                { id: 8, text: "Number of cells formed at the end of Meiosis II." }, { id: 8, text: "Four" },
                { id: 9, text: "The daughter cells are genetically __________." }, { id: 9, text: "Different" },
                { id: 10, text: "Stage where chromatids are pulled by spindle fibers." }, { id: 10, text: "Anaphase II" }
            ],
            'topic4': [
                { id: 1, text: "Failure of chromosomes to separate during anaphase." }, { id: 1, text: "Non-disjunction" },
                { id: 2, text: "Condition caused by an extra copy of chromosome 21." }, { id: 2, text: "Down Syndrome" },
                { id: 3, text: "Mechanisms in Metaphase I and II that create variety." }, { id: 3, text: "Random Arrangement" },
                { id: 4, text: "Down Syndrome is also known as __________ 21." }, { id: 4, text: "Trisomy" },
                { id: 5, text: "Result of Meiosis: Ensuring __________ in offspring." }, { id: 5, text: "Variability" },
                { id: 6, text: "Importance: Halving chromosome number for __________." }, { id: 6, text: "Fertilisation" },
                { id: 7, text: "When a gamete with 24 chromosomes fuses with a normal one." }, { id: 7, text: "Down Syndrome" },
                { id: 8, text: "The maternal or paternal chromosome can be above/below equator." }, { id: 8, text: "Random Arrangement" },
                { id: 9, text: "Crossing-over occurs between __________ chromatids." }, { id: 9, text: "Non-sister" },
                { id: 10, text: "Type of map showing an individual's chromosomes." }, { id: 10, text: "Karyotype" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 12 Life Sciences Meiosis Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
