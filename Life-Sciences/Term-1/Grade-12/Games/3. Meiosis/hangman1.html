<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Life Sciences Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Life Sciences Hangman Challenge</h1>
        <p class="game-subtitle">Grade 12: Meiosis (Chapter 3)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "MEIOSIS", topic: "Intro", hint: "The process of cell division that results in four genetically different haploid gametes." },
            { word: "HAPLOID", topic: "Basics", hint: "A cell containing half the number of chromosomes of the parent cell (n)." },
            { word: "DIPLOID", topic: "Basics", hint: "A cell containing two full sets of chromosomes (2n)." },
            { word: "GAMETES", topic: "Basics", hint: "Sex cells (sperm and egg) produced during meiosis." },
            { word: "SOMATIC", topic: "Basics", hint: "The general name for normal body cells that divide by mitosis." },
            { word: "HOMOLOGOUS", topic: "Basics", hint: "Pairs of chromosomes that are similar in shape, size, and gene position." },
            { word: "CROSSING OVER", topic: "Variation", hint: "The exchange of genetic material between non-sister chromatids in Prophase I." },
            { word: "CHIASMA", topic: "Variation", hint: "The specific point where chromatids overlap and exchange material." },
            { word: "RECOMBINANT", topic: "Variation", hint: "Chromatids that have a new combination of genes after crossing over." },
            { word: "METAPHASE ONE", topic: "Stages", hint: "Phase where homologous pairs line up randomly at the equator." },
            { word: "ANAPHASE ONE", topic: "Stages", hint: "Phase where whole homologous chromosomes are pulled to opposite poles." },
            { word: "METAPHASE TWO", topic: "Stages", hint: "Phase where single chromosomes line up at the equator." },
            { word: "ANAPHASE TWO", topic: "Stages", hint: "Phase where sister chromatids are pulled apart." },
            { word: "NON DISJUNCTION", topic: "Abnormalities", hint: "The failure of chromosomes or chromatids to separate properly during meiosis." },
            { word: "DOWN SYNDROME", topic: "Abnormalities", hint: "Condition caused by having an extra copy of chromosome 21 (Trisomy 21)." },
            { word: "TRISOMY", topic: "Abnormalities", hint: "Term for having three copies of a chromosome instead of two." },
            { word: "KARYOTYPE", topic: "Basics", hint: "A diagram showing the complete set of chromosomes in an organism's cell." },
            { word: "AUTOSOMES", topic: "Genetics", hint: "Chromosomes that do not determine the sex of an individual (pairs 1-22 in humans)." },
            { word: "GONOSOMES", topic: "Genetics", hint: "The sex chromosomes (pair 23 in humans, X and Y)." },
            { word: "BIVALENT", topic: "Prophase I", hint: "A pair of homologous chromosomes associated together." },
            { word: "TETRAD", topic: "Prophase I", hint: "Another name for a bivalent, consisting of four chromatids." },
            { word: "CENTROMERE", topic: "Basics", hint: "The part of a chromosome that holds sister chromatids together." },
            { word: "CENTRIOLE", topic: "Basics", hint: "Organelle that produces spindle fibres during meiosis." },
            { word: "VARIABILITY", topic: "Importance", hint: "Meiosis ensures ____ of offspring, which is essential for evolution." },
            { word: "FERTILISATION", topic: "Importance", hint: "Meiosis balances the doubling effect of ____ by halving chromosome numbers." },
            { word: "RANDOM", topic: "Variation", hint: "The arrangement of chromosomes at the equator is ____." },
            { word: "EQUATOR", topic: "Metaphase", hint: "The middle of the cell where chromosomes align." },
            { word: "POLES", topic: "Anaphase", hint: "The opposite ends of the cell." },
            { word: "NUCLEOLUS", topic: "Prophase", hint: "This nuclear structure disappears as the chromosomes condense." },
            { word: "CYTOKINESIS", topic: "Stages", hint: "The division of the cytoplasm that follows nuclear division." },
            { word: "PROPHASE ONE", topic: "Stages", hint: "The longest stage where crossing-over occurs." },
            { word: "TELOPHASE TWO", topic: "Stages", hint: "Final stage resulting in four haploid daughter cells." },
            { word: "MATERNAL", topic: "Basics", hint: "Chromosomes inherited from the mother." },
            { word: "PATERNAL", topic: "Basics", hint: "Chromosomes inherited from the father." },
            { word: "REDUCTION", topic: "Intro", hint: "Meiosis is often called ____ division because it halves the chromosome count." },
            { word: "GENETIC", topic: "Importance", hint: "Meiosis leads to ____ variation in a population." },
            { word: "SYNOPSIS", topic: "Prophase I", hint: "The pairing of homologous chromosomes." },
            { word: "OOGENESIS", topic: "Basics", hint: "The specific type of meiosis that produces egg cells." },
            { word: "SPERMATOGENESIS", topic: "Basics", hint: "The specific type of meiosis that produces sperm cells." },
            { word: "AMNIOCENTESIS", topic: "Abnormalities", hint: "Procedure used to obtain fetal cells to check for Down Syndrome." },
            { word: "ZYGOTE", topic: "Importance", hint: "The diploid cell formed when two haploid gametes fuse." },
            { word: "GONADS", topic: "Location", hint: "The organs (testes/ovaries) where meiosis takes place in animals." },
            { word: "SPORANGIA", topic: "Location", hint: "Where meiosis takes place in plants to produce spores." },
            { word: "HISTONES", topic: "Basics", hint: "Proteins that DNA wraps around to form chromosomes." },
            { word: "CHROMATID", topic: "Basics", hint: "One half of a replicated chromosome." },
            { word: "SISTER", topic: "Basics", hint: "Two identical chromatids are called ____ chromatids." },
            { word: "SPINDLE", topic: "Basics", hint: "Fibre made of protein that moves chromosomes." },
            { word: "MEMBRANE", topic: "Telophase", hint: "The nuclear ____ reforms around the four sets of haploid daughter chromosomes." },
            { word: "AGE", topic: "Abnormalities", hint: "The risk of non-disjunction increases with the ____ of the mother." },
            { word: "TRISOMY TWENTY ONE", topic: "Abnormalities", hint: "The clinical name for Down Syndrome." },
            { word: "DIAGRAM", topic: "Basics", hint: "A karyotype is a ____ of the chromosomes in a cell." },
            { word: "CHROMATIN", topic: "Basics", hint: "The form of DNA during interphase before it coils." },
            { word: "INTERPHASE", topic: "Intro", hint: "Phase of growth and DNA replication before meiosis begins." },
            { word: "S PHASE", topic: "Interphase", hint: "The specific part of interphase when DNA replicates." },
            { word: "TWO STAGES", topic: "Intro", hint: "Meiosis consists of ____ (I and II)." },
            { word: "FOUR CELLS", topic: "Outcome", hint: "The number of cells produced at the end of Meiosis II." },
            { word: "GENETICALLY", topic: "Outcome", hint: "The daughter cells are ____ different from each other." },
            { word: "OFFSPRING", topic: "Importance", hint: "Genetic variation helps ____ survive in changing environments." },
            { word: "EVOLUTION", topic: "Importance", hint: "Variation is the basis for natural selection and ____." },
            { word: "CAPS", topic: "Intro", hint: "The South African curriculum framework for Life Sciences." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Meiosis Expert!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for Reduction Division!";
            document.getElementById('modalWord').innerText = "CYTOGENETICS PRO";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
