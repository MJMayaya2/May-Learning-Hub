<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Life Sciences: Protein Synthesis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.95rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Life Sciences: Protein Synthesis</h1>
        <p class="game-subtitle">Match the processes, molecules, and codes that build life!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">RNA Structure & Types</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Transcription</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Translation</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">The Genetic Code</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "The sugar found in RNA nucleotides." }, { id: 1, text: "Ribose" },
                { id: 2, text: "The nitrogenous base found in RNA but not in DNA." }, { id: 2, text: "Uracil" },
                { id: 3, text: "RNA that carries the genetic code from the nucleus to the ribosome." }, { id: 3, text: "mRNA" },
                { id: 4, text: "RNA that carries specific amino acids to the ribosome." }, { id: 4, text: "tRNA" },
                { id: 5, text: "RNA that combines with proteins to form ribosomes." }, { id: 5, text: "rRNA" },
                { id: 6, text: "Unlike DNA, the RNA molecule is generally..." }, { id: 6, text: "Single-stranded" },
                { id: 7, text: "The length of an RNA molecule compared to DNA." }, { id: 7, text: "Shorter" },
                { id: 8, text: "The 'shape' of an RNA molecule (it does not have this)." }, { id: 8, text: "Double Helix" },
                { id: 9, text: "Uracil in RNA always pairs with this base from DNA during transcription." }, { id: 9, text: "Adenine" },
                { id: 10, text: "Cytosine in RNA always pairs with this base." }, { id: 10, text: "Guanine" }
            ],
            'topic2': [
                { id: 1, text: "The process of making mRNA from a DNA template." }, { id: 1, text: "Transcription" },
                { id: 2, text: "Location in the eukaryotic cell where transcription occurs." }, { id: 2, text: "Nucleus" },
                { id: 3, text: "The DNA strand that provides the code for mRNA." }, { id: 3, text: "Template Strand" },
                { id: 4, text: "Enzyme that controls the synthesis of mRNA (not named in text, but process is)." }, { id: 4, text: "RNA Polymerase" },
                { id: 5, text: "mRNA leaves the nucleus through these structures." }, { id: 5, text: "Nuclear Pores" },
                { id: 6, text: "Transcription begins when a portion of the DNA molecule..." }, { id: 6, text: "Unzips" },
                { id: 7, text: "Individual units used to build the mRNA strand." }, { id: 7, text: "RNA Nucleotides" },
                { id: 8, text: "Transcription ensures the genetic message reaches the..." }, { id: 8, text: "Cytoplasm/Ribosome" },
                { id: 9, text: "The mRNA molecule is __________ to the DNA template." }, { id: 9, text: "Complementary" },
                { id: 10, text: "Once mRNA is formed, the DNA strands __________." }, { id: 10, text: "Re-zip/Close" }
            ],
            'topic3': [
                { id: 1, text: "The process of building a protein from an mRNA code." }, { id: 1, text: "Translation" },
                { id: 2, text: "Organelle where translation takes place." }, { id: 2, text: "Ribosome" },
                { id: 3, text: "The building blocks of proteins." }, { id: 3, text: "Amino Acids" },
                { id: 4, text: "Bonds that join amino acids together." }, { id: 4, text: "Peptide Bonds" },
                { id: 5, text: "A chain of many amino acids." }, { id: 5, text: "Polypeptide" },
                { id: 6, text: "Three-base sequence on a tRNA molecule." }, { id: 6, text: "Anticodon" },
                { id: 7, text: "Translation starts when mRNA attaches to a..." }, { id: 7, text: "Ribosome" },
                { id: 8, text: "Translation ends when the ribosome reaches a..." }, { id: 8, text: "Stop Codon" },
                { id: 9, text: "The tRNA anticodon is complementary to the mRNA..." }, { id: 9, text: "Codon" },
                { id: 10, text: "tRNA drops off this molecule before leaving the ribosome." }, { id: 10, text: "Amino Acid" }
            ],
            'topic4': [
                { id: 1, text: "A sequence of three nitrogenous bases on mRNA." }, { id: 1, text: "Codon" },
                { id: 2, text: "Total number of possible codons in the genetic code." }, { id: 2, text: "64" },
                { id: 3, text: "Number of different amino acids used to build proteins." }, { id: 3, text: "20" },
                { id: 4, text: "The sequence of nitrogenous bases determines the type of..." }, { id: 4, text: "Protein" },
                { id: 5, text: "The mRNA codon 'AUG' also serves as the __________ codon." }, { id: 5, text: "Start" },
                { id: 6, text: "Codons that do not code for any amino acid." }, { id: 6, text: "Stop Codons" },
                { id: 7, text: "The 'language' of the nitrogenous bases is called the..." }, { id: 7, text: "Genetic Code" },
                { id: 8, text: "Each codon codes for only one specific..." }, { id: 8, text: "Amino Acid" },
                { id: 9, text: "If the DNA triplet is GAC, the mRNA codon is..." }, { id: 9, text: "CUG" },
                { id: 10, text: "The order of codons determines the order of __________ in the protein." }, { id: 10, text: "Amino Acids" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 12 Life Sciences Protein Synthesis Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
