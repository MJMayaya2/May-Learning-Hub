<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Life Sciences Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Life Sciences Hangman Challenge</h1>
        <p class="game-subtitle">Grade 12: Reproductive Strategies (Chapter 5)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "FERTILISATION", topic: "Basics", hint: "The fusion of a sperm cell with an egg cell to form a zygote." },
            { word: "EXTERNAL", topic: "Fertilisation", hint: "Fertilisation that occurs outside the female body, usually in water." },
            { word: "INTERNAL", topic: "Fertilisation", hint: "Fertilisation that occurs inside the female body, essential for land animals." },
            { word: "OVIPARY", topic: "Development", hint: "Eggs are laid and develop outside the mother's body (e.g., birds)." },
            { word: "OVOVIVIPARY", topic: "Development", hint: "Eggs are retained in the mother's body until they hatch, but no placental connection exists." },
            { word: "VIVIPARY", topic: "Development", hint: "The young develop inside the uterus and are nourished via a placenta." },
            { word: "AMNIOTIC EGG", topic: "Adaptation", hint: "A shelled egg that allows reptiles and birds to reproduce on land." },
            { word: "AMNION", topic: "Amniotic Egg", hint: "The fluid-filled sac that protects the embryo from shock and dehydration." },
            { word: "ALLANTOIS", topic: "Amniotic Egg", hint: "The membrane responsible for gas exchange and storing nitrogenous waste." },
            { word: "CHORION", topic: "Amniotic Egg", hint: "The outermost membrane that allows oxygen to enter the egg." },
            { word: "YOLK SAC", topic: "Amniotic Egg", hint: "The structure that provides nutrients to the developing embryo." },
            { word: "ALTRICIAL", topic: "Development", hint: "Hatchlings that are helpless, blind, and require extensive parental care." },
            { word: "PRECOCIAL", topic: "Development", hint: "Hatchlings that are well-developed, can walk/swim, and find food almost immediately." },
            { word: "PARENTAL CARE", topic: "Survival", hint: "Behaviour where parents invest time and energy to ensure offspring survival." },
            { word: "INCUBATION", topic: "Parental Care", hint: "Keeping eggs warm so the embryos can develop properly." },
            { word: "PLACENTA", topic: "Vivipary", hint: "Organ that provides oxygen and nutrients from mother to foetus in mammals." },
            { word: "UTERUS", topic: "Vivipary", hint: "The organ where the foetus develops in viviparous animals." },
            { word: "AQUATIC", topic: "Environment", hint: "Environment necessary for external fertilisation." },
            { word: "TERRESTRIAL", topic: "Environment", hint: "Environment where internal fertilisation is a major advantage." },
            { word: "PREDATORS", topic: "Survival", hint: "Offspring of external fertilisation are highly vulnerable to these." },
            { word: "MAMMALS", topic: "Groups", hint: "Vertebrate group that displays the highest degree of parental care." },
            { word: "BIRDS", topic: "Groups", hint: "Vertebrate group where most 'flying' species show altricial development." },
            { word: "REPTILES", topic: "Groups", hint: "Group that first developed the amniotic egg for land reproduction." },
            { word: "AMPHIBIANS", topic: "Groups", hint: "Group that usually relies on external fertilisation in water." },
            { word: "ALBUMEN", topic: "Amniotic Egg", hint: "The 'egg white' which provides protein and water to the embryo." },
            { word: "SHELL", topic: "Amniotic Egg", hint: "The porous outer layer that protects the egg but allows gas exchange." },
            { word: "NESTING", topic: "Parental Care", hint: "Building a safe place to lay eggs or raise young." },
            { word: "MAMMARY GLANDS", topic: "Mammals", hint: "Glands that produce milk to feed newly born young." },
            { word: "INDEPENDENT", topic: "Precocial", hint: "Precocial young are relatively ____ shortly after birth." },
            { word: "DEHYDRATION", topic: "Amniotic Egg", hint: "The amniotic egg prevents the embryo from ____ on land." },
            { word: "SYMBIOTIC", topic: "General", hint: "A close relationship between mother and foetus during vivipary." },
            { word: "GAMETES", topic: "Basics", hint: "Collective term for sperm and eggs." },
            { word: "ZYGOTE", topic: "Basics", hint: "The single cell formed immediately after fertilisation." },
            { word: "FOETUS", topic: "Vivipary", hint: "The name for the developing young in the later stages of pregnancy." },
            { word: "SKELETON", topic: "Altricial", hint: "Altricial young often have a weak ____ and cannot stand." },
            { word: "FEATHERS", topic: "Precocial", hint: "Precocial birds are born with downy ____." },
            { word: "ENERGY", topic: "Altricial", hint: "Altricial eggs have little ____, leading to poorly developed hatchlings." },
            { word: "OXYGEN", topic: "Basics", hint: "Passed from mother to foetus through the placenta." },
            { word: "WASTE", topic: "Amniotic Egg", hint: "The allantois stores the embryo's ____." },
            { word: "SHOCK", topic: "Amniotic Egg", hint: "The amnion protects the embryo against mechanical ____." },
            { word: "EVOLUTION", topic: "Adaptation", hint: "Reproductive strategies change over time through ____." },
            { word: "REPRODUCTION", topic: "Basics", hint: "The biological process by which new individual organisms are produced." },
            { word: "STRATEGY", topic: "General", hint: "A method used by a species to maximize offspring survival." },
            { word: "VERTEBRATES", topic: "General", hint: "Animals with backbones, the focus of this chapter." },
            { word: "CLOACA", topic: "External", hint: "Opening used by some fish and amphibians to release gametes." },
            { word: "PROTECTION", topic: "Parental Care", hint: "A primary benefit of internal development." },
            { word: "NUTRITION", topic: "Vivipary", hint: "Supplied via the placenta in viviparous animals." },
            { word: "HATCHING", topic: "Ovipary", hint: "The process of a young animal emerging from an egg." },
            { word: "GESTATION", topic: "Vivipary", hint: "The period of development inside the mother's body." },
            { word: "GENETIC", topic: "Fertilisation", hint: "Fertilisation combines ____ material from two parents." },
            { word: "DIVERSITY", topic: "Fertilisation", hint: "Sexual reproduction increases genetic ____." },
            { word: "POPULATION", topic: "Survival", hint: "Strategies ensure the continuation of the ____." },
            { word: "ENVIRONMENT", topic: "Adaptation", hint: "Strategies are often dictated by the animal's ____." },
            { word: "CAPS", topic: "General", hint: "The South African curriculum framework for Life Sciences." },
            { word: "SHARK", topic: "Groups", hint: "Some species of this fish display ovovivipary." },
            { word: "CROCODILES", topic: "Groups", hint: "Reptiles that show surprisingly high levels of parental care." },
            { word: "EAGLES", topic: "Groups", hint: "Birds that display altricial development." },
            { word: "DUCKLINGS", topic: "Groups", hint: "A common example of precocial young." },
            { word: "UMBILICAL CORD", topic: "Vivipary", hint: "Connects the foetus to the placenta." },
            { word: "MEMBRANES", topic: "Amniotic Egg", hint: "The four extra-embryonic ____ are the amnion, allantois, chorion, and yolk sac." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Reproductive Expert!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for Reproductive Strategies!";
            document.getElementById('modalWord').innerText = "BIOLOGY MASTER";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
