<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Life Sciences: Human Reproduction</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 0.9rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Life Sciences: Human Reproduction</h1>
        <p class="game-subtitle">Match the organs, processes, and cells involved in human life cycles!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Male Reproductive System</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Female Reproductive System</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Gametogenesis</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">The Ovarian Cycle</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Organs where sperm and testosterone are produced." }, { id: 1, text: "Testes" },
                { id: 2, text: "Coiled tube where sperm are stored and mature." }, { id: 2, text: "Epididymis" },
                { id: 3, text: "The tube that carries sperm from the epididymis to the urethra." }, { id: 3, text: "Vas Deferens" },
                { id: 4, text: "The bag of skin that houses the testes outside the body cavity." }, { id: 4, text: "Scrotum" },
                { id: 5, text: "Cells in the testes that produce testosterone." }, { id: 5, text: "Interstitial cells (of Leydig)" },
                { id: 6, text: "Specific tubules in the testes where sperm are made." }, { id: 6, text: "Seminiferous Tubules" },
                { id: 7, text: "Part of the sperm containing enzymes to dissolve the egg surface." }, { id: 7, text: "Acrosome" },
                { id: 8, text: "Part of the sperm filled with mitochondria for energy." }, { id: 8, text: "Middle Piece" },
                { id: 9, text: "The part of the sperm used for swimming." }, { id: 9, text: "Tail" },
                { id: 10, text: "Cells in the tubules that provide nutrients to developing sperm." }, { id: 10, text: "Sertoli Cells" }
            ],
            'topic2': [
                { id: 1, text: "Organs where eggs (ova) and hormones are produced." }, { id: 1, text: "Ovaries" },
                { id: 2, text: "The tube where fertilization usually occurs." }, { id: 2, text: "Fallopian Tube" },
                { id: 3, text: "The muscular organ where a fetus develops; also called the womb." }, { id: 3, text: "Uterus" },
                { id: 4, text: "The inner lining of the uterus where an embryo implants." }, { id: 4, text: "Endometrium" },
                { id: 5, text: "The narrow neck or opening of the uterus." }, { id: 5, text: "Cervix" },
                { id: 6, text: "The birth canal and site where sperm are deposited." }, { id: 6, text: "Vagina" },
                { id: 7, text: "Process where a mature egg is released from the ovary." }, { id: 7, text: "Ovulation" },
                { id: 8, text: "Mature structure in the ovary that contains a haploid egg." }, { id: 8, text: "Graafian Follicle" },
                { id: 9, text: "Structure formed from the empty follicle that secretes progesterone." }, { id: 9, text: "Corpus Luteum" },
                { id: 10, text: "The layer of cells lining the ovary that undergoes meiosis." }, { id: 10, text: "Germinal Epithelium" }
            ],
            'topic3': [
                { id: 1, text: "The general process of producing gametes through meiosis." }, { id: 1, text: "Gametogenesis" },
                { id: 2, text: "The specific process of sperm production in the testes." }, { id: 2, text: "Spermatogenesis" },
                { id: 3, text: "The specific process of egg production in the ovaries." }, { id: 3, text: "Oogenesis" },
                { id: 4, text: "Chromosome number of germ cells in the gonads (2n)." }, { id: 4, text: "Diploid" },
                { id: 5, text: "Chromosome number of mature sperm and eggs (n)." }, { id: 5, text: "Haploid" },
                { id: 6, text: "Type of cell division required for gametogenesis." }, { id: 6, text: "Meiosis" },
                { id: 7, text: "Formed when a sperm (n) fuses with an egg (n)." }, { id: 7, text: "Zygote (2n)" },
                { id: 8, text: "Spermatogenesis occurs under the influence of this hormone." }, { id: 8, text: "Testosterone" },
                { id: 9, text: "Meiosis in ovaries forms a primary __________ consisting of haploid cells." }, { id: 9, text: "Follicle" },
                { id: 10, text: "The haploid chromosome number in human gametes." }, { id: 10, text: "23" }
            ],
            'topic4': [
                { id: 1, text: "Typical length of the human ovarian cycle (in days)." }, { id: 1, text: "28 Days" },
                { id: 2, text: "Hormone that causes the Graafian follicle to burst (Ovulation)." }, { id: 2, text: "Luteinising Hormone (LH)" },
                { id: 3, text: "Hormone secreted by the Graafian follicle." }, { id: 3, text: "Oestrogen" },
                { id: 4, text: "Hormone secreted by the corpus luteum to maintain pregnancy." }, { id: 4, text: "Progesterone" },
                { id: 5, text: "Where the released ovum travels after ovulation." }, { id: 5, text: "Fallopian Tube" },
                { id: 6, text: "What happens to the corpus luteum if no pregnancy occurs." }, { id: 6, text: "Breaks down" },
                { id: 7, text: "Stage where the follicle matures into a Graafian follicle." }, { id: 7, text: "Follicular Stage" },
                { id: 8, text: "Stage where the empty follicle becomes the corpus luteum." }, { id: 8, text: "Luteal Stage" },
                { id: 9, text: "Process of depositing sperm into the vagina." }, { id: 9, text: "Copulation" },
                { id: 10, text: "The diploid cell formed after fertilization." }, { id: 10, text: "Zygote" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 12 Human Reproduction Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
