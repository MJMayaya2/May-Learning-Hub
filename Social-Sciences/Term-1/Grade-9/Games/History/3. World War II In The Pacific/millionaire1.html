<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 8 History: Diamond Mining Challenge</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../../index.html">Home</a>
            <a href="../../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 History Challenge</h1>
        <p class="game-subtitle">Mineral Revolution: Diamond Mining in Kimberley (Grade 8 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What major discovery in 1867 triggered South Africa's shift from an agricultural to an industrial society?", options: ["Coal", "Gold", "Diamonds", "Platinum"], a: 2, hint: "It happened at Hopetown." },
            { q: "In the 1860s, was the territory known as 'South Africa' a single united country?", options: ["Yes", "No"], a: 1, hint: "It was a collection of independent kingdoms and separate colonies." },
            { q: "Where were the first diamonds found along the river banks in 1867?", options: ["Orange and Vaal Rivers", "Limpopo River", "Zambezi River", "Tugela River"], a: 0, hint: "These were near where two major rivers join." },
            { q: "What were both black and white miners commonly called on the diamond fields?", options: ["Sappers", "Pioneers", "Trekkers", "Diggers"], a: 3, hint: "This name comes from the physical act of mining." },
            { q: "What is the term for 'wet' diggings where diamonds are found near the surface along river banks?", options: ["Marine diggings", "Alluvial diggings", "Dry diggings", "Mountain diggings"], a: 1, hint: "These were the first types of mines found." },
            { q: "What was the biggest 'dry' digging originally called before it became the Kimberley Mine?", options: ["New Rush", "Old Drift", "Richterveld", "Golden Arc"], a: 0, hint: "It is now known as the 'Big Hole'." },
            { q: "Why was the 'one person one claim' rule introduced during the first ten years of mining?", options: ["To make digging faster", "To help mining companies", "To prevent wealthy people from buying up all the land", "To save water"], a: 2, hint: "This law protected small, independent miners." },
            { q: "The Big Hole of the Kimberley Mine is actually the site of what geological feature?", options: ["A coral reef", "A dried-up lake", "A massive cave", "An extinct volcano pipe"], a: 3, hint: "The diamonds were found deep inside this vertical tube." },
            { q: "What were the small squares of land owned by individual diggers called?", options: ["Plots", "Claims", "Farms", "Estates"], a: 1, hint: "Diggers marked these with wooden pegs and string." },
            { q: "What dangerous problem occurred as diggers dug deeper into their small claims?", options: ["The walls between claims collapsed", "The ground became too hot", "They found too much gold", "Wild animals moved in"], a: 0, hint: "Falling rock often filled the mines." },
            { q: "Approximately what proportion of the people who came to the diamond fields were black?", options: ["One-quarter", "One-third", "Two-thirds", "All of them"], a: 2, hint: "They came from all parts of southern Africa." },
            { q: "What racial law did the British introduce once they took control of the diamond fields?", options: ["Everyone had to pay high taxes", "White miners had to work for black miners", "Mining was banned for three years", "It became illegal for black people to own claims"], a: 3, hint: "This forced black men to work for white diggers instead." },
            { q: "What was the result of the new laws passed in 1876 regarding claim ownership?", options: ["All claims were abolished", "Wealthier diggers were allowed to buy more claims", "Only women could own claims", "Claim sizes were doubled"], a: 1, hint: "This lifted the 'one person one claim' restriction." },
            { q: "Why did small diggers eventually go out of business in the late 1870s?", options: ["They could not afford expensive machinery to dig deeper", "Diamonds disappeared", "They all moved to the coast", "The British government evicted everyone"], a: 0, hint: "Mining deep levels required more than just buckets." },
            { q: "What is a period where businesses close down, jobs are lost, and people have less money for luxury goods?", options: ["Economic Boom", "Inflation", "Economic Depression", "Golden Age"], a: 2, hint: "One occurred in 1881-82." },
            { q: "What term describes the joining together of companies to share costs and equipment?", options: ["Separation", "Colonization", "Migration", "Amalgamation"], a: 3, hint: "This process continued as mines got deeper and more expensive." },
            { q: "What happened to the price of diamonds when too many were dug up and put on the market?", options: ["The price stayed the same", "The price dropped", "The price tripled", "Diamonds became free"], a: 1, hint: "Oversupply leads to lower value." },
            { q: "How old was Cecil John Rhodes when he arrived in southern Africa from Britain?", options: ["Seventeen", "Thirty", "Fifty", "Twelve"], a: 0, hint: "He was still a teenager in 1870." },
            { q: "How did Cecil Rhodes first make a significant amount of money on the mines?", options: ["Selling food", "Digging for gold", "Operating a water pumping company", "Building houses"], a: 2, hint: "He pumped water out of the deep mines." },
            { q: "In what year did Cecil Rhodes form the De Beers Mining Company?", options: ["1867", "1843", "1902", "1880"], a: 3, hint: "This was a few years before he controlled the whole area." },
            { q: "By 1885, which was the only main mine in the Kimberley area that Rhodes did NOT yet control?", options: ["De Beers Mine", "Kimberley Mine", "Bultfontein Mine", "Du Toit's Pan Mine"], a: 1, hint: "This one was owned by Barney Barnato." },
            { q: "What was Barney Barnato's original name before he changed it for his acting career?", options: ["Barnett Isaacs", "John MacAdam", "Ned Ludd", "Cecil Rhodes"], a: 0, hint: "He was born in a poor part of London." },
            { q: "Which of these jobs did Barney Barnato NOT do before becoming a diamond buyer?", options: ["Bouncer", "Singer", "Banker", "Comedian"], a: 2, hint: "He was a performer and entertainer." },
            { q: "What is it called when one company has complete control over a trade or industry?", options: ["Republic", "Cottage Industry", "Partnership", "Monopoly"], a: 3, hint: "De Beers achieved this in 1888." },
            { q: "Who provided Cecil Rhodes with a huge loan in 1888 to buy the Kimberley Mine from Barnato?", options: ["The Cape Government", "Rothschild International Bank", "De Beers Bank", "Standard Bank"], a: 1, hint: "This bank was essential for the buyout." },
            { q: "What was the name of the company formed by Rhodes in 1888 that controlled all Kimberley mines?", options: ["De Beers Consolidated Mines Limited", "Kimberley Central", "London Diamonds Co.", "Anglo-Boer Mining"], a: 0, hint: "It became the owner and controller of all mines." },
            { q: "How did Rhodes keep diamond prices high to maximize profits?", options: ["He gave them away for free", "He sold them only to the British King", "He balanced how many were produced versus how many were sold", "He stopped mining entirely"], a: 2, hint: "He regulated the supply to the market." },
            { q: "Why were black workers forced to live in closed compounds during their contracts?", options: ["To teach them how to farm", "To protect them from rain", "Because it was the law in Britain", "To limit diamond theft"], a: 3, hint: "Diamonds are small and easy to swallow or hide." },
            { q: "Which other major mineral was discovered in 1886 on the Witwatersrand?", options: ["Silver", "Gold", "Iron", "Coal"], a: 1, hint: "This followed the diamond discovery of 1867." },
            { q: "Besides Britain and surrounding colonies, where else did white diggers come from?", options: ["Australia and America", "France and Germany", "China and Japan", "Russia and Egypt"], a: 0, hint: "They came from English-speaking countries far across the sea." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                if (qData.options[i]) {
                    btn.innerText = qData.options[i];
                    btn.style.display = "block";
                    btn.classList.remove('hidden');
                } else {
                    btn.style.display = "none";
                }
                btn.className = 'answer-btn'; 
                btn.disabled = false;
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const qData = questions[currentLevel];
            const correctIndex = qData.a;
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (selectedIndex === correctIndex) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    document.getElementById(`btn${correctIndex}`).classList.add('correct');
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            const correctIndex = questions[currentLevel].a;
            let wrongIndexes = [];
            for(let i=0; i<questions[currentLevel].options.length; i++){
                if(i !== correctIndex) wrongIndexes.push(i);
            }
            wrongIndexes.sort(() => Math.random() - 0.5);
            document.getElementById(`btn${wrongIndexes[0]}`).classList.add('hidden');
            if(wrongIndexes.length > 1) document.getElementById(`btn${wrongIndexes[1]}`).classList.add('hidden');
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("History Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Diamond Millionaire!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Walked away with:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
