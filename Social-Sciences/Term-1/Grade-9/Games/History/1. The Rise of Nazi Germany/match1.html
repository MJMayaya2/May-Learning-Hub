    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 9 History: The Rise of Nazi Germany</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../../index.html">Home</a>
            <a href="../../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 9 History: The Rise of Nazi Germany</h1>
        <p class="game-subtitle">Match the historical concepts and facts from WWI aftermath to the Nazi Dictatorship!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">WWI & Versailles Treaty</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Great Depression & Weimar Republic</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Hitler & Nazi Support</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Dictatorship & Persecution</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "The 1918 agreement to stop fighting World War I." }, { id: 1, text: "Armistice" },
                { id: 2, text: "Overthrown leader of Germany after World War I." }, { id: 2, text: "Kaiser Wilhelm II" },
                { id: 3, text: "The new democratic government formed in Germany in 1919." }, { id: 3, text: "Weimar Republic" },
                { id: 4, text: "1919 Peace Treaty that dictated harsh terms to Germany." }, { id: 4, text: "Treaty of Versailles" },
                { id: 5, text: "Term forcing Germany to take full blame for the war." }, { id: 5, text: "War Guilt Clause" },
                { id: 6, text: "Massive payments (\$55 billion) Germany had to make for war damages." }, { id: 6, text: "Reparations" },
                { id: 7, text: "A free city run by the League of Nations according to the treaty." }, { id: 7, text: "Danzig" },
                { id: 8, text: "Territory returned to France by Germany in 1919." }, { id: 8, text: "Alsace-Lorraine" },
                { id: 9, text: "Status of the Ruhr Valley where German troops were banned." }, { id: 9, text: "Demilitarised Zone" },
                { id: 10, text: "The fact that Germany had no say in the Treaty terms." }, { id: 10, text: "Dictated Peace" }
            ],
            'topic2': [
                { id: 1, text: "1929 economic collapse in the USA that started the Depression." }, { id: 1, text: "Wall Street Crash" },
                { id: 2, text: "Six million Germans were out of work by 1932." }, { id: 2, text: "Unemployment" },
                { id: 3, text: "Dramatic rise in prices where money loses its value." }, { id: 3, text: "Inflation" },
                { id: 4, text: "Money lent to Germany in the early 1920s to stabilise economy." }, { id: 4, text: "USA Loans" },
                { id: 5, text: "Leadership style like the Kaiser that many Germans still wanted." }, { id: 5, text: "Authoritarianism" },
                { id: 6, text: "The official name of the German Parliament." }, { id: 6, text: "Reichstag" },
                { id: 7, text: "The title of the leader of the Reichstag." }, { id: 7, text: "Chancellor" },
                { id: 8, text: "The 1929 disaster the Weimar government could not cope with." }, { id: 8, text: "Economic Crisis" },
                { id: 9, text: "Nazi claim that the Weimar government betrayed the army in WWI." }, { id: 9, text: "Stabbed in the Back" },
                { id: 10, text: "New York street where the US stock market is situated." }, { id: 10, text: "Wall Street" }
            ],
            'topic3': [
                { id: 1, text: "Leader who joined the Nazi Party and became its head in 1921." }, { id: 1, text: "Adolf Hitler" },
                { id: 2, text: "Armed Nazi groups who wore brown uniforms and used violence." }, { id: 2, text: "SA (Storm Troopers)" },
                { id: 3, text: "The symbol on the Nazi flag." }, { id: 3, text: "Swastika" },
                { id: 4, text: "Hitler's failed military coup attempt in 1923." }, { id: 4, text: "Putsch" },
                { id: 5, text: "The book Hitler wrote while in jail ('My Struggle')." }, { id: 5, text: "Mein Kampf" },
                { id: 6, text: "Use of exaggeration and lies to control people's thoughts." }, { id: 6, text: "Propaganda" },
                { id: 7, text: "The year the Nazi Party won the most votes and Hitler became Chancellor." }, { id: 7, text: "1933" },
                { id: 8, text: "Hitler's skill used to hold the attention of thousands." }, { id: 8, text: "Public Speaking" },
                { id: 9, text: "One of the promises Nazis made to voters during the Depression." }, { id: 9, text: "Law and Order" },
                { id: 10, text: "Common name for the members of the Sturmabteilung (SA)." }, { id: 10, text: "Brown Shirts" }
            ],
            'topic4': [
                { id: 1, text: "1933 law giving Hitler complete power to rule as a dictator." }, { id: 1, text: "Enabling Act" },
                { id: 2, text: "The title meaning 'The Leader' taken by Hitler in 1934." }, { id: 2, text: "Der Führer" },
                { id: 3, text: "The location of the first Nazi concentration camp opened in 1933." }, { id: 3, text: "Dachau" },
                { id: 4, text: "Authoritarian system that is the opposite of democracy." }, { id: 4, text: "Fascism" },
                { id: 5, text: "The hatred of Jewish people." }, { id: 5, text: "Anti-Semitism" },
                { id: 6, text: "Hitler's idea of a 'pure' and superior German race." }, { id: 6, text: "Aryan" },
                { id: 7, text: "Blaming a group (like Jews) for things they did not do." }, { id: 7, text: "Scapegoat" },
                { id: 8, text: "1935 laws that caused the loss of basic rights for Jews." }, { id: 8, text: "Nuremberg Laws" },
                { id: 9, text: "Secret force that spies on people to maintain control." }, { id: 9, text: "Secret Police" },
                { id: 10, text: "Enclosures for political opponents to do hard labour." }, { id: 10, text: "Concentration Camps" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 9 History Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
