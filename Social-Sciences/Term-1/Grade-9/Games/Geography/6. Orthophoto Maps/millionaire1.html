    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 9 Geography: Orthophoto Maps Millionaire</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../../index.html">Home</a>
            <a href="../../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Topic: Orthophoto Maps (Grade 9 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the definition of an aerial photograph?", options: ["A hand-drawn map of a town", "A picture of the Earth's surface taken from the air", "A digital image of the stars", "A satellite scan of the ocean floor"], a: 1, hint: "Check page 3 of the document." },
            { q: "Which type of aerial photograph is primarily used for mapping purposes?", options: ["Horizontal", "Oblique", "Vertical", "Panoramic"], a: 2, hint: "Look at the mapping section on page 3." },
            { q: "How is a vertical aerial photograph taken?", options: ["At an angle from the side", "Directly above the ground with the camera pointing straight down", "From a mountain peak", "Using a telescope"], a: 1, hint: "Check the characteristics on page 5." },
            { q: "What is a major characteristic of a vertical aerial photograph?", options: ["It only shows clouds", "It shows the true positions of features", "It is always in black and white", "It cannot be used to create maps"], a: 1, hint: "Look at the 'Characteristics' list on page 5." },
            { q: "What is an orthophoto map?", options: ["A normal map with no photos", "A corrected aerial photograph adjusted to remove distortions", "A photo taken from a submarine", "A sketch of the land"], a: 1, hint: "Check page 6 for the definition." },
            { q: "What two main components are combined to create an orthophoto map?", options: ["Paintings and text", "Aerial photographs and map information", "Satellite data and weather charts", "Newspapers and maps"], a: 1, hint: "Page 6 explains what it combines." },
            { q: "Which piece of map information is found on an orthophoto map?", options: ["Historical dates", "Contour lines", "Names of local leaders", "Temperature charts"], a: 1, hint: "Look under 'Orthophoto maps show' on page 6." },
            { q: "What is the common scale used for orthophoto maps in South Africa?", options: ["1:50 000", "1:100 000", "1:10 000", "1:1 000 000"], a: 2, hint: "Check page 7 of the document." },
            { q: "On a 1:10 000 orthophoto map, what does 1 cm represent in real-life ground units?", options: ["10 000 cm", "100 cm", "1 000 cm", "10 cm"], a: 0, hint: "Scale is a ratio: map units to ground units." },
            { q: "In metres, what ground distance is represented by 1 cm on a 1:10 000 scale map?", options: ["10 metres", "500 metres", "100 metres", "1 000 metres"], a: 2, hint: "Check the scale conversion on page 7." },
            { q: "Why do orthophoto maps show very detailed features compared to normal topographic maps?", options: ["Because they use brighter colors", "Because of the large scale (1:10 000)", "Because they are drawn by hand", "Because they only show cities"], a: 1, hint: "Check the final point on page 7." },
            { q: "Which of these is a height clue used on orthophoto maps?", options: ["Scale bar", "Grid reference", "Contour lines", "River names"], a: 2, hint: "Look at 'How Height is Shown' on page 8." },
            { q: "What term is used to describe the height of land above sea level?", options: ["Gradient", "Elevation", "Depth", "Relief"], a: 1, hint: "Check the definition on page 8 or 9." },
            { q: "What specifically do contour lines on an orthophoto map join?", options: ["Points of equal population", "Points of equal height above sea level", "Cities with the same name", "Roads and bridges"], a: 1, hint: "Look at 'Contour Lines' on page 9." },
            { q: "What can a geographer understand by looking at the pattern of contour lines?", options: ["The temperature of the area", "The shape of the land", "The history of the buildings", "The speed of the wind"], a: 1, hint: "Check the bullet points on page 9." },
            { q: "True or False: Contour lines on an orthophoto map can cross each other.", options: ["True", "False"], a: 1, hint: "Check the 'Important rule' on page 9." },
            { q: "Which of the following is identified as a natural feature on an orthophoto map?", options: ["Bridges", "Farms", "Forests", "Roads"], a: 2, hint: "Check 'Identifying Features' on page 11." },
            { q: "Which feature is considered a human (man-made) feature on an orthophoto map?", options: ["Mountains", "Bridges", "Hills", "Rivers"], a: 1, hint: "Look at the human features list on page 11." },
            { q: "What is a major advantage of using an orthophoto map over a normal topographic map?", options: ["It is smaller and easier to carry", "It shows real images of the landscape", "It doesn't use contour lines", "It is cheaper to produce"], a: 1, hint: "Look at the 'Advantages' list on page 11." },
            { q: "Orthophoto maps help identify features more easily because they combine both map data and...", options: ["Weather forecasts", "Real photographs", "Newspaper articles", "History lessons"], a: 1, hint: "Check the advantages section on page 11." },
            { q: "Besides contour lines, which other height clue might you find on an orthophoto map?", options: ["Compass rose", "Spot heights", "Scale factor", "Legend"], a: 1, hint: "Check page 8 for height information." },
            { q: "What equipment can be used to take the digital images required for aerial photography?", options: ["Telescopes", "Aircraft or drones", "Hand-held cameras on the ground", "Submarines"], a: 1, hint: "Check the definition on page 3." },
            { q: "What does it mean if an aerial photograph has been 'adjusted to remove distortions'?", options: ["It has been color-coded", "It has been 'corrected' to make an orthophoto", "It has been shrunk to fit a page", "It has been turned into a drawing"], a: 1, hint: "Check the definition of an orthophoto map on page 6." },
            { q: "Which height clue helps determine elevation using a surveyed physical beacon on the ground?", options: ["Spot height", "Trigonometrical station", "Contour line", "Index line"], a: 1, hint: "Look at the list on page 8." },
            { q: "How do contour lines help you identify whether land is steep or flat?", options: ["By their color", "By their length", "By how close together or far apart they are", "By their thickness"], a: 2, hint: "Page 9 explains what they help us understand." },
            { q: "Which natural feature would be identified as a large flow of water?", options: ["Hills", "Rivers", "Forests", "Farms"], a: 1, hint: "Check natural features on page 11." },
            { q: "Buildings and farms are listed as which type of feature on an orthophoto map?", options: ["Geological", "Natural", "Human", "Atmospheric"], a: 2, hint: "Look at page 11." },
            { q: "What is elevation?", options: ["The distance between two hills", "The height above sea level", "The length of a road", "The speed of a drone"], a: 1, hint: "Definition found on page 8." },
            { q: "True or False: Orthophoto maps provide accurate measurements of the landscape.", options: ["True", "False"], a: 0, hint: "Check the advantages list on page 11." },
            { q: "What is the primary role of vertical aerial photographs?", options: ["To take pretty pictures for tourists", "To be used to create maps", "To track wildlife only", "To monitor outer space"], a: 1, hint: "Check the characteristics on page 5." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            // Randomize answer positions
            let btnIndexes = [0, 1, 2, 3];
            let options = [...qData.options];
            let correctAns = options[qData.a];
            
            // Fisher-Yates shuffle
            for (let i = btnIndexes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [btnIndexes[i], btnIndexes[j]] = [btnIndexes[j], btnIndexes[i]];
            }

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = qData.options[btnIndexes[i]];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden');
                
                // Track if this button holds the correct answer
                if (qData.options[btnIndexes[i]] === correctAns) {
                    btn.setAttribute('data-correct', 'true');
                } else {
                    btn.setAttribute('data-correct', 'false');
                }
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    // Find and highlight correct button
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            
            let wrongBtns = [];
            for (let i = 0; i < 4; i++) {
                if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'false') {
                    wrongBtns.push(document.getElementById(`btn${i}`));
                }
            }
            // Hide 2 wrong answers
            wrongBtns.sort(() => Math.random() - 0.5);
            wrongBtns[0].classList.add('hidden');
            wrongBtns[1].classList.add('hidden');
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
