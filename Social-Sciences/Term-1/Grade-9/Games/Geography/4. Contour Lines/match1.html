<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 9 Geography: Contour Lines</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../../index.html">Home</a>
            <a href="../../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 9 Geography: Contour Lines</h1>
        <p class="game-subtitle">Match the topographical concepts and landform patterns!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Maps & Height Clues</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Contour Rules</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Slopes & Scales</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Landform Patterns</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Map showing relief, height, and natural/human features." }, { id: 1, text: "Topographic Map" },
                { id: 2, text: "The height of land above sea level." }, { id: 2, text: "Elevation" },
                { id: 3, text: "The most accurate height clues, indicated by a triangle." }, { id: 3, text: "Trigonometrical Stations" },
                { id: 4, text: "Height clues found along roads, railways, or bridges." }, { id: 4, text: "Benchmarks" },
                { id: 5, text: "Altitude of specific points shown as a black dot." }, { id: 5, text: "Spot Heights" },
                { id: 6, text: "Feature represented by a small triangle with a dot." }, { id: 6, text: "Trig Beacon" },
                { id: 7, text: "Clue used by engineers to know ground height." }, { id: 7, text: "Benchmark" },
                { id: 8, text: "Physical concrete pillars found on hills/mountains." }, { id: 8, text: "Trig Stations" },
                { id: 9, text: "Shows exact height to the nearest centimetre." }, { id: 9, text: "Benchmark Accuracy" },
                { id: 10, text: "Measurement of how the land rises and falls." }, { id: 10, text: "Relief" }
            ],
            'topic2': [
                { id: 1, text: "Brown lines connecting points of equal height." }, { id: 1, text: "Contour Lines" },
                { id: 2, text: "The difference in height between two contour lines." }, { id: 2, text: "Contour Interval" },
                { id: 3, text: "Important rule: Contour lines never do this." }, { id: 3, text: "Cross each other" },
                { id: 4, text: "Color used to draw contour lines on a map." }, { id: 4, text: "Brown" },
                { id: 5, text: "Every point on one line is at the same..." }, { id: 5, text: "Height" },
                { id: 6, text: "General shape formed by contour lines." }, { id: 6, text: "Closed shapes" },
                { id: 7, text: "If lines are 100m, 120m, 140m, the interval is..." }, { id: 7, text: "20 metres" },
                { id: 8, text: "A line that helps visualize the 3D landscape." }, { id: 8, text: "Contour Line" },
                { id: 9, text: "Unit of measurement for height on SA maps." }, { id: 9, text: "Metres" },
                { id: 10, text: "Pattern of lines that never intersect." }, { id: 10, text: "Contour Rules" }
            ],
            'topic3': [
                { id: 1, text: "When contour lines are spaced far apart." }, { id: 1, text: "Gentle Slope" },
                { id: 2, text: "When contour lines are very close together." }, { id: 2, text: "Steep Slope" },
                { id: 3, text: "The term for the steepness of a slope." }, { id: 3, text: "Gradient" },
                { id: 4, text: "Standard scale for SA topographic maps." }, { id: 4, text: "1:50 000" },
                { id: 5, text: "In 1:50 000 scale, 1 cm on the map equals..." }, { id: 5, text: "500 metres" },
                { id: 6, text: "Land rises slowly over a long distance." }, { id: 6, text: "Gentle Gradient" },
                { id: 7, text: "Land rises quickly over a short distance." }, { id: 7, text: "Steep Gradient" },
                { id: 8, text: "1 cm represents 50 000 cm on the ground." }, { id: 8, text: "Scale Ratio" },
                { id: 9, text: "Scale where 2 cm equals 1 kilometre." }, { id: 9, text: "1:50 000" },
                { id: 10, text: "Maps used for hiking and navigation." }, { id: 10, text: "Topographic Maps" }
            ],
            'topic4': [
                { id: 1, text: "V-shaped contours pointing upstream." }, { id: 1, text: "River Valley" },
                { id: 2, text: "Circular or oval contour lines." }, { id: 2, text: "Hills and Mountains" },
                { id: 3, text: "Long narrow area of high land." }, { id: 3, text: "Ridge" },
                { id: 4, text: "Smaller ridge extending from a hill." }, { id: 4, text: "Spur" },
                { id: 5, text: "Contour V-shapes pointing downhill." }, { id: 5, text: "Spur" },
                { id: 6, text: "Patterns that help identify river direction." }, { id: 6, text: "V pointing upstream" },
                { id: 7, text: "Elongated contour shapes." }, { id: 7, text: "Ridge" },
                { id: 8, text: "Highest contour line is in the centre." }, { id: 8, text: "Hills" },
                { id: 9, text: "Landform often separating two valleys." }, { id: 9, text: "Ridge" },
                { id: 10, text: "Contours that show a landscape's 3D shape." }, { id: 10, text: "Landform Patterns" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 9 Geography Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
