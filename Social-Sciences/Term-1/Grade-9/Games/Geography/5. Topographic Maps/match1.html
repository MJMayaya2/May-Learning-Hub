<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 9 Geography: Topographical Maps</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../../index.html">Home</a>
            <a href="../../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 9 Geography: Topographical Maps</h1>
        <p class="game-subtitle">Match the scales, coordinates, and landform patterns found on topographic maps!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Scales & Measurement</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Map Features & Relief</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Landform Patterns</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Coordinates & Location</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "1:50 000 map scale (1 unit on map = 50 000 units on ground)." }, { id: 1, text: "Ratio Scale" },
                { id: 2, text: "Visual scale bar that allows direct distance measurement." }, { id: 2, text: "Line Scale" },
                { id: 3, text: "Calculation: 4cm on a 1:50 000 map equals..." }, { id: 3, text: "2 000 metres (2 km)" },
                { id: 4, text: "1cm on a 1:50 000 topographical map equals..." }, { id: 4, text: "500 metres" },
                { id: 5, text: "2cm on a 1:50 000 topographical map equals..." }, { id: 5, text: "1 kilometre" },
                { id: 6, text: "The relationship between map distance and ground distance." }, { id: 6, text: "Map Scale" },
                { id: 7, text: "The scale 1:10 000 is typically used for this series." }, { id: 7, text: "Orthophoto Maps" },
                { id: 8, text: "10cm on a 1:50 000 map represents this real distance." }, { id: 8, text: "5 kilometres" },
                { id: 9, text: "The first step in measuring distance on a map." }, { id: 9, text: "Use a ruler" },
                { id: 10, text: "Unit of measurement for real distance after conversion." }, { id: 10, text: "Metres or Kilometres" }
            ],
            'topic2': [
                { id: 1, text: "Map showing relief, height above sea level, and human/natural features." }, { id: 1, text: "Topographical Map" },
                { id: 2, text: "The physical shape of the land (rising and falling ground)." }, { id: 2, text: "Relief" },
                { id: 3, text: "Features like roads, buildings, schools, and hospitals." }, { id: 3, text: "Human Features" },
                { id: 4, text: "Features like rivers, mountains, and indigenous forests." }, { id: 4, text: "Natural Features" },
                { id: 5, text: "Brown lines connecting points of equal height above sea level." }, { id: 5, text: "Contour Lines" },
                { id: 6, text: "Standard series for South Africa topographic maps." }, { id: 6, text: "1:50 000" },
                { id: 7, text: "Represented by blue lines on a topographic map." }, { id: 7, text: "Rivers" },
                { id: 8, text: "Vertical distance of land above mean sea level." }, { id: 8, text: "Altitude / Height" },
                { id: 9, text: "Used to distinguish between land uses like farming or mining." }, { id: 9, text: "Symbols and Patterns" },
                { id: 10, text: "The physical features like valleys or hills identified on maps." }, { id: 10, text: "Landforms" }
            ],
            'topic3': [
                { id: 1, text: "V-shaped contour pattern where the 'V' points upstream." }, { id: 1, text: "River Valley" },
                { id: 2, text: "Circular or oval contour lines where height increases to the centre." }, { id: 2, text: "Hills and Mountains" },
                { id: 3, text: "A long, narrow area of high land that often separates valleys." }, { id: 3, text: "Ridge" },
                { id: 4, text: "A smaller ridge that extends from a hill or mountain." }, { id: 4, text: "Spur" },
                { id: 5, text: "U or V-shaped contour pattern pointing downhill." }, { id: 5, text: "Spur" },
                { id: 6, text: "Elongated contour shapes indicating high ground." }, { id: 6, text: "Ridge Line" },
                { id: 7, text: "Area of lower land found between two hills or ridges." }, { id: 7, text: "Valley" },
                { id: 8, text: "Rule for identifying river direction from contours." }, { id: 8, text: "V points upstream" },
                { id: 9, text: "Highest part of a mountain (peak) found in the center of contours." }, { id: 9, text: "Summit" },
                { id: 10, text: "The steepness of the land shown by contour spacing." }, { id: 10, text: "Slope / Gradient" }
            ],
            'topic4': [
                { id: 1, text: "Lines running West to East, measured North or South of Equator." }, { id: 1, text: "Latitude" },
                { id: 2, text: "Lines running North to South, measured East or West of Greenwich." }, { id: 2, text: "Longitude" },
                { id: 3, text: "Small units that each degree (°) is divided into (60 total)." }, { id: 3, text: "Minutes" },
                { id: 4, text: "System used to find exact locations like a school or river." }, { id: 4, text: "Grid References" },
                { id: 5, text: "Rough latitude location of South Africa." }, { id: 5, text: "22° S to 35° S" },
                { id: 6, text: "The starting line (0°) for measuring latitude." }, { id: 6, text: "Equator" },
                { id: 7, text: "The starting line (0°) for measuring longitude." }, { id: 7, text: "Greenwich Meridian" },
                { id: 8, text: "South African Standard Time is based on this meridian." }, { id: 8, text: "30° East" },
                { id: 9, text: "Symbol (') used to represent subdivisions of degrees." }, { id: 9, text: "Minute Symbol" },
                { id: 10, text: "Primary use of coordinates on topographic maps." }, { id: 10, text: "Locating Features" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Well done! You've mastered Topographical Maps revision in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
