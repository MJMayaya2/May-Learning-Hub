    <style>

    <main class="game-container">
        <h1 class="game-title">History Quiz: The Industrial Revolution</h1>
        <p class="game-subtitle">Select a category, spin the wheel, and test your Grade 8 History knowledge!</p>

        <div class="category-selection">
            <h2>Step 1: Choose a Category</h2>
            <div class="cat-buttons" id="catButtons">
                <button class="cat-btn" onclick="selectCategory('definitions', this)">Definitions</button>
                <button class="cat-btn" onclick="selectCategory('terms', this)">Name the Term</button>
                <button class="cat-btn" onclick="selectCategory('multipleChoice', this)">Multiple Choice</button>
                <button class="cat-btn" onclick="selectCategory('trueFalse', this)">True or False</button>
            </div>
        </div>

        <div id="wheelArea">
            <h2 id="activeCategoryTitle">Category: None</h2>
            
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <div class="wheel-center"></div>
                <div class="wheel" id="wheel">
                    <div class="wheel-bg" id="wheelBg"></div>
                    <div class="wheel-labels" id="wheelLabels"></div>
                </div>
            </div>

            <button class="spin-btn" id="spinBtn" onclick="spinWheel()">SPIN THE WHEEL</button>
            <p id="remainingCount" style="color: #666; font-size: 0.9rem; margin-bottom: 1rem; font-weight: bold;">20 questions remaining</p>

            <div class="question-card" id="questionCard">
                <div class="q-number-tag" id="qNumberTag">Question #</div>
                <div class="question-text" id="questionText">Loading question...</div>
                
                <div class="mc-options" id="mcOptions"></div>
                
                <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">Reveal Answer</button>
                <div class="answer-text" id="answerText"></div>
            </div>
        </div>
    </main>

    <script>
        const gameData = {
            'definitions': [
                { q: "Industrial Revolution", a: "A period of rapid growth in using machines for manufacturing and production that began in the mid-1700s." },
                { q: "Industrialisation", a: "The gradual process where a country begins to use machines to make goods in factories instead of relying on manual farming." },
                { q: "Rural Areas", a: "The countryside regions where most people lived, farmed the land, and grew food before the Industrial Revolution." },
                { q: "Urbanisation", a: "The movement of people from rural areas into towns and cities to live and work." },
                { q: "Cottage Industry", a: "A system where goods were made by hand by families working in and around their own homes." },
                { q: "Factory System", a: "A method of manufacturing using machinery and division of labour centralized in large buildings." },
                { q: "Child Labour", a: "The employment of children, sometimes as young as five, to do dangerous work for long hours in factories and mines." },
                { q: "Trade Union", a: "An organized association of workers formed to protect and further their rights and interests." },
                { q: "Strike", a: "A refusal to work organized by a body of employees as a form of protest." },
                { q: "Grand National Consolidated Trades Union", a: "A powerful early trade union in Britain that gained half a million members within a week." },
                { q: "Crystal Palace", a: "A huge building in London's Hyde Park made with an iron framework and massive sheets of plate-glass." },
                { q: "Great Exhibition of 1851", a: "An international exhibition held in London to showcase the industrial and technological superiority of Britain." },
                { q: "Trapper", a: "A child employed in coal mines to open and close ventilation doors for coal wagons." },
                { q: "Mass Production", a: "The manufacture of large quantities of standardized products, frequently using assembly line or machine technology." },
                { q: "Cholera", a: "A deadly waterborne disease that spread rapidly in the overcrowded and unsanitary industrial towns." },
                { q: "Capitalist", a: "A wealthy person who invests their money in trade and industry for profit in accordance with the principles of capitalism." },
                { q: "Working Class", a: "The social group consisting of people who were employed for wages, especially in manual or industrial work." },
                { q: "Middle Class", a: "A social group that grew during the Industrial Revolution, made up of factory owners, managers, merchants, and professionals." },
                { q: "Smog", a: "A thick mixture of smoke and fog that severely polluted the air in industrial cities." },
                { q: "Hand Loom", a: "A manually operated machine used for weaving cloth, which was common before 1785." }
            ],
            'terms': [
                { q: "The specific period in history between 1750 and 1850 when massive technological shifts occurred in Britain.", a: "Industrial Revolution" },
                { q: "The country that is recognized as the first industrialised nation in the world.", a: "Britain" },
                { q: "Using machines to produce goods in factories.", a: "Industrialisation" },
                { q: "Where people relocated to be nearer to large factories for work.", a: "Cities / Towns" },
                { q: "Two Western European countries that started competing with Britain for power and wealth in the late 19th century.", a: "France and Germany" },
                { q: "The primary reason young children were employed in textile factories.", a: "They could crawl under machines to clean them." },
                { q: "The massive structure built to house the 'Great Exhibition of the Works of Industry of All Nations'.", a: "The Crystal Palace" },
                { q: "What happened to the Grand National Consolidated Trades Union after harsh prison sentences were given to workers.", a: "It collapsed." },
                { q: "The primary source of power that drove the early factory machines before electricity.", a: "Steam Power (or Water Power)" },
                { q: "The industry focused on making cloth and clothing, which was the first to be fully industrialized.", a: "Textile Industry" },
                { q: "The primary fuel source that was mined heavily during the Industrial Revolution to power steam engines.", a: "Coal" },
                { q: "Small children who pulled heavy carts of coal through narrow mine shafts.", a: "Hurriers" },
                { q: "A place where destitute people lived and performed manual labor in exchange for basic food and shelter.", a: "Workhouse" },
                { q: "The social class that benefited the most from the wealth generated by the new factories.", a: "The Middle Class / Factory Owners" },
                { q: "A machine invented by James Hargreaves that allowed a worker to spin multiple threads at once.", a: "Spinning Jenny" },
                { q: "The process of taking over and fencing off land formerly shared by peasant farmers.", a: "Enclosure Movement" },
                { q: "The material used along with plate-glass to show Britain's technological superiority at the Crystal Palace.", a: "Iron framework" },
                { q: "The main mode of transportation that revolutionized the movement of goods and people over land in the 1800s.", a: "Steam Railway / Trains" },
                { q: "Workers who violently destroyed factory machinery because they felt it threatened their jobs.", a: "Luddites" },
                { q: "The time period when the trade union movement in Britain eventually became very powerful.", a: "Towards the end of the 19th century" }
            ],
            'multipleChoice': [
                { q: "During which years did the main changes of the Industrial Revolution take place in Britain?", options: ["A) 1650 - 1750", "B) 1750 - 1850", "C) 1850 - 1950", "D) 1900 - 2000"], a: "B) 1750 - 1850" },
                { q: "Before the Industrial Revolution, where did most people in Britain live?", options: ["A) In large cities", "B) In mining compounds", "C) In rural areas", "D) In factory dormitories"], a: "C) In rural areas" },
                { q: "What was the main occupation of people before industrialisation?", options: ["A) Operating heavy machinery", "B) Farming the land to grow food", "C) Building railways", "D) Working in coal mines"], a: "B) Farming the land to grow food" },
                { q: "Why did families stop working in and around their homes?", options: ["A) It was made illegal", "B) They moved to cities to find work in large factories", "C) They became too wealthy to work", "D) They preferred to travel"], a: "B) They moved to cities to find work in large factories" },
                { q: "At what age were some children employed to work in factories?", options: ["A) As young as five years old", "B) Not until they were teenagers", "C) Exactly ten years old", "D) Only after finishing school"], a: "A) As young as five years old" },
                { q: "Why were children specifically sought after for factory work?", options: ["A) They were more educated", "B) They owned the factories", "C) They could reach places and crawl under machines that adults couldn't", "D) They demanded higher wages"], a: "C) They could reach places and crawl under machines that adults couldn't" },
                { q: "What happened to the government when the Grand National Consolidated Trade Union was formed?", options: ["A) They fully supported it", "B) They ignored it completely", "C) They were alarmed by this new mass labour movement", "D) They made all politicians join it"], a: "C) They were alarmed by this new mass labour movement" },
                { q: "Why did the Grand National Consolidated Trades Union eventually collapse?", options: ["A) The workers lost interest", "B) Harsh prison sentences discouraged workers from joining", "C) The factories shut down", "D) All their demands were met instantly"], a: "B) Harsh prison sentences discouraged workers from joining" },
                { q: "Which nation was the FIRST to become an industrialised nation?", options: ["A) France", "B) Germany", "C) United States", "D) Britain"], a: "D) Britain" },
                { q: "In the second half of the 19th century, which countries started to compete with Britain in terms of wealth and power?", options: ["A) Spain and Portugal", "B) France and Germany", "C) China and Japan", "D) Russia and Italy"], a: "B) France and Germany" },
                { q: "What was the name of the huge building in London's Hyde Park where the 1851 Great Exhibition was held?", options: ["A) The Iron Tower", "B) The Crystal Palace", "C) Westminster Abbey", "D) The Grand Factory"], a: "B) The Crystal Palace" },
                { q: "What materials were primarily used to build the Crystal Palace, showing off Britain's technological superiority?", options: ["A) Wood and brick", "B) Stone and mortar", "C) Iron framework and massive sheets of plate-glass", "D) Steel and concrete"], a: "C) Iron framework and massive sheets of plate-glass" },
                { q: "According to historical records, how did the National Income in Britain shift after the Industrial Revolution?", options: ["A) Agriculture became the largest sector", "B) Mining and Manufacturing became significantly larger", "C) Trade and transport disappeared", "D) Government rents provided 100% of income"], a: "B) Mining and Manufacturing became significantly larger" },
                { q: "What kind of loom was commonly used BEFORE 1785?", options: ["A) Power Loom", "B) Steam Loom", "C) Hand Loom", "D) Electric Loom"], a: "C) Hand Loom" },
                { q: "How long did it take for the Grand National Consolidated Trade Union to get over half a million members?", options: ["A) One decade", "B) One year", "C) One month", "D) Within a week"], a: "D) Within a week" },
                { q: "What were the typical working hours for people in the new factories?", options: ["A) Very short hours", "B) Flexible hours", "C) Long hours", "D) Only on weekends"], a: "C) Long hours" },
                { q: "Who competed with Britain for wealth by utilizing British inventions and technologies?", options: ["A) Only Asian countries", "B) Western European countries", "C) Ancient civilizations", "D) South American nations"], a: "B) Western European countries" },
                { q: "What was the main purpose of the 'Great Exhibition of the Works of Industry of All Nations' in 1851?", options: ["A) To start a war", "B) To showcase Britain's technological superiority and global industry", "C) To shut down trade unions", "D) To protest against factory owners"], a: "B) To showcase Britain's technological superiority and global industry" },
                { q: "How did industrialisation affect the development of infrastructure?", options: ["A) Towns and cities developed rapidly", "B) All cities were destroyed", "C) People abandoned cities to go back to farms", "D) No new buildings were constructed"], a: "A) Towns and cities developed rapidly" },
                { q: "What does the term 'mass labour movement' refer to in the context of the Industrial Revolution?", options: ["A) Factory owners moving overseas", "B) Large groups of workers uniting in trade unions to demand rights", "C) People walking to work", "D) The military marching into factories"], a: "B) Large groups of workers uniting in trade unions to demand rights" }
            ],
            'trueFalse': [
                { q: "Britain was the first industrialised nation in the world.", options: ["True", "False"], a: "True", exp: "Britain led the way due to its abundant coal, inventions, and capital." },
                { q: "The main changes of the Industrial Revolution in Britain occurred between 1950 and 2000.", options: ["True", "False"], a: "False", exp: "The primary revolutionary changes took place between 1750 and 1850." },
                { q: "Before industrialisation, the vast majority of people lived in large cities.", options: ["True", "False"], a: "False", exp: "Before the Industrial Revolution, most people lived in rural areas and farmed." },
                { q: "Industrialisation means using machines to make goods in factories.", options: ["True", "False"], a: "True", exp: "It marks the shift from hand-production in homes to machine-production in factories." },
                { q: "During the Industrial Revolution, families continued to work exclusively in and around their own homes.", options: ["True", "False"], a: "False", exp: "Families moved away from cottage industries and went to work in large urban factories." },
                { q: "Children as young as five were never allowed to work in factories because of strict laws.", options: ["True", "False"], a: "False", exp: "Children as young as five were actively employed to work long hours in dangerous conditions." },
                { q: "Children were useful in factories because they were small enough to crawl under machines and clean them.", options: ["True", "False"], a: "True", exp: "Their small size was exploited by factory owners to perform dangerous maintenance tasks." },
                { q: "The British government was very supportive when the Grand National Consolidated Trade Union gained half a million members.", options: ["True", "False"], a: "False", exp: "The government was highly alarmed by the power of this new mass labour movement." },
                { q: "Harsh prison sentences were used to discourage workers from joining early trade unions.", options: ["True", "False"], a: "True", exp: "This severe intimidation caused the collapse of the Grand National Consolidated Trades Union." },
                { q: "Trade unions in Britain remained completely powerless throughout the entire 19th century.", options: ["True", "False"], a: "False", exp: "The trade union movement eventually became very powerful towards the end of the 19th century." },
                { q: "France and Germany started to compete with Britain's wealth and power in the second half of the 19th century.", options: ["True", "False"], a: "True", exp: "They adopted British inventions and rapidly industrialized themselves." },
                { q: "The Great Exhibition of 1851 was held in Paris.", options: ["True", "False"], a: "False", exp: "The Great Exhibition of 1851 was held in London's Hyde Park." },
                { q: "The Crystal Palace was constructed primarily out of wood and bricks.", options: ["True", "False"], a: "False", exp: "It was an architectural marvel constructed with an iron framework and huge sheets of plate-glass." },
                { q: "The Crystal Palace was built to hide Britain's technological failures.", options: ["True", "False"], a: "False", exp: "It was built to boldly showcase Britain's technological superiority to the rest of the world." },
                { q: "After the Industrial Revolution, agriculture was no longer the largest contributor to Britain's National Income.", options: ["True", "False"], a: "True", exp: "Mining and Manufacturing overtook Agriculture significantly." },
                { q: "A hand loom is an example of machinery used largely AFTER factories were established.", options: ["True", "False"], a: "False", exp: "Hand looms were the primary method used BEFORE 1785, prior to the widespread use of power looms." },
                { q: "The development of towns and cities was a direct result of people moving to be nearer to large factories.", options: ["True", "False"], a: "True", exp: "This process is known as Urbanisation." },
                { q: "Working conditions for men and women in the new factories were generally easy and featured very short hours.", options: ["True", "False"], a: "False", exp: "Men, women, and children faced grueling, long hours in difficult environments." },
                { q: "Western European countries industrialized by completely ignoring British inventions.", options: ["True", "False"], a: "False", exp: "They successfully industrialized by adopting and utilizing British inventions and technologies." },
                { q: "The Industrial Revolution had very little impact on the lives of ordinary people.", options: ["True", "False"], a: "False", exp: "It entirely transformed their lives, dictating where they lived, how they worked, and family dynamics." }
            ]
        };

        const totalQuestions = 20; 
        const sliceAngle = 360 / totalQuestions;
        let currentCategoryKey = null;
        let currentRotation = 0;
        let currentQuestionData = null;
        let targetQuestionIndex = null;

        let availableQuestions = {
            'definitions': Array.from({length: totalQuestions}, (_, i) => i),
            'terms': Array.from({length: totalQuestions}, (_, i) => i),
            'multipleChoice': Array.from({length: totalQuestions}, (_, i) => i),
            'trueFalse': Array.from({length: totalQuestions}, (_, i) => i)
        };

        const sliceColors = ["#0055ff", "#0088ff", "#00bfff", "#0044cc"];

        function buildWheel() {
            const wheelBg = document.getElementById('wheelBg');
            const wheelLabels = document.getElementById('wheelLabels');
            let gradientParts = [];

            for (let i = 0; i < totalQuestions; i++) {
                let startAngle = i * sliceAngle;
                let endAngle = (i + 1) * sliceAngle;
                let color = sliceColors[i % sliceColors.length];
                gradientParts.push(`${color} ${startAngle}deg ${endAngle}deg`);

                let label = document.createElement('div');
                label.className = 'label';
                let textRotation = startAngle + (sliceAngle / 2) - 90;
                label.style.transform = `rotate(${textRotation}deg) translate(145px, -50%)`;
                label.innerText = i + 1;
                wheelLabels.appendChild(label);
            }
            wheelBg.style.background = `conic-gradient(${gradientParts.join(', ')})`;
        }

        buildWheel();

        function selectCategory(categoryKey, btnElement) {
            currentCategoryKey = categoryKey;
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('wheelArea').style.display = 'block';
            document.getElementById('activeCategoryTitle').innerText = `Category: ${btnElement.innerText}`;
            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('remainingCount').innerText = `${availableQuestions[categoryKey].length} questions remaining`;
            currentRotation = 0;
            document.getElementById('wheel').style.transform = `rotate(0deg)`;
        }

        function spinWheel() {
            const spinBtn = document.getElementById('spinBtn');
            const wheel = document.getElementById('wheel');
            const questionCard = document.getElementById('questionCard');
            let available = availableQuestions[currentCategoryKey];
            
            if (available.length === 0) {
                alert(`Resetting ${currentCategoryKey}!`);
                availableQuestions[currentCategoryKey] = Array.from({length: totalQuestions}, (_, i) => i);
                available = availableQuestions[currentCategoryKey];
            }

            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";
            questionCard.style.display = 'none';

            let randomArrIndex = Math.floor(Math.random() * available.length);
            targetQuestionIndex = available[randomArrIndex];
            available.splice(randomArrIndex, 1);
            document.getElementById('remainingCount').innerText = `${available.length} questions remaining`;

            let sliceCenterAngle = (targetQuestionIndex * sliceAngle) + (sliceAngle / 2);
            let targetDegree = 360 - sliceCenterAngle;
            let currentBase = Math.ceil(currentRotation / 360) * 360; 
            currentRotation = currentBase + 1800 + targetDegree;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                spinBtn.disabled = false;
                spinBtn.innerText = "SPIN AGAIN";
                currentQuestionData = gameData[currentCategoryKey][targetQuestionIndex];
                displayQuestion(targetQuestionIndex + 1, currentQuestionData);
            }, 4000);
        }

        function displayQuestion(questionNumber, data) {
            document.getElementById('qNumberTag').innerText = `Question #${questionNumber}`;
            document.getElementById('questionText').innerText = data.q;
            const mcOptions = document.getElementById('mcOptions');
            const revealBtn = document.getElementById('revealBtn');
            const answerText = document.getElementById('answerText');
            mcOptions.innerHTML = "";
            answerText.style.display = "none";
            
            if (currentCategoryKey === 'multipleChoice' || currentCategoryKey === 'trueFalse') {
                revealBtn.style.display = "none"; 
                mcOptions.style.display = "flex";
                data.options.forEach(opt => {
                    let btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    btn.onclick = () => checkInteractiveAnswer(btn, opt);
                    mcOptions.appendChild(btn);
                });
            } else {
                mcOptions.style.display = "none";
                revealBtn.style.display = "inline-block";
                answerText.innerHTML = `<strong>Answer:</strong> ${data.a}`;
            }
            document.getElementById('questionCard').style.display = "block";
        }

        function checkInteractiveAnswer(clickedBtn, selectedText) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);
            const isCorrect = (selectedText === currentQuestionData.a || selectedText.startsWith(currentQuestionData.a.charAt(0)));
            const answerTextDiv = document.getElementById('answerText');
            if (isCorrect) {
                clickedBtn.classList.add('correct');
                answerTextDiv.innerHTML = `<div style="color: green;">Correct!</div> ${currentQuestionData.exp || ''}`;
            } else {
                clickedBtn.classList.add('incorrect');
                answerTextDiv.innerHTML = `<div style="color: red;">Incorrect!</div> The correct answer was: ${currentQuestionData.a}. ${currentQuestionData.exp || ''}`;
            }
            answerTextDiv.style.display = "block";
        }

        function revealAnswer() {
            document.getElementById('revealBtn').style.display = "none";
            document.getElementById('answerText').style.display = "block";
        }
    </script>
</body>
</html>
