<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 8 History Master Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 250px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../../index.html">Home</a>
            <a href="../../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">History Master Quiz</h1>
        <p class="game-subtitle">30-Question Challenge: Changes during the Industrial Revolution</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final score:</p>
            <div id="endPrize">0 Pts</div>
            <button class="lifeline-btn" onclick="location.reload()">Try Again</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "Between which years did the Industrial Revolution primarily take place in Britain?", options: ["1650-1750", "1750-1850", "1850-1950", "1900-2000"], a: 1, hint: "It occurred across a specific 100-year span starting in the mid-18th century." },
            { q: "What is the term for Britain's shift from manual labor to the use of machines in factories?", options: ["Urbanisation", "Globalisation", "Industrialisation", "Agricultural Revolution"], a: 2, hint: "It shares a root word with 'industry'." },
            { q: "Before the Industrial Revolution, where did most people in Britain live?", options: ["Cities", "Factory towns", "Rural areas", "Seaports"], a: 2, hint: "They lived in the countryside and farmed." },
            { q: "Which trade, involving the exchange of captured people for raw materials, helped Britain become wealthy?", options: ["The Spice Trade", "The Silk Road", "The Trans-Atlantic Slave Trade", "The Tea Trade"], a: 2, hint: "It involved three stages and ships crossing the Atlantic." },
            { q: "Which city was a major British seaport for the slave trade for about 100 years?", options: ["London", "Manchester", "Bristol", "Birmingham"], a: 2, hint: "It is located in south-west England." },
            { q: "Under the farming economy, what was the 'common land' used for?", options: ["Building factories", "Grazing livestock", "Private gardens", "Mining coal"], a: 1, hint: "Villagers shared this land before enclosures." },
            { q: "What was the 'Enclosure System'?", options: ["Sharing fields among farmers", "Fencing land to belong to one owner", "Building houses in rows", "Opening parks for the public"], a: 1, hint: "It involved making land private property." },
            { q: "What happened to small farmers because of the enclosure movement?", options: ["They became wealthy landowners", "They were left poor and homeless", "They stayed in rural areas", "They stopped farming"], a: 1, hint: "They were forced to find work in growing towns." },
            { q: "What name was given to handicrafts done at home before factories existed?", options: ["Home-made goods", "Cottage industries", "Manual labor", "Urban crafts"], a: 1, hint: "Think of a small house or 'cottage'." },
            { q: "In the woollen cloth industry, what was the job of a 'spinster'?", options: ["Weaving cloth on a loom", "Spinning and combing wool into thread", "Buying raw material", "Shrinking the cloth"], a: 1, hint: "They turned fleece into thread." },
            { q: "Why were the first factories built?", options: ["To house large families", "New machines were too big for houses", "To protect workers from rain", "To store raw cotton"], a: 1, hint: "Machines like the power loom required massive spaces." },
            { q: "Who improved the technology of the steam engine in about 1770?", options: ["Ned Ludd", "John MacAdam", "James Watt", "George Stephenson"], a: 2, hint: "His name is now used as a unit of power." },
            { q: "Which two natural resources were essential for the steam engine and machinery?", options: ["Wood and Water", "Coal and Iron", "Oil and Gas", "Sugar and Cotton"], a: 1, hint: "One for fuel to boil water, one for heat-resistant machines." },
            { q: "What was 'The Rocket'?", options: ["A steam pump for mines", "A steam-powered train engine", "A new weaving machine", "A type of sailing ship"], a: 1, hint: "It was developed by George Stephenson in 1830." },
            { q: "The movement of people from rural areas to towns and cities is called...", options: ["Migration", "Urbanisation", "Enclosure", "Cottage industry"], a: 1, hint: "It describes the growth of cities." },
            { q: "Why were factory workers' houses often built back-to-back in rows?", options: ["For decoration", "To save space and accommodate more workers", "To keep them warm", "Because it was the law"], a: 1, hint: "Owners crammed them close to the smoking chimneys." },
            { q: "What was a major health issue in the new industrial towns?", options: ["Fresh water shortage", "Overcrowding and spread of diseases", "Lack of entertainment", "Too much exercise"], a: 1, hint: "Streets had open drains and shared water pumps." },
            { q: "Why were children as young as five employed in factories and mines?", options: ["They were the most skilled", "They could reach small places adults couldn't", "They were paid the highest wages", "Their parents didn't want them"], a: 1, hint: "They could crawl under machines and into small tunnels." },
            { q: "What were 'Workhouses'?", options: ["Vacation homes for workers", "Places to help the very poor in exchange for labor", "Small factories for orphans", "Schools for craftspeople"], a: 1, hint: "They were uncomfortable places for those with nowhere else to go." },
            { q: "Which act in 1842 banned children under ten from working in mines?", options: ["The Factory Act", "The Mines Act", "The Labour Act", "The Education Act"], a: 1, hint: "It specifically addressed the dangerous conditions underground." },
            { q: "Who were the 'Luddites'?", options: ["Wealthy factory owners", "Workers who destroyed machines", "Farm laborers who protested", "Steam engine inventors"], a: 1, hint: "They followed the example of Ned Ludd." },
            { q: "What was the purpose of the 'Swing Riots' in 1830?", options: ["To protest against threshing machines", "To ask for more factories", "To celebrate the steam engine", "To support the slave trade"], a: 0, hint: "Farm workers wanted to draw attention to unemployment." },
            { q: "Why was it difficult for workers to protest against their employers initially?", options: ["They were too tired", "It was illegal to organise together", "They didn't know how to write", "They liked the long hours"], a: 1, hint: "Early trade union activity was against the law." },
            { q: "What was the Grand National Consolidated Trades Union?", options: ["A factory owners' association", "A massive labor movement with over 500,000 members", "A government department", "A railway company"], a: 1, hint: "It was formed in 1834 to help workers." },
            { q: "What was the 'Crystal Palace' built for in 1851?", options: ["To house the Queen", "The Great Exhibition of Industry", "A new coal mine", "A giant workhouse"], a: 1, hint: "It showed off Britain's technological superiority." },
            { q: "Which South African province received indentured Indian workers for sugar plantations from 1860?", options: ["Cape Colony", "Natal", "Transvaal", "Orange Free State"], a: 1, hint: "This region is known for its sugar production." },
            { q: "When did Southern Africa's own industrial revolution start?", options: ["1830", "1850", "1867", "1900"], a: 2, hint: "It happened after a major discovery in Kimberley." },
            { q: "The discovery of which resource in Kimberley triggered industrialisation in South Africa?", options: ["Gold", "Coal", "Diamonds", "Sugar"], a: 2, hint: "This precious stone started the mineral revolution." },
            { q: "By 1900, which sector became a major part of Britain's national income?", options: ["Agriculture", "Mining and Manufacturing", "Tourism", "Fishing"], a: 1, hint: "It rose to 40% of the national income." },
            { q: "Who invented 'tarmac' roads to improve transportation?", options: ["James Watt", "John MacAdam", "George Stephenson", "Ned Ludd"], a: 1, hint: "Hard-surface roads are sometimes named after him." }
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>Q-Point</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = qData.options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const qData = questions[currentLevel];
            const correctIndex = qData.a;
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (selectedIndex === correctIndex) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    document.getElementById(`btn${correctIndex}`).classList.add('correct');
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            const correctIndex = questions[currentLevel].a;
            let wrongIndexes = [0, 1, 2, 3].filter(i => i !== correctIndex);
            wrongIndexes.sort(() => Math.random() - 0.5);
            document.getElementById(`btn${wrongIndexes[0]}`).classList.add('hidden');
            document.getElementById(`btn${wrongIndexes[1]}`).classList.add('hidden');
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Study Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "History Legend!";
                document.getElementById('endPrize').innerText = "30/30 - 100%";
            } else {
                document.getElementById('endMessage').innerText = "Keep Studying!";
                document.getElementById('endPrize').innerText = `${currentLevel}/30 Correct`;
            }
        }
        loadQuestion();
    </script>
</body>
</html>
