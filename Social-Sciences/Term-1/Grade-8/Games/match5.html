<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Memory Match</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="https://mmayaya.github.io/mayhub" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="https://mmayaya.github.io/mayhub/">Home</a>
            <a href="https://mmayaya.github.io/mayhub/about">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 8 History Assessment Prep</h1>
        <p class="game-subtitle">Match the history concepts and definitions from your term 1 assessment tasks!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Topic 1: General Concepts</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Topic 2: Factory & Social Changes</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Topic 3: Indentured Labour</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Topic 4: Diamonds & Industry</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "In which country did the Industrial Revolution begin?" }, { id: 1, text: "Britain" },
                { id: 2, text: "Where were most slaves captured and traded before being sent to the Americas?" }, { id: 2, text: "West Africa" },
                { id: 3, text: "What term describes the massive changes in how farming was done before industrialisation?" }, { id: 3, text: "The Agricultural Revolution" },
                { id: 4, text: "What major event started the industrial revolution in Southern Africa?" }, { id: 4, text: "The discovery and mining of diamonds" },
                { id: 5, text: "What was the movement towards securing and fencing off land owned by one person called?" }, { id: 5, text: "The Enclosure System" },
                { id: 6, text: "What is land that is shared and can be freely used by everyone in a village called?" }, { id: 6, text: "Common land" },
                { id: 7, text: "What is the creation of a completely new product or process called?" }, { id: 7, text: "An Invention" },
                { id: 8, text: "What does it mean to make goods on a large scale using machinery?" }, { id: 8, text: "To Manufacture" },
                { id: 9, text: "What do we call workers bound by a strict contract for a certain length of time?" }, { id: 9, text: "Indentured labourers" },
                { id: 10, text: "What agricultural process involves separating grains of wheat from the husk and stalks?" }, { id: 10, text: "Threshing" }
            ],
            'topic2': [
                { id: 1, text: "How can the Industrial Revolution be defined?" }, { id: 1, text: "A period of rapid transition to new manufacturing processes." },
                { id: 2, text: "What was a key change in agriculture that helped spark industrialisation?" }, { id: 2, text: "The shift to new machinery and efficient farming methods." },
                { id: 3, text: "Why were children frequently employed in early factories?" }, { id: 3, text: "They provided cheap labor and could fit into small spaces under machines." },
                { id: 4, text: "How did steam power change industry?" }, { id: 4, text: "It allowed factories to be built anywhere, not just next to fast-flowing rivers." },
                { id: 5, text: "What were common grievances for early factory workers?" }, { id: 5, text: "Extremely long working hours, dangerous conditions, and very low wages." },
                { id: 6, text: "What is the definition of urbanisation?" }, { id: 6, text: "The mass movement of populations from rural farming areas to growing cities." },
                { id: 7, text: "What was the main reason towns grew so rapidly during this era?" }, { id: 7, text: "The promise of steady factory jobs attracted thousands of rural workers." },
                { id: 8, text: "What was the purpose of workhouses in Britain?" }, { id: 8, text: "To provide basic shelter and harsh physical work for the very poor and destitute." },
                { id: 9, text: "How was discipline typically maintained in early factories?" }, { id: 9, text: "Through strict rules, fines, and harsh physical punishments." },
                { id: 10, text: "What was a major social impact of the Industrial Revolution?" }, { id: 10, text: "It completely transformed daily life, separating home life from the workplace." }
            ],
            'topic3': [
                { id: 1, text: "What is a system where workers are bound by a legal contract to an employer for a specific period?" }, { id: 1, text: "Indentured labour." },
                { id: 2, text: "Why were Indian labourers brought to Natal by the British?" }, { id: 2, text: "To provide a massive workforce for the growing sugar plantations." },
                { id: 3, text: "What were the living conditions typically like for early indentured workers in Natal?" }, { id: 3, text: "They faced harsh, cramped, and often unsanitary environments." },
                { id: 4, text: "What was a common issue with food rations for indentured labourers?" }, { id: 4, text: "The food provided was often unfamiliar, poor quality, or inadequate in portion size." },
                { id: 5, text: "Who were the 'Passenger Indians'?" }, { id: 5, text: "Immigrants who paid their own travel fare and contributed heavily to Natal's trade." },
                { id: 6, text: "Why did the Zulu kingdom initially resist working on the colonial sugar plantations?" }, { id: 6, text: "They preferred to maintain their independent, self-sustaining agricultural lifestyle." },
                { id: 7, text: "Which specific crop drove the massive demand for indentured labour in South Africa?" }, { id: 7, text: "Sugar cane." },
                { id: 8, text: "In which South African region did this specific sugar and indentured labour economy develop?" }, { id: 8, text: "Natal." },
                { id: 9, text: "What happened at the end of an indentured labourer's contract?" }, { id: 9, text: "They could return home to India or choose to stay in South Africa as free citizens." },
                { id: 10, text: "What was the primary economic motivation for British colonial authorities in Natal?" }, { id: 10, text: "Maximizing export profits from agricultural cash crops like sugar." }
            ],
            'topic4': [
                { id: 1, text: "How did new machines improve the process of industrialisation?" }, { id: 1, text: "They drastically increased the speed and volume of production." },
                { id: 2, text: "What was the main advantage of the factory system?" }, { id: 2, text: "It centralized labor, raw materials, and heavy equipment in one place." },
                { id: 3, text: "Which two resources were the main drivers of power and energy improvements?" }, { id: 3, text: "Coal and steam." },
                { id: 4, text: "Where in South Africa were diamonds first discovered in large quantities in 1867?" }, { id: 4, text: "Kimberley." },
                { id: 5, text: "How did the 1867 diamond discovery transform South Africa's economy?" }, { id: 5, text: "It shifted the focus from agriculture to large-scale, industrialized mining." },
                { id: 6, text: "What major challenge did black claim holders face in the diamond fields?" }, { id: 6, text: "They faced unfair racial discrimination and were eventually stripped of their land rights." },
                { id: 7, text: "Which historical figure is known for establishing a massive monopoly over diamond mining?" }, { id: 7, text: "Cecil John Rhodes." },
                { id: 8, text: "How did industrialisation affect transportation in South Africa?" }, { id: 8, text: "It led to the rapid building of railways to move mined goods efficiently to the coast." },
                { id: 9, text: "Why did diamond mining eventually require deep-level digging?" }, { id: 9, text: "Surface diamonds ran out quickly, requiring expensive machinery and better engineering." },
                { id: 10, text: "What does a 'monopoly' in the diamond industry mean?" }, { id: 10, text: "Having total control over the market, supply, and pricing of diamonds." }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Assessment Prep Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
