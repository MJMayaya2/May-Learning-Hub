<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Memory Match</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        /* FONT SIZE INCREASED HERE */
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.1rem; /* Increased font size */
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="https://mmayaya.github.io/mayhub" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="https://mmayaya.github.io/mayhub/">Home</a>
            <a href="https://mmayaya.github.io/mayhub/about">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">March Assessment Prep</h1>
        <p class="game-subtitle">Match the geography concepts and definitions from your assessment tasks!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('seasonal', this)">Topic 1: Seasonal Positions</button>
                <button class="cat-btn" onclick="selectCategory('movement', this)">Topic 2: Earth Movement</button>
                <button class="cat-btn" onclick="selectCategory('circulation', this)">Topic 3: Air Circulation</button>
                <button class="cat-btn" onclick="selectCategory('monsoon', this)">Topic 4: Monsoon Winds</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'seasonal': [
                { id: 1, text: "Equinox Definition" }, { id: 1, text: "Date when day and night are of equal length." },
                { id: 2, text: "Solstice Condition" }, { id: 2, text: "When one pole is tilted at its maximum toward the sun." },
                { id: 3, text: "December Solstice (S. Hemisphere)" }, { id: 3, text: "South Africa experiences Summer." },
                { id: 4, text: "June Solstice (S. Hemisphere)" }, { id: 4, text: "South Africa experiences Winter." },
                { id: 5, text: "Ocean Currents' Role" }, { id: 5, text: "Restoring energy balance between Poles and Equator." },
                { id: 6, text: "Direct Sun Rays @ Equator" }, { id: 6, text: "Occurs during an Equinox." },
                { id: 7, text: "Earth's Inclination" }, { id: 7, text: "The tilt of 23.5 degrees." },
                { id: 8, text: "Heat Transfer" }, { id: 8, text: "Movement of energy from surplus (Equator) to deficit (Poles)." },
                { id: 9, text: "Energy Balance" }, { id: 9, text: "The equilibrium of incoming and outgoing radiation." },
                { id: 10, text: "Seasonal Change Cause" }, { id: 10, text: "The tilt of the Earth combined with revolution." }
            ],
            'movement': [
                { id: 1, text: "Earth Movement Identify" }, { id: 1, text: "Revolution (orbit around the Sun)." },
                { id: 2, text: "March 21st (N. Hemisphere)" }, { id: 2, text: "Spring (Vernal) Equinox." },
                { id: 3, text: "Summer (S. Hemisphere)" }, { id: 3, text: "When the South Pole tilts toward the Sun." },
                { id: 4, text: "Equinox Sun Position" }, { id: 4, text: "Directly overhead (90°) at the Equator." },
                { id: 5, text: "Equal Day/Night Dates" }, { id: 5, text: "March 21st and September 23rd." },
                { id: 6, text: "Elliptical Orbit" }, { id: 6, text: "The oval shape of Earth's path." },
                { id: 7, text: "Rotation" }, { id: 7, text: "Earth spinning on its axis every 24 hours." },
                { id: 8, text: "Tropic of Capricorn" }, { id: 8, text: "23.5° South Latitude." },
                { id: 9, text: "Tropic of Cancer" }, { id: 9, text: "23.5° North Latitude." },
                { id: 10, text: "Aphelion" }, { id: 10, text: "When Earth is furthest from the Sun." }
            ],
            'circulation': [
                { id: 1, text: "Pressure at 0°" }, { id: 1, text: "Equatorial Low (Doldrums)." },
                { id: 2, text: "Pressure at 30°S" }, { id: 2, text: "Subtropical High." },
                { id: 3, text: "Pressure at 60°S" }, { id: 3, text: "Subpolar Low." },
                { id: 4, text: "Pressure at 90°S" }, { id: 4, text: "Polar High." },
                { id: 5, text: "Hadley Cell" }, { id: 5, text: "Cell located between 0° and 30°." },
                { id: 6, text: "Ferrel Cell" }, { id: 6, text: "Cell located between 30° and 60°." },
                { id: 7, text: "Polar Cell" }, { id: 7, text: "Cell located between 60° and 90°." },
                { id: 8, text: "ITCZ Location" }, { id: 8, text: "Where Trade Winds converge at the Equator." },
                { id: 9, text: "Westerlies" }, { id: 9, text: "Winds blowing between 30°S and 60°S." },
                { id: 10, text: "Coriolis Force" }, { id: 10, text: "Deflects winds to the left in the Southern Hemisphere." }
            ],
            'monsoon': [
                { id: 1, text: "Monsoon Concept" }, { id: 1, text: "Seasonal reversal of wind direction." },
                { id: 2, text: "Summer Monsoon" }, { id: 2, text: "Winds blow sea to land, bringing heavy rain." },
                { id: 3, text: "Winter Monsoon" }, { id: 3, text: "Winds blow land to sea, bringing dry air." },
                { id: 4, text: "Thermal Low" }, { id: 4, text: "Intense heating over land in summer." },
                { id: 5, text: "NE Monsoon Reason" }, { id: 5, text: "Dry winter wind from Central Asia." },
                { id: 6, text: "Monsoon Blessing" }, { id: 6, text: "Essential for India's agriculture (rice)." },
                { id: 7, text: "Monsoon Curse" }, { id: 7, text: "Causes massive floods and loss of life." },
                { id: 8, text: "India Environment Impact" }, { id: 8, text: "Seasonal lush growth vs dry dormancy." },
                { id: 9, text: "Himalayas' Role" }, { id: 9, text: "Forces moist air up (Orographic rain)." },
                { id: 10, text: "South West Monsoon" }, { id: 10, text: "Moist summer winds from the Indian Ocean." }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job, Mayaya! Assessment Prep Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
