<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Geography: Earth's Energy Balance Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Earth's Energy Balance (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the primary source of heat for Earth's atmosphere?", options: ["Volcanic activity", "Solar radiation", "Geothermal energy", "Terrestrial radiation"], a: 1, hint: "Energy from the Sun." },
            { q: "Earth's axis is tilted at an angle of how many degrees?", options: ["15 degrees", "45 degrees", "23.5 degrees", "90 degrees"], a: 2, hint: "This specific tilt causes our seasons." },
            { q: "In equatorial regions, why is the solar radiation more intense?", options: ["It hits at a low angle", "It hits the surface directly (90°)", "The atmosphere is thicker there", "It is closer to the moon"], a: 1, hint: "Direct rays concentrate energy on a smaller area." },
            { q: "Which process involves the vertical movement of heat through air or water currents?", options: ["Conduction", "Convection", "Radiation", "Insulation"], a: 1, hint: "Think of rising warm air and sinking cold air." },
            { q: "How long does it take for Earth to complete one full revolution around the Sun?", options: ["24 hours", "28 days", "365.25 days", "10 years"], a: 2, hint: "This is the length of one calendar year." },
            { q: "Which energy transfer process involves heat moving through direct contact between substances?", options: ["Convection", "Conduction", "Radiation", "Sublimation"], a: 1, hint: "Like the warm ground heating the air touching it." },
            { q: "What do we call the incoming solar energy received by the Earth's atmosphere?", options: ["Infrared", "Albedo", "Insolation", "Ozone"], a: 2, hint: "Combination of: Incoming Solar Radiation." },
            { q: "Which cold ocean current flows along the West Coast of South Africa?", options: ["Agulhas Current", "Benguela Current", "Mozambique Current", "Gulf Stream"], a: 1, hint: "It brings cool water from the Antarctic." },
            { q: "During which event is the Southern Hemisphere tilted directly toward the Sun (around December 21st)?", options: ["Autumn Equinox", "Winter Solstice", "Summer Solstice", "Spring Equinox"], a: 2, hint: "The longest day of the year in SA." },
            { q: "What are the high-altitude winds that help redistribute energy across the globe?", options: ["Trade winds", "Westerlies", "Jet Streams", "Polar Easterlies"], a: 2, hint: "Fast-moving air currents very high up." },
            { q: "Earth's energy balance is achieved when incoming solar radiation equals...", options: ["Reflected light", "Absorbed UV rays", "Outgoing terrestrial radiation", "Greenhouse gas mass"], a: 2, hint: "Energy in must equal energy out." },
            { q: "What occurs around March 21st and September 23rd when day and night are equal?", options: ["Solstices", "Equinoxes", "Aphelion", "Perihelion"], a: 1, hint: "From the Latin for 'equal night'." },
            { q: "Why are Polar Regions colder than Equatorial regions?", options: ["They are further from the Sun", "Sunlight is spread over a larger area due to the angle", "They have no greenhouse gases", "The land is higher"], a: 1, hint: "Angled rays are less concentrated." },
            { q: "Which warm ocean current is responsible for warming the climate of Western Europe?", options: ["Benguela Current", "Gulf Stream", "Canary Current", "Peru Current"], a: 1, hint: "It crosses the North Atlantic." },
            { q: "Which gases in the atmosphere trap heat and re-radiate it toward Earth?", options: ["Oxygen and Nitrogen", "Argon and Helium", "Greenhouse gases", "Noble gases"], a: 2, hint: "Includes CO2 and water vapour." },
            { q: "What type of radiation does the Earth emit after being warmed by the Sun?", options: ["Short-wave radiation", "Visible light", "Long-wave (infrared) radiation", "X-rays"], a: 2, hint: "Also known as terrestrial radiation." },
            { q: "In which wind belt are the 'Roaring Forties' located?", options: ["Trade winds", "Westerlies", "Polar Easterlies", "Doldrums"], a: 1, hint: "Between 30 and 60 degrees latitude." },
            { q: "What natural event can disrupt the energy balance by blocking sunlight with ash?", options: ["Earthquakes", "Volcanic eruptions", "Tides", "Tsunamis"], a: 1, hint: "Think of mountains that erupt." },
            { q: "What does ITCZ stand for in Geography?", options: ["International Tropical Climate Zone", "Intertropical Convergence Zone", "Internal Temperature Control Zone", "Interpolar Thermal Cold Zone"], a: 1, hint: "The low-pressure belt near the Equator." },
            { q: "On June 21st, the Sun is directly overhead at which latitude?", options: ["Tropic of Capricorn", "Equator", "Tropic of Cancer", "Antarctic Circle"], a: 2, hint: "The Northern Hemisphere's Summer Solstice." },
            { q: "Which global wind pattern drives heat from the tropics toward the higher latitudes?", options: ["Polar Easterlies", "Westerlies", "Trade winds", "Jet streams"], a: 2, hint: "Blowing toward the Equator." },
            { q: "Heat transfer from the Equator to the Poles via ocean currents is an example of...", options: ["Radiation", "Energy redistribution", "Greenhouse effect", "Atmospheric pressure"], a: 1, hint: "Ensures the planet doesn't overheat in one spot." },
            { q: "The Agulhas Current brings warm water to which coast of South Africa?", options: ["West Coast", "North Coast", "East Coast", "Central interior"], a: 2, hint: "The Indian Ocean side." },
            { q: "What happens to the temperature of an air mass above a warm ocean current?", options: ["It decreases", "It stays the same", "It increases", "It becomes perfectly dry"], a: 2, hint: "The water heats the air by conduction." },
            { q: "What is the primary factor causing seasons on Earth?", options: ["Earth's distance from the Sun", "The Moon's gravity", "Earth's tilted axis", "Global warming"], a: 2, hint: "23.5 degrees tilt." },
            { q: "What term is used for the percentage of solar radiation reflected back into space?", options: ["Insolation", "Albedo", "Advection", "Convergence"], a: 1, hint: "Shiny or white surfaces have a high value." },
            { q: "Which of the following is a cold-water current?", options: ["Agulhas", "Gulf Stream", "Benguela", "East Australian"], a: 2, hint: "Flows from the South towards the Equator." },
            { q: "How does deforestation affect the energy balance?", options: ["Increases oxygen", "Reduces absorption of CO2, increasing heat trap", "Makes the Earth cooler", "Stops the wind"], a: 1, hint: "Trees are carbon sinks." },
            { q: "What happens to energy density as you move from the Equator to the Poles?", options: ["It increases", "It decreases", "It stays constant", "It disappears"], a: 1, hint: "Energy is spread over more surface area." },
            { q: "Which protocol was designed to phase out substances that deplete the ozone layer?", options: ["Kyoto Protocol", "Paris Agreement", "Montreal Protocol", "Berlin Accord"], a: 2, hint: "Named after a city in Canada." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
