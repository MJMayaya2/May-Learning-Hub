    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Geography: Africa's Weather & Climate</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Geography: Africa's Weather</h1>
        <p class="game-subtitle">Master subsidence, convergence, and seasonal synoptic systems!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Air Movement Basics</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Oceans & Currents</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Synoptic Symbols</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Seasonal Patterns</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Downward movement of air causing high pressure and dry weather." }, { id: 1, text: "Subsidence" },
                { id: 2, text: "Meeting of air masses at low pressure, forcing air to rise." }, { id: 2, text: "Convergence" },
                { id: 3, text: "Example of a subsidence zone in Southern Africa." }, { id: 3, text: "Kalahari Desert" },
                { id: 4, text: "Zone over Africa where rising air causes high rainfall." }, { id: 4, text: "ITCZ" },
                { id: 5, text: "Effect of rising air on temperature and moisture." }, { id: 5, text: "Cooling & Condensing" },
                { id: 6, text: "Effect of descending air on cloud formation." }, { id: 6, text: "Suppresses Clouds" },
                { id: 7, text: "Type of pressure system found in a convergence zone." }, { id: 7, text: "Low Pressure" },
                { id: 8, text: "Type of pressure system found in a subsidence zone." }, { id: 8, text: "High Pressure" },
                { id: 9, text: "ITCZ stands for Intertropical..." }, { id: 9, text: "Convergence Zone" },
                { id: 10, text: "Primary cause of dry conditions in subtropical zones." }, { id: 10, text: "Subsiding Air" }
            ],
            'topic2': [
                { id: 1, text: "Cold current flowing along Africa's west coast." }, { id: 1, text: "Benguela Current" },
                { id: 2, text: "Warm current flowing along Africa's east coast." }, { id: 2, text: "Mozambique Current" },
                { id: 3, text: "Current that decreases temperature and humidity." }, { id: 3, text: "Cold Currents" },
                { id: 4, text: "Current that increases temperature and humidity." }, { id: 4, text: "Warm Currents" },
                { id: 5, text: "Process by which warm water heats the air above it." }, { id: 5, text: "Conduction" },
                { id: 6, text: "Relationship between water temp and evaporation rate." }, { id: 6, text: "Warmer = Higher rate" },
                { id: 7, text: "Oceans have this type of influence on coastal temps." }, { id: 7, text: "Moderating" },
                { id: 8, text: "Reason land heats and cools faster than the sea." }, { id: 8, text: "Lower Specific Heat" },
                { id: 9, text: "Term for climate with hot summers and cold winters inland." }, { id: 9, text: "Continental Climate" },
                { id: 10, text: "Term for stable, mild coastal temperatures." }, { id: 10, text: "Maritime Climate" }
            ],
            'topic3': [
                { id: 1, text: "Lines on a synoptic map connecting equal air pressure." }, { id: 1, text: "Isobars" },
                { id: 2, text: "Indicated by isobars that are very close together." }, { id: 2, text: "Strong Winds" },
                { id: 3, text: "The interval usually used for isobars (in hPa)." }, { id: 3, text: "4 hPa" },
                { id: 4, text: "Weather diagram showing cloud cover, temp, and wind." }, { id: 4, text: "Station Model" },
                { id: 5, text: "Symbol for the temperature at which air is saturated." }, { id: 5, text: "Dew Point" },
                { id: 6, text: "Standard air pressure at sea level." }, { id: 6, text: "1013.2 hPa" },
                { id: 7, text: "Symbol for a boundary of advancing cold air." }, { id: 7, text: "Cold Front" },
                { id: 8, text: "Low pressure system ahead of a winter cold front." }, { id: 8, text: "Coastal Low" },
                { id: 9, text: "Small 'feathers' on a station model represent this." }, { id: 9, text: "Wind Speed" },
                { id: 10, text: "The central circle of a station model represents this." }, { id: 10, text: "Cloud Cover" }
            ],
            'topic4': [
                { id: 1, text: "Map showing a Continental High pressure over the interior." }, { id: 1, text: "Winter Map" },
                { id: 2, text: "Map showing a Thermal or Tropical Low over the interior." }, { id: 2, text: "Summer Map" },
                { id: 3, text: "High pressure cells migrate here in winter (degrees)." }, { id: 3, text: "30°S (Northwards)" },
                { id: 4, text: "High pressure cells migrate here in summer (degrees)." }, { id: 4, text: "35°S (Southwards)" },
                { id: 5, text: "Cell that blocks cold fronts from the interior in summer." }, { id: 5, text: "South Atlantic High" },
                { id: 6, text: "Typical season for mid-latitude cyclones to pass SA." }, { id: 6, text: "Winter" },
                { id: 7, text: "Feature present in summer maps but absent in winter." }, { id: 7, text: "Thermal Low" },
                { id: 8, text: "Season with clear skies and no rain on the plateau." }, { id: 8, text: "Winter" },
                { id: 9, text: "Season with thunderstorms and high humidity inland." }, { id: 9, text: "Summer" },
                { id: 10, text: "The South Indian High is located east of this country." }, { id: 10, text: "South Africa" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Africa's Weather Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
