<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | The Escalating Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Game Header */
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        /* Left Column: Game Board */
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        /* Lifelines */
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        /* Question Area */
        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Answers Area */
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        /* Answer States */
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.selected::before { color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.correct::before { color: #fff; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.incorrect::before { color: #fff; }
        .answer-btn.hidden { visibility: hidden; } /* For 50/50 */

        /* Right Column: Prize Ladder */
        .prize-ladder { width: 250px; background: #001a33; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column-reverse; gap: 0.2rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.35rem 0.8rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.95rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); box-shadow: 0 0 10px rgba(255, 193, 7, 0.5); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 2px solid rgba(255,255,255,0.2); } 

        /* Game Over / Win Screen */
        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 2rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 3rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: column; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">The Escalating Quiz</h1>
        <p class="game-subtitle">20 Questions. Grade 8 to Grade 12. Go for 100%!</p>
    </header>

    <main class="game-wrapper">
        
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">You secured a final score of:</p>
            <div id="endPrize">0 Pts</div>
            <button class="lifeline-btn" onclick="location.reload()">Play Again</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>

    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        // --- ESCALATING QUESTION DATA (20 Questions) ---
        const questions = [
            // Level 1-5: Grade 8 Basics
            { q: "Which of the following is considered a renewable energy resource?", options: ["Coal", "Solar Power", "Crude Oil", "Natural Gas"], a: 1, hint: "It comes from the sky and only shines during the day." },
            { q: "What gas do plants primarily absorb from the atmosphere during photosynthesis?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], a: 2, hint: "It is the gas that humans exhale." },
            { q: "In what year did South Africa hold its first fully democratic elections?", options: ["1990", "1994", "1999", "2000"], a: 1, hint: "Nelson Mandela became president this year." },
            { q: "What is the longest river on the African continent?", options: ["Congo River", "Zambezi River", "Orange River", "Nile River"], a: 3, hint: "It flows north into the Mediterranean Sea." },
            { q: "What is the main function of red blood cells in the human body?", options: ["Fight viral infections", "Clot blood to stop bleeding", "Carry oxygen to tissues", "Digest complex proteins"], a: 2, hint: "They contain hemoglobin, which binds to a vital gas." },
            
            // Level 6-10: Grade 9 Foundations
            { q: "The Earth's core is primarily composed of which two elements?", options: ["Silicon and Oxygen", "Iron and Nickel", "Carbon and Hydrogen", "Magnesium and Aluminum"], a: 1, hint: "These are heavy, magnetic metals that sank to the center during Earth's formation." },
            { q: "On a topographical map, what does it mean when contour lines are drawn very close together?", options: ["A gentle slope", "A river valley", "A steep slope", "A flat plain"], a: 2, hint: "Elevation is changing very rapidly over a short distance." },
            { q: "What is the key difference between weather and climate?", options: ["Weather is short-term; Climate is long-term", "Weather is hot; Climate is cold", "Weather is global; Climate is local", "There is no difference"], a: 0, hint: "You check one before leaving the house, but the other defines a desert or rainforest." },
            { q: "Which cellular organelle is responsible for producing cellular energy (ATP)?", options: ["Nucleus", "Ribosome", "Mitochondria", "Vacuole"], a: 2, hint: "It is often called the 'powerhouse' of the cell." },
            { q: "Which layer of the Earth's atmosphere contains the protective ozone layer?", options: ["Troposphere", "Stratosphere", "Mesosphere", "Thermosphere"], a: 1, hint: "It is the second layer, just above the layer where our weather happens." },
            
            // Level 11-15: Grade 10-11 Intermediate
            { q: "Where does the absorption of most nutrients take place in the human digestive system?", options: ["Stomach", "Large Intestine", "Small Intestine", "Esophagus"], a: 2, hint: "It is the longest section of the digestive tract, lined with microscopic villi." },
            { q: "What type of tectonic plate boundary creates massive fold mountains like the Himalayas?", options: ["Divergent boundary", "Transform boundary", "Convergent boundary", "Rift boundary"], a: 2, hint: "It happens when two plates crash into each other." },
            { q: "What type of rainfall is most common in the Western Cape during winter?", options: ["Convectional", "Orographic", "Frontal (Cyclonic)", "Monsoon"], a: 2, hint: "It is brought in by mid-latitude cyclones." },
            { q: "What term describes the outward, often uncontrolled spread of a city into its surrounding rural areas?", options: ["Urbanization", "Urban Sprawl", "Counter-urbanization", "Gentrification"], a: 1, hint: "Think of a person stretching out and taking up too much space." },
            { q: "Which hormone is secreted by the pancreas to raise blood sugar levels when they drop too low?", options: ["Insulin", "Glucagon", "Adrenaline", "Thyroxin"], a: 1, hint: "It does the exact opposite of Insulin." },
            
            // Level 16-20: Grade 12 Advanced
            { q: "In fluvial geomorphology, what causes a river to form a knickpoint and often a waterfall?", options: ["Deposition of heavy sediment", "Rejuvenation and a drop in base level", "A severe decrease in water volume", "Meandering over a wide floodplain"], a: 1, hint: "The river gains renewed erosive energy to cut downwards into its bed." },
            { q: "During meiosis, the process of 'crossing over' occurs in which specific phase?", options: ["Prophase I", "Metaphase I", "Prophase II", "Anaphase II"], a: 0, hint: "It happens at the very beginning of the first meiotic division." },
            { q: "A mid-latitude cyclone in the Southern Hemisphere rotates in which direction?", options: ["Clockwise", "Anti-clockwise", "East to West directly", "It does not rotate"], a: 0, hint: "Think about the Coriolis force deflecting winds to the left in the Southern Hemisphere." },
            { q: "Which map projection preserves local angles and shapes but heavily distorts the size of landmasses near the poles?", options: ["Peters Projection", "Robinson Projection", "Mercator Projection", "Azimuthal Equidistant"], a: 2, hint: "It is famous for making Greenland look the size of Africa." },
            { q: "Which of the following best describes the characteristics of a Berg Wind?", options: ["Cold, wet wind from the ocean", "Hot, dry wind blowing down the escarpment", "A seasonal monsoon wind", "A gentle valley breeze at night"], a: 1, hint: "It causes temperatures to spike along the coast before a cold front arrives." }
        ];

        // 20 point levels (increments of 5)
        const prizeLevels = [
            "5 Pts", "10 Pts", "15 Pts", "20 Pts", "25 Pts", 
            "30 Pts", "35 Pts", "40 Pts", "45 Pts", "50 Pts", 
            "55 Pts", "60 Pts", "65 Pts", "70 Pts", "75 Pts",
            "80 Pts", "85 Pts", "90 Pts", "95 Pts", "100 Pts"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        // Setup the Ladder
        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 20; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            // Milestones at 25 Pts, 50 Pts, 75 Pts, 100 Pts
            if (i === 4 || i === 9 || i === 14 || i === 19) step.classList.add('milestone');
            
            step.innerHTML = `<span>${i + 1}</span> <span>${prizeLevels[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            
            // Update Ladder UI
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            // Load Content
            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            // Load Buttons
            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = qData.options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const qData = questions[currentLevel];
            const correctIndex = qData.a;
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (selectedIndex === correctIndex) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 20) {
                            endGame(true);
                        } else {
                            loadQuestion();
                        }
                    }, 2000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    document.getElementById(`btn${correctIndex}`).classList.add('correct');
                    setTimeout(() => {
                        endGame(false);
                    }, 3000);
                }
            }, 2000);
        }

        function use5050() {
            if (isWaiting) return;
            const btn5050 = document.getElementById('btn5050');
            btn5050.disabled = true;
            
            const correctIndex = questions[currentLevel].a;
            
            let wrongIndexes = [0, 1, 2, 3].filter(i => i !== correctIndex);
            wrongIndexes.sort(() => Math.random() - 0.5);
            
            document.getElementById(`btn${wrongIndexes[0]}`).classList.add('hidden');
            document.getElementById(`btn${wrongIndexes[0]}`).disabled = true;
            document.getElementById(`btn${wrongIndexes[1]}`).classList.add('hidden');
            document.getElementById(`btn${wrongIndexes[1]}`).disabled = true;
        }

        function useHint() {
            if (isWaiting) return;
            const btnHint = document.getElementById('btnHint');
            btnHint.disabled = true;
            alert("Teacher's Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            
            if (won) {
                document.getElementById('endMessage').innerText = "100% Correct! You are a Geography & Science Master!";
                document.getElementById('endMessage').style.color = "#28a745";
                document.getElementById('endPrize').innerText = prizeLevels[19];
            } else {
                document.getElementById('endMessage').innerText = "Game Over!";
                document.getElementById('endMessage').style.color = "#dc3545";
                
                // Fallback to the last passed milestone
                let prize = "0 Pts";
                if (currentLevel >= 15) prize = prizeLevels[14];      // Secured 75 Pts
                else if (currentLevel >= 10) prize = prizeLevels[9];  // Secured 50 Pts
                else if (currentLevel >= 5) prize = prizeLevels[4];   // Secured 25 Pts
                
                document.getElementById('endPrize').innerText = prize;
            }
        }

        // Start game
        loadQuestion();
    </script>
</body>
</html>
