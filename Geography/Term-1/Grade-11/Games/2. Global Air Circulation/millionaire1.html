<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Geography: Global Air Circulation Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Global Air Circulation (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the primary purpose of Global Air Circulation?", options: ["To move the moon", "To distribute heat from the equator to the poles", "To create ocean tides", "To increase air pollution"], a: 1, hint: "Think about balancing the Earth's unequal heating." },
            { q: "Which atmospheric cell is located between the Equator and 30° North and South?", options: ["Ferrel Cell", "Polar Cell", "Hadley Cell", "Siberian Cell"], a: 2, hint: "It is the cell closest to the tropics." },
            { q: "What is the belt of low pressure at the equator called?", options: ["Subtropical High", "Intertropical Convergence Zone (ITCZ)", "Horse Latitudes", "Polar Front"], a: 1, hint: "It's where trade winds from both hemispheres meet." },
            { q: "Which force causes winds to deflect to the left in the Southern Hemisphere?", options: ["Centrifugal Force", "Gravitational Force", "Coriolis Force", "Magnetic Force"], a: 2, hint: "This force is a result of the Earth's rotation." },
            { q: "The high-pressure belts located around 30° latitude are often referred to as...", options: ["Doldrums", "Roaring Forties", "Horse Latitudes", "Trade Zones"], a: 2, hint: "Legend says sailors once threw livestock overboard here when winds died down." },
            { q: "Which atmospheric cell is found between 30° and 60° latitude?", options: ["Hadley Cell", "Polar Cell", "Ferrel Cell", "Tropical Cell"], a: 2, hint: "It is the middle cell that moves like a gear." },
            { q: "What type of winds blow from the subtropical high-pressure belts toward the Equator?", options: ["Westerlies", "Polar Easterlies", "Trade Winds", "Monsoons"], a: 2, hint: "These winds were essential for historical sailing merchant ships." },
            { q: "What describes the weather at the ITCZ?", options: ["Sinking air and clear skies", "Rising air, clouds, and heavy rain", "Strong horizontal winds and no rain", "Frozen temperatures and snow"], a: 1, hint: "Intense heating at the equator causes air to rise rapidly." },
            { q: "The boundary where cold polar air meets warmer air from the Ferrel cell is the...", options: ["Equatorial Low", "Polar Front", "Trade Boundary", "Subtropical Ridge"], a: 1, hint: "This is where many temperate storms originate." },
            { q: "Which cell is the smallest and weakest, located near the North and South Poles?", options: ["Hadley Cell", "Ferrel Cell", "Polar Cell", "Equatorial Cell"], a: 2, hint: "Air here is very cold and dense." },
            { q: "Planetary winds that blow from West to East between 30° and 60° are known as...", options: ["Trade Winds", "Polar Easterlies", "Westerlies", "Berg Winds"], a: 2, hint: "These winds influence the weather in the Western Cape." },
            { q: "What is the result of air sinking at 30° latitude?", options: ["High pressure and dry weather", "Low pressure and thunderstorms", "Constant hurricanes", "Monsoon rain"], a: 0, hint: "Subsidence warms the air and prevents cloud formation." },
            { q: "The 'Doldrums' is another name for which pressure belt?", options: ["Subtropical High", "Equatorial Low", "Subpolar Low", "Polar High"], a: 1, hint: "Ships often get stuck here due to calm, vertical air movement." },
            { q: "During the Summer Monsoon in India, what is the pressure state over the land?", options: ["High Pressure", "Low Pressure", "Neutral Pressure", "Vacuum"], a: 1, hint: "The land heats up much faster than the ocean." },
            { q: "What is the primary cause of the Winter Monsoon's dry conditions in India?", options: ["Winds blowing from the warm ocean", "Winds blowing from the cold, dry land interior", "Heavy snowfall on the coast", "Rising air over the Himalayas"], a: 1, hint: "The North-East winds originate over the cold continent." },
            { q: "What is a 'Föhn Wind'?", options: ["A cold, wet coastal wind", "A warm, dry wind descending on the leeward side of mountains", "A tropical storm", "A permanent planetary wind"], a: 1, hint: "Think of Berg winds in South Africa." },
            { q: "What happens to the ITCZ during the Southern Hemisphere's summer (January)?", options: ["It disappears", "It shifts North", "It shifts South", "It stays at the Equator"], a: 2, hint: "It moves toward the area receiving the most direct heat." },
            { q: "In the Northern Hemisphere, the Coriolis Force deflects winds to the...", options: ["Left", "Right", "South", "Up"], a: 1, hint: "It is the opposite of the Southern Hemisphere." },
            { q: "Why is the Ferrel Cell often called the 'Zone of Mixing'?", options: ["It has no wind", "Warm tropical air and cold polar air interact here", "It only exists in the ocean", "Oxygen and Carbon Dioxide swap places here"], a: 1, hint: "It's the middle ground between the heat of the tropics and the cold of the poles." },
            { q: "What are the 'North-East Trades'?", options: ["Winds in the Southern Hemisphere", "Winds blowing toward the Equator in the Northern Hemisphere", "Winds blowing toward the North Pole", "Winds that bring snow to Africa"], a: 1, hint: "Named for the direction they come from." },
            { q: "Which planetary winds are found at the highest latitudes?", options: ["Trade Winds", "Westerlies", "Polar Easterlies", "Jet Streams"], a: 2, hint: "These blow from the Polar High toward the Subpolar Low." },
            { q: "The 'Rain Shadow' effect is most associated with which side of a mountain?", options: ["Windward", "Peak", "Leeward", "Oceanic"], a: 2, hint: "The side where air descends and warms up." },
            { q: "In South Africa, the 'Berg Wind' is an example of which type of regional wind?", options: ["Monsoon", "Föhn Wind", "Trade Wind", "Cyclonic Wind"], a: 1, hint: "It is a warm, dry wind that blows from the interior to the coast." },
            { q: "What defines the Subpolar Low pressure belt?", options: ["Cold air sinking", "Warm air and cold air meeting and rising", "Intense heating at the poles", "Lack of Coriolis force"], a: 1, hint: "It is located at roughly 60° latitude." },
            { q: "The Siberian High is a dominant feature of which seasonal event?", options: ["Summer Monsoon", "Winter Monsoon", "Spring Equinox", "Tropical Cyclone"], a: 1, hint: "It forms over the cold landmass of Russia and Asia." },
            { q: "What is 'Adiabatic Warming'?", options: ["Cooling due to expansion", "Warming due to compression of descending air", "Heating by the sun", "Heat transfer through water"], a: 1, hint: "This happens as air sinks down the side of a mountain." },
            { q: "Why is the ITCZ critical for South African summer rainfall?", options: ["It brings cold fronts", "It shifts south and brings moisture to the interior", "It blocks all wind", "It cools the ocean current"], a: 1, hint: "It brings tropical moisture down with it." },
            { q: "Westerlies are most powerful and consistent in which hemisphere?", options: ["Northern", "Southern", "Eastern", "Western"], a: 1, hint: "There is less land to slow them down here." },
            { q: "The process of air moving horizontally from high to low pressure is called...", options: ["Convection", "Subsidence", "Wind", "Radiation"], a: 2, hint: "This is the simple movement of air particles." },
            { q: "Which pressure belt is characterized by clear, calm, and dry conditions?", options: ["Equatorial Low", "Subpolar Low", "Subtropical High", "Tropical Low"], a: 2, hint: "Air here is descending from the upper atmosphere." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
