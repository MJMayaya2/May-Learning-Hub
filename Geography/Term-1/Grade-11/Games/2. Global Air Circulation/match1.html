<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Geography: Global Air Circulation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Geography: Global Air Circulation</h1>
        <p class="game-subtitle">Master the cells, forces, and regional wind systems!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Tri-Cellular Model</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Pressure & Forces</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Monsoon Systems</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Föhn & Berg Winds</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Cell located between the Equator and 30° latitude." }, { id: 1, text: "Hadley Cell" },
                { id: 2, text: "Cell located between 30° and 60° latitude." }, { id: 2, text: "Ferrel Cell" },
                { id: 3, text: "Cell located between 60° and the Poles." }, { id: 3, text: "Polar Cell" },
                { id: 4, text: "Zone where trade winds from both hemispheres meet." }, { id: 4, text: "ITCZ" },
                { id: 5, text: "High-pressure belt at 30° known for calm winds." }, { id: 5, text: "Horse Latitudes" },
                { id: 6, text: "Winds blowing from the Subtropical High to the ITCZ." }, { id: 6, text: "Trade Winds" },
                { id: 7, text: "Winds blowing between 30° and 60° latitude." }, { id: 7, text: "Westerlies" },
                { id: 8, text: "Zone of low pressure at 60° latitude." }, { id: 8, text: "Subpolar Low" },
                { id: 9, text: "Large-scale movement distributing heat to the poles." }, { id: 9, text: "Global Air Circulation" },
                { id: 10, text: "Boundary between the Polar and Ferrel cells." }, { id: 10, text: "Polar Front" }
            ],
            'topic2': [
                { id: 1, text: "Force caused by Earth's rotation that deflects winds." }, { id: 1, text: "Coriolis Force" },
                { id: 2, text: "In the Southern Hemisphere, winds deflect to the..." }, { id: 2, text: "Left" },
                { id: 3, text: "In the Northern Hemisphere, winds deflect to the..." }, { id: 3, text: "Right" },
                { id: 4, text: "The force that moves air from High to Low pressure." }, { id: 4, text: "Pressure Gradient Force" },
                { id: 5, text: "High-altitude winds blowing parallel to isobars." }, { id: 5, text: "Geostrophic Flow" },
                { id: 6, text: "Surface force that slows down wind speed." }, { id: 6, text: "Friction" },
                { id: 7, text: "Upper-troposphere winds like the Subtropical Jet." }, { id: 7, text: "Jet Streams" },
                { id: 8, text: "Air pressure is highest where air is..." }, { id: 8, text: "Descending" },
                { id: 9, text: "Air pressure is lowest where air is..." }, { id: 9, text: "Rising" },
                { id: 10, text: "Instrument used to measure air pressure." }, { id: 10, text: "Barometer" }
            ],
            'topic3': [
                { id: 1, text: "Seasonal wind reversal affecting South Asia." }, { id: 1, text: "Monsoon" },
                { id: 2, text: "Summer Monsoon timing in India." }, { id: 2, text: "June to September" },
                { id: 3, text: "Low pressure develops over this during summer." }, { id: 3, text: "Heated Landmass" },
                { id: 4, text: "Type of rainfall caused by air rising over Himalayas." }, { id: 4, text: "Orographic Lifting" },
                { id: 5, text: "Winter Monsoon wind direction in India." }, { id: 5, text: "North-East" },
                { id: 6, text: "Winter Monsoons are dry because they originate over..." }, { id: 6, text: "Land" },
                { id: 7, text: "High pressure develops over these cold regions in winter." }, { id: 7, text: "Siberia/Tibet" },
                { id: 8, text: "The shift of this zone causes seasonal Monsoons." }, { id: 8, text: "ITCZ" },
                { id: 9, text: "The wet season in India is driven by these winds." }, { id: 9, text: "South-West Monsoons" },
                { id: 10, text: "South-East coast of India gets rain in winter from..." }, { id: 10, text: "Bay of Bengal moisture" }
            ],
            'topic4': [
                { id: 1, text: "Warm, dry winds descending the leeward side of mountains." }, { id: 1, text: "Föhn Winds" },
                { id: 2, text: "Local name for Föhn winds in South Africa." }, { id: 2, text: "Berg Winds" },
                { id: 3, text: "Side of the mountain where air rises and cools." }, { id: 3, text: "Windward" },
                { id: 4, text: "Side of the mountain where air descends and warms." }, { id: 4, text: "Leeward" },
                { id: 5, text: "Process where air warms by compression as it falls." }, { id: 5, text: "Adiabatic Heating" },
                { id: 6, text: "Mountain range associated with SA Berg winds." }, { id: 6, text: "Drakensberg" },
                { id: 7, text: "Danger caused by Berg winds in South Africa." }, { id: 7, text: "Veld Fires" },
                { id: 8, text: "Föhn winds in the Alps can cause these to melt." }, { id: 8, text: "Snow/Glaciers" },
                { id: 9, text: "Dry area created on the leeward side." }, { id: 9, text: "Rain Shadow" },
                { id: 10, text: "Temperature change of air descending a slope." }, { id: 10, text: "Warming & Drying" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Global Air Circulation Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
