    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Geography: Droughts & Desertification</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 11 Geography: Droughts & Desertification</h1>
        <p class="game-subtitle">Match definitions, causes, and management strategies!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Definitions & Basics</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Causes & Drivers</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Impacts & Effects</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Management Strategies</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "A prolonged period of abnormally low rainfall causing water shortages." }, { id: 1, text: "Drought" },
                { id: 2, text: "The process by which fertile land becomes desert." }, { id: 2, text: "Desertification" },
                { id: 3, text: "Region in Africa most vulnerable to desertification." }, { id: 3, text: "The Sahel" },
                { id: 4, text: "Drought affecting the volume of water in rivers and dams." }, { id: 4, text: "Hydrological Drought" },
                { id: 5, text: "Drought resulting in crop failure and loss of soil moisture." }, { id: 5, text: "Agricultural Drought" },
                { id: 6, text: "Clearing trees for fuel or farming, leading to soil erosion." }, { id: 6, text: "Deforestation" },
                { id: 7, text: "The ability of land to support a specific number of animals." }, { id: 7, text: "Carrying Capacity" },
                { id: 8, text: "The state of having reliable access to enough affordable, nutritious food." }, { id: 8, text: "Food Security" },
                { id: 9, text: "When soil is worn away by wind or water after vegetation loss." }, { id: 9, text: "Soil Erosion" },
                { id: 10, text: "Semi-arid regions are at the highest risk for this." }, { id: 10, text: "Desertification" }
            ],
            'topic2': [
                { id: 1, text: "Ocean-atmosphere interaction that reduces rainfall in SA." }, { id: 1, text: "El Niño" },
                { id: 2, text: "Human cause: Keeping too many animals on a small piece of land." }, { id: 2, text: "Overgrazing" },
                { id: 3, text: "Climate driver: High temperatures increase this rate." }, { id: 3, text: "Evaporation" },
                { id: 4, text: "Human cause: Continuous planting of the same crop without rest." }, { id: 4, text: "Monoculture" },
                { id: 5, text: "Natural cause: Prolonged presence of high-pressure systems." }, { id: 5, text: "Subsiding Air" },
                { id: 6, text: "Global driver: Increasing greenhouse gas emissions." }, { id: 6, text: "Climate Change" },
                { id: 7, text: "Human cause: Using poor irrigation that leads to salt buildup." }, { id: 7, text: "Salinization" },
                { id: 8, text: "Natural cause: Shifts in seasonal wind patterns." }, { id: 8, text: "Climate Variability" },
                { id: 9, text: "Human cause: Rapid growth putting pressure on resources." }, { id: 9, text: "Population Growth" },
                { id: 10, text: "Human cause: Inefficient use of water in agriculture." }, { id: 10, text: "Water Mismanagement" }
            ],
            'topic3': [
                { id: 1, text: "Economic impact: Loss of income from farming." }, { id: 1, text: "Financial Loss" },
                { id: 2, text: "Social impact: Farmers moving to cities for jobs." }, { id: 2, text: "Rural-Urban Migration" },
                { id: 3, text: "Environmental impact: Loss of plant and animal species." }, { id: 3, text: "Loss of Biodiversity" },
                { id: 4, text: "Economic impact: Increase in the price of staple foods." }, { id: 4, text: "Food Inflation" },
                { id: 5, text: "Social impact: Hunger and lack of proper nutrition." }, { id: 5, text: "Malnutrition" },
                { id: 6, text: "Environmental impact: Dust storms and air pollution." }, { id: 6, text: "Reduced Air Quality" },
                { id: 7, text: "Economic impact: Cost of importing water or food." }, { id: 7, text: "Increased Debt" },
                { id: 8, text: "Social impact: Conflict over remaining fertile land." }, { id: 8, text: "Resource Wars" },
                { id: 9, text: "Environmental impact: Permanent change to soil structure." }, { id: 9, text: "Land Degradation" },
                { id: 10, text: "Social impact: Reduced access to clean drinking water." }, { id: 10, text: "Water Scarcity" }
            ],
            'topic4': [
                { id: 1, text: "Local strategy: Plowing across slopes to reduce runoff." }, { id: 1, text: "Contour Plowing" },
                { id: 2, text: "Global strategy: UN agreement to fight land degradation." }, { id: 2, text: "UNCCD" },
                { id: 3, text: "Local strategy: Collecting and storing rainwater." }, { id: 3, text: "Water Harvesting" },
                { id: 4, text: "Regional strategy: Large-scale tree planting in China/Africa." }, { id: 4, text: "Green Walls" },
                { id: 5, text: "Local strategy: Rotating crops to maintain soil health." }, { id: 5, text: "Crop Rotation" },
                { id: 6, text: "Regional strategy: Building dams to store water surplus." }, { id: 6, text: "Reservoir Construction" },
                { id: 7, text: "Global strategy: Reducing carbon footprints worldwide." }, { id: 7, text: "Climate Initiatives" },
                { id: 8, text: "Local strategy: Planting trees to restore vegetation." }, { id: 8, text: "Reforestation" },
                { id: 9, text: "Global strategy: Sharing water-saving technology with poor nations." }, { id: 9, text: "Technology Transfer" },
                { id: 10, text: "Regional strategy: Using efficient drip irrigation." }, { id: 10, text: "Sustainable Farming" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 11 Geography: Droughts & Desertification Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
