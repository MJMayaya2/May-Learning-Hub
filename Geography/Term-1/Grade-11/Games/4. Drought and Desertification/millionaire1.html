<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 11 Geography: Droughts & Desertification Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Droughts & Desertification (Grade 11 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the definition of a drought?", options: ["Occasional heavy rainfall in deserts", "A prolonged period of abnormally low rainfall", "A sudden flood in a city", "The movement of sand dunes"], a: 1, hint: "It involves a long-term shortage of water." },
            { q: "What is 'Desertification'?", options: ["The process of planting trees in a forest", "The process by which fertile land becomes desert", "Building cities in arid regions", "The natural cooling of the Earth"], a: 1, hint: "Think of land losing its productivity and becoming dry like a desert." },
            { q: "Which of the following is a natural cause of drought?", options: ["Overgrazing", "Climate variability like El Niño", "Deforestation", "Poor irrigation"], a: 1, hint: "This involves global weather patterns, not human actions." },
            { q: "How do high temperatures contribute to drought conditions?", options: ["They stop the wind", "They increase evaporation rates", "They cause more snow", "They increase soil nutrients"], a: 1, hint: "Heat causes water sources to dry up faster." },
            { q: "Which human activity is a major cause of desertification?", options: ["Urban planning", "Deforestation", "Water harvesting", "Wildlife conservation"], a: 1, hint: "It involves the large-scale removal of trees." },
            { q: "What is 'Overgrazing'?", options: ["Planting too many crops", "Allowing too many animals to graze on a piece of land", "Giving animals too much water", "Leaving land fallow"], a: 1, hint: "This removes vegetation cover, leading to soil erosion." },
            { q: "Poor irrigation practices can lead to 'Salinization'. What is this?", options: ["Adding sugar to soil", "The buildup of salts in the soil", "Increasing soil moisture", "Reducing soil air"], a: 1, hint: "This makes the soil toxic to most plants." },
            { q: "Which environmental impact is caused by desertification?", options: ["Increased soil fertility", "Loss of biodiversity", "Reduction in dust storms", "Cooler local temperatures"], a: 1, hint: "Habitat destruction leads to the disappearance of species." },
            { q: "How does drought affect the economy of a country?", options: ["Increases agricultural exports", "Reduces crop yields and affects food prices", "Reduces national debt", "Increases tourism"], a: 1, hint: "Less water means less food can be grown for sale." },
            { q: "What is a socio-economic impact of desertification?", options: ["Increased rural employment", "Migration and conflict over resources", "Lower food prices", "Improved healthcare in villages"], a: 1, hint: "People often move to cities when their land can no longer support them." },
            { q: "Why are poor communities more vulnerable to droughts?", options: ["They have too much technology", "They have limited resources and infrastructure", "They only live in cities", "They don't use water"], a: 1, hint: "Lack of backup funds and systems makes it harder to cope." },
            { q: "Which local strategy helps manage soil conservation?", options: ["Building large malls", "Contour plowing and terracing", "Deforestation", "Monoculture farming"], a: 1, hint: "These methods help prevent soil from washing or blowing away." },
            { q: "What is 'Afforestation'?", options: ["Cutting down old trees", "Planting trees to create a forest", "Building wooden houses", "Studying desert animals"], a: 1, hint: "It is a key strategy to restore vegetation." },
            { q: "Which regional strategy involves storing water for use during dry periods?", options: ["Building dams and reservoirs", "Increasing animal numbers", "Drying out wetlands", "Building more roads"], a: 0, hint: "It creates a physical storage of water for the future." },
            { q: "What is the primary goal of the UN Convention to Combat Desertification (UNCCD)?", options: ["To promote desert tourism", "To coordinate global efforts to fight desertification", "To build more industries in deserts", "To study the moon"], a: 1, hint: "It is an international agreement for environmental protection." },
            { q: "Which African region is cited as a case study for community-led reforestation?", options: ["The Sahara", "The Sahel", "The Kalahari", "The Karoo"], a: 1, hint: "This is the transition zone south of the Sahara." },
            { q: "China's 'Green Wall' is a project designed to...", options: ["Prevent people from entering China", "Reduce desertification through large-scale afforestation", "Build more factories", "Stop floods"], a: 1, hint: "It uses millions of trees to block the spread of the Gobi desert." },
            { q: "Which ocean-atmosphere interaction can trigger droughts in Southern Africa?", options: ["La Niña", "The Jet Stream", "El Niño", "Monsoons"], a: 2, hint: "This phenomenon usually results in below-average rainfall for SA." },
            { q: "What is 'Water Harvesting'?", options: ["Making water in a lab", "Collection of rainwater for domestic or agricultural use", "Boiling seawater", "Drinking from rivers only"], a: 1, hint: "It involves saving the rain that falls on roofs or land." },
            { q: "Inappropriate agricultural practices include...", options: ["Crop rotation", "Monoculture (planting the same crop repeatedly)", "Organic farming", "Drip irrigation"], a: 1, hint: "This wears out the soil's specific nutrients." },
            { q: "Drought can lead to 'Famine'. What is this?", options: ["A period of high wealth", "Extreme scarcity of food", "A type of local wind", "A celebratory feast"], a: 1, hint: "It is a severe consequence of total crop failure." },
            { q: "Soil erosion is accelerated in desertification because...", options: ["There are too many trees", "There is no vegetation to hold the soil together", "The wind stops blowing", "The rain is too gentle"], a: 1, hint: "Roots act as an anchor for the ground." },
            { q: "Which management strategy involves sharing knowledge and resources between countries?", options: ["Trade wars", "Technology transfer", "Strict border controls", "Increasing taxes"], a: 1, hint: "Helping each other with modern farming and water tools." },
            { q: "How does 'sustainable farming' help manage land?", options: ["By using up all nutrients quickly", "By maintaining soil health for future generations", "By ignoring weather patterns", "By only using chemicals"], a: 1, hint: "It focuses on long-term productivity without damage." },
            { q: "The loss of 'arable land' means...", options: ["More space for cities", "Loss of land that can be used for growing crops", "Increase in mountain ranges", "The ocean is getting bigger"], a: 1, hint: "Arable relates to farming potential." },
            { q: "Australia manages droughts using which case study example?", options: ["Building wooden dams", "Water-efficient irrigation systems", "Importing all their water", "Cutting down their forests"], a: 1, hint: "They use technology to get the most out of every drop." },
            { q: "A socio-economic impact of drought on livestock is...", options: ["Higher milk production", "Loss of livelihoods for pastoralists", "Animals becoming pets", "Increase in meat exports"], a: 1, hint: "Farmers who rely on animals lose their income when the animals die." },
            { q: "Prolonged dry seasons in semi-arid regions can trigger...", options: ["Snowstorms", "Drought conditions", "Tsunamis", "Volcanic eruptions"], a: 1, hint: "This happens when the expected rain fails to arrive for a long time." },
            { q: "What is 'Reduced Tillage'?", options: ["Digging up the soil more often", "Minimizing soil disturbance during planting", "Increasing the use of tractors", "Burning crop remains"], a: 1, hint: "This helps keep moisture and structure in the soil." },
            { q: "International agreements are a form of...", options: ["Local management", "Global strategy", "Regional bypass", "Human error"], a: 1, hint: "These involve many countries working together." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
