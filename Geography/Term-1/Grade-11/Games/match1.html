<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Memory Match</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation (Blue Theme) */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Game Header */
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }
        
        /* --- Category Selection UI --- */
        .category-selection { margin-bottom: 2rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem; max-width: 900px; margin: 0 auto; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.6rem 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        /* Score & Controls */
        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; animation: fadeIn 0.5s ease; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #e6f0fa; padding: 0.5rem 1.5rem; border-radius: 20px; border: 2px solid #b3d4ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.6rem 1.5rem; font-size: 1.1rem; font-weight: bold; border-radius: 20px; cursor: pointer; transition: background 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .restart-btn:hover { background-color: #004080; transform: translateY(-2px); }

        /* Memory Game Grid */
        .memory-game {
            display: none; /* Hidden until a category is selected */
            width: 100%;
            max-width: 800px;
            margin: 0 auto 3rem;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 0 20px;
            perspective: 1000px;
            animation: fadeIn 0.5s ease;
        }

        /* Mobile Adjustments for Grid */
        @media (max-width: 600px) {
            .memory-game { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }

        /* Individual Card */
        .memory-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; 
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            cursor: pointer;
        }

        .memory-card.flip { transform: rotateY(180deg); }
        .memory-card.matched { cursor: default; }

        /* Card Faces */
        .front-face, .back-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Hidden side */
        .front-face {
            background: linear-gradient(135deg, #004080, #002b5e);
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
            border: 3px solid #3385ff;
        }
        .front-face:hover { background: linear-gradient(135deg, #3385ff, #004080); }

        /* Revealed side */
        .back-face {
            background: #fff;
            color: #002b5e;
            transform: rotateY(180deg);
            border: 3px solid #004080;
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* Correct Match styling */
        .memory-card.matched .back-face {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Memory Match</h1>
        <p class="game-subtitle">Grade 12 Geography. Select a topic to start matching terms to their definitions!</p>
        
        <div class="category-selection">
            <div class="cat-buttons" id="catButtons">
                <button class="cat-btn" onclick="selectCategory('climatology', this)">Climatology</button>
                <button class="cat-btn" onclick="selectCategory('geomorphology', this)">Geomorphology</button>
                <button class="cat-btn" onclick="selectCategory('settlement', this)">Settlement Geo</button>
                <button class="cat-btn" onclick="selectCategory('economic', this)">Economic Geo</button>
                <button class="cat-btn" onclick="selectCategory('mapwork', this)">Mapwork & GIS</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="resetGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        // --- GRADE 12 GEOGRAPHY DATA (5 Categories, 8 Pairs Each) ---
        const gameData = {
            'climatology': [
                { id: 1, text: "Mid-latitude Cyclone" }, { id: 1, text: "Low-pressure weather system moving west to east, driven by westerly winds." },
                { id: 2, text: "Tropical Cyclone" }, { id: 2, text: "Intense low-pressure system fueled by warm ocean water and latent heat." },
                { id: 3, text: "Valley Inversion" }, { id: 3, text: "Cold, dense air draining to the bottom of a valley at night, trapping pollution." },
                { id: 4, text: "Moisture Front" }, { id: 4, text: "A boundary separating dry, cold air from warm, moist air over the interior." },
                { id: 5, text: "Berg Wind" }, { id: 5, text: "Hot, dry wind blowing down the escarpment to the coast." },
                { id: 6, text: "Line Thunderstorm" }, { id: 6, text: "Thunderstorms arranged in a line along a moisture front." },
                { id: 7, text: "Anticyclone" }, { id: 7, text: "High-pressure system with descending air and clear skies." },
                { id: 8, text: "Heat Island" }, { id: 8, text: "Urban area that is significantly warmer than surrounding rural areas." }
            ],
            'geomorphology': [
                { id: 1, text: "River Capture" }, { id: 1, text: "When a more energetic stream intercepts the waters of a neighboring stream." },
                { id: 2, text: "Knickpoint" }, { id: 2, text: "A sharp change in channel slope, often resulting in a waterfall." },
                { id: 3, text: "Superimposed Drainage" }, { id: 3, text: "A river system that cuts downward into a buried, older rock structure." },
                { id: 4, text: "Catchment Area" }, { id: 4, text: "The entire land area drained by a river and its tributaries." },
                { id: 5, text: "Rejuvenation" }, { id: 5, text: "When a river gains renewed erosive power due to a drop in base level." },
                { id: 6, text: "Braided Stream" }, { id: 6, text: "A river with multiple channels separated by small islands or sandbars." },
                { id: 7, text: "River Terrace" }, { id: 7, text: "A remnant of a former floodplain situated above the current river level." },
                { id: 8, text: "Antecedent Drainage" }, { id: 8, text: "A river that maintains its course while a ridge is uplifted across it." }
            ],
            'settlement': [
                { id: 1, text: "Urban Sprawl" }, { id: 1, text: "Unrestricted outward expansion of urban areas." },
                { id: 2, text: "Rural Depopulation" }, { id: 2, text: "The decline in population of rural areas as people move to cities." },
                { id: 3, text: "CBD" }, { id: 3, text: "Central Business District: The commercial and economic core of a city." },
                { id: 4, text: "Greenbelt" }, { id: 4, text: "An area of open land around a city where development is restricted." },
                { id: 5, text: "Centrifugal Forces" }, { id: 5, text: "Forces that push people and businesses away from the city center." },
                { id: 6, text: "Centripetal Forces" }, { id: 6, text: "Forces that attract people and businesses toward the city center." },
                { id: 7, text: "Informal Settlement" }, { id: 7, text: "Areas where housing has been built on land without legal claim." },
                { id: 8, text: "Push Factors" }, { id: 8, text: "Negative conditions that encourage people to leave an area." }
            ],
            'economic': [
                { id: 1, text: "Primary Sector" }, { id: 1, text: "Economic activities that extract natural resources (e.g., mining, farming)." },
                { id: 2, text: "Secondary Sector" }, { id: 2, text: "Economic activities that process raw materials into manufactured goods." },
                { id: 3, text: "Tertiary Sector" }, { id: 3, text: "The service industry, including retail, transport, and education." },
                { id: 4, text: "Quaternary Sector" }, { id: 4, text: "Knowledge-based part of the economy like research and IT." },
                { id: 5, text: "Food Security" }, { id: 5, text: "When all people have access to sufficient, safe, and nutritious food." },
                { id: 6, text: "Beneficiation" }, { id: 6, text: "Processing raw minerals into a higher-value product before exporting." },
                { id: 7, text: "IDZ" }, { id: 7, text: "Industrial Development Zone: Purpose-built industrial estate linked to a port." },
                { id: 8, text: "SDI" }, { id: 8, text: "Spatial Development Initiative: Program to promote growth in underdeveloped areas." }
            ],
            'mapwork': [
                { id: 1, text: "GIS" }, { id: 1, text: "Geographic Information Systems: Computer system for analyzing spatial data." },
                { id: 2, text: "Remote Sensing" }, { id: 2, text: "Gathering information about the Earth from a distance, like satellites." },
                { id: 3, text: "Spatial Resolution" }, { id: 3, text: "The detail with which a map depicts the location and shape of features." },
                { id: 4, text: "Raster Data" }, { id: 4, text: "Spatial data represented as a grid of pixels or cells." },
                { id: 5, text: "Vector Data" }, { id: 5, text: "Spatial data represented using points, lines, and polygons." },
                { id: 6, text: "Contour Line" }, { id: 6, text: "A line on a map joining points of equal elevation." },
                { id: 7, text: "Magnetic Declination" }, { id: 7, text: "The angle between true north and magnetic north." },
                { id: 8, text: "Buffering" }, { id: 8, text: "Creating a zone of a specified distance around a map feature in GIS." }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        // 1. Select Category and Load Game
        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            
            // Update UI buttons
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Show Game Board and Controls
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';

            initGame();
        }

        // 2. Initialize / Reset the Game
        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;

            // Get the data for the selected category and shuffle it
            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            // Generate HTML for each card
            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id; // Secret ID to check for matches
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        // 3. Flip Card Logic
        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        // 4. Check for Match
        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        // 5. Handle a Match
        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            matchedPairs++;
            if (matchedPairs === 8) {
                setTimeout(() => {
                    alert(`Excellent work! You mastered this topic in ${moves} moves.`);
                }, 500);
            }

            resetBoard();
        }

        // 6. Handle a Mismatch
        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        // 7. Reset Turn Variables
        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // 8. Restart Level Button Logic
        function resetGame() {
            if(currentCategory) {
                initGame();
            }
        }
    </script>
</body>
</html>
