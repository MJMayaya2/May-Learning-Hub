<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub | Coming Soon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation (Same as your other pages) */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Footer */
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }

        /* --- Coming Soon Layout --- */
        /* This centers the card perfectly in the middle of the screen */
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        
        .coming-soon-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border-top: 6px solid #3385ff;
            padding: 4rem 3rem;
            max-width: 600px;
            text-align: center;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .coming-soon-card h1 {
            color: #004080;
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .coming-soon-card p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 2rem;
        }

        /* Go Back Button */
        .back-btn {
            display: inline-block;
            background-color: #004080;
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,64,128,0.2);
        }

        .back-btn:hover {
            background-color: #3385ff;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(51,133,255,0.3);
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* A gentle floating animation for the emoji */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <main class="container">
        <div class="coming-soon-card">
            <div class="icon">🛠️</div>
            <h1>Content in Progress</h1>
            <p>I am currently crafting these beautifully designed notes and interactive games to ensure they are perfectly CAPS-aligned and ready for your classroom.</p>
            <p><strong>Check back soon!</strong></p>
            <a href="https://mjmayaya2.github.io/May-Learning-Hub/index.html" class="back-btn">← Return to Home</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

</body>
</html>
