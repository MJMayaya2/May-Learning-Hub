<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 10 Geography: Types of Precipitation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 10 Geography: Precipitation</h1>
        <p class="game-subtitle">Match the forms of water and rainfall mechanisms found in South Africa!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Basic Concepts</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Solid Precipitation</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Dew & Frost</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Rainfall Types</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Falling of water or ice from a cloud to the ground." }, { id: 1, text: "Precipitation" },
                { id: 2, text: "Liquid forms of precipitation produced when dew point is > 0°C." }, { id: 2, text: "Rain & Dew" },
                { id: 3, text: "Solid forms produced when dew point is < 0°C." }, { id: 3, text: "Snow & Frost" },
                { id: 4, text: "Frozen raindrops formed by rising currents." }, { id: 4, text: "Hail" },
                { id: 5, text: "The temperature at which condensation begins." }, { id: 5, text: "Dew Point" },
                { id: 6, text: "Vapour condensing straight into ice crystals." }, { id: 6, text: "Snow formation" },
                { id: 7, text: "Small droplets on the Earth's surface." }, { id: 7, text: "Dew" },
                { id: 8, text: "Water that falls in liquid form." }, { id: 8, text: "Rain" },
                { id: 9, text: "Ice crystals that combine to fall." }, { id: 9, text: "Snowflake" },
                { id: 10, text: "Liquid or solid deposition from the atmosphere." }, { id: 10, text: "Precipitation" }
            ],
            'topic2': [
                { id: 1, text: "Process where hailstone travels up and down in a cloud." }, { id: 1, text: "Hail formation" },
                { id: 2, text: "Upward movement of air in a cloud." }, { id: 2, text: "Up draught" },
                { id: 3, text: "A layer that forms on a frozen raindrop as it falls." }, { id: 3, text: "Dew layer" },
                { id: 4, text: "Hailstones fall when this weakens." }, { id: 4, text: "Air currents" },
                { id: 5, text: "Snow falls when it becomes too..." }, { id: 5, text: "Heavy" },
                { id: 6, text: "Minute ice crystals that combine." }, { id: 6, text: "Snowflakes" },
                { id: 7, text: "Formed from raindrops that have frozen." }, { id: 7, text: "Hail" },
                { id: 8, text: "Minimum temperature for hail to freeze (°C)." }, { id: 8, text: "Below 0°C" },
                { id: 9, text: "Snow forms when dew point is below this." }, { id: 9, text: "0 degrees Celsius" },
                { id: 10, text: "Can occur many times before a stone falls." }, { id: 10, text: "Hail cycle" }
            ],
            'topic3': [
                { id: 1, text: "Vapour condensing into droplets on ground objects." }, { id: 1, text: "Dew" },
                { id: 2, text: "Condition when dew point is above 0°C." }, { id: 2, text: "Dew forms" },
                { id: 3, text: "Forms in summer and is good for plants." }, { id: 3, text: "Dew" },
                { id: 4, text: "Vapour changing directly into ice on surfaces." }, { id: 4, text: "Frost" },
                { id: 5, text: "Condition when dew point is below 0°C at surface." }, { id: 5, text: "Frost forms" },
                { id: 6, text: "Occurs in winter and causes plant damage." }, { id: 6, text: "Frost" },
                { id: 7, text: "Dew point well below freezing causes plant sap to freeze." }, { id: 7, text: "Black frost" },
                { id: 8, text: "Frozen surface moisture that damages crops." }, { id: 8, text: "Frost" },
                { id: 9, text: "Liquid droplets found on grass in summer." }, { id: 9, text: "Dew" },
                { id: 10, text: "Danger for SA farmers during winter nights." }, { id: 10, text: "Black frost" }
            ],
            'topic4': [
                { id: 1, text: "Heated air expands, rises, and forms cumulonimbus." }, { id: 1, text: "Convection Rain" },
                { id: 2, text: "Thunderstorms on the SA plateau in summer." }, { id: 2, text: "Convection" },
                { id: 3, text: "Air rising over the windward side of mountains." }, { id: 3, text: "Relief (Orographic) Rain" },
                { id: 4, text: "Dry area on the leeward side of a mountain." }, { id: 4, text: "Rain shadow" },
                { id: 5, text: "Rain common in the Drakensberg, KZN." }, { id: 5, text: "Relief Rain" },
                { id: 6, text: "Warm air forced to rise over cold air." }, { id: 6, text: "Frontal Rain" },
                { id: 7, text: "Rain type occurring in the Western Cape in winter." }, { id: 7, text: "Frontal Rain" },
                { id: 8, text: "Side of the mountain facing the sea." }, { id: 8, text: "Windward side" },
                { id: 9, text: "Rain often occurring in late afternoon." }, { id: 9, text: "Convectional" },
                { id: 10, text: "Where the air cools to its dew point." }, { id: 10, text: "Rising air" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 10 Geography Chapter 5 Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
