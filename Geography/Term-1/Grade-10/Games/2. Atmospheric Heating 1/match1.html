<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 10 Geography: Atmospheric Heating</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 10 Geography: Atmospheric Heating</h1>
        <p class="game-subtitle">Match the heating processes, greenhouse concepts, and temperature factors!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Heating Processes</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Greenhouse & Warming</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Latitude & Altitude</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Oceans & Distance</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Incoming solar radiation from the sun." }, { id: 1, text: "Insolation" },
                { id: 2, text: "Energy bounced back by clouds, dust, or snow." }, { id: 2, text: "Reflection" },
                { id: 3, text: "Rays strike particles and redirect randomly." }, { id: 3, text: "Scattering" },
                { id: 4, text: "Uptake of heat by water vapour and CO2." }, { id: 4, text: "Absorption" },
                { id: 5, text: "Earth's surface radiating heat as long waves." }, { id: 5, text: "Terrestrial Radiation" },
                { id: 6, text: "Heat transfer through direct contact between particles." }, { id: 6, text: "Conduction" },
                { id: 7, text: "Heat transfer as hot air rises." }, { id: 7, text: "Convection" },
                { id: 8, text: "Energy traveling as waves or photons." }, { id: 8, text: "Radiation" },
                { id: 9, text: "Form of energy coming from the sun." }, { id: 9, text: "Short-wave Radiation" },
                { id: 10, text: "Atmosphere allows sun's rays to pass through." }, { id: 10, text: "Transparent" }
            ],
            'topic2': [
                { id: 1, text: "Natural process that retains heat for life." }, { id: 1, text: "Greenhouse Effect" },
                { id: 2, text: "Gases like CO2 and ozone that absorb heat." }, { id: 2, text: "Greenhouse Gases" },
                { id: 3, text: "Increase in global temp due to enhanced heating." }, { id: 3, text: "Global Warming" },
                { id: 4, text: "Energy radiated from the Earth's surface." }, { id: 4, text: "Long-wave Radiation" },
                { id: 5, text: "Atmospheric heating drives this cycle." }, { id: 5, text: "Water Cycle" },
                { id: 6, text: "Heat energy turns water into vapour." }, { id: 6, text: "Evaporation" },
                { id: 7, text: "Energy sent back after Earth's absorption." }, { id: 7, text: "Reradiated Heat" },
                { id: 8, text: "The primary source of heat for the atmosphere." }, { id: 8, text: "The Sun" },
                { id: 9, text: "Percentage of insolation absorbed at surface." }, { id: 9, text: "51%" },
                { id: 10, text: "Percentage of heat warming atmosphere via radiation." }, { id: 10, text: "14%" }
            ],
            'topic3': [
                { id: 1, text: "Places close to the equator are hotter." }, { id: 1, text: "Latitude" },
                { id: 2, text: "Sun's rays over lower latitudes (equator)." }, { id: 2, text: "Direct Rays" },
                { id: 3, text: "Sun's rays spread over a large area at poles." }, { id: 3, text: "Oblique Rays" },
                { id: 4, text: "Height above sea level." }, { id: 4, text: "Altitude" },
                { id: 5, text: "Temp increase as altitude increases." }, { id: 5, text: "Temperature Inversion" },
                { id: 6, text: "Temp decrease per 1000m rise." }, { id: 6, text: "6.5°C" },
                { id: 7, text: "Lack of this gas at altitude makes it colder." }, { id: 7, text: "Water Vapour" },
                { id: 8, text: "Rays travel this distance to reach the equator." }, { id: 8, text: "Short distance" },
                { id: 9, text: "Sun's rays over poles must pass through more..." }, { id: 9, text: "Atmosphere" },
                { id: 10, text: "Higher altitudes have less CO2 to absorb..." }, { id: 10, text: "Heat" }
            ],
            'topic4': [
                { id: 1, text: "Moving water raising or lowering coastal temp." }, { id: 1, text: "Ocean Currents" },
                { id: 2, text: "Flow from equator toward polar regions." }, { id: 2, text: "Warm Currents" },
                { id: 3, text: "Flow from polar regions toward the equator." }, { id: 3, text: "Cold Currents" },
                { id: 4, text: "Increased by warm currents through evaporation." }, { id: 4, text: "Humidity" },
                { id: 5, text: "Ocean water heats air through this process." }, { id: 5, text: "Conduction" },
                { id: 6, text: "Coastal places have smaller temp ranges." }, { id: 6, text: "Distance from Sea" },
                { id: 7, text: "Effect oceans have on coastal temperatures." }, { id: 7, text: "Moderating Influence" },
                { id: 8, text: "Hotter summers and colder winters inland." }, { id: 8, text: "Extreme Temperatures" },
                { id: 9, text: "Cooler summers and warmer winters on coast." }, { id: 9, text: "Moderate Temperatures" },
                { id: 10, text: "Takes longer to heat and cool than land." }, { id: 10, text: "Water/Ocean" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Well done! Grade 10 Atmospheric Heating Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
