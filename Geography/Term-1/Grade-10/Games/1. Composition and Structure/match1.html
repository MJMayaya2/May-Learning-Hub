    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 10 Geography: The Atmosphere</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 10 Geography: The Atmosphere</h1>
        <p class="game-subtitle">Master the layers, gases, and environmental challenges of our atmosphere!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Atmospheric Layers</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Importance & Gases</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Ozone Depletion Causes</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Effects & Solutions</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Layer where all weather occurs and life exists." }, { id: 1, text: "Troposphere" },
                { id: 2, text: "Layer containing the ozone layer where planes fly." }, { id: 2, text: "Stratosphere" },
                { id: 3, text: "Coldest layer where temperature decreases with altitude." }, { id: 3, text: "Mesosphere" },
                { id: 4, text: "The outer limit of the troposphere." }, { id: 4, text: "Tropopause" },
                { id: 5, text: "Layer that absorbs Sun's X-rays and UV rays; also called Ionosphere." }, { id: 5, text: "Thermosphere" },
                { id: 6, text: "The boundary between the stratosphere and mesosphere." }, { id: 6, text: "Stratopause" },
                { id: 7, text: "The uppermost layer of the atmosphere." }, { id: 7, text: "Exosphere" },
                { id: 8, text: "Criteria used to divide the atmosphere into layers." }, { id: 8, text: "Temperature change" },
                { id: 9, text: "The upper limit of the mesosphere." }, { id: 9, text: "Mesopause" },
                { id: 10, text: "Phenomenon found in the thermosphere." }, { id: 10, text: "Aurora" }
            ],
            'topic2': [
                { id: 1, text: "Most abundant gas in the atmosphere (approx. 78%)." }, { id: 1, text: "Nitrogen" },
                { id: 2, text: "Essential gas for life and respiration (approx. 21%)." }, { id: 2, text: "Oxygen" },
                { id: 3, text: "Greenhouse gas that enables the atmosphere to retain heat." }, { id: 3, text: "Carbon Dioxide" },
                { id: 4, text: "Essential for rain and moisture for life on Earth." }, { id: 4, text: "Water Vapour" },
                { id: 5, text: "Harmful radiation shielded by the atmosphere." }, { id: 5, text: "Ultraviolet (UV) Rays" },
                { id: 6, text: "Natural process of heat retention in the atmosphere." }, { id: 6, text: "Greenhouse Effect" },
                { id: 7, text: "Function of the atmosphere regarding solar radiation." }, { id: 7, text: "Shielding/Protection" },
                { id: 8, text: "The layer of air surrounding the Earth." }, { id: 8, text: "Atmosphere" },
                { id: 9, text: "Height above sea level." }, { id: 9, text: "Altitude" },
                { id: 10, text: "A gas made of three oxygen molecules (O3)." }, { id: 10, text: "Ozone" }
            ],
            'topic3': [
                { id: 1, text: "Chemicals used in aerosols and fridges that destroy ozone." }, { id: 1, text: "CFCs" },
                { id: 2, text: "The specific element in CFCs that splits ozone molecules." }, { id: 2, text: "Chlorine" },
                { id: 3, text: "Atmospheric layer where ozone depletion occurs." }, { id: 3, text: "Stratosphere" },
                { id: 4, text: "A historical product using CFCs as propellants." }, { id: 4, text: "Aerosol Sprays" },
                { id: 5, text: "Destruction of forests that worsens atmospheric heating." }, { id: 5, text: "Deforestation" },
                { id: 6, text: "Action of CFCs on O3 molecules." }, { id: 6, text: "Splitting into O2 and O" },
                { id: 7, text: "Common appliance that previously used CFCs." }, { id: 7, text: "Refrigerators" },
                { id: 8, text: "International agreement to phase out CFC use." }, { id: 8, text: "Montreal Protocol" },
                { id: 9, text: "Primary cause of the 'hole' in the ozone layer." }, { id: 9, text: "Human-made chemicals" },
                { id: 10, text: "Source of chlorine in the stratosphere." }, { id: 10, text: "Chlorofluorocarbons" }
            ],
            'topic4': [
                { id: 1, text: "Skin condition caused by excessive UV radiation." }, { id: 1, text: "Skin Cancer" },
                { id: 2, text: "Eye condition in humans and animals linked to UV rays." }, { id: 2, text: "Cataracts" },
                { id: 3, text: "Marine life form at the base of the food chain damaged by UV." }, { id: 3, text: "Phytoplankton" },
                { id: 4, text: "Vital plant process disrupted by ozone depletion." }, { id: 4, text: "Photosynthesis" },
                { id: 5, text: "A solution: To process old refrigerants safely." }, { id: 5, text: "Recycling" },
                { id: 6, text: "Way to reduce industrial emissions by traveling together." }, { id: 6, text: "Public Transport" },
                { id: 7, text: "Gradual elimination of harmful substances like CFCs." }, { id: 7, text: "Phasing out" },
                { id: 8, text: "Global increase in Earth's temperature." }, { id: 8, text: "Global Warming" },
                { id: 9, text: "Effect of ozone loss on the troposphere." }, { id: 9, text: "More UV radiation" },
                { id: 10, text: "Collective goal of the Montreal Protocol." }, { id: 10, text: "Reducing ozone depletion" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Excellent work! Grade 10 Atmosphere Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
