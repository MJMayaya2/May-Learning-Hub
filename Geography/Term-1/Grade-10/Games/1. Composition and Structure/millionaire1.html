<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 10 Geography: Atmosphere Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Composition & Structure of the Atmosphere (Grade 10 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the layer of air surrounding Earth, on which all life depends?", options: ["Hydrosphere", "Atmosphere", "Lithosphere", "Biosphere"], a: 1, hint: "Think of the sphere that contains the gases we breathe." },
            { q: "The atmosphere is divided into four main layers based on changes in which factor?", options: ["Air pressure", "Oxygen levels", "Temperature", "Wind speed"], a: 2, hint: "The layers are defined by whether it gets hotter or colder as you go up." },
            { q: "Which of these gases is mentioned as a very essential gas for life in the atmosphere?", options: ["Hydrogen", "Argon", "Helium", "Oxygen"], a: 3, hint: "It's the gas humans and animals need for respiration." },
            { q: "In which layer of the atmosphere does all weather occur?", options: ["Stratosphere", "Troposphere", "Mesosphere", "Thermosphere"], a: 1, hint: "This is the layer closest to the Earth's surface." },
            { q: "What is the upper limit of the Troposphere?", options: ["Tropopause", "Stratopause", "Mesopause", "Thermopause"], a: 0, hint: "Most 'pauses' are named after the layer they follow." },
            { q: "Which layer contains the protective ozone layer?", options: ["Troposphere", "Mesosphere", "Stratosphere", "Exosphere"], a: 2, hint: "This layer sits directly above the Troposphere." },
            { q: "Why do passenger planes primarily fly in the Stratosphere?", options: ["It is the warmest layer", "There are no clouds", "It has the most oxygen", "To see the aurora"], a: 1, hint: "Flying above the weather provides a smoother flight." },
            { q: "How does temperature change in the Stratosphere?", options: ["It decreases", "It stays the same", "It increases", "It fluctuates wildly"], a: 2, hint: "Because of the ozone layer absorbing UV rays, this layer actually warms up." },
            { q: "Which layer is responsible for absorbing the Sun's X-rays and ultraviolet rays?", options: ["Troposphere", "Mesosphere", "Thermosphere", "Stratosphere"], a: 2, hint: "This is the very high, hot layer where the aurora occurs." },
            { q: "What is the upper limit of the Mesosphere?", options: ["Stratopause", "Tropopause", "Mesopause", "Thermopause"], a: 2, hint: "This is the boundary before you enter the Thermosphere." },
            { q: "The Exosphere is located at what altitude range?", options: ["0 to 12 km", "40 to 80 km", "80 to 800 km", "800 to 3000 km"], a: 3, hint: "It is the outermost edge of the atmosphere, leading into space." },
            { q: "How does the atmosphere protect life from the Sun?", options: ["By reflecting all light", "By shielding us from harmful ultraviolet rays", "By providing a vacuum", "By cooling the Sun"], a: 1, hint: "Think about what the ozone layer specifically blocks." },
            { q: "Which substance in the atmosphere provides rain and moisture?", options: ["Nitrogen", "Carbon dioxide", "Water vapour", "Ozone"], a: 2, hint: "This is the gaseous form of water." },
            { q: "Which two gases enable the atmosphere to retain heat through the greenhouse effect?", options: ["Oxygen and Nitrogen", "Carbon dioxide and Water vapour", "Hydrogen and Helium", "Ozone and Chlorine"], a: 1, hint: "One is released by breathing/burning, the other by evaporation." },
            { q: "What is ozone (O3) made of?", options: ["Two atoms of nitrogen", "Three molecules of oxygen", "One molecule of carbon", "Three molecules of hydrogen"], a: 1, hint: "The '3' in O3 tells you how many atoms are joined." },
            { q: "In which specific layer of the atmosphere is the ozone layer found?", options: ["Troposphere", "Mesosphere", "Stratosphere", "Thermosphere"], a: 2, hint: "It's the layer above where we live, where temperatures start to rise." },
            { q: "What is the primary function of the ozone layer for life on Earth?", options: ["It provides oxygen to breathe", "It creates weather", "It absorbs ultraviolet radiation", "It keeps the sky blue"], a: 2, hint: "It acts like a global sunscreen." },
            { q: "Which chemicals containing chlorine are major causes of ozone depletion?", options: ["Carbon dioxide", "Chlorofluorocarbons (CFCs)", "Methane", "Nitrous oxide"], a: 1, hint: "They are often abbreviated to three letters starting with C." },
            { q: "CFCs were commonly used in which of the following?", options: ["Aerosol sprays and refrigerants", "Solar panels", "Organic fertilizers", "Wooden furniture"], a: 0, hint: "Think of old spray cans and fridge cooling systems." },
            { q: "What does a CFC molecule do to an ozone molecule (O3)?", options: ["It makes it stronger", "It splits it into O2 and O", "It turns it into water", "It freezes it"], a: 1, hint: "It breaks the bond of the three oxygen atoms." },
            { q: "Besides CFCs, what other factor is listed as a cause of ozone depletion?", options: ["Planting trees", "Deforestation", "Electric cars", "Using bicycles"], a: 1, hint: "Removing forests reduces the planet's ability to balance gases." },
            { q: "What happens when there is less ozone in the stratosphere?", options: ["Less radiation reaches Earth", "More ultraviolet radiation reaches the troposphere", "The sky turns green", "Weather stops occurring"], a: 1, hint: "Without the 'shield', more harmful rays leak through to the bottom layer." },
            { q: "Which human health issue is caused by increased ultraviolet radiation?", options: ["Common cold", "Skin cancer", "Hearing loss", "Vitamin C deficiency"], a: 1, hint: "This is a serious skin condition caused by too much sun exposure." },
            { q: "What eye condition can be caused by UV radiation in both people and animals?", options: ["Cataracts", "Nearsightedness", "Astigmatism", "Color blindness"], a: 0, hint: "It is the clouding of the lens in the eye." },
            { q: "How does ozone depletion affect the marine food chain?", options: ["It makes fish grow larger", "It reduces the production of phytoplankton", "It increases sea salt levels", "It has no effect"], a: 1, hint: "It harms the tiny organisms at the very bottom of the ocean food chain." },
            { q: "What process in plants is disrupted by ultraviolet radiation?", options: ["Transpiration", "Respiration", "Photosynthesis", "Germination"], a: 2, hint: "This is the process plants use to make food from sunlight." },
            { q: "What is the name of the international protocol where countries agreed to phase out CFCs?", options: ["Kyoto Protocol", "Paris Agreement", "Montreal Protocol", "Berlin Accord"], a: 2, hint: "It is named after a city in Canada." },
            { q: "If we stop putting CFCs into the atmosphere, what would happen to the ozone hole?", options: ["It would get bigger", "It would stay the same forever", "It would slowly close", "It would turn into a cloud"], a: 2, hint: "The atmosphere has a natural ability to recover if the damage stops." },
            { q: "Which transport strategy is suggested to help reduce ozone depletion?", options: ["Driving individual sports cars", "Using public transport", "Flying more planes", "Walking everywhere"], a: 1, hint: "Using buses or trains reduces the number of individual polluting vehicles." },
            { q: "Which of the following is a recommended action to reduce ozone depletion?", options: ["Burning old refrigerators", "Recycling old refrigerants and air conditioners", "Using more aerosol sprays", "Increasing deforestation"], a: 1, hint: "We should carefully dispose of or reuse old cooling chemicals." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                if (qData.options[i]) {
                    btn.innerText = qData.options[i];
                    btn.style.display = "block";
                    btn.classList.remove('hidden');
                } else {
                    btn.style.display = "none";
                }
                btn.className = 'answer-btn'; 
                btn.disabled = false;
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const qData = questions[currentLevel];
            const correctIndex = qData.a;
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (selectedIndex === correctIndex) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    document.getElementById(`btn${correctIndex}`).classList.add('correct');
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            const correctIndex = questions[currentLevel].a;
            let wrongIndexes = [];
            for(let i=0; i<questions[currentLevel].options.length; i++){
                if(i !== correctIndex) wrongIndexes.push(i);
            }
            wrongIndexes.sort(() => Math.random() - 0.5);
            document.getElementById(`btn${wrongIndexes[0]}`).classList.add('hidden');
            if(wrongIndexes.length > 1) document.getElementById(`btn${wrongIndexes[1]}`).classList.add('hidden');
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
