    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 10 Geography: Global Warming</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 10 Geography: Global Warming</h1>
        <p class="game-subtitle">Match the Greenhouse concepts, Climate Change impacts, and African strategies!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">The Greenhouse Effect</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Global Warming Concepts</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Impacts in Africa</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Solutions & Strategies</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Shelter made of glass used to keep plants warm." }, { id: 1, text: "Greenhouse" },
                { id: 2, text: "Gases like water vapour and CO2 that trap heat." }, { id: 2, text: "Greenhouse Gases" },
                { id: 3, text: "Natural process that keeps Earth warm enough for life." }, { id: 3, text: "Greenhouse Effect" },
                { id: 4, text: "Greenhouse gases absorb heat given off by this." }, { id: 4, text: "Earth's Surface" },
                { id: 5, text: "Analogy for how gases trap heat in the atmosphere." }, { id: 5, text: "Glass Shelter" },
                { id: 6, text: "Type of energy that is allowed into a greenhouse." }, { id: 6, text: "Light and Heat" },
                { id: 7, text: "Increased concentration of these causes higher temps." }, { id: 7, text: "Greenhouse Gases" },
                { id: 8, text: "The primary source of heat energy for the system." }, { id: 8, text: "The Sun" },
                { id: 9, text: "Process where energy is sent back by the Earth." }, { id: 9, text: "Terrestrial Radiation" },
                { id: 10, text: "Gases trap heat instead of letting it..." }, { id: 10, text: "Escape" }
            ],
            'topic2': [
                { id: 1, text: "Gradual increase in the Earth's average temperature." }, { id: 1, text: "Global Warming" },
                { id: 2, text: "Long-term change in average weather patterns." }, { id: 2, text: "Climate Change" },
                { id: 3, text: "Primary driver behind increased greenhouse gases." }, { id: 3, text: "Human Activity" },
                { id: 4, text: "Clearing of forests that increases CO2 levels." }, { id: 4, text: "Deforestation" },
                { id: 5, text: "Energy trapped by greenhouse gases is this wave type." }, { id: 5, text: "Long-wave" },
                { id: 6, text: "Process of turning fertile land into desert." }, { id: 6, text: "Desertification" },
                { id: 7, text: "The melting of these causes sea-level rise." }, { id: 7, text: "Ice Caps/Glaciers" },
                { id: 8, text: "Natural process vs. human-enhanced warming." }, { id: 8, text: "Enhanced Greenhouse" },
                { id: 9, text: "Result of more heat being trapped in the atmosphere." }, { id: 9, text: "Higher Temperatures" },
                { id: 10, text: "Major gas released by burning fossil fuels." }, { id: 10, text: "Carbon Dioxide" }
            ],
            'topic3': [
                { id: 1, text: "Extreme weather event common in KZN and Mozambique." }, { id: 1, text: "Floods" },
                { id: 2, text: "Waterborne disease often following flood disasters." }, { id: 2, text: "Cholera" },
                { id: 3, text: "Movement of farmers to cities after losing livelihoods." }, { id: 3, text: "Rural-urban migration" },
                { id: 4, text: "Region in Africa facing severe desertification." }, { id: 4, text: "The Sahel" },
                { id: 5, text: "Saltwater leaking into fresh drinking water." }, { id: 5, text: "Salination" },
                { id: 6, text: "Specific dam in Africa facing reduced energy production." }, { id: 6, text: "Kariba Dam" },
                { id: 7, text: "SA cities at risk of coastal flooding." }, { id: 7, text: "Durban & Cape Town" },
                { id: 8, text: "Major impact of droughts on African agriculture." }, { id: 8, text: "Failure of crops" },
                { id: 9, text: "Oceans destroying homes and infrastructure." }, { id: 9, text: "Coastal Erosion" },
                { id: 10, text: "Reduction in this energy source during droughts." }, { id: 10, text: "Hydropower" }
            ],
            'topic4': [
                { id: 1, text: "Agreement where countries agreed to phase out CFCs." }, { id: 1, text: "Montreal Protocol" },
                { id: 2, text: "Planting trees to absorb carbon dioxide." }, { id: 2, text: "Afforestation" },
                { id: 3, text: "Reducing individual car use to lower emissions." }, { id: 3, text: "Public Transport" },
                { id: 4, text: "Using sun, wind, or water for electricity." }, { id: 4, text: "Green Power" },
                { id: 5, text: "Safely processing old air conditioners and fridges." }, { id: 5, text: "Recycling" },
                { id: 6, text: "Action to stop putting harmful gases into air." }, { id: 6, text: "Emission Reduction" },
                { id: 7, text: "Strategies to handle impacts like water scarcity." }, { id: 7, text: "Coping Strategies" },
                { id: 8, text: "Type of power source that is 'environmentally friendly'." }, { id: 8, text: "Renewable Energy" },
                { id: 9, text: "Global goal to keep temperatures from rising." }, { id: 9, text: "Mitigation" },
                { id: 10, text: "Primary goal of the Montreal Protocol." }, { id: 10, text: "Close Ozone Hole" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 10 Geography Revision on Global Warming Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
