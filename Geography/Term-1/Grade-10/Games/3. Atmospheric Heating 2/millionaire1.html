<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 10 Geography: Global Warming Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Global Warming & Climate Change (Grade 10 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is a 'Greenhouse' primarily used for in gardening?", options: ["Storing garden tools", "A shelter made of glass for keeping plants warm", "A place to harvest rainwater", "A dark room for growing mushrooms"], a: 1, hint: "Think of a structure that lets light in but keeps heat from escaping." },
            { q: "Why are certain atmospheric gases called 'Greenhouse Gases'?", options: ["Because they turn the sky green", "Because they help plants grow faster", "Because they trap heat like the glass in a greenhouse", "Because they are only found in forests"], a: 2, hint: "They absorb the heat given off by the Earth's surface." },
            { q: "Which of the following is described as a 'Natural Process' that keeps the Earth warm enough to support life?", options: ["Ozone Depletion", "The Greenhouse Effect", "Global Warming", "Acid Rain"], a: 1, hint: "Without this process, the Earth would be too cold for us to live on." },
            { q: "What is the primary reason for the increase in greenhouse gas concentrations today?", options: ["Natural volcanic eruptions", "Human activity", "Changes in the moon's orbit", "Increase in animal populations"], a: 1, hint: "Think about industrialization and modern living." },
            { q: "Which two gases are specifically mentioned as being similar to a greenhouse because they trap heat?", options: ["Oxygen and Nitrogen", "Carbon dioxide and Water vapour", "Hydrogen and Helium", "Argon and Neon"], a: 1, hint: "One is released by burning wood/coal; the other is the gaseous form of water." },
            { q: "What term describes the rise in the average temperature of the Earth's atmosphere?", options: ["The Ozone Hole", "Climate Stability", "Global Warming", "Solar Maximum"], a: 2, hint: "It refers to the planet getting hotter over time." },
            { q: "According to the text, what is a major cause of increased Carbon Dioxide (CO2)?", options: ["Planting too many trees", "The burning of fossil fuels", "Solar panels", "Natural forest growth"], a: 1, hint: "Think of industries and car combustions." },
            { q: "How does deforestation contribute to global warming?", options: ["It makes the ground darker", "It prevents rain from falling", "It reduces the amount of CO2 absorbed from the atmosphere", "It makes the Earth heavier"], a: 2, hint: "Trees are natural 'sponges' for Carbon Dioxide." },
            { q: "Which of the following is an example of 'Evidence' for Global Warming mentioned in the document?", options: ["Increase in bird migration", "Melting of glaciers and polar ice caps", "Stronger magnetic fields", "Discovery of new planets"], a: 1, hint: "This causes sea levels to rise." },
            { q: "What impact does the melting of ice caps have on coastal areas?", options: ["It creates more beaches", "It causes rising sea levels", "It makes the ocean less salty", "It stops ocean currents"], a: 1, hint: "When ice melts into the ocean, the water level goes up." },
            { q: "What is a 'Carbon Footprint'?", options: ["A mark left by charcoal on the ground", "The total amount of greenhouse gases produced by human activities", "A type of fossil found in coal mines", "The size of a forest in square kilometers"], a: 1, hint: "It measures your impact on the atmosphere." },
            { q: "In some parts of Africa, global warming is expected to cause 'Desertification'. What does this mean?", options: ["The creation of more tropical rainforests", "Fertile land turning into desert", "Increase in snowfall in the Sahara", "More sand being used for construction"], a: 1, hint: "It results in less land available for farming." },
            { q: "Which famous African dam is mentioned as having reduced hydropower due to droughts?", options: ["Gariep Dam", "Vaal Dam", "Kariba Dam", "Aswan Dam"], a: 2, hint: "It is a major dam located between Zambia and Zimbabwe." },
            { q: "What is a social cost of droughts in rural African areas?", options: ["Increase in movie ticket sales", "Rural-urban migration", "More people becoming farmers", "Reduction in internet usage"], a: 1, hint: "People move to cities when they lose their livelihoods." },
            { q: "Which extreme weather event is predicted to increase in intensity in places like Mozambique and KZN?", options: ["Blizzards", "Sandstorms", "Tropical Cyclones", "Earthquakes"], a: 2, hint: "These are massive storms that cause heavy flooding and damage." },
            { q: "Which waterborne disease is mentioned as a health risk after floods?", options: ["Malaria", "Cholera", "Influenza", "Diabetes"], a: 1, hint: "It often spreads when fresh drinking water is contaminated." },
            { q: "What is 'Salination' in the context of rising sea levels?", options: ["Making the ocean less salty", "Saltwater leaking into fresh drinking water", "Using salt to melt ice on roads", "The growth of salt-resistant trees"], a: 1, hint: "This threatens the drinking water of coastal cities like Cape Town." },
            { q: "Which South African cities are specifically mentioned as facing threats from rising sea levels?", options: ["Johannesburg and Pretoria", "Durban and Cape Town", "Bloemfontein and Kimberley", "Polokwane and Nelspruit"], a: 1, hint: "They are major coastal cities." },
            { q: "What is 'Afforestation'?", options: ["Cutting down forests for wood", "The process of planting trees to create a forest", "A type of desert plant", "Building houses in the forest"], a: 1, hint: "It is a strategy to reduce the carbon footprint." },
            { q: "What is recommended as a way for individuals to help reduce global warming?", options: ["Buying more individual cars", "Using public transport", "Burning more firewood", "Cutting down garden trees"], a: 1, hint: "Sharing a bus or train reduces the number of vehicles on the road." },
            { q: "How does rising sea levels affect coastal infrastructure?", options: ["It makes roads stronger", "It causes coastal erosion and destruction of homes", "It builds new bridges automatically", "It has no impact on buildings"], a: 1, hint: "Oceans destroying homes is a major risk." },
            { q: "Why does desertification lead to conflict in Africa?", options: ["People fight over who has the best sand", "There is growing competition for remaining grazing land", "It makes people too hot to talk", "Governments ban farming"], a: 1, hint: "When resources like grass for livestock disappear, people struggle over what is left." },
            { q: "What is the impact of global warming on livestock in Africa?", options: ["They grow thicker fur", "Mass death of livestock due to lack of grazing", "They stop needing water", "They produce more milk"], a: 1, hint: "This happens during severe droughts." },
            { q: "What energy-related problem does reduced rainfall cause in Africa?", options: ["Less solar power", "Reduced hydropower generation", "More coal becomes available", "Wind turbines spin faster"], a: 1, hint: "Dams need water to create electricity." },
            { q: "Which region is given as an example of a place experiencing the process of fertile land turning into desert?", options: ["The Amazon", "The Sahel", "The Alps", "The Drakensberg"], a: 1, hint: "It is a transition zone in Africa south of the Sahara." },
            { q: "What happens to 'food security' when global warming causes droughts?", options: ["It increases as food stays fresh longer", "Food shortages occur as crops fail", "Food becomes cheaper", "People eat more vegetables"], a: 1, hint: "If farmers can't grow crops, there is less to eat." },
            { q: "How can 'environmentally friendly sources of power' help?", options: ["They produce more CO2", "They reduce the reliance on burning fossil fuels", "They make the air thicker", "They are only used in winter"], a: 1, hint: "Think of wind or solar power." },
            { q: "Which of these is a direct consequence of higher temperatures on the water cycle?", options: ["The cycle stops completely", "Increased evaporation and potential for floods in some areas", "Water stops turning into vapour", "Ice becomes permanent"], a: 1, hint: "Heat drives the movement of water through the atmosphere." },
            { q: "According to the document, what happens to 'Arable Land' during global warming?", options: ["It increases everywhere", "It is lost due to desertification", "It turns into gold", "It becomes too wet to use"], a: 1, hint: "'Arable' means land that can be used to grow crops." },
            { q: "What is the overall goal of strategies like the Montreal or Kyoto protocols?", options: ["To increase global trade", "To reduce the human impact on the atmosphere and climate", "To explore other planets", "To build more industries"], a: 1, hint: "These are international agreements to protect the environment." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                if (qData.options[i]) {
                    btn.innerText = qData.options[i];
                    btn.style.display = "block";
                    btn.classList.remove('hidden');
                } else {
                    btn.style.display = "none";
                }
                btn.className = 'answer-btn'; 
                btn.disabled = false;
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const qData = questions[currentLevel];
            const correctIndex = qData.a;
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (selectedIndex === correctIndex) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    document.getElementById(`btn${correctIndex}`).classList.add('correct');
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            const correctIndex = questions[currentLevel].a;
            let wrongIndexes = [];
            for(let i=0; i<questions[currentLevel].options.length; i++){
                if(i !== correctIndex) wrongIndexes.push(i);
            }
            wrongIndexes.sort(() => Math.random() - 0.5);
            document.getElementById(`btn${wrongIndexes[0]}`).classList.add('hidden');
            if(wrongIndexes.length > 1) document.getElementById(`btn${wrongIndexes[1]}`).classList.add('hidden');
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
