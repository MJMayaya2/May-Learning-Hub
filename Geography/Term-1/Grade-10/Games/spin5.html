    <main class="game-container">

                <button class="cat-btn" onclick="selectCategory('definitions', this)">Definitions</button>
                <button class="cat-btn" onclick="selectCategory('terms', this)">Name the Term</button>
                <button class="cat-btn" onclick="selectCategory('multipleChoice', this)">Multiple Choice</button>
                <button class="cat-btn" onclick="selectCategory('trueFalse', this)">True or False</button>

        function buildWheel() {
            const wheelBg = document.getElementById('wheelBg');
            const wheelLabels = document.getElementById('wheelLabels');
            let gradientParts = [];

            for (let i = 0; i < totalQuestions; i++) {
                let startAngle = i * sliceAngle;
                let endAngle = (i + 1) * sliceAngle;
                let color = sliceColors[i % sliceColors.length];
                gradientParts.push(`${color} ${startAngle}deg ${endAngle}deg`);

                let label = document.createElement('div');
                label.className = 'label';
                let textRotation = startAngle + (sliceAngle / 2) - 90;
                label.style.transform = `rotate(${textRotation}deg) translate(145px, -50%)`;
                label.innerText = i + 1;
                wheelLabels.appendChild(label);
            }
            wheelBg.style.background = `conic-gradient(${gradientParts.join(', ')})`;
        }

        buildWheel();

        function selectCategory(categoryKey, btnElement) {
            currentCategoryKey = categoryKey;
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('wheelArea').style.display = 'block';
            document.getElementById('activeCategoryTitle').innerText = `Category: ${btnElement.innerText}`;
            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('remainingCount').innerText = `${availableQuestions[categoryKey].length} questions remaining`;
            currentRotation = 0;
            document.getElementById('wheel').style.transform = `rotate(0deg)`;
        }

        function spinWheel() {
            const spinBtn = document.getElementById('spinBtn');
            const wheel = document.getElementById('wheel');
            const questionCard = document.getElementById('questionCard');
            let available = availableQuestions[currentCategoryKey];
            
            if (available.length === 0) {
                alert(`Resetting ${currentCategoryKey}!`);
                availableQuestions[currentCategoryKey] = Array.from({length: totalQuestions}, (_, i) => i);
                available = availableQuestions[currentCategoryKey];
            }

            spinBtn.disabled = true;
            spinBtn.innerText = "SPINNING...";
            questionCard.style.display = 'none';

            let randomArrIndex = Math.floor(Math.random() * available.length);
            targetQuestionIndex = available[randomArrIndex];
            available.splice(randomArrIndex, 1);
            document.getElementById('remainingCount').innerText = `${available.length} questions remaining`;

            let sliceCenterAngle = (targetQuestionIndex * sliceAngle) + (sliceAngle / 2);
            let targetDegree = 360 - sliceCenterAngle;
            let currentBase = Math.ceil(currentRotation / 360) * 360; 
            currentRotation = currentBase + 1800 + targetDegree;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                spinBtn.disabled = false;
                spinBtn.innerText = "SPIN AGAIN";
                currentQuestionData = gameData[currentCategoryKey][targetQuestionIndex];
                displayQuestion(targetQuestionIndex + 1, currentQuestionData);
            }, 4000);
        }

        function displayQuestion(questionNumber, data) {
            document.getElementById('qNumberTag').innerText = `Question #${questionNumber}`;
            document.getElementById('questionText').innerText = data.q;
            const mcOptions = document.getElementById('mcOptions');
            const revealBtn = document.getElementById('revealBtn');
            const answerText = document.getElementById('answerText');
            mcOptions.innerHTML = "";
            answerText.style.display = "none";
            
            if (currentCategoryKey === 'multipleChoice' || currentCategoryKey === 'trueFalse') {
                revealBtn.style.display = "none"; 
                mcOptions.style.display = "flex";
                data.options.forEach(opt => {
                    let btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    btn.onclick = () => checkInteractiveAnswer(btn, opt);
                    mcOptions.appendChild(btn);
                });
            } else {
                mcOptions.style.display = "none";
                revealBtn.style.display = "inline-block";
                answerText.innerHTML = `<strong>Answer:</strong> ${data.a}`;
            }
            document.getElementById('questionCard').style.display = "block";
        }

        function checkInteractiveAnswer(clickedBtn, selectedText) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);
            const isCorrect = (selectedText === currentQuestionData.a || selectedText.startsWith(currentQuestionData.a.charAt(0)));
            const answerTextDiv = document.getElementById('answerText');
            if (isCorrect) {
                clickedBtn.classList.add('correct');
                answerTextDiv.innerHTML = `<div style="color: green;">Correct!</div> ${currentQuestionData.exp || ''}`;
            } else {
                clickedBtn.classList.add('incorrect');
                answerTextDiv.innerHTML = `<div style="color: red;">Incorrect!</div> The correct answer was: ${currentQuestionData.a}. ${currentQuestionData.exp || ''}`;
            }
            answerTextDiv.style.display = "block";
        }

        function revealAnswer() {
            document.getElementById('revealBtn').style.display = "none";
            document.getElementById('answerText').style.display = "block";
        }
    </script>
</body>
</html>
