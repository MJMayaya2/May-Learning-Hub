<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 10 Geography: Synoptic Weather Maps</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 10 Geography: Synoptic Weather Maps</h1>
        <p class="game-subtitle">Match the symbols, ocean influences, and seasonal map patterns!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Air Movement & Oceans</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Global Cycles & Pressure</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Weather Symbols & Tools</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Seasonal Interpretation</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Downward movement of air causing dry surface conditions." }, { id: 1, text: "Subsidence" },
                { id: 2, text: "Meeting of air masses, forcing air to rise and rain." }, { id: 2, text: "Convergence" },
                { id: 3, text: "Cold current cooling the west coast, creating arid conditions." }, { id: 3, text: "Benguela Current" },
                { id: 4, text: "Warm current bringing humid air to eastern Africa." }, { id: 4, text: "Mozambique Current" },
                { id: 5, text: "Oceans absorb/release heat, regulating coastal climates." }, { id: 5, text: "Heat Reservoirs" },
                { id: 6, text: "High-pressure zone example: Kalahari Desert." }, { id: 6, text: "Subsidence Zone" },
                { id: 7, text: "Low-pressure convergence zone over central Africa." }, { id: 7, text: "ITCZ" },
                { id: 8, text: "Cold current influencing the Sahara's dry climate." }, { id: 8, text: "Canary Current" },
                { id: 9, text: "Ocean current linked to Namibia's Namib Desert." }, { id: 9, text: "Benguela Current" },
                { id: 10, text: "Rising air cools and condenses to form this." }, { id: 10, text: "Precipitation" }
            ],
            'topic2': [
                { id: 1, text: "Warming of Pacific surface waters altering global weather." }, { id: 1, text: "El Niño" },
                { id: 2, text: "Cooling of Pacific surface waters, opposite of El Niño." }, { id: 2, text: "La Niña" },
                { id: 3, text: "Impact of El Niño on Southern Africa's climate." }, { id: 3, text: "Drought Conditions" },
                { id: 4, text: "Impact of La Niña on Southern Africa's climate." }, { id: 4, text: "Increased Rainfall/Floods" },
                { id: 5, text: "Lines on a synoptic map connecting equal air pressure." }, { id: 5, text: "Isobars" },
                { id: 6, text: "Map feature indicated by closely spaced isobars." }, { id: 6, text: "Strong Winds" },
                { id: 7, text: "High pressure (H) system typically brings this weather." }, { id: 7, text: "Clear Skies & Dry" },
                { id: 8, text: "Low pressure (L) system typically brings this weather." }, { id: 8, text: "Cloudy & Rainfall" },
                { id: 9, text: "Boundary of advancing cold air, often bringing storms." }, { id: 9, text: "Cold Front" },
                { id: 10, text: "Boundary associated with steady rain and warming." }, { id: 10, text: "Warm Front" }
            ],
            'topic3': [
                { id: 1, text: "Diagram showing weather data for a specific location." }, { id: 1, text: "Weather Station Model" },
                { id: 2, text: "Top left number on a weather station model." }, { id: 2, text: "Air Temperature" },
                { id: 3, text: "Bottom left number on a weather station model." }, { id: 3, text: "Dew Point Temperature" },
                { id: 4, text: "Central circle on a station model indicates this." }, { id: 4, text: "Cloud Cover" },
                { id: 5, text: "Symbol for Overcast cloud conditions." }, { id: 5, text: "Fully Shaded Circle" },
                { id: 6, text: "Weather symbol consisting of three horizontal lines (≡)." }, { id: 6, text: "Fog" },
                { id: 7, text: "Weather symbol consisting of an asterisk (*)." }, { id: 7, text: "Snow" },
                { id: 8, text: "Symbol: R with a downward arrow." }, { id: 8, text: "Thunderstorm" },
                { id: 9, text: "Short feather line on a wind shaft." }, { id: 9, text: "5 Knots Speed" },
                { id: 10, text: "Long feather line on a wind shaft." }, { id: 10, text: "10 Knots Speed" }
            ],
            'topic4': [
                { id: 1, text: "Identifying a Winter map by this interior feature." }, { id: 1, text: "Continental High Pressure" },
                { id: 2, text: "Identifying a Summer map by this interior feature." }, { id: 2, text: "Thermal or Tropical Low" },
                { id: 3, text: "Winter migration of High Pressure cells." }, { id: 3, text: "Northwards to 30°S" },
                { id: 4, text: "Summer migration of High Pressure cells." }, { id: 4, text: "Southwards to 35°S" },
                { id: 5, text: "Standard air pressure interval used on SA maps." }, { id: 5, text: "4hPa Isobar Interval" },
                { id: 6, text: "Blocks cold fronts from influencing SA in summer." }, { id: 6, text: "South Atlantic High" },
                { id: 7, text: "Low pressure system ahead of a winter cold front." }, { id: 7, text: "Coastal Low" },
                { id: 8, text: "Season where cold fronts pass over the interior." }, { id: 8, text: "Winter" },
                { id: 9, text: "Standard air pressure at sea level." }, { id: 9, text: "1013.2 hPa" },
                { id: 10, text: "HP cell migration southwards leads to this in WC." }, { id: 10, text: "Ridging High" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 10 Synoptic Weather Map Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
