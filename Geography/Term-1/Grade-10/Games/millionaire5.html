<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Geography Master Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 250px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="https://mmayaya.github.io/mayhub/" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="https://mmayaya.github.io/mayhub/">Home</a>
            <a href="https://mmayaya.github.io/mayhub/about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Geography Master Quiz</h1>
        <p class="game-subtitle">30-Question Challenge: Climatology & Weather Processes</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final score:</p>
            <div id="endPrize">0 Pts</div>
            <button class="lifeline-btn" onclick="location.reload()">Try Again</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "A process whereby areas become more arid and drier like a desert, is...", options: ["Drought", "Desertification", "Climate Change", "Ozone Depletion"], a: 1, hint: "Think of turning into a desert." },
            { q: "What is the transfer of heat by vertically moving air called?", options: ["Convection", "Conduction", "Coriolis force", "Latent heat"], a: 0, hint: "Warm air rises, cold air sinks." },
            { q: "Gases in the atmosphere that absorb long-wave radiation and contribute to global warming are known as...", options: ["Radiation gases", "Thermosphere", "Greenhouse effect", "Greenhouse gases"], a: 3, hint: "These act like the glass of a greenhouse." },
            { q: "Chemicals used in some aerosol sprays, refrigerants, and air conditioners are known as...", options: ["Oxygen atoms", "Chlorine carbons", "Pollutants", "Chlorofluorocarbons"], a: 3, hint: "Often abbreviated as CFCs." },
            { q: "Moisture or any form of water which falls from the atmosphere onto the earth's surface is called...", options: ["Thunderstorms", "Fog", "Precipitation", "Rainfalls"], a: 2, hint: "Includes rain, snow, sleet, and hail." },
            { q: "A map showing a summary of the weather conditions of a place is...", options: ["Meteorology", "Weather forecast", "A Synoptic Weather Map", "Climatology"], a: 2, hint: "Synoptic means a summary or general view." },
            { q: "What is the main cause of global warming?", options: ["Decrease in greenhouse gases", "Increase in greenhouse gases", "Increased rainfall", "Ocean currents"], a: 1, hint: "More heat is being trapped in the atmosphere." },
            { q: "Which factor is NOT evidence of global warming?", options: ["Droughts", "Increase in diseases", "Extinction of Plants", "Drop in sea level"], a: 3, hint: "Melting ice caps actually cause the opposite of this." },
            { q: "What is the largest reservoir of water on Earth?", options: ["Oceans", "Lakes", "Rivers", "Groundwater"], a: 0, hint: "It covers about 71% of the Earth's surface." },
            { q: "What is the process whereby liquid water changes to water vapor?", options: ["Evaporation", "Condensation", "Transpiration", "Infiltration"], a: 0, hint: "Happens when water is heated." },
            { q: "What is the process whereby water vapor changes to liquid water?", options: ["Evaporation", "Condensation", "Transpiration", "Infiltration"], a: 1, hint: "This forms clouds." },
            { q: "What is the term for any form of water released from the atmosphere to the earth's surface?", options: ["Precipitation", "Surface-runoff", "Groundwater", "Transpiration"], a: 0, hint: "Includes rain and snow." },
            { q: "What do we call water that flows on the Earth's surface after it has rained?", options: ["Infiltration", "Condensation", "Surface-runoff", "Evaporation"], a: 2, hint: "It 'runs off' the land into rivers." },
            { q: "What is the process whereby moisture is released from plants into the atmosphere?", options: ["Evaporation", "Transpiration", "Condensation", "Infiltration"], a: 1, hint: "Like plants sweating." },
            { q: "What is the process whereby water reaches the groundwater?", options: ["Precipitation", "Infiltration", "Transpiration", "Condensation"], a: 1, hint: "Water seeps or filters into the soil." },
            { q: "How is the term 'atmosphere' best defined?", options: ["The solid part of the earth", "The layer of gases surrounding the Earth", "The water on the Earth's surface", "The core of the Earth"], a: 1, hint: "It contains the air we breathe." },
            { q: "In which two layers of the atmosphere do we find an increase in temperature with height?", options: ["Troposphere & Mesosphere", "Stratosphere & Thermosphere", "Troposphere & Stratosphere", "Mesosphere & Thermosphere"], a: 1, hint: "The second and fourth layers." },
            { q: "Why does temperature increase in the Stratosphere?", options: ["Ozone layer absorbs UV radiation", "It is closer to the sun", "Greenhouse gases trap heat", "Friction with meteors"], a: 0, hint: "A specific gas layer protects us here." },
            { q: "Why is the Troposphere such an important layer?", options: ["It contains the ozone layer", "It is where most weather occurs and life exists", "It is the hottest layer", "It protects earth from meteors"], a: 1, hint: "It's the lowest layer where we live." },
            { q: "Why do long-distance aircraft choose to fly in the lower part of the Stratosphere?", options: ["To avoid clouds and weather disturbances", "To stay close to the ground", "Because the air is thicker", "Because it is warmer"], a: 0, hint: "It provides a smoother ride." },
            { q: "Which human activity is known to deplete the ozone layer?", options: ["Planting trees", "Release of Chlorofluorocarbons (CFCs)", "Using solar panels", "Recycling"], a: 1, hint: "Found in old aerosols and fridges." },
            { q: "Which ocean current flows along the west coast of South Africa?", options: ["Agulhas Current", "Benguela Current", "Mozambique Current", "Equatorial Current"], a: 1, hint: "It brings cold water from the south." },
            { q: "Which ocean current flows along the east coast of South Africa?", options: ["Benguela Current", "Agulhas Current", "Canary Current", "Gulf Stream"], a: 1, hint: "It brings warm water from the equator." },
            { q: "What best describes the moisture content and temperature of the Benguela Current?", options: ["Warm and moist", "Cold and dry", "Warm and dry", "Cold and moist"], a: 1, hint: "Flows from the poles and affects the arid west coast." },
            { q: "What best describes the moisture content and temperature of the Agulhas Current?", options: ["Warm and moist", "Cold and dry", "Cold and moist", "Warm and dry"], a: 0, hint: "Flows from the tropics." },
            { q: "How does the Agulhas current influence weather on the eastern part of South Africa?", options: ["It causes dry conditions", "It lowers temperatures and brings frost", "It increases temperatures and brings rain", "It creates deserts"], a: 2, hint: "Warm, moist air leads to more evaporation and precipitation." },
            { q: "What geographical factor heavily influences the consistently warm climate near the Equator?", options: ["Latitude", "Altitude", "Distance from the sea", "Ocean currents"], a: 0, hint: "Refers to how far north or south a place is." },
            { q: "Which area of the Earth is consistently the warmest due to direct sunlight?", options: ["The Poles", "The Equator", "The Tropic of Capricorn", "The Arctic Circle"], a: 1, hint: "The imaginary line around the middle of the Earth." },
            { q: "Why are polar regions consistently cold and covered with ice?", options: ["They receive direct sunlight", "The sun's rays hit at an oblique angle, spreading heat over a larger area", "They have warm ocean currents", "They are closer to the equator"], a: 1, hint: "The angle of insolation is very low." },
            { q: "What are lines drawn on synoptic weather maps showing places of equal pressure called?", options: ["Isohyets", "Isotherms", "Isobars", "Contours"], a: 2, hint: "Barometric pressure gives it its name." }
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>Q-Point</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = qData.options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const qData = questions[currentLevel];
            const correctIndex = qData.a;
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (selectedIndex === correctIndex) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    document.getElementById(`btn${correctIndex}`).classList.add('correct');
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            const correctIndex = questions[currentLevel].a;
            let wrongIndexes = [0, 1, 2, 3].filter(i => i !== correctIndex);
            wrongIndexes.sort(() => Math.random() - 0.5);
            document.getElementById(`btn${wrongIndexes[0]}`).classList.add('hidden');
            document.getElementById(`btn${wrongIndexes[1]}`).classList.add('hidden');
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Study Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "30/30 - 100%";
            } else {
                document.getElementById('endMessage').innerText = "Keep Studying!";
                document.getElementById('endPrize').innerText = `${currentLevel}/30 Correct`;
            }
        }
        loadQuestion();
    </script>
</body>
</html>
