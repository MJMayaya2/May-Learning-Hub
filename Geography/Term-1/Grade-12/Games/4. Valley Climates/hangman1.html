<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Geography Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Geography Hangman Challenge</h1>
        <p class="game-subtitle">Grade 12: Valley Climates (Chapter 4)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "MICROCLIMATE", topic: "Introduction", hint: "The climate of a small area that differs from its surroundings." },
            { word: "SLOPE ASPECT", topic: "Sunlight", hint: "The orientation of a slope relative to the Sun." },
            { word: "NORTH FACING", topic: "Sunlight", hint: "In South Africa, these slopes receive more direct solar radiation." },
            { word: "SOUTH FACING", topic: "Sunlight", hint: "Slopes that are cooler and often in the shadow zone in winter." },
            { word: "SHADOW ZONE", topic: "Sunlight", hint: "An area on a slope that receives no direct sunlight in winter." },
            { word: "ANABATIC", topic: "Winds", hint: "Upslope winds that occur during the day as valley slopes heat up." },
            { word: "KATABATIC", topic: "Winds", hint: "Downslope winds that occur at night as air cools and becomes dense." },
            { word: "INVERSION", topic: "Temperature", hint: "When air temperature increases with altitude, trapping cold air below." },
            { word: "FROST POCKET", topic: "Agriculture", hint: "The cold valley floor where freezing temperatures damage crops." },
            { word: "RADIATION FOG", topic: "Weather", hint: "Fog formed at night as the ground loses heat and cools the air above." },
            { word: "SMOG", topic: "Pollution", hint: "A mixture of smoke and fog trapped in a valley by an inversion." },
            { word: "THERMAL BELT", topic: "Settlement", hint: "The warm middle-slope area above the inversion layer, ideal for homes." },
            { word: "TERRESTRIAL", topic: "Temperature", hint: "____ radiation is the heat lost by the Earth's surface at night." },
            { word: "SOLAR", topic: "Sunlight", hint: "____ radiation is the heat received from the Sun." },
            { word: "GRAVITY", topic: "Winds", hint: "The force that pulls cold air down slopes to form katabatic winds." },
            { word: "ADIABATIC", topic: "Temperature", hint: "Heating or cooling of air due to pressure changes without heat exchange." },
            { word: "CONVECTION", topic: "Winds", hint: "Rising of warm air that drives anabatic wind movement." },
            { word: "DENSITY", topic: "Winds", hint: "Katabatic winds form because cold air has a higher ____." },
            { word: "VALLEY FLOOR", topic: "Settlement", hint: "The lowest part of the valley where cold air collects at night." },
            { word: "PLATEAU", topic: "Introduction", hint: "High, flat land where air might cool before sinking into a valley." },
            { word: "CROP ROTATION", topic: "Agriculture", hint: "Farmers might use this, but they must avoid frost-sensitive plants in pockets." },
            { word: "DECIDUOUS", topic: "Agriculture", hint: "Type of fruit trees (like apples) often planted in cooler areas." },
            { word: "GRAPEVINES", topic: "Agriculture", hint: "Sun-loving crops often planted on north-facing slopes in SA." },
            { word: "VISIBILITY", topic: "Weather", hint: "This is greatly reduced on valley roads during radiation fog." },
            { word: "SATURATION", topic: "Weather", hint: "The point where air cannot hold more moisture, leading to fog." },
            { word: "DEW POINT", topic: "Weather", hint: "The temperature at which condensation begins." },
            { word: "ASPECT", topic: "Sunlight", hint: "The 'direction' a slope faces." },
            { word: "ORIENTATION", topic: "Sunlight", hint: "Another word for the way a slope faces the Sun." },
            { word: "VALLEY CLIMATE", topic: "Introduction", hint: "The specific topic covered in Chapter 4." },
            { word: "MICRO", topic: "Introduction", hint: "Prefix meaning small, used to describe local climates." },
            { word: "INVERSION LAYER", topic: "Temperature", hint: "The boundary between the cold valley air and warm thermal belt." },
            { word: "SUBSIDING", topic: "Winds", hint: "Air that is sinking or moving downwards." },
            { word: "COLD AIR", topic: "Temperature", hint: "This 'pools' at the bottom of the valley at night." },
            { word: "WARM AIR", topic: "Temperature", hint: "This is pushed upwards as cold air sinks into the valley." },
            { word: "HUMAN ACTIVITY", topic: "Settlement", hint: "How people use the valley for farming and building homes." },
            { word: "SUNNY", topic: "Sunlight", hint: "Characteristic of north-facing slopes in the Southern Hemisphere." },
            { word: "SHADY", topic: "Sunlight", hint: "Characteristic of south-facing slopes in the Southern Hemisphere." },
            { word: "EVAPORATION", topic: "Agriculture", hint: "This happens faster on sunny slopes, making soil drier." },
            { word: "MOISTURE", topic: "Agriculture", hint: "South-facing slopes retain more of this because they are cooler." },
            { word: "AIR POLLUTION", topic: "Pollution", hint: "This becomes a major health risk in valleys with inversions." },
            { word: "STAGNANT", topic: "Pollution", hint: "Air that is not moving, often found under an inversion." },
            { word: "TRAPPED", topic: "Pollution", hint: "Smoke and exhaust fumes are ____ by the warm inversion layer." },
            { word: "VALLEY BREEZE", topic: "Winds", hint: "Another name for an anabatic wind." },
            { word: "MOUNTAIN BREEZE", topic: "Winds", hint: "Another name for a katabatic wind." },
            { word: "DIRECT RAYS", topic: "Sunlight", hint: "North-facing slopes receive these, making them warmer." },
            { word: "OBLIQUE RAYS", topic: "Sunlight", hint: "South-facing slopes receive these, making them cooler." },
            { word: "WINTER CROPS", topic: "Agriculture", hint: "Farmers avoid planting these in the shadow zone." },
            { word: "FRUIT TREES", topic: "Agriculture", hint: "Sensitive plants that can be killed by frost in a valley." },
            { word: "SPRING", topic: "Agriculture", hint: "Season when new growth is most at risk from frost pockets." },
            { word: "SUNLIGHT", topic: "Sunlight", hint: "The main factor that slope aspect affects." },
            { word: "DIFFERENTIAL", topic: "Temperature", hint: "The ____ heating of slopes causes valley winds." },
            { word: "ISOLATION", topic: "Sunlight", hint: "Common misspelling/variation for Insolation (Solar radiation)." },
            { word: "INSOLATION", topic: "Sunlight", hint: "Incoming Solar Radiation." },
            { word: "TOPOGRAPHY", topic: "Introduction", hint: "The shape of the land (mountains/valleys) affecting climate." },
            { word: "LOCAL WINDS", topic: "Winds", hint: "Winds like anabatic and katabatic that are site-specific." },
            { word: "ACCIDENTS", topic: "Weather", hint: "Risk increased by heavy radiation fog in valleys." },
            { word: "CONDENSATION", topic: "Weather", hint: "The process that forms the droplets in fog." },
            { word: "SINKING", topic: "Winds", hint: "The motion of air during katabatic flow." },
            { word: "WARMING", topic: "Sunlight", hint: "The effect of the Sun on north-facing slopes." },
            { word: "HEALTH", topic: "Pollution", hint: "This is negatively affected by smog in urban valleys." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Valley Climate Expert!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for Microclimates!";
            document.getElementById('modalWord').innerText = "GEOGRAPHY PRO";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
