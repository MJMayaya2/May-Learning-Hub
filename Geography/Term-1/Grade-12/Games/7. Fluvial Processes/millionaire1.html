<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Fluvial Processes Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Fluvial Processes (Grade 12 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the 'Base Level' of a river?", options: ["The source of the river", "The highest point of a waterfall", "The lowest level to which a river can flow", "The speed of the water"], a: 2, hint: "It is usually sea level." },
            { q: "Which profile shows a river's length and its descent from source to mouth?", options: ["Transverse profile", "Cross profile", "Longitudinal profile", "Vertical profile"], a: 2, hint: "Think of looking at the river from the side along its whole length." },
            { q: "What does a 'Transverse Profile' show?", options: ["The river's length", "The width and depth of the river channel", "The age of the river", "The type of rocks"], a: 1, hint: "It is a cross-section of the river valley." },
            { q: "In which stage of a river is vertical erosion dominant, creating a V-shaped valley?", options: ["Lower course", "Middle course", "Upper course", "Delta stage"], a: 2, hint: "This stage is near the source where the gradient is steep." },
            { q: "What is the common nickname for valleys in the upper course?", options: ["U-shaped valleys", "Flat valleys", "V-shaped valleys", "Circular valleys"], a: 2, hint: "They look like a specific letter of the alphabet." },
            { q: "In the middle course, which type of erosion starts to dominate?", options: ["Vertical erosion", "Lateral erosion", "No erosion", "Chemical erosion"], a: 1, hint: "The river starts eroding sideways, making the valley wider." },
            { q: "What feature is formed in the lower course where the gradient is flat and the river is very wide?", options: ["Waterfall", "Gorge", "Floodplain", "Rapid"], a: 2, hint: "It is a flat area of land next to the river that floods." },
            { q: "Which of the following is an example of a temporary base level?", options: ["The ocean", "A lake or a dam", "A mountain peak", "The atmosphere"], a: 1, hint: "It stops the river from eroding deeper until that feature is removed." },
            { q: "What term describes a river that has adjusted its profile to a smooth, concave curve?", options: ["Young river", "Ungraded river", "Graded river", "Disrupted river"], a: 2, hint: "It has reached a state of equilibrium." },
            { q: "What is a 'Knickpoint'?", options: ["The end of a river", "A point where a river's profile has a sharp change in gradient", "A sharp rock in the water", "A place where two rivers meet"], a: 1, hint: "Waterfalls are often found at these points." },
            { q: "When a river gains energy and starts eroding vertically again, it is called...", options: ["Deposition", "Rejuvenation", "Saturation", "Sublimation"], a: 1, hint: "The river becomes 'young' again." },
            { q: "Which landform is a crescent-shaped lake formed when a meander is cut off?", options: ["Delta", "Oxbow lake", "Levee", "Braided stream"], a: 1, hint: "It is named after a part of an ox's harness." },
            { q: "What are 'Levees'?", options: ["Natural embankments formed by deposition along river banks", "Deep holes in the riverbed", "Small islands in a delta", "Types of waterfalls"], a: 0, hint: "They help keep the river within its channel during minor floods." },
            { q: "A 'Delta' forms at which part of the river?", options: ["The source", "The upper course", "The mouth", "A knickpoint"], a: 2, hint: "It is where the river enters the sea or a lake." },
            { q: "Which drainage pattern develops its course on a layer of sediment that is later eroded away to expose older rocks?", options: ["Antecedent drainage", "Superimposed drainage", "Dendritic drainage", "Radial drainage"], a: 1, hint: "The river 'imposes' itself on the older structure below." },
            { q: "What defines an 'Antecedent Drainage' pattern?", options: ["The river is younger than the landscape", "The river is older than the landscape and keeps its course during uplift", "The river flows in a tree-like shape", "The river flows into a central basin"], a: 1, hint: "The river was there first (pre-existing)." },
            { q: "What is 'River Capture' (also known as Stream Piracy)?", options: ["Building a dam", "When a more energetic river intercepts the water of another river", "Polluting a river", "A river drying up"], a: 1, hint: "One river 'steals' the water of its neighbor." },
            { q: "In river capture, what is the 'Captor Stream'?", options: ["The river that loses its water", "The river that takes the water from another stream", "The dry riverbed", "The new waterfall"], a: 1, hint: "It is the energetic 'thief'." },
            { q: "What do we call the dry valley left behind after a river has been captured?", options: ["Misfit stream", "Wind gap", "Elbow of capture", "Gorge"], a: 1, hint: "It was once a water gap, but now only wind passes through." },
            { q: "What is an 'Elbow of Capture'?", options: ["A type of fish", "The sharp turn where the captured stream joins the captor", "The source of the river", "The wide floodplain"], a: 1, hint: "It indicates the exact spot where the 'piracy' happened." },
            { q: "A stream that is now too small for the valley it flows in (due to capture) is a...", options: ["Misfit stream", "Superimposed stream", "Braided stream", "Tributary"], a: 0, hint: "It no longer 'fits' its large valley." },
            { q: "Which fluvial process involves the river carrying sediment along its bed?", options: ["Erosion", "Deposition", "Transportation", "Condensation"], a: 2, hint: "The river acts like a conveyor belt." },
            { q: "What causes a river to deposit its load?", options: ["Increase in speed", "Decrease in energy and velocity", "Getting deeper", "Entering the upper course"], a: 1, hint: "When the water slows down, it can no longer carry the weight." },
            { q: "Which feature is formed when a river flows into a flat area and splits into many small channels?", options: ["Waterfall", "Braided stream", "Gorge", "Meander"], a: 1, hint: "The channels look like hair that has been plaited." },
            { q: "What is a 'Meander'?", options: ["A straight river channel", "A large loop or bend in a river", "A hole in the ground", "The start of a river"], a: 1, hint: "These are typical in the middle and lower courses." },
            { q: "Where does EROSION occur in a meander?", options: ["On the inside bank", "On the outer bank (undercut slope)", "Only at the bottom", "It doesn't happen"], a: 1, hint: "Water moves fastest on the outside of the curve." },
            { q: "Where does DEPOSITION occur in a meander?", options: ["On the outer bank", "On the inner bank (slip-off slope)", "At the confluence", "At the source"], a: 1, hint: "Water moves slowest on the inside of the curve." },
            { q: "The process of a river cutting back its source upstream is called...", options: ["Lateral erosion", "Headward erosion", "Vertical erosion", "Chemical weathering"], a: 1, hint: "This is how a river increases its length at its start." },
            { q: "A deep, narrow valley with very steep sides is called a...", options: ["Floodplain", "Delta", "Gorge", "Marsh"], a: 2, hint: "Often formed by vertical erosion in resistant rock." },
            { q: "What is the primary force that makes a river flow?", options: ["Wind", "Magnetism", "Gravity", "Earth's rotation"], a: 2, hint: "Water always wants to go 'downhill'." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
