    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Subtropical Anticyclones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Geography: Subtropical Anticyclones</h1>
        <p class="game-subtitle">Match the high-pressure cells and SA weather phenomena!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">High Pressure Cells</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Summer Weather Patterns</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Coastal Weather Systems</button>
                <button class="cat-btn" onclick="topic4Category('topic4', this)">Winter & Berg Winds</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "High-pressure cell located over the Atlantic Ocean." }, { id: 1, text: "South Atlantic High" },
                { id: 2, text: "Cell responsible for summer rain in the eastern half of SA." }, { id: 2, text: "South Indian High" },
                { id: 3, text: "Inland high-pressure cell dominant in winter." }, { id: 3, text: "Kalahari High" },
                { id: 4, text: "Primary air movement associated with anticyclones." }, { id: 4, text: "Subsiding air" },
                { id: 5, text: "Pressure trend toward the center of these cells." }, { id: 5, text: "Increases" },
                { id: 6, text: "Anticyclones form at the boundary of these two cells." }, { id: 6, text: "Hadley and Ferrel" },
                { id: 7, text: "Wind direction out of an anticyclone (Southern Hemisphere)." }, { id: 7, text: "Anti-clockwise" },
                { id: 8, text: "Ocean current on the west coast influencing HP cells." }, { id: 8, text: "Benguela Current" },
                { id: 9, text: "Ocean current on the east coast influencing HP cells." }, { id: 9, text: "Mozambique Current" },
                { id: 10, text: "General weather associated with high-pressure centers." }, { id: 10, text: "Dry and Clear" }
            ],
            'topic2': [
                { id: 1, text: "Boundary where warm, moist air meets cold, dry air." }, { id: 1, text: "Moisture Front" },
                { id: 2, text: "Violent summer storms formed along the moisture front." }, { id: 2, text: "Line Thunderstorms" },
                { id: 3, text: "Air mass originating from the South Indian High." }, { id: 3, text: "Warm and Moist" },
                { id: 4, text: "Air mass originating from the South Atlantic High." }, { id: 4, text: "Cold and Dry" },
                { id: 5, text: "Seasonal shift of HP cells during summer." }, { id: 5, text: "Move Southwards" },
                { id: 6, text: "Low-pressure system formed over the land in summer." }, { id: 6, text: "Thermal Low" },
                { id: 7, text: "The moisture front typically stretches across this region." }, { id: 7, text: "Interior / Plateau" },
                { id: 8, text: "Cloud type associated with line thunderstorms." }, { id: 8, text: "Cumulonimbus" },
                { id: 9, text: "Wind direction bringing moisture to the interior." }, { id: 9, text: "North-Easterly" },
                { id: 10, text: "Precipitation type often seen in line thunderstorms." }, { id: 10, text: "Heavy rain / Hail" }
            ],
            'topic3': [
                { id: 1, text: "Low-pressure cells that travel ahead of a cold front." }, { id: 1, text: "Coastal Lows" },
                { id: 2, text: "Direction in which coastal lows move along the coast." }, { id: 2, text: "Eastwards" },
                { id: 3, text: "Weather brought by offshore winds in a coastal low." }, { id: 3, text: "Clear and Dry" },
                { id: 4, text: "Weather brought by onshore winds in a coastal low." }, { id: 4, text: "Fog and Drizzle" },
                { id: 5, text: "Temperature change when coastal low winds turn onshore." }, { id: 5, text: "Cooler" },
                { id: 6, text: "Coastal lows often form off this coast first." }, { id: 6, text: "West Coast" },
                { id: 7, text: "System responsible for sudden coastal weather changes." }, { id: 7, text: "Coastal Low" },
                { id: 8, text: "Air pressure change as a coastal low passes." }, { id: 8, text: "Rises" },
                { id: 9, text: "Sea conditions often associated with coastal lows." }, { id: 9, text: "Rough" },
                { id: 10, text: "Cloud type often found with onshore coastal low winds." }, { id: 10, text: "Stratus" }
            ],
            'topic4': [
                { id: 1, text: "Hot, dry wind descending from the plateau in winter." }, { id: 1, text: "Berg Wind" },
                { id: 2, text: "Process where air warms by compression as it falls." }, { id: 2, text: "Adiabatic Heating" },
                { id: 3, text: "Seasonal shift of HP cells during winter." }, { id: 3, text: "Move Northwards" },
                { id: 4, text: "The Kalahari High prevents this from reaching the interior." }, { id: 4, text: "Moist air / Rain" },
                { id: 5, text: "Berg winds are often linked to this low-pressure system." }, { id: 5, text: "Coastal Low" },
                { id: 6, text: "Risk associated with hot, dry Berg winds." }, { id: 6, text: "Veld Fires" },
                { id: 7, text: "Layer of warm air that traps pollution in winter." }, { id: 7, text: "Inversion Layer" },
                { id: 8, text: "Height of the inversion layer in winter." }, { id: 8, text: "Below Escarpment" },
                { id: 9, text: "Condition of the Kalahari High in summer." }, { id: 9, text: "Weakens / Rises" },
                { id: 10, text: "General winter interior sky condition." }, { id: 10, text: "Cloudless / Sunny" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 12 Subtropical Anticyclones Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // Fix for the fourth button naming in HTML
        function topic4Category(key, btn) { selectCategory(key, btn); }
    </script>
</body>
</html>
