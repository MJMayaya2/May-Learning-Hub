<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Geography Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Geography Hangman Challenge</h1>
        <p class="game-subtitle">Grade 12: Subtropical Anticyclones (Chapter 3)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "KALAHARI", topic: "High Pressure Cells", hint: "The high-pressure cell located over the interior of South Africa." },
            { word: "SUBSIDING", topic: "General Characteristics", hint: "The downward movement of air associated with high-pressure cells." },
            { word: "ANTICYCLONE", topic: "Terminology", hint: "Another name for a high-pressure cell." },
            { word: "DIVERGENCE", topic: "General Characteristics", hint: "Air moving away from the center of a high-pressure cell at the surface." },
            { word: "WINTER", topic: "Seasonal Weather", hint: "The season when the Kalahari High is dominant over the interior." },
            { word: "SUMMER", topic: "Seasonal Weather", hint: "The season when the high-pressure cells shift South." },
            { word: "BERG WIND", topic: "Local Winds", hint: "A hot, dry wind that blows from the interior to the coast in winter." },
            { word: "ADIABATIC", topic: "Local Winds", hint: "The type of heating that occurs as air descends the escarpment." },
            { word: "COASTAL LOW", topic: "Local Winds", hint: "A low-pressure cell that moves along the coast, often linked to berg winds." },
            { word: "MOISTURE FRONT", topic: "Fronts", hint: "The boundary where warm, moist air meets cool, dry air over the interior." },
            { word: "THUNDERSTORM", topic: "Weather Patterns", hint: "Type of storm that occurs along the moisture front (Line ____)." },
            { word: "INVERSION", topic: "High Pressure Cells", hint: "A layer of warm air that prevents moist air from rising to the plateau in winter." },
            { word: "ESCARPMENT", topic: "Local Winds", hint: "The steep slope air descends, causing it to warm up as berg winds." },
            { word: "SOUTH ATLANTIC", topic: "High Pressure Cells", hint: "The high-pressure cell found off the West coast of SA." },
            { word: "SOUTH INDIAN", topic: "High Pressure Cells", hint: "The high-pressure cell found off the East coast of SA." },
            { word: "BENGUELA", topic: "Ocean Currents", hint: "The cold ocean current on the West coast of South Africa." },
            { word: "MOZAMBIQUE", topic: "Ocean Currents", hint: "The warm ocean current on the East coast of South Africa." },
            { word: "HADLEY", topic: "Atmospheric Circulation", hint: "The circulation cell whose boundary forms the subtropical high-pressure zone." },
            { word: "FERREL", topic: "Atmospheric Circulation", hint: "The second circulation cell that meets the Hadley cell at the subtropics." },
            { word: "CLEAR SKIES", topic: "Weather Patterns", hint: "Typical sky conditions associated with high-pressure cells." },
            { word: "COMPRESSION", topic: "Local Winds", hint: "The process that causes air to heat up as it sinks." },
            { word: "OFFSHORE", topic: "Local Winds", hint: "Winds blowing from the land toward the sea, like berg winds." },
            { word: "ONSHORE", topic: "Local Winds", hint: "Winds blowing from the sea toward the land, bringing moisture." },
            { word: "VELD FIRES", topic: "Local Winds", hint: "A major hazard caused by hot, dry berg winds in winter." },
            { word: "CONCENTRIC", topic: "Synoptic Maps", hint: "The shape of the isobars in an anticyclone." },
            { word: "SUBTROPICAL", topic: "General Characteristics", hint: "The latitude belt (around 30 degrees) where these highs form." },
            { word: "STABLE", topic: "General Characteristics", hint: "Atmospheric condition where air is sinking and no clouds form." },
            { word: "RIDGING", topic: "Synoptic Maps", hint: "When a high-pressure cell pushes into a low-pressure area." },
            { word: "CONVECTION", topic: "Weather Patterns", hint: "Process of rising air that creates summer rain in the East." },
            { word: "HUMIDITY", topic: "Weather Patterns", hint: "This is very low in the Kalahari High air mass." },
            { word: "FOG", topic: "Local Winds", hint: "Weather condition brought to the coast as a coastal low passes." },
            { word: "PLATEAU", topic: "Local Winds", hint: "The high interior land from which berg winds originate." },
            { word: "KILOPASCAL", topic: "Measurement", hint: "The standard unit for measuring air pressure on SA maps." },
            { word: "HECTOPASCAL", topic: "Measurement", hint: "The common international unit (hPa) for air pressure." },
            { word: "NORTHWARDS", topic: "Seasonal Weather", hint: "The direction the pressure belts shift during winter." },
            { word: "SOUTHWARDS", topic: "Seasonal Weather", hint: "The direction the pressure belts shift during summer." },
            { word: "FROST", topic: "Weather Patterns", hint: "A winter morning condition caused by cold air under the inversion." },
            { word: "CUMULUS", topic: "Weather Patterns", hint: "Small, puffy clouds that might form at the top of an inversion." },
            { word: "WESTERLIES", topic: "Seasonal Weather", hint: "Wind belt that brings cold fronts to SA in winter." },
            { word: "TRADES", topic: "Seasonal Weather", hint: "Tropical winds that influence the East coast in summer." },
            { word: "DRY AIR", topic: "General Characteristics", hint: "Main characteristic of air in a high-pressure cell." },
            { word: "EVAPORATION", topic: "General Characteristics", hint: "High-pressure cells often prevent this by suppressing rising air." },
            { word: "CLOUDS", topic: "General Characteristics", hint: "These are generally absent in high-pressure systems." },
            { word: "BLOCKING", topic: "High Pressure Cells", hint: "When a high prevents a cyclone from moving in a certain direction." },
            { word: "ISLANDS", topic: "High Pressure Cells", hint: "Highs are often centered over these in the ocean (e.g., St. Helena)." },
            { word: "DESCENDING", topic: "General Characteristics", hint: "Another word for subsiding air." },
            { word: "FRICTION", topic: "Local Winds", hint: "This slows down surface winds as they cross land." },
            { word: "TEMPERATURE", topic: "Weather Patterns", hint: "This increases dramatically during a berg wind event." },
            { word: "PRECIPITATION", topic: "Weather Patterns", hint: "This is very low in the western interior due to high pressure." },
            { word: "WEST COAST", topic: "Local Winds", hint: "Where coastal lows typically form before moving East." },
            { word: "SYNOPTIC", topic: "Synoptic Maps", hint: "The type of chart used to identify high-pressure cells." },
            { word: "ANTI CLOCKWISE", topic: "High Pressure Cells", hint: "Wind direction in a high-pressure cell in the Southern Hemisphere." },
            { word: "OROGRAPHIC", topic: "Weather Patterns", hint: "Rain caused by mountains lifting air from the South Indian High." },
            { word: "HADLEY CELL", topic: "Atmospheric Circulation", hint: "The tropical circulation cell." },
            { word: "FERREL CELL", topic: "Atmospheric Circulation", hint: "The temperate circulation cell." },
            { word: "SUBTROPICAL HIGH", topic: "Terminology", hint: "The general name for the belt of high pressure at 30 degrees." },
            { word: "THERMAL EQUATOR", topic: "Seasonal Weather", hint: "The line of maximum heating that shifts seasonally." },
            { word: "MOIST AIR", topic: "Weather Patterns", hint: "Air brought inland by the South Indian High in summer." },
            { word: "RAINY SEASON", topic: "Seasonal Weather", hint: "For the eastern interior, this occurs in summer." },
            { word: "DRY SEASON", topic: "Seasonal Weather", hint: "For the eastern interior, this occurs in winter." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Anticyclone Expert!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for South African High Pressure Systems!";
            document.getElementById('modalWord').innerText = "EXCELLENT PREPARATION";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
