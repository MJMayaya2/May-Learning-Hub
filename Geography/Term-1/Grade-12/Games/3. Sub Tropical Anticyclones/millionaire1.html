<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Subtropical Anticyclones Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Subtropical Anticyclones (Grade 12 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "How many high-pressure cells primarily influence South Africa's climate?", options: ["One", "Two", "Three", "Four"], a: 2, hint: "Two are over the oceans and one is inland." },
            { q: "Which high-pressure cell is located off the West Coast of South Africa?", options: ["Kalahari High", "South Indian High", "South Atlantic High", "Thermal Low"], a: 2, hint: "It is associated with the cold Benguela current." },
            { q: "Which high-pressure cell produces clear skies and dry conditions in the interior during winter?", options: ["South Atlantic High", "South Indian High", "Kalahari High", "Coastal Low"], a: 2, hint: "It is also known as the interior high-pressure cell." },
            { q: "At what latitude are subtropical anticyclones typically located?", options: ["0°", "15°S", "30°S", "60°S"], a: 2, hint: "They form at the boundary of the Hadley and Ferrel cells." },
            { q: "What is the primary air movement associated with high-pressure cells?", options: ["Rising air", "Subsiding (sinking) air", "Converging air", "Clockwise inward flow"], a: 1, hint: "Descending air creates stable weather conditions." },
            { q: "In the Southern Hemisphere, air diverges from high-pressure cells in which direction?", options: ["Clockwise", "Anticlockwise", "Straight North", "Directly into the center"], a: 1, hint: "This is the opposite of the rotation for low-pressure systems." },
            { q: "What happens to the Kalahari High in summer?", options: ["It becomes stronger", "It shifts south to the ocean", "It weakens or is lifted by surface heating", "It causes heavy snow"], a: 2, hint: "The intense heating of the land breaks its dominance." },
            { q: "Which cell is responsible for pushing moist air from the Indian Ocean over the eastern half of SA?", options: ["South Atlantic High", "Kalahari High", "South Indian High", "Arctic High"], a: 2, hint: "It is located to the east of the country." },
            { q: "The 'Inversion Layer' is a characteristic of which high-pressure system in winter?", options: ["Kalahari High", "South Atlantic High", "South Indian High", "Tropical Low"], a: 0, hint: "This layer prevents moist air from the coast from entering the interior." },
            { q: "What type of weather does the South Atlantic High bring when it 'ridges' behind a cold front?", options: ["Heatwaves", "Clear skies and cool, moist air", "Heavy tropical thunderstorms", "Sandstorms"], a: 1, hint: "It pushes in behind a passing mid-latitude cyclone." },
            { q: "Where does the 'Moisture Front' usually form in South Africa?", options: ["Along the West Coast", "Across the interior from NW to SE", "Over the Drakensberg peaks", "Only in the Western Cape"], a: 1, hint: "It is the boundary between cold dry air and warm moist air." },
            { q: "What type of storm is caused by the convergence of air at the moisture front?", options: ["Tropical Cyclones", "Coastal Drizzle", "Line Thunderstorms", "Berg Winds"], a: 2, hint: "A long row of storms often seen in summer." },
            { q: "During a line thunderstorm, which air mass is forced to rise?", options: ["Cold dry air from the SW", "Warm moist air from the NE", "Sinking air from the Kalahari High", "Air from the South Pole"], a: 1, hint: "Warm, less dense air is always the one that is lifted." },
            { q: "Which air mass is associated with the South Indian High?", options: ["Cold and dry", "Warm and moist", "Freezing and unstable", "Hot and dusty"], a: 1, hint: "It comes from a warm ocean current." },
            { q: "Where do Coastal Lows typically form before moving eastwards?", options: ["Over the interior plateau", "Off the West Coast", "Over the Indian Ocean", "In the Limpopo valley"], a: 1, hint: "They travel ahead of cold fronts along the shoreline." },
            { q: "What is a 'Berg Wind'?", options: ["A cold wind from the sea", "A hot, dry wind descending from the plateau", "A wind that brings snow", "A permanent planetary wind"], a: 1, hint: "The name suggests it comes from the mountains." },
            { q: "By which process are Berg Winds heated as they descend the escarpment?", options: ["Direct solar radiation", "Conduction from the sea", "Adiabatic compression (descending)", "Evaporation"], a: 2, hint: "Air warms as it is squeezed by higher pressure at lower altitudes." },
            { q: "In which season are Berg Winds most common?", options: ["Mid-summer", "Late Spring", "Winter", "Early Autumn"], a: 2, hint: "They occur before the approach of a winter mid-latitude cyclone." },
            { q: "Coastal Lows bring what change to the weather as they pass a station?", options: ["Permanent sunshine", "From offshore dry winds to onshore fog/drizzle", "Tornadoes", "Dry heat for several days"], a: 1, hint: "The wind direction flips from the land to the sea." },
            { q: "What prevents summer rain from reaching the Western Cape?", options: ["The Kalahari High", "The South Atlantic High migrating south", "Line thunderstorms", "The warm Mozambique current"], a: 1, hint: "The high-pressure cell blocks the path of cold fronts." },
            { q: "What is indicated by an 'H' on a synoptic weather chart?", options: ["High Temperature", "High Pressure (Anticyclone)", "Heavy Rain", "Hurricane"], a: 1, hint: "It represents a center of high atmospheric pressure." },
            { q: "The South Atlantic High and South Indian High shift in which direction in Winter?", options: ["South", "North", "West", "They don't move"], a: 1, hint: "They follow the movement of the thermal equator." },
            { q: "Which current flows along the East Coast and supports the South Indian High?", options: ["Benguela Current", "Mozambique Current", "Agulhas Current", "West Wind Drift"], a: 2, hint: "It is a warm current from the tropics." },
            { q: "What occurs at the surface of a high-pressure cell?", options: ["Convergence", "Divergence", "Subsidence", "Vertical rising"], a: 1, hint: "Air moves away from the center of the cell." },
            { q: "What happens to the inversion layer in summer?", options: ["It disappears", "It moves higher, above the escarpment", "It sinks to sea level", "It becomes twice as thick"], a: 1, hint: "This allows moist air to finally flow into the interior." },
            { q: "Line thunderstorms are a common summer feature for which South African region?", options: ["The Coastal Belt", "The Western Cape", "The Interior Plateau", "The Kalahari Desert"], a: 2, hint: "This is where the cold and warm air masses collide." },
            { q: "What defines a 'Thermal Low'?", options: ["A low-pressure cell caused by intense ground heating", "A high-pressure cell in winter", "A cloud that produces hail", "A type of ocean current"], a: 0, hint: "Common over the land in summer." },
            { q: "Why do Berg Winds cause a fire hazard?", options: ["They are very wet", "They are hot, dry, and strong", "They only occur in forests", "They bring lightning"], a: 1, hint: "The extreme dryness and heat create perfect conditions for veld fires." },
            { q: "A 'Ridge' on a weather map is an extension of what?", options: ["Low pressure", "High pressure", "A mountain range", "A tropical storm"], a: 1, hint: "It looks like an elongated area of high pressure." },
            { q: "What air mass does the South Atlantic High bring to the West Coast?", options: ["Maritime Tropical (warm/moist)", "Maritime Polar (cold/moist)", "Continental Tropical (hot/dry)", "Continental Polar (cold/dry)"], a: 1, hint: "It originates over the cold Atlantic Ocean." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
