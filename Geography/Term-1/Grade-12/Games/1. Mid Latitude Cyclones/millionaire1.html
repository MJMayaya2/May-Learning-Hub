<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Mid-Latitude Cyclones Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Mid-Latitude Cyclones (Grade 12 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is another name for a Mid-Latitude Cyclone?", options: ["Tropical Cyclone", "Extra-tropical Cyclone", "Thermal Low", "Tornado"], a: 1, hint: "They occur outside the tropics in the temperate zones." },
            { q: "In which wind belt do Mid-Latitude Cyclones primarily travel?", options: ["Trade Winds", "Polar Easterlies", "Westerlies", "Doldrums"], a: 2, hint: "They move from West to East." },
            { q: "Which stage of development is characterized by the formation of a 'wave' along the polar front?", options: ["Mature Stage", "Initial Stage", "Occluded Stage", "Degenerating Stage"], a: 1, hint: "It is the very beginning of the system." },
            { q: "What is the pressure at the center of a Mid-Latitude Cyclone?", options: ["High Pressure", "Low Pressure", "Standard Pressure", "Varies significantly"], a: 1, hint: "It is a spiraling inward system." },
            { q: "Which front moves faster in a Mid-Latitude Cyclone?", options: ["Warm Front", "Cold Front", "They move at the same speed", "Neither moves"], a: 1, hint: "The colder, denser air pushes more aggressively." },
            { q: "What occurs during the 'Occluded Stage'?", options: ["The wave begins to form", "The cold front overtakes the warm front", "Rain stops completely", "The cyclone reaches the equator"], a: 1, hint: "The warm air is lifted completely off the ground." },
            { q: "In the Southern Hemisphere, air rotates in which direction around a Mid-Latitude Cyclone?", options: ["Clockwise", "Anticlockwise", "Straight inwards", "Upwards only"], a: 0, hint: "Think of the Coriolis effect on low pressure in the south." },
            { q: "Which clouds are typically associated with a Cold Front?", options: ["Stratus", "Cirrus", "Cumulonimbus", "Altostratus"], a: 2, hint: "These clouds bring heavy, stormy rain." },
            { q: "What happens to the air pressure as a Cold Front arrives?", options: ["It stays the same", "It drops to its lowest and then increases", "It increases steadily", "It drops and stays low"], a: 1, hint: "The arrival of dense, cold air causes a sharp change." },
            { q: "In South Africa, Mid-Latitude Cyclones primarily affect weather during which season?", options: ["Summer", "Spring", "Winter", "Autumn"], a: 2, hint: "This is when the pressure belts shift northwards." },
            { q: "Which region of South Africa receives most of its rain from Mid-Latitude Cyclones?", options: ["Limpopo", "Gauteng", "Western Cape", "Mpumalanga"], a: 2, hint: "This area has a Mediterranean climate with winter rainfall." },
            { q: "What is the typical diameter of a large Mid-Latitude Cyclone?", options: ["100 km", "500 km", "Up to 3000 km", "10,000 km"], a: 2, hint: "These are massive summary weather systems." },
            { q: "What type of rain is associated with a Warm Front?", options: ["Heavy thunderstorms", "Gentle, prolonged rain", "Hail", "No rain, just wind"], a: 1, hint: "Nimbostratus clouds are usually the cause here." },
            { q: "What is the 'Warm Sector'?", options: ["The area ahead of the warm front", "The area behind the cold front", "The area between the cold and warm fronts", "The center of the eye"], a: 2, hint: "It is a wedge of warm air near the surface." },
            { q: "Which of the following is a necessary condition for the formation of these cyclones?", options: ["Warm tropical oceans", "Interaction of cold polar air and warm subtropical air", "Extreme heat over land", "Very low humidity"], a: 1, hint: "It requires a temperature contrast at the polar front." },
            { q: "What happens to temperature when a cold front passes over a station?", options: ["It increases", "It decreases sharply", "It stays the same", "It fluctuates every hour"], a: 1, hint: "Cold, dense air replaces the warmer air." },
            { q: "Which stage of the cyclone is considered its strongest or most intense?", options: ["Initial Stage", "Mature Stage", "Occluded Stage", "Dissipating Stage"], a: 1, hint: "Both fronts are well-defined and the pressure is lowest." },
            { q: "On a synoptic map, a line with triangles represents what?", options: ["Warm Front", "Cold Front", "Occluded Front", "Isobar"], a: 1, hint: "The 'teeth' point in the direction of movement." },
            { q: "What defines a 'Cold Occlusion'?", options: ["Warm air is trapped on the ground", "The cold front lifts the warm front and the air ahead of it", "The cyclone moves over a warm ocean", "The sun blocks the clouds"], a: 1, hint: "This is the most common type of occlusion." },
            { q: "What is the 'Polar Front'?", options: ["The center of the North Pole", "The boundary between cold polar air and warm subtropical air", "The edge of a tropical cyclone", "A mountain range in Antarctica"], a: 1, hint: "It is the 'birthplace' of mid-latitude cyclones." },
            { q: "How many cyclones usually occur in a 'family'?", options: ["1", "3 to 5", "Exactly 10", "100"], a: 1, hint: "They follow each other a few days apart." },
            { q: "In a Warm Front, which clouds are the first to be seen as it approaches?", options: ["Cumulonimbus", "Wispy Cirrus", "Stratus", "Fog"], a: 1, hint: "These are high-altitude, thin clouds." },
            { q: "What happens to wind direction as a cold front passes (in the Southern Hemisphere)?", options: ["Backs from NW to SW", "Veers from SE to NE", "Wind stops completely", "Blows from the North"], a: 0, hint: "The wind shifts direction as the fronts move through." },
            { q: "Why are these cyclones also called 'Extra-tropical'?", options: ["Because they are extra large", "Because they occur outside the tropics", "Because they have extra rain", "Because they move fast"], a: 1, hint: "Extra- means outside or beyond." },
            { q: "Which front is associated with Nimbostratus clouds?", options: ["Cold Front", "Warm Front", "The ITCZ", "Occluded Front"], a: 1, hint: "These clouds produce steady, light to moderate rain." },
            { q: "Which air mass is described as 'retreating' in the mature stage?", options: ["Cold air behind the cold front", "Warm air in the sector", "Cool air ahead of the warm front", "Tropical air"], a: 2, hint: "The warm front is pushing into this air mass." },
            { q: "During which stage does the pressure start to rise again and the system weaken?", options: ["Mature Stage", "Occluded Stage", "Initial Stage", "Formation Stage"], a: 1, hint: "The temperature contrast is lost as air is lifted." },
            { q: "A Mid-Latitude Cyclone moves from West to East. This is called...", options: ["Westward drift", "Eastward migration", "Polar shift", "Coriolis spin"], a: 1, hint: "Think about the direction they head across the South Atlantic." },
            { q: "What kind of weather does the 'Warm Sector' bring?", options: ["Thunderstorms", "Clear or partly cloudy, mild weather", "Heavy snow", "Dust storms"], a: 1, hint: "This is the period between the two fronts passing." },
            { q: "What provides the energy for a Mid-Latitude Cyclone?", options: ["Latent heat from the ocean", "The temperature difference between air masses", "Solar heating of the ground", "Earth's magnetic field"], a: 1, hint: "It is driven by the contrast between cold and warm air." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
