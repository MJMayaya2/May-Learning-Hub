    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Mid-Latitude Cyclones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Geography: Mid-Latitude Cyclones</h1>
        <p class="game-subtitle">Match the characteristics, fronts, and weather conditions!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">General Characteristics</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Cold Front Weather</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Warm Front Weather</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Stages & Occlusions</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Spiraling low pressure systems common in temperate latitudes." }, { id: 1, text: "Mid-Latitude Cyclone" },
                { id: 2, text: "Direction in which these cyclones move across South Africa." }, { id: 2, text: "West to East" },
                { id: 3, text: "Pressure system associated with Mid-Latitude Cyclones." }, { id: 3, text: "Low Pressure (L)" },
                { id: 4, text: "The path or current that carries cyclones eastward." }, { id: 4, text: "Jet Stream" },
                { id: 5, text: "A group of 3-5 cyclones following one after another." }, { id: 5, text: "Family of Cyclones" },
                { id: 6, text: "Also known as temperate or extra-tropical cyclones." }, { id: 6, text: "Mid-Latitude Cyclone" },
                { id: 7, text: "Formation area between Polar and Ferrel cells." }, { id: 7, text: "Polar Front" },
                { id: 8, text: "The diameter of these large-scale systems (up to...)." }, { id: 8, text: "3000 km" },
                { id: 9, text: "The shape of the isobars in these systems." }, { id: 9, text: "Oval" },
                { id: 10, text: "Winds that steer these systems in the Southern Hemisphere." }, { id: 10, text: "Westerlies" }
            ],
            'topic2': [
                { id: 1, text: "Sharp drop in temperature and humidity after this passes." }, { id: 1, text: "Cold Front" },
                { id: 2, text: "Cloud type associated with heavy rain and storms." }, { id: 2, text: "Cumulonimbus" },
                { id: 3, text: "Winds shift from NW to SW during this process." }, { id: 3, text: "Backing (Southern Hemisphere)" },
                { id: 4, text: "Air pressure reaches its lowest point just before this arrival." }, { id: 4, text: "Cold Front" },
                { id: 5, text: "Precipitation type often seen with strong cold fronts." }, { id: 5, text: "Heavy Showers/Snow" },
                { id: 6, text: "Dense air that pushes warm air upwards." }, { id: 6, text: "Cold Air Mass" },
                { id: 7, text: "Condition of the sky after the cold front has passed." }, { id: 7, text: "Clearing/Clearer" },
                { id: 8, text: "Pressure change as dense cold air arrives." }, { id: 8, text: "Pressure Increases" },
                { id: 9, text: "Common term for Mid-Latitude Cyclones in South Africa." }, { id: 9, text: "Cold Fronts" },
                { id: 10, text: "Narrow band of intense weather." }, { id: 10, text: "Cold Front Band" }
            ],
            'topic3': [
                { id: 1, text: "Gradual increase in temperature and humidity." }, { id: 1, text: "Warm Front" },
                { id: 2, text: "First clouds to appear, looking thin and wispy." }, { id: 2, text: "Cirrus" },
                { id: 3, text: "Rain type: Continuous and light to moderate." }, { id: 3, text: "Gentle/Steady Rain" },
                { id: 4, text: "Cloud type responsible for steady frontal rain." }, { id: 4, text: "Nimbostratus" },
                { id: 5, text: "Warm air is forced to glide over this type of air." }, { id: 5, text: "Cooler/Retreating Air" },
                { id: 6, text: "Air pressure trend as a warm front approaches." }, { id: 6, text: "Pressure Drops" },
                { id: 7, text: "Sector between the warm and cold fronts." }, { id: 7, text: "Warm Sector" },
                { id: 8, text: "Atmospheric condition: Calm and mild." }, { id: 8, text: "Post-Warm Front" },
                { id: 9, text: "Clouds that follow Cirrus as the front gets closer." }, { id: 9, text: "Stratus" },
                { id: 10, text: "The leading edge of a warm air mass." }, { id: 10, text: "Warm Front" }
            ],
            'topic4': [
                { id: 1, text: "The phase when the cold front overtakes the warm front." }, { id: 1, text: "Occluded Stage" },
                { id: 2, text: "The very first stage of cyclone development." }, { id: 2, text: "Initial Stage" },
                { id: 3, text: "Stage where the 'wave' is fully formed with fronts." }, { id: 3, text: "Mature Stage" },
                { id: 4, text: "Overtaking cold front lifts the warm front off the ground." }, { id: 4, text: "Cold Occlusion" },
                { id: 5, text: "Overtaking cold front is lifted by colder retreating air." }, { id: 5, text: "Warm Occlusion" },
                { id: 6, text: "The final stage where the cyclone loses energy." }, { id: 6, text: "Dissipating Stage" },
                { id: 7, text: "Combines stormy weather with wide cloud areas." }, { id: 7, text: "Occluded Front" },
                { id: 8, text: "Most common type of occlusion." }, { id: 8, text: "Cold Occlusion" },
                { id: 9, text: "Point where the cold, warm, and occluded fronts meet." }, { id: 9, text: "Triple Point" },
                { id: 10, text: "Movement that creates the low pressure 'kink' or wave." }, { id: 10, text: "Cyclogenesis" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Well done! Grade 12 Geography: Mid-Latitude Cyclones Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
