        .player-tabs { display: flex; justify-content: center; gap: 0.5rem; max-width: 1000px; margin: 0 auto 1.5rem; padding: 0 10px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 100px; background: #e6f0fa; color: #004080; border: 2px solid #b3d4ff; padding: 0.8rem; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .btn-incorrect { flex: 1; background: #dc3545; color: #fff; border: none; padding: 1rem; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }

        .steal-area { display: none; background: #fff3cd; border: 2px solid #ffeeba; padding: 1.5rem; border-radius: 8px; margin-top: 1rem; }
        .steal-buttons { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
        .btn-steal { flex: 1; min-width: 100px; background: #ffc107; color: #000; border: none; padding: 0.8rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    <header class="game-header">
        <h1 class="game-title">Grade 12 Geography Jeopardy</h1>
        <p class="game-subtitle">Topic: Mid-Latitude Cyclones (Chapter 1)</p>
    </header>

    <section class="name-setup" id="nameSetupSection">
        <div class="name-box">
            <h2>Enter Player Names</h2>
            <div class="name-grid">
                <input class="name-input" id="nameInput-0" type="text" maxlength="20" placeholder="Player 1" />
                <input class="name-input" id="nameInput-1" type="text" maxlength="20" placeholder="Player 2" />
                <input class="name-input" id="nameInput-2" type="text" maxlength="20" placeholder="Player 3" />
                <input class="name-input" id="nameInput-3" type="text" maxlength="20" placeholder="Player 4" />
            </div>
            <div class="name-actions">
                <button class="btn-save" id="btnSaveNames" onclick="savePlayerNames()">Save Names</button>
                <button class="btn-edit" id="btnEditNames" onclick="showNameEditor()">Edit Names</button>
                <button class="btn-reset" onclick="resetPlayerNames()">Reset</button>
            </div>
        </div>
    </section>

    <div class="player-tabs">
        <button class="tab-btn active" id="tab-0" onclick="switchPlayer(0)">Player 1</button>
        <button class="tab-btn" id="tab-1" onclick="switchPlayer(1)">Player 2</button>
        <button class="tab-btn" id="tab-2" onclick="switchPlayer(2)">Player 3</button>
        <button class="tab-btn" id="tab-3" onclick="switchPlayer(3)">Player 4</button>
    </div>

    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack">
            <div class="player-slide">
                <div class="score-board"><span id="label-0">Player 1</span>: <span id="score-0">0</span></div>
                <div class="jeopardy-board" id="board-0"></div>
            </div>
            <div class="player-slide">
                <div class="score-board"><span id="label-1">Player 2</span>: <span id="score-1">0</span></div>
                <div class="jeopardy-board" id="board-1"></div>
            </div>
            <div class="player-slide">
                <div class="score-board"><span id="label-2">Player 3</span>: <span id="score-2">0</span></div>
                <div class="jeopardy-board" id="board-2"></div>
            </div>
            <div class="player-slide">
                <div class="score-board"><span id="label-3">Player 4</span>: <span id="score-3">0</span></div>
                <div class="jeopardy-board" id="board-3"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="questionModal">
        <div class="modal-content">
            <div class="modal-category" id="modalCategory">Category</div>
            <div class="modal-question" id="modalQuestion">Question</div>
            <button class="btn-reveal" id="btnReveal" onclick="revealAnswer()">Reveal Answer</button>
            <div class="modal-answer-area" id="answerArea">
                <div class="modal-answer" id="modalAnswer">Answer</div>
                <div class="judgement-area" id="judgementArea">
                    <p>Did <strong id="activePlayerName">Player</strong> get it right?</p>
                    <div class="judgement-buttons">
                        <button class="btn-incorrect" onclick="judgeActivePlayer(false)">Wrong</button>
                        <button class="btn-correct" onclick="judgeActivePlayer(true)">Correct!</button>
                    </div>
                </div>
                <div class="steal-area" id="stealArea">
                    <div class="steal-title">STEAL OPPORTUNITY!</div>
                    <div class="steal-buttons" id="stealButtons"></div>
                </div>
            </div>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        // Unique question banks based on Chapter 1 Grade 12
        const p1Cats = [
            { name: "General Traits", questions: [
                { points: 10, q: "Common South African name for Mid-Latitude Cyclones.", a: "Cold fronts" },
                { points: 20, q: "Maximum diameter of these systems (in km).", a: "3 000 km" },
                { points: 30, q: "Direction these systems move with the jet stream.", a: "Eastwards" },
                { points: 40, q: "Name for a group of 3-5 cyclones following each other.", a: "Family of cyclones" },
                { points: 50, q: "Term used because they occur outside the tropics.", a: "Extra-tropical cyclones" }
            ]},
            { name: "Polar Front", questions: [
                { points: 10, q: "The boundary where cold polar and warm subtropical air meet.", a: "Polar Front" },
                { points: 20, q: "Latitude range (N/S) where these systems usually form.", a: "30° to 60°" },
                { points: 30, q: "Type of air mass coming from the subtropical regions.", a: "Warm air mass" },
                { points: 40, q: "The process of a front beginning to form.", a: "Frontogenesis" },
                { points: 50, q: "Stage where warm and cold air masses flow past each other without mixing.", a: "Formative stage" }
            ]},
            { name: "Mature Stage", questions: [
                { points: 10, q: "Pressure system found at the center of the mature cyclone.", a: "Low Pressure" },
                { points: 20, q: "The shape of isobars on a map for these cyclones.", a: "Oval" },
                { points: 30, q: "The sector of warm air found between the two fronts.", a: "Warm sector" },
                { points: 40, q: "Front that moves faster than the other in a mature system.", a: "Cold front" },
                { points: 50, q: "Air pressure is at its lowest at this point of the lifecycle.", a: "Mature stage" }
            ]},
            { name: "Cold Front Weather", questions: [
                { points: 10, q: "Dense air mass that undercuts the warmer air mass.", a: "Cold air mass" },
                { points: 20, q: "Main cloud type that produces heavy storms at a cold front.", a: "Cumulonimbus" },
                { points: 30, q: "Change in temperature (increase or decrease) behind the cold front.", a: "Decrease" },
                { points: 40, q: "Does humidity increase or decrease after the cold front passes?", a: "Decrease" },
                { points: 50, q: "Precipitation type often seen during severe winter cold fronts in SA.", a: "Snow" }
            ]}
        ];

        const p2Cats = [
            { name: "Formation Factors", questions: [
                { points: 10, q: "High-altitude winds that carry cyclones across the ocean.", a: "Jet stream" },
                { points: 20, q: "Boundary where air masses with different temperatures collide.", a: "The Polar Front" },
                { points: 30, q: "Air mass coming from the high-latitude polar regions.", a: "Cold polar air" },
                { points: 40, q: "Term for these because they are found in middle latitudes.", a: "Temperate cyclones" },
                { points: 50, q: "Interval (in days) between cyclones in a typical family.", a: "2 to 8 days" }
            ]},
            { name: "Wave Stage", questions: [
                { points: 10, q: "What develops on the polar front to signify the wave stage?", a: "A 'kink' or wave" },
                { points: 20, q: "Movement of air in the Southern Hemisphere around the low.", a: "Clockwise" },
                { points: 30, q: "Stage where the 'spiraling' of air masses truly begins.", a: "Wave stage / Immature stage" },
                { points: 40, q: "Why does the air begin to spiral?", a: "Coriolis force and pressure gradient" },
                { points: 50, q: "Is the warm sector largest or smallest during the wave stage?", a: "Largest (it begins narrowing later)" }
            ]},
            { name: "Warm Front Weather", questions: [
                { points: 10, q: "Type of rain (heavy or gentle) associated with a warm front.", a: "Gentle rain" },
                { points: 20, q: "Wispy clouds that are the first sign of an approaching warm front.", a: "Cirrus" },
                { points: 30, q: "The lighter air mass that rises gently over the cold air.", a: "Warm air mass" },
                { points: 40, q: "Cloud type often associated with steady rain at a warm front.", a: "Nimbostratus" },
                { points: 50, q: "What happens to temperature after the warm front passes?", a: "It increases" }
            ]},
            { name: "Occlusions", questions: [
                { points: 10, q: "Front formed when a cold front lifts a warm sector off the ground.", a: "Occluded front" },
                { points: 20, q: "Occlusion where the overtaking cold air is the coldest.", a: "Cold occlusion" },
                { points: 30, q: "Occlusion where the air ahead of the warm front is the coldest.", a: "Warm occlusion" },
                { points: 40, q: "Which type of occlusion is more common globally?", a: "Cold occlusion" },
                { points: 50, q: "Weather in a cold occlusion is most similar to which front?", a: "Cold front" }
            ]}
        ];

        const p3Cats = [
            { name: "Synoptic Maps", questions: [
                { points: 10, q: "Line on a map with blue triangles.", a: "Cold front" },
                { points: 20, q: "Line on a map with red semi-circles.", a: "Warm front" },
                { points: 30, q: "Lines on a weather map joining places of equal pressure.", a: "Isobars" },
                { points: 40, q: "Line with alternating triangles and semi-circles.", a: "Occluded front" },
                { points: 50, q: "Typical low-pressure reading at the center of a mature cyclone.", a: "E.g., 980-1000 hPa" }
            ]},
            { name: "Frontal Slopes", questions: [
                { points: 10, q: "Which front has a steeper slope (Cold or Warm)?", a: "Cold front" },
                { points: 20, q: "Reason for the steepness of the cold front slope.", a: "Cold air is denser and undercuts" },
                { points: 30, q: "Which front covers a wider area of cloudiness?", a: "Warm front" },
                { points: 40, q: "Relationship between slope steepness and rainfall intensity.", a: "Steeper slope = heavier rain" },
                { points: 50, q: "Does the cold front undercut or overlie the warm air?", a: "Undercuts" }
            ]},
            { name: "Stage: Dissipation", questions: [
                { points: 10, q: "The term for a front that is disappearing or weakening.", a: "Frontolysis" },
                { points: 20, q: "What happens to the temperature gradient in the final stage?", a: "It disappears / levels out" },
                { points: 30, q: "The final stage of the mid-latitude cyclone lifecycle.", a: "Dissipation" },
                { points: 40, q: "Why does the cyclone eventually 'die'?", a: "Warm air is no longer rising / energy lost" },
                { points: 50, q: "What kind of weather is typical during dissipation?", a: "Clearing skies" }
            ]},
            { name: "South Africa Context", questions: [
                { points: 10, q: "Season when these cyclones most commonly hit South Africa.", a: "Winter" },
                { points: 20, q: "Province most frequently receiving rain from these systems.", a: "Western Cape" },
                { points: 30, q: "System that pushes these cyclones southwards in summer.", a: "South Atlantic High" },
                { points: 40, q: "Typical movement direction of cold fronts over SA.", a: "West to East" },
                { points: 50, q: "Condition of the sea (Rough or Calm) when a cyclone passes the coast.", a: "Rough / Stormy" }
            ]}
        ];

        const p4Cats = [
            { name: "Advanced Traits", questions: [
                { points: 10, q: "Size comparison: Are these larger or smaller than tropical cyclones?", a: "Larger" },
                { points: 20, q: "What do we call the 'gap' between two cyclones in a family?", a: "Ridge of high pressure" },
                { points: 30, q: "How many fronts must a system have to be a mid-latitude cyclone?", a: "Two (Cold and Warm)" },
                { points: 40, q: "Primary energy source for the storm system.", a: "Latent heat / Temperature differences" },
                { points: 50, q: "Upper-air feature that triggers frontogenesis.", a: "Jet stream disturbance" }
            ]},
            { name: "Air Masses", questions: [
                { points: 10, q: "Characteristics of polar air (Warm/Dry or Cold/Dry)?", a: "Cold and Dry" },
                { points: 20, q: "Characteristics of subtropical air (Warm/Moist or Cold/Moist)?", a: "Warm and Moist" },
                { points: 30, q: "Which air mass is denser (Cold or Warm)?", a: "Cold air mass" },
                { points: 40, q: "Does dense air rise or sink beneath lighter air?", a: "Sinks" },
                { points: 50, q: "The meeting point of these air masses creates what?", a: "A front" }
            ]},
            { name: "Occlusion weather", questions: [
                { points: 10, q: "Is the warm sector on the ground or in the air during occlusion?", a: "In the air" },
                { points: 20, q: "Weather in a warm occlusion is most similar to which front?", a: "Warm front" },
                { points: 30, q: "Cloud mix found at an occluded front.", a: "Mix of Cumulonimbus and Stratus" },
                { points: 40, q: "Stage where the cyclone is at its 'oldest' point before decay.", a: "Occlusion stage" },
                { points: 50, q: "Change in pressure during the occlusion stage.", a: "Starts to rise" }
            ]},
            { name: "Pressure & Wind", questions: [
                { points: 10, q: "What happens to pressure as the cold front arrives?", a: "It drops to its lowest" },
                { points: 20, q: "Wind direction change (backing or veering) in the SH behind the front.", a: "Backing (e.g., NW to SW)" },
                { points: 30, q: "Do winds speed up or slow down near the cold front?", a: "Speed up" },
                { points: 40, q: "Term for the sudden shift in wind direction.", a: "Wind shear / backing" },
                { points: 50, q: "The sector of air mass found behind the cold front.", a: "Cold sector" }
            ]}
        ];

        const gameData = [p1Cats, p2Cats, p3Cats, p4Cats];
        let currentPlayerIndex = 0;
        let scores = [0, 0, 0, 0];
        let activePointValue = 0;
        let activeTileButton = null;
        let playerNames = ["Player 1", "Player 2", "Player 3", "Player 4"];

        const carouselTrack = document.getElementById('carouselTrack');
        const modal = document.getElementById('questionModal');
        const answerArea = document.getElementById('answerArea');
        const btnReveal = document.getElementById('btnReveal');

        function savePlayerNames() {
            for (let i = 0; i < 4; i++) {
                const val = document.getElementById(`nameInput-${i}`).value.trim();
                if (val) playerNames[i] = val;
                document.getElementById(`tab-${i}`).innerText = playerNames[i];
                document.getElementById(`label-${i}`).innerText = playerNames[i];
            }
            document.getElementById('nameSetupSection').classList.add('hidden');
            document.getElementById('btnEditNames').style.display = 'inline-block';
        }

        function showNameEditor() { document.getElementById('nameSetupSection').classList.remove('hidden'); }

        function buildBoards() {
            for (let p = 0; p < 4; p++) {
                const board = document.getElementById(`board-${p}`);
                board.innerHTML = '';
                const cats = gameData[p];
                cats.forEach(c => {
                    let h = document.createElement('div');
                    h.className = 'category-header'; h.innerText = c.name; board.appendChild(h);
                });
                for (let r = 0; r < 5; r++) {
                    cats.forEach(c => {
                        let btn = document.createElement('button');
                        btn.className = 'point-btn'; btn.innerText = c.questions[r].points;
                        btn.onclick = () => openQuestion(c.name, c.questions[r], btn, p);
                        board.appendChild(btn);
                    });
                }
            }
        }

        function switchPlayer(idx) {
            currentPlayerIndex = idx;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${idx}`).classList.add('active');
            carouselTrack.style.transform = `translateX(-${idx * 25}%)`;
        }

        function openQuestion(catName, qData, btn, pIdx) {
            if (pIdx !== currentPlayerIndex) return;
            activePointValue = qData.points; activeTileButton = btn;
            document.getElementById('modalCategory').innerText = `${playerNames[pIdx]} | ${catName}`;
            document.getElementById('modalQuestion').innerText = qData.q;
            document.getElementById('modalAnswer').innerText = qData.a;
            document.getElementById('activePlayerName').innerText = playerNames[pIdx];
            btnReveal.style.display = 'block'; answerArea.style.display = 'none'; modal.style.display = 'flex';
        }

        function revealAnswer() { btnReveal.style.display = 'none'; answerArea.style.display = 'block'; }

        function judgeActivePlayer(correct) {
            if (correct) { scores[currentPlayerIndex] += activePointValue; updateScore(currentPlayerIndex); closeModal(); } 
            else { showSteal(); }
        }

        function showSteal() {
            const stealArea = document.querySelector('.steal-area'); stealArea.style.display = 'block';
            const container = document.getElementById('stealButtons'); container.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                if (i !== currentPlayerIndex) {
                    let b = document.createElement('button'); b.className = 'btn-steal'; b.innerText = playerNames[i];
                    b.onclick = () => { scores[i] += Math.floor(activePointValue/2); updateScore(i); closeModal(); };
                    container.appendChild(b);
                }
            }
            let none = document.createElement('button'); none.className = 'btn-incorrect'; none.innerText = "No one"; none.onclick = closeModal; container.appendChild(none);
        }

        function updateScore(i) { document.getElementById(`score-${i}`).innerText = scores[i]; }
        function closeModal() { 
            activeTileButton.innerText = ""; activeTileButton.disabled = true;
