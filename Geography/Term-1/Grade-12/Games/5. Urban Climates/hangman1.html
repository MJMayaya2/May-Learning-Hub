<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Geography Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Geography Hangman Challenge</h1>
        <p class="game-subtitle">Grade 12: Urban Climates (Chapter 5)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "HEAT ISLAND", topic: "Introduction", hint: "An urban area that is significantly warmer than its surrounding rural areas." },
            { word: "POLLUTION DOME", topic: "Pollution", hint: "A trapped mass of polluted air over a city or industrial area." },
            { word: "ALBEDO", topic: "Causes", hint: "The reflectivity of a surface; concrete and tar have a low ____." },
            { word: "DEVEGETATION", topic: "Causes", hint: "The removal of plants and trees, which reduces natural cooling." },
            { word: "TARMAC", topic: "Causes", hint: "Material used for roads that absorbs and retains a lot of solar heat." },
            { word: "INVERSION", topic: "Structure", hint: "A layer of warm air that traps cooler air and pollution near the ground." },
            { word: "CBD", topic: "Structure", hint: "The peak of the heat island is usually found over this central area." },
            { word: "NUCLEI", topic: "Weather", hint: "Pollutant particles act as condensation ____, increasing city rain." },
            { word: "ISOTHERM", topic: "Synoptic", hint: "A line on a map joining places with the same temperature." },
            { word: "EVAPOTRANSPIRATION", topic: "Causes", hint: "Process of cooling through plant moisture, which cities lack." },
            { word: "ARTIFICIAL", topic: "Causes", hint: "Heat generated by cars, industry, and air conditioning is ____ heat." },
            { word: "FRICTION", topic: "Winds", hint: "Tall buildings cause this, slowing down wind speeds at street level." },
            { word: "REFORESTATION", topic: "Strategies", hint: "Planting trees in cities to reduce the heat island effect." },
            { word: "SUBURBS", topic: "Structure", hint: "Residential areas that are typically cooler than the CBD." },
            { word: "CONCRETE", topic: "Causes", hint: "Common building material with high heat storage capacity." },
            { word: "NIGHT", topic: "Weather", hint: "The heat island effect is often most noticeable at this time." },
            { word: "HEALTH", topic: "Impact", hint: "Pollution domes cause breathing difficulties and asthma ____ issues." },
            { word: "PRECIPITATION", topic: "Weather", hint: "This increases in cities due to rising warm air and dust particles." },
            { word: "CANYON", topic: "Structure", hint: "An urban ____ is formed by tall buildings trapping heat in streets." },
            { word: "LIGHT COLOUR", topic: "Strategies", hint: "Using these types of paints on roofs helps reflect solar heat." },
            { word: "HUMAN ACTIVITY", topic: "Causes", hint: "Dense populations in cities increase heat from ____." },
            { word: "FOSSIL FUELS", topic: "Pollution", hint: "Burning these for energy creates the smoke in a pollution dome." },
            { word: "DOMESTIC FIRES", topic: "Pollution", hint: "A source of air pollution in cities, especially in winter." },
            { word: "EXHAUST FUMES", topic: "Pollution", hint: "Pollution generated by cars in densely populated urban areas." },
            { word: "TAX REBATES", topic: "Strategies", hint: "Financial incentives for businesses that plant greenery on properties." },
            { word: "SMOKE", topic: "Pollution", hint: "A major component of the air trapped in a pollution dome." },
            { word: "WETTER", topic: "Weather", hint: "General characteristic of urban weather compared to rural areas." },
            { word: "LESS WINDY", topic: "Weather", hint: "General characteristic of city air movement due to buildings." },
            { word: "HEAT FATIGUE", topic: "Impact", hint: "A physical condition caused by excessive heat in cities." },
            { word: "GREENBELTS", topic: "Strategies", hint: "Areas of vegetation preserved around or within a city." },
            { word: "ALBEDO EFFECT", topic: "Causes", hint: "How different surfaces reflect or absorb sun rays." },
            { word: "TURBULENCE", topic: "Winds", hint: "Chaotic air movement caused by wind hitting tall buildings." },
            { word: "SURFACE AREA", topic: "Causes", hint: "Tall buildings provide a larger ____ to absorb the sun's rays." },
            { word: "ABSORPTION", topic: "Causes", hint: "Dark surfaces like tar are efficient at heat ____." },
            { word: "RADIATION", topic: "Weather", hint: "Heat trapped at night by the 'blanket' of city pollution." },
            { word: "ASTHMA", topic: "Impact", hint: "A respiratory condition worsened by urban air pollution." },
            { word: "BLOCKED", topic: "Structure", hint: "In a pollution dome, normal air circulation is ____." },
            { word: "INSOLATION", topic: "Pollution", hint: "Incoming sunlight that is sometimes blocked by a pollution dome." },
            { word: "ENERGY DEMAND", topic: "Impact", hint: "This increases for air conditioning as cities get hotter." },
            { word: "PAVING", topic: "Causes", hint: "Large areas of hard ____ prevent moisture from cooling the ground." },
            { word: "SHADE", topic: "Strategies", hint: "Creating this in parking areas helps keep cities cooler." },
            { word: "REVEGETATE", topic: "Strategies", hint: "To add plants back into an urban environment." },
            { word: "MICROCLIMATE", topic: "Terminology", hint: "The specific local climate of a large city." },
            { word: "SKYLINE", topic: "Structure", hint: "The outline of tall buildings that traps heat near the ground." },
            { word: "ISLAND", topic: "Terminology", hint: "Metaphor used because the hot city is surrounded by 'cool' rural areas." },
            { word: "RURAL", topic: "Comparison", hint: "The natural countryside area surrounding the urban heat island." },
            { word: "TEMPERATURE", topic: "Weather", hint: "This is significantly higher in the CBD than in rural areas." },
            { word: "CLOUDS", topic: "Weather", hint: "These form more easily over cities due to rising warm air." },
            { word: "STAGNANT", topic: "Pollution", hint: "Air that does not move, common in a pollution dome." },
            { word: "TRAPPED", topic: "Structure", hint: "Masses of air are ____ by the inversion layer above." },
            { word: "DOMESTIC", topic: "Pollution", hint: "Pollution from household activities like cooking and heating." },
            { word: "METEOROLOGY", topic: "Terminology", hint: "The scientific study of the atmosphere and urban climates." },
            { word: "REFLECTIVITY", topic: "Causes", hint: "Another word for albedo." },
            { word: "GREEN ROOFS", topic: "Strategies", hint: "A strategy where plants are grown on the tops of buildings." },
            { word: "VENTILATION", topic: "Structure", hint: "Cities often have poor ____ because buildings block wind." },
            { word: "CONVECTION", topic: "Weather", hint: "Process of rising warm air that carries city pollution upwards." },
            { word: "DISTRIBUTION", topic: "Structure", hint: "The horizontal ____ of heat shows a peak at the CBD." },
            { word: "CAPS", topic: "Terminology", hint: "The curriculum we are following for this Grade 12 Geography topic." },
            { word: "RETAINED", topic: "Causes", hint: "Heat that is held in city materials long after sunset." },
            { word: "CLIMATE", topic: "Terminology", hint: "The long-term weather patterns specific to an urban area." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Urban Climate Pro!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for Urban Heat Islands!";
            document.getElementById('modalWord').innerText = "CITY EXPERT";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
