<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Urban Climates Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Urban Climates (Grade 12 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the phenomenon where a city is significantly warmer than its surrounding rural areas?", options: ["Greenhouse Effect", "Urban Heat Island", "Global Warming", "Pollution Dome"], a: 1, hint: "It creates a literal 'island' of heat over the metropolis." },
            { q: "What is the primary reason cities are generally hotter than rural areas?", options: ["Higher altitude", "Devegetation and artificial surfaces", "Lack of people", "Closeness to the ocean"], a: 1, hint: "Cities replace plants with tar, bricks, and concrete." },
            { q: "What does 'Albedo' refer to?", options: ["The temperature of a surface", "The ability of a surface to reflect sunlight", "The amount of rain in a city", "The speed of the wind"], a: 1, hint: "Dark surfaces like tar have a very low value." },
            { q: "Why does concrete and tar increase urban heat?", options: ["They have a high albedo", "They absorb and retain heat due to low albedo", "They release moisture into the air", "They block the wind"], a: 1, hint: "Darker materials 'trap' energy from the sun." },
            { q: "How do tall buildings in a city center (CBD) affect temperature?", options: ["They cool the ground with shade", "They trap heat near the ground through reflection", "They increase wind speed", "They absorb no heat"], a: 1, hint: "Heat 'bounces' between buildings instead of escaping." },
            { q: "Why is precipitation often higher in cities than in rural areas?", options: ["Cities are closer to clouds", "Pollutant particles act as condensation nuclei", "Tall buildings push clouds up", "Cities have more rivers"], a: 1, hint: "Dust and smoke provide a solid surface for raindrops to form." },
            { q: "What is a 'Pollution Dome'?", options: ["A protective cover over a city", "A trapped mass of polluted air over an urban area", "A type of modern skyscraper", "The center of a tropical cyclone"], a: 1, hint: "It is a dome-shaped layer of smog and waste gases." },
            { q: "What causes the formation of a pollution dome?", options: ["Strong winds", "An inversion layer trapping polluted air", "Heavy snowfall", "The lack of factories"], a: 1, hint: "A layer of warm air acts as a 'lid' over the city." },
            { q: "How do buildings affect wind speed in a city?", options: ["They increase wind speed everywhere", "Buildings cause friction, which slows wind speeds", "They have no effect on wind", "They make the air stop moving entirely"], a: 1, hint: "The physical structure of the city creates a 'rough' surface." },
            { q: "What is a 'Heat Dome'?", options: ["Another name for a sun hat", "The area of heated air above a city", "A type of volcanic crater", "A glasshouse for plants"], a: 1, hint: "It refers to the vertical extent of the heat island." },
            { q: "How does air pollution contribute to the Urban Heat Island effect?", options: ["It reflects all sunlight away", "It helps to trap heat near the surface", "It cools the atmosphere", "It stops the rain"], a: 1, hint: "Pollutants act like a blanket for terrestrial radiation." },
            { q: "Which part of a city usually experiences the highest temperatures?", options: ["The residential suburbs", "The Central Business District (CBD)", "The parkland", "The industrial edge"], a: 1, hint: "This area has the highest density of artificial surfaces." },
            { q: "What is a negative health impact of pollution domes?", options: ["Vitamin D deficiency", "Breathing difficulties and asthma attacks", "Better hearing", "Increased energy levels"], a: 1, hint: "Trapped smog is very harmful to the lungs." },
            { q: "Why does heat get trapped at night in a city more than in a forest?", options: ["The moon is brighter over cities", "Artificial surfaces slowly release stored heat", "Cars are always driving", "Buildings are made of ice"], a: 1, hint: "Tar and concrete act like 'batteries' that release heat after sunset." },
            { q: "How does devegetation (removing trees) affect city climate?", options: ["Increases evaporation", "Reduces cooling from evapotranspiration", "Increases oxygen", "Decreases temperature"], a: 1, hint: "Plants provide natural cooling through moisture release." },
            { q: "Which strategy involves using lighter-coloured materials for paving?", options: ["Albedo management", "Pollution control", "Traffic calming", "Urban sprawl"], a: 0, hint: "Light colors reflect more solar radiation." },
            { q: "What is 'Reforestation/Revegetation' in a city context?", options: ["Cutting down old trees", "Planting more trees and plants to cool the area", "Building wooden houses", "Storing seeds in a vault"], a: 1, hint: "Increasing the 'green' in the 'urban' area." },
            { q: "How can tax rebates help reduce the heat island effect?", options: ["By encouraging people to buy more cars", "By granting rebates for properties with plants and green roofs", "By taxing trees", "By paying people to stay indoors"], a: 1, hint: "Governments reward businesses for being environmentally friendly." },
            { q: "Incoming sunlight (insolation) in a city with a pollution dome is...", options: ["Increased", "Blocked or reduced during the day", "Turned into oxygen", "Unchanged"], a: 1, hint: "The 'haze' prevents some light from reaching the ground." },
            { q: "What is an 'Isotherm' on an urban climate map?", options: ["A line connecting points of equal pressure", "A line connecting points of equal temperature", "A line showing wind direction", "A border between countries"], a: 1, hint: "'Iso' means equal, 'therm' means heat." },
            { q: "What happens to the demand for energy in an Urban Heat Island during summer?", options: ["It decreases", "It increases due to air conditioning needs", "It stays the same", "Electricity becomes free"], a: 1, hint: "People use more power to stay cool." },
            { q: "What is the effect of tall buildings on the 'surface area' available to absorb heat?", options: ["It decreases surface area", "It creates a larger surface area to absorb sun rays", "It makes the earth flat", "It creates no change"], a: 1, hint: "Vertical walls provide more space for the sun to hit." },
            { q: "Pollution domes are most dangerous during which atmospheric condition?", options: ["A strong hurricane", "A temperature inversion", "A heavy rainstorm", "High wind speeds"], a: 1, hint: "This condition stops the air from moving vertically." },
            { q: "In general, cities are hotter, wetter and...", options: ["More windy than rural areas", "Less windy than rural areas", "Equally windy", "Frozen"], a: 1, hint: "Friction from buildings plays a role here." },
            { q: "What is the 'Green Roof' strategy?", options: ["Painting roofs green", "Covering a building roof with vegetation", "Using only green lights", "Building roofs out of glass"], a: 1, hint: "It turns the top of a building into a garden." },
            { q: "What term describes the 'lid' that prevents polluted air from rising?", options: ["Cloud layer", "Inversion layer", "Oxygen zone", "Ozone layer"], a: 1, hint: "It is a layer where temperature increases with altitude." },
            { q: "Why do cities have 'more heat-generating human activity'?", options: ["Because cities are larger", "High population density and concentrated energy use", "Because cities have more animals", "Because the sun is closer to cities"], a: 1, hint: "Millions of people in a small space create body and machine heat." },
            { q: "By how many degrees can a CBD be warmer than the surrounding countryside?", options: ["1°C", "Up to 5°C or more", "100°C", "It is always the same"], a: 1, hint: "The difference can be quite significant on a hot day." },
            { q: "Why is shading parking areas a good strategy?", options: ["It makes the cars look better", "It prevents hard surfaces from absorbing heat", "It attracts more birds", "It stops the wind"], a: 1, hint: "Preventing the sun from hitting tar keeps the area cooler." },
            { q: "Urban Heat Islands are specific to which type of environment?", options: ["Deserts", "Large cities", "Tropical rainforests", "The poles"], a: 1, hint: "The name 'Urban' gives it away." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
