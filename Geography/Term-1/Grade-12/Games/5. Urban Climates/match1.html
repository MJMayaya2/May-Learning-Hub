    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Urban Climates</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Geography: Urban Climates</h1>
        <p class="game-subtitle">Match the causes, effects, and strategies for city weather!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Urban Heat Islands</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Pollution Domes</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Causes of City Heat</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Management Strategies</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "Area in a city where temperatures are higher than rural areas." }, { id: 1, text: "Urban Heat Island" },
                { id: 2, text: "Effect of cities having less vegetation than rural areas." }, { id: 2, text: "Devegetation" },
                { id: 3, text: "Cities generally have more of this than rural areas due to pollution." }, { id: 3, text: "Precipitation" },
                { id: 4, text: "Role of buildings in relation to wind speeds." }, { id: 4, text: "Slows wind (Friction)" },
                { id: 5, text: "Typical temperature difference between city and country." }, { id: 5, text: "City is Hotter" },
                { id: 6, text: "Large mass of people in cities generating body heat." }, { id: 6, text: "High Population" },
                { id: 7, text: "General weather trend for urban moisture levels." }, { id: 7, text: "Wetter" },
                { id: 8, text: "Reason for higher rainfall in cities." }, { id: 8, text: "Condensation Nuclei" },
                { id: 9, text: "When urban heat islands are most intense." }, { id: 9, text: "At Night" },
                { id: 10, text: "Impact of tall buildings on airflow." }, { id: 10, text: "Traps Heat" }
            ],
            'topic2': [
                { id: 1, text: "Trapped mass of polluted air over an industrial city." }, { id: 1, text: "Pollution Dome" },
                { id: 2, text: "Atmospheric layer that prevents polluted air from rising." }, { id: 2, text: "Inversion Layer" },
                { id: 3, text: "A physical health effect caused by a pollution dome." }, { id: 3, text: "Asthma/Breathing Issues" },
                { id: 4, text: "Insolation is often blocked by this during the day." }, { id: 4, text: "Pollution Dome" },
                { id: 5, text: "Pollutant particles that help form clouds and rain." }, { id: 5, text: "Condensation Nuclei" },
                { id: 6, text: "Economic cost related to urban pollution and heat." }, { id: 6, text: "Rising Healthcare Costs" },
                { id: 7, text: "Cause of pollution domes in large cities." }, { id: 7, text: "Air Pollution" },
                { id: 8, text: "Effect of a pollution dome on night-time temperatures." }, { id: 8, text: "Traps Heat" },
                { id: 9, text: "The shape of the pollution mass over a city." }, { id: 9, text: "Dome-shaped" },
                { id: 10, text: "Dispersal of pollution is blocked by lack of this." }, { id: 10, text: "Air Circulation" }
            ],
            'topic3': [
                { id: 1, text: "Low reflectivity of concrete and tar surfaces." }, { id: 1, text: "Low Albedo" },
                { id: 2, text: "Materials like concrete and brick that store heat." }, { id: 2, text: "Building Materials" },
                { id: 3, text: "Increased heat absorption due to more vertical walls." }, { id: 3, text: "Larger Surface Area" },
                { id: 4, text: "Waste heat from air conditioners and cars." }, { id: 4, text: "Human Activities" },
                { id: 5, text: "Source of heat from the industrial burning of..." }, { id: 5, text: "Fossil Fuels" },
                { id: 6, text: "Primary source of air pollution from vehicles." }, { id: 6, text: "Car Exhausts" },
                { id: 7, text: "Effect of tall buildings on solar energy." }, { id: 7, text: "Traps Heat" },
                { id: 8, text: "Why there is less evaporation in cities." }, { id: 8, text: "Lack of Vegetation" },
                { id: 9, text: "Surface that absorbs a high amount of solar heat." }, { id: 9, text: "Tar/Tarmac" },
                { id: 10, text: "Concentrated living that generates internal heat." }, { id: 10, text: "Population Density" }
            ],
            'topic4': [
                { id: 1, text: "Planting trees and creating parks in cities." }, { id: 1, text: "Reforest/Revegetate" },
                { id: 2, text: "Using white or light materials for roads and roofs." }, { id: 2, text: "Lighter-coloured paving" },
                { id: 3, text: "Financial reward for properties with high plant cover." }, { id: 3, text: "Tax Rebates" },
                { id: 4, text: "Providing cover for hard surfaces to stop heating." }, { id: 4, text: "Shade Parking Areas" },
                { id: 5, text: "Design choice to avoid large areas of hard surface." }, { id: 5, text: "Keep Buildings Cool" },
                { id: 6, text: "A solution to reduce heat fatigue in citizens." }, { id: 6, text: "Urban Greening" },
                { id: 7, text: "Strategy to reduce absorption of sun's rays." }, { id: 7, text: "High Albedo Materials" },
                { id: 8, text: "Helps disperse trapped pollutants." }, { id: 8, text: "Improved Ventilation" },
                { id: 9, text: "Reduces demand for internal air conditioning." }, { id: 9, text: "Building Insulation" },
                { id: 10, text: "Key strategy to make city life more comfortable." }, { id: 10, text: "Heat Island Reduction" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 12 Geography: Urban Climates Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
