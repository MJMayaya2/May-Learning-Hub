    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Tropical Cyclones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Header */
        .game-header { text-align: center; padding: 3rem 1rem 1rem; max-width: 900px; margin: 0 auto; }
        .game-title { color: #004080; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Categories */
        .category-selection { margin-bottom: 2.5rem; }
        .cat-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
        .cat-btn { background-color: #f0f4f8; border: 2px solid #004080; color: #004080; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .cat-btn:hover, .cat-btn.active { background-color: #004080; color: #fff; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,64,128,0.2); }

        .controls { display: none; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem; }
        .move-counter { font-size: 1.2rem; font-weight: bold; color: #004080; background: #fff; padding: 0.6rem 1.8rem; border-radius: 50px; border: 2px solid #3385ff; }
        .restart-btn { background-color: #3385ff; color: #fff; border: none; padding: 0.7rem 1.8rem; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border-bottom: 3px solid #004080; }

        /* Memory Grid */
        .memory-game { display: none; width: 100%; max-width: 1200px; margin: 0 auto 4rem; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 20px; perspective: 1000px; }
        
        @media (max-width: 950px) { .memory-game { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 650px) { .memory-game { grid-template-columns: repeat(2, 1fr); } }

        .memory-card { position: relative; width: 100%; aspect-ratio: 1 / 1.2; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flip { transform: rotateY(180deg); }
        
        .front-face, .back-face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            text-align: center; 
            font-size: 1rem; 
            line-height: 1.4; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .front-face { background: #004080; color: #fff; font-size: 2.5rem; border: 3px solid #3385ff; font-weight: bold; }
        .back-face { background: #fff; color: #002b5e; transform: rotateY(180deg); border: 3px solid #004080; font-weight: 700; }
        .memory-card.matched .back-face { background: #d4edda; border-color: #28a745; color: #155724; }

        footer { text-align: center; padding: 1.5rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">Grade 12 Geography: Tropical Cyclones</h1>
        <p class="game-subtitle">Match the anatomical features, stages, and impacts of these powerful storms!</p>
        
        <div class="category-selection">
            <div class="cat-buttons">
                <button class="cat-btn" onclick="selectCategory('topic1', this)">Structure & Features</button>
                <button class="cat-btn" onclick="selectCategory('topic2', this)">Formation & Movement</button>
                <button class="cat-btn" onclick="selectCategory('topic3', this)">Stages of Development</button>
                <button class="cat-btn" onclick="selectCategory('topic4', this)">Impacts & Management</button>
            </div>
        </div>

        <div class="controls" id="gameControls">
            <div class="move-counter">Moves: <span id="moves">0</span></div>
            <button class="restart-btn" onclick="initGame()">Restart Level</button>
        </div>
    </header>

    <main class="memory-game" id="gameBoard"></main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const gameData = {
            'topic1': [
                { id: 1, text: "The low-pressure, calm, and cloudless center of the storm." }, { id: 1, text: "The Eye" },
                { id: 2, text: "Towering wall of clouds where heaviest rain and strongest winds occur." }, { id: 2, text: "The Eyewall" },
                { id: 3, text: "Swirling bands of rain-filled clouds surrounding the center." }, { id: 3, text: "Spiral Rain Bands" },
                { id: 4, text: "Direction of wind spiral in the Southern Hemisphere." }, { id: 4, text: "Clockwise" },
                { id: 5, text: "Direction of wind spiral in the Northern Hemisphere." }, { id: 5, text: "Anti-clockwise" },
                { id: 6, text: "Intense cloud type making up the eyewall." }, { id: 6, text: "Cumulonimbus" },
                { id: 7, text: "Wind speed required to be classified as a tropical cyclone." }, { id: 7, text: "Over 120 km/h" },
                { id: 8, text: "Pressure trend toward the center of the storm." }, { id: 8, text: "Steep decrease" },
                { id: 9, text: "Typical lifespan of a tropical cyclone (in days)." }, { id: 9, text: "4 to 7 days" },
                { id: 10, text: "Air movement inside the eye of the storm." }, { id: 10, text: "Subsiding air" }
            ],
            'topic2': [
                { id: 1, text: "Minimum sea surface temperature required for formation." }, { id: 1, text: "27°C" },
                { id: 2, text: "Latitudinal range where these storms form." }, { id: 2, text: "5° to 30°" },
                { id: 3, text: "General direction of travel in the tropics." }, { id: 3, text: "Westwards" },
                { id: 4, text: "Force absent at the equator, preventing formation." }, { id: 4, text: "Coriolis Force" },
                { id: 5, text: "Winds that steer cyclones across the ocean." }, { id: 5, text: "Tropical Easterlies" },
                { id: 6, text: "Main source of energy for the cyclone." }, { id: 6, text: "Latent heat" },
                { id: 7, text: "Cyclones in the Indian Ocean are called..." }, { id: 7, text: "Cyclones" },
                { id: 8, text: "Cyclones in the Atlantic Ocean are called..." }, { id: 8, text: "Hurricanes" },
                { id: 9, text: "Cyclones in the Pacific Ocean are called..." }, { id: 9, text: "Typhoons" },
                { id: 10, text: "The path a cyclone takes as it curves away from the equator." }, { id: 10, text: "Re-curvature" }
            ],
            'topic3': [
                { id: 1, text: "Phase with rising air, no clear eye, and pressure > 1000 hPa." }, { id: 1, text: "Formative Stage" },
                { id: 2, text: "Phase where the eye is well-defined and pressure is at its lowest." }, { id: 2, text: "Immature Stage" },
                { id: 3, text: "Phase of peak intensity covering the largest area." }, { id: 3, text: "Mature Stage" },
                { id: 4, text: "Phase where the storm crosses land or moves over cold water." }, { id: 4, text: "Dissipating Stage" },
                { id: 5, text: "Reason for dissipation over land." }, { id: 5, text: "Friction & Loss of moisture" },
                { id: 6, text: "Typical naming convention for South Indian Ocean storms." }, { id: 6, text: "Alphabetical" },
                { id: 7, text: "Stage where the central pressure is typically 950 hPa." }, { id: 7, text: "Mature Stage" },
                { id: 8, text: "Wind speed reaches its maximum during this stage." }, { id: 8, text: "Mature Stage" },
                { id: 9, text: "Stage where the storm begins to 'die'." }, { id: 9, text: "Degeneration" },
                { id: 10, text: "Pressure system associated with tropical cyclones." }, { id: 10, text: "Deep Low Pressure" }
            ],
            'topic4': [
                { id: 1, text: "Sudden rise in sea levels causing coastal flooding." }, { id: 1, text: "Storm Surge" },
                { id: 2, text: "Water-borne disease common after cyclone floods." }, { id: 2, text: "Cholera" },
                { id: 3, text: "Economic sector hit by crop destruction." }, { id: 3, text: "Agriculture" },
                { id: 4, text: "Key management strategy to reduce fatalities." }, { id: 4, text: "Early Warning Systems" },
                { id: 5, text: "Example: 2012 cyclone that hit Mozambique." }, { id: 5, text: "Funso" },
                { id: 6, text: "Social impact: People losing their homes." }, { id: 6, text: "Homelessness" },
                { id: 7, text: "Damage to roads, bridges, and power lines." }, { id: 7, text: "Infrastructure damage" },
                { id: 8, text: "Action of saving people from flooded areas." }, { id: 8, text: "Rescue Operations" },
                { id: 9, text: "Strategy: Mapping areas prone to flooding." }, { id: 9, text: "Hazard Mapping" },
                { id: 10, text: "Effect on the environment: Loss of marine..." }, { id: 10, text: "Ecosystems" }
            ]
        };

        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const gameControls = document.getElementById('gameControls');
        
        let currentCategory = null;
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matchedPairs = 0;

        function selectCategory(categoryKey, btnElement) {
            currentCategory = categoryKey;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            gameControls.style.display = 'flex';
            gameBoard.style.display = 'grid';
            initGame();
        }

        function initGame() {
            gameBoard.innerHTML = '';
            moves = 0;
            matchedPairs = 0;
            movesDisplay.innerText = moves;
            hasFlippedCard = false;
            lockBoard = false;

            const categoryData = gameData[currentCategory];
            const shuffledCards = [...categoryData].sort(() => 0.5 - Math.random());

            shuffledCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('memory-card');
                cardElement.dataset.pairId = card.id;
                
                cardElement.innerHTML = `
                    <div class="front-face">?</div>
                    <div class="back-face">${card.text}</div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            matchedPairs++;
            if (matchedPairs === (gameData[currentCategory].length / 2)) {
                setTimeout(() => alert(`Great job! Grade 12 Geography: Tropical Cyclones Revision Complete in ${moves} moves.`), 500);
            }
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1200);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }
    </script>
</body>
</html>
