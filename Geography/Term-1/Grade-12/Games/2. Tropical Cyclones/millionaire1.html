<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Grade 12 Geography: Tropical Cyclones Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        .game-header { text-align: center; padding: 2rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1.5rem; font-size: 1.1rem; }

        .game-wrapper { display: flex; max-width: 1100px; margin: 0 auto 3rem; gap: 2rem; padding: 0 20px; width: 100%; align-items: flex-start; }
        
        .game-board { flex: 1; background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; display: flex; flex-direction: column; }
        
        .lifelines { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .lifeline-btn { background: #002b5e; color: #fff; border: 2px solid #b3d4ff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .lifeline-btn:hover:not(:disabled) { background: #3385ff; transform: translateY(-2px); }
        .lifeline-btn:disabled { background: #ccc; border-color: #aaa; color: #666; cursor: not-allowed; transform: none; box-shadow: none; text-decoration: line-through; }

        .question-box { background: #004080; color: #fff; padding: 2rem; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .answer-btn { background: #f0f7ff; border: 2px solid #3385ff; color: #002b5e; padding: 1.2rem; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; position: relative; overflow: hidden; }
        .answer-btn::before { content: attr(data-letter) ": "; color: #3385ff; margin-right: 0.5rem; }
        .answer-btn:hover:not(:disabled) { background: #e6f0fa; border-color: #004080; transform: scale(1.02); }
        
        .answer-btn.selected { background: #ffc107; border-color: #d39e00; color: #000; }
        .answer-btn.correct { background: #28a745 !important; border-color: #1e7e34 !important; color: #fff !important; }
        .answer-btn.incorrect { background: #dc3545 !important; border-color: #bd2130 !important; color: #fff !important; }
        .answer-btn.hidden { visibility: hidden; }

        .prize-ladder { width: 280px; background: #001a33; border-radius: 12px; padding: 1rem; display: flex; flex-direction: column-reverse; gap: 0.1rem; box-shadow: 0 8px 30px rgba(0,0,0,0.2); max-height: 600px; overflow-y: auto; }
        .ladder-step { display: flex; justify-content: space-between; padding: 0.2rem 0.6rem; color: #66a3ff; font-weight: bold; border-radius: 4px; transition: all 0.3s; font-size: 0.85rem; }
        .ladder-step.active { background: #ffc107; color: #000; transform: scale(1.05); }
        .ladder-step.passed { color: #28a745; }
        .ladder-step.milestone { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.2); } 

        #endScreen { display: none; text-align: center; padding: 3rem 1rem; }
        #endMessage { font-size: 1.8rem; color: #004080; margin-bottom: 1rem; }
        #endPrize { font-size: 2.5rem; color: #28a745; font-weight: bold; margin-bottom: 2rem; }

        @media (max-width: 850px) {
            .game-wrapper { flex-direction: column; }
            .prize-ladder { width: 100%; flex-direction: row; flex-wrap: wrap; height: auto; } 
            .answers-grid { grid-template-columns: 1fr; }
        }
        
        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <header class="game-header">
        <h1 class="game-title">R1,000,000 Geography Challenge</h1>
        <p class="game-subtitle">Tropical Cyclones (Grade 12 CAPS)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board" id="gameBoard">
            <div class="lifelines">
                <button class="lifeline-btn" id="btn5050" onclick="use5050()">50 / 50</button>
                <button class="lifeline-btn" id="btnHint" onclick="useHint()">Get a Hint</button>
            </div>

            <div class="question-box">
                <span id="questionText">Loading question...</span>
            </div>

            <div class="answers-grid">
                <button class="answer-btn" data-letter="A" id="btn0" onclick="selectAnswer(0)"></button>
                <button class="answer-btn" data-letter="B" id="btn1" onclick="selectAnswer(1)"></button>
                <button class="answer-btn" data-letter="C" id="btn2" onclick="selectAnswer(2)"></button>
                <button class="answer-btn" data-letter="D" id="btn3" onclick="selectAnswer(3)"></button>
            </div>
        </div>

        <div class="game-board" id="endScreen">
            <h2 id="endMessage">Game Over!</h2>
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem;">Your final winnings:</p>
            <div id="endPrize">R0</div>
            <button class="lifeline-btn" onclick="location.reload()">New Game</button>
        </div>

        <div class="prize-ladder" id="prizeLadder"></div>
    </main>

    <footer>
        <p>&copy; 2026 May Learning Hub. All rights reserved.</p>
    </footer>

    <script>
        const questions = [
            { q: "What is the low-pressure warm, calm, and cloudless centre of a tropical cyclone called?", options: ["The Eyewall", "The Rain Band", "The Eye", "The Core"], a: 2, hint: "It is the only part of the storm where the weather is peaceful." },
            { q: "Which part of the tropical cyclone contains the heaviest rain and strongest winds?", options: ["The Eye", "The Eyewall", "The Spiral Rain Bands", "The Outer Edge"], a: 1, hint: "It is the towering wall of clouds immediately surrounding the center." },
            { q: "Tropical cyclones in the Southern Hemisphere spiral in which direction?", options: ["Anticlockwise", "Clockwise", "Inwardly only", "Outwardly only"], a: 1, hint: "This is due to the Coriolis effect in our hemisphere." },
            { q: "What is the minimum wind speed required for a storm to be classified as a tropical cyclone?", options: ["60 km/h", "80 km/h", "120 km/h", "200 km/h"], a: 2, hint: "Anything lower is classified as a tropical storm or depression." },
            { q: "In which ocean are these powerful storm systems called 'Typhoons'?", options: ["Indian Ocean", "Atlantic Ocean", "Pacific Ocean", "Arctic Ocean"], a: 2, hint: "The name varies depending on the region of the world." },
            { q: "Tropical cyclones typically form between which latitudes?", options: ["0° and 5°", "5° and 30°", "30° and 60°", "60° and 90°"], a: 1, hint: "They do not form exactly on the equator because there is no Coriolis force there." },
            { q: "What is the primary source of energy for a tropical cyclone?", options: ["Solar heating of the land", "Latent heat from warm ocean water", "Friction with the air", "Geothermal energy"], a: 1, hint: "They require sea temperatures of at least 26.5°C." },
            { q: "In which direction do tropical cyclones generally travel?", options: ["Westwards", "Eastwards", "Northwards", "Southwards"], a: 0, hint: "They are driven by the tropical easterly winds." },
            { q: "What happens to a tropical cyclone when it crosses over land?", options: ["It becomes stronger", "It changes direction to the East", "It dissipates (dies)", "It stops raining but winds increase"], a: 2, hint: "The storm loses its supply of warm, moist air and faces increased friction." },
            { q: "Which of the following is NOT a necessary condition for a tropical cyclone to form?", options: ["Sea temperatures above 26.5°C", "High humidity", "Presence of a cold front", "Coriolis force"], a: 2, hint: "These storms are warm-core systems and do not involve fronts." },
            { q: "Which alphabet letter is used to name the first tropical cyclone of the season?", options: ["Z", "M", "A", "Any random letter"], a: 2, hint: "They are named alphabetically as they occur." },
            { q: "What is the typical lifespan of a tropical cyclone?", options: ["1 day", "4 to 7 days", "1 month", "Several hours"], a: 1, hint: "They usually last about a week from formation to dissipation." },
            { q: "During which stage of development does the 'Eye' of the cyclone become visible?", options: ["Formative Stage", "Immature Stage", "Mature Stage", "Dissipating Stage"], a: 2, hint: "This is when the storm reaches its peak intensity." },
            { q: "What is a 'Storm Surge'?", options: ["A sudden increase in wind speed", "A sudden rise in sea level caused by the storm", "A heavy burst of lightning", "The movement of the cyclone over land"], a: 1, hint: "This causes devastating flooding in coastal areas." },
            { q: "Which water-borne disease often breaks out after a tropical cyclone due to flooding?", options: ["Malaria", "Cholera", "Influenza", "Skin cancer"], a: 1, hint: "It is caused by contaminated drinking water." },
            { q: "Cyclone Funso (2012) primarily affected which two countries?", options: ["South Africa and Namibia", "Mozambique and Malawi", "Zimbabwe and Botswana", "Madagascar and Mauritius"], a: 1, hint: "Check the case study section of the document." },
            { q: "What was the lowest pressure recorded for Cyclone Funso?", options: ["1013 hPa", "980 hPa", "936 hPa", "850 hPa"], a: 2, hint: "Lower pressure indicates a more intense storm." },
            { q: "How many stages are there in the life cycle of a tropical cyclone?", options: ["Two", "Four", "Six", "Eight"], a: 1, hint: "Formative, Immature, Mature, and Dissipating." },
            { q: "Which cloud type forms the massive eyewall of a tropical cyclone?", options: ["Stratus", "Cirrus", "Cumulonimbus", "Altostratus"], a: 2, hint: "These are the same clouds associated with heavy thunderstorms." },
            { q: "What happens to a tropical cyclone if it moves into cooler latitudes?", options: ["It speeds up", "It dissipates", "It turns into a tornado", "It becomes a mid-latitude cyclone"], a: 1, hint: "It loses the warm water energy source it needs to survive." },
            { q: "Why is the Eye of the cyclone calm?", options: ["Air is rising rapidly", "Air is sinking (subsiding)", "There is no air at all", "The wind is blocked by the eyewall"], a: 1, hint: "Descending air prevents cloud formation and rain." },
            { q: "What is a key socio-economic impact of tropical cyclones?", options: ["Increase in tourism", "Damage to infrastructure like roads and bridges", "Lowering of food prices", "Creation of new farmland"], a: 1, hint: "The destruction costs billions and disrupts trade." },
            { q: "Which management strategy involves predicting the path of a cyclone?", options: ["Rescue operations", "Rebuilding homes", "Tracking and early warnings", "Planting trees"], a: 2, hint: "This helps people evacuate before the storm hits." },
            { q: "The 'Spiral Rain Bands' are responsible for what?", options: ["Calm weather", "Continuous heavy rainfall", "The naming of the storm", "Directing the storm toward the poles"], a: 1, hint: "They are the swirling bands filled with moisture." },
            { q: "What is the typical diameter of the Eye in a mature tropical cyclone?", options: ["5-10 km", "30-50 km", "500 km", "1000 km"], a: 1, hint: "It is relatively small compared to the whole storm system." },
            { q: "Tropical cyclones move with which global wind system?", options: ["Westerlies", "Polar Easterlies", "Tropical Easterlies (Trade Winds)", "Jet Streams"], a: 2, hint: "These winds blow from East to West in the tropics." },
            { q: "Which of the following describes the Immature Stage?", options: ["The storm is at its strongest", "Pressure is falling but the eye hasn't formed fully", "The storm reaches land", "The storm turns into a mid-latitude cyclone"], a: 1, hint: "Pressure is below 1000 hPa but the storm hasn't reached full power." },
            { q: "How do tropical cyclones affect the environment?", options: ["They purify the air", "They cause coastal erosion and destroy habitats", "They create new coral reefs", "They have no environmental impact"], a: 1, hint: "High waves and salt water can ruin coastal ecosystems." },
            { q: "What is the name of the agreement used to manage international aid after a cyclone?", options: ["The Montreal Protocol", "Management Strategies", "The Paris Accord", "SADC Agreements"], a: 1, hint: "Governments must coordinate rescue and aid efforts." },
            { q: "What is the highest wind speed recorded for Cyclone Funso?", options: ["120 km/h", "180 km/h", "220 km/h", "350 km/h"], a: 2, hint: "This made it a very dangerous Category 4-equivalent storm." }
        ];

        const prizes = [
            "R100", "R200", "R300", "R500", "R1,000",
            "R2,000", "R3,000", "R4,000", "R5,000", "R10,000",
            "R15,000", "R20,000", "R25,000", "R30,000", "R40,000",
            "R50,000", "R60,000", "R70,000", "R80,000", "R100,000",
            "R150,000", "R200,000", "R250,000", "R300,000", "R400,000",
            "R500,000", "R600,000", "R750,000", "R850,000", "R1,000,000"
        ];

        let currentLevel = 0;
        let isWaiting = false;

        const ladderContainer = document.getElementById('prizeLadder');
        for (let i = 0; i < 30; i++) {
            let step = document.createElement('div');
            step.className = 'ladder-step';
            step.id = `ladder-${i}`;
            if ((i + 1) % 5 === 0) step.classList.add('milestone');
            step.innerHTML = `<span>${i + 1}</span> <span>${prizes[i]}</span>`;
            ladderContainer.appendChild(step);
        }

        function loadQuestion() {
            isWaiting = false;
            document.querySelectorAll('.ladder-step').forEach((el, index) => {
                el.classList.remove('active');
                if (index < currentLevel) el.classList.add('passed');
            });
            document.getElementById(`ladder-${currentLevel}`).classList.add('active');

            const qData = questions[currentLevel];
            document.getElementById('questionText').innerText = `Q${currentLevel + 1}: ${qData.q}`;

            let options = [...qData.options];
            let correctText = options[qData.a];
            options.sort(() => Math.random() - 0.5);
            let correctIdx = options.indexOf(correctText);

            for (let i = 0; i < 4; i++) {
                let btn = document.getElementById(`btn${i}`);
                btn.innerText = options[i];
                btn.className = 'answer-btn'; 
                btn.disabled = false;
                btn.classList.remove('hidden', 'selected', 'correct', 'incorrect');
                btn.setAttribute('data-correct', i === correctIdx);
            }
        }

        function selectAnswer(selectedIndex) {
            if (isWaiting) return;
            isWaiting = true;

            const selectedBtn = document.getElementById(`btn${selectedIndex}`);
            const isCorrect = selectedBtn.getAttribute('data-correct') === 'true';
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn${i}`).disabled = true;
            }

            selectedBtn.classList.add('selected');

            setTimeout(() => {
                selectedBtn.classList.remove('selected');

                if (isCorrect) {
                    selectedBtn.classList.add('correct');
                    setTimeout(() => {
                        currentLevel++;
                        if (currentLevel >= 30) endGame(true);
                        else loadQuestion();
                    }, 1000); 
                } else {
                    selectedBtn.classList.add('incorrect');
                    for (let i = 0; i < 4; i++) {
                        if (document.getElementById(`btn${i}`).getAttribute('data-correct') === 'true') {
                            document.getElementById(`btn${i}`).classList.add('correct');
                        }
                    }
                    setTimeout(() => endGame(false), 2000);
                }
            }, 1000);
        }

        function use5050() {
            if (isWaiting) return;
            document.getElementById('btn5050').disabled = true;
            let hiddenCount = 0;
            for(let i=0; i<4; i++){
                let btn = document.getElementById(`btn${i}`);
                if(btn.getAttribute('data-correct') === 'false' && hiddenCount < 2) {
                    btn.classList.add('hidden');
                    hiddenCount++;
                }
            }
        }

        function useHint() {
            if (isWaiting) return;
            document.getElementById('btnHint').disabled = true;
            alert("Geography Teacher Hint: " + questions[currentLevel].hint);
        }

        function endGame(won) {
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            if (won) {
                document.getElementById('endMessage').innerText = "Geography Legend!";
                document.getElementById('endPrize').innerText = "R1,000,000";
            } else {
                document.getElementById('endMessage').innerText = "Final Winnings:";
                document.getElementById('endPrize').innerText = currentLevel > 0 ? prizes[currentLevel - 1] : "R0";
            }
        }
        loadQuestion();
    </script>
</body>
</html>
