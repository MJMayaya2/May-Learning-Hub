<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>May Learning Hub | Geography Hangman</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Navigation - Maintained Original Links */
        nav { background-color: #002b5e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: #fff; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links a { color: #cce0ff; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-decoration: underline; }
        
        /* Progress Bar */
        .progress-container { max-width: 800px; width: 90%; margin: 1rem auto 0; background-color: #d1d9e6; border-radius: 10px; height: 20px; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3385ff, #002b5e); width: 0%; transition: width 0.5s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Game Header */
        .game-header { text-align: center; padding: 1.5rem 1rem 1rem; }
        .game-title { color: #004080; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .game-subtitle { color: #555; margin-bottom: 1rem; font-size: 1.1rem; }

        /* Main Game Layout */
        .game-wrapper { max-width: 800px; margin: 0 auto 3rem; padding: 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .game-board { background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #3385ff; padding: 2rem; width: 100%; text-align: center; }

        /* Hangman SVG */
        .drawing-area { margin: 0 auto 1.5rem; height: 180px; width: 200px; position: relative; }
        .figure-part { stroke: #002b5e; stroke-width: 4; fill: transparent; stroke-linecap: round; display: none; }
        .gallows { stroke: #99b3cc; stroke-width: 6; fill: transparent; stroke-linecap: round; }

        /* Hint & Word Area */
        .hint-box { background: #e6f0fa; color: #004080; padding: 1rem; border-radius: 8px; font-weight: bold; margin-bottom: 1.5rem; border-left: 4px solid #3385ff; font-size: 1.1rem; }
        .topic-tag { display: inline-block; background: #002b5e; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .word-display { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .letter-box { width: 35px; height: 45px; border-bottom: 3px solid #004080; font-size: 1.8rem; font-weight: bold; color: #002b5e; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* Keyboard */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; max-width: 600px; margin: 0 auto; }
        .key { background: #f0f7ff; border: 2px solid #b3d4ff; color: #002b5e; font-size: 1.1rem; font-weight: bold; border-radius: 6px; width: 42px; height: 45px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
        .key:hover:not(:disabled) { background: #3385ff; color: #fff; transform: translateY(-2px); }
        .key:disabled { cursor: not-allowed; }
        .key.correct { background: #28a745; border-color: #1e7e34; color: #fff; opacity: 0.8; }
        .key.incorrect { background: #dc3545; border-color: #bd2130; color: #fff; opacity: 0.5; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; border-top: 6px solid #004080; }
        .modal-title { font-size: 2rem; margin-bottom: 1rem; }
        .modal-word { font-size: 1.5rem; color: #004080; font-weight: bold; letter-spacing: 2px; margin-bottom: 1.5rem; }
        .play-again-btn { background: #3385ff; color: #fff; border: none; padding: 0.8rem 2rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 1rem; background-color: #002b5e; color: #fff; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="../../../../../index.html" class="logo">May Learning Hub</a>
        <div class="nav-links">
            <a href="../../../../../index.html">Home</a>
            <a href="../../../../../about.html">About</a>
        </div>
    </nav>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">0 / 60 Words Completed</div>
    </div>

    <header class="game-header">
        <h1 class="game-title">Geography Hangman Challenge</h1>
        <p class="game-subtitle">Grade 12: Tropical Cyclones (Chapter 2)</p>
    </header>

    <main class="game-wrapper">
        <div class="game-board">
            <div class="drawing-area">
                <svg height="180" width="200">
                    <line x1="10" y1="170" x2="90" y2="170" class="gallows" />
                    <line x1="50" y1="170" x2="50" y2="10" class="gallows" />
                    <line x1="50" y1="10" x2="130" y2="10" class="gallows" />
                    <line x1="130" y1="10" x2="130" y2="30" class="gallows" />
                    <circle cx="130" cy="50" r="20" class="figure-part" id="part-0" />
                    <line x1="130" y1="70" x2="130" y2="120" class="figure-part" id="part-1" />
                    <line x1="130" y1="80" x2="100" y2="110" class="figure-part" id="part-2" />
                    <line x1="130" y1="80" x2="160" y2="110" class="figure-part" id="part-3" />
                    <line x1="130" y1="120" x2="100" y2="160" class="figure-part" id="part-4" />
                    <line x1="130" y1="120" x2="160" y2="160" class="figure-part" id="part-5" />
                </svg>
            </div>
            <div id="topicTag" class="topic-tag">Topic</div>
            <div class="hint-box" id="hintBox">Hint goes here</div>
            <div class="word-display" id="wordDisplay"></div>
            <div class="keyboard" id="keyboard"></div>
        </div>
    </main>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Correct!</h2>
            <p id="modalMsg">The word was:</p>
            <div class="modal-word" id="modalWord">TERM</div>
            <button class="play-again-btn" id="modalBtn" onclick="nextWord()">Continue</button>
        </div>
    </div>

    <footer><p>&copy; 2026 May Learning Hub. All rights reserved.</p></footer>

    <script>
        const fullWordList = [
            { word: "EYE", topic: "Structure", hint: "The low-pressure, warm, calm, and cloudless center of the cyclone." },
            { word: "EYEWALL", topic: "Structure", hint: "The towering wall of cumulonimbus clouds where heaviest rain occurs." },
            { word: "LATENT", topic: "Formation", hint: "The type of heat released during condensation that fuels the cyclone." },
            { word: "CORIOLIS", topic: "Formation", hint: "The force required to make the winds spiral; absent at the equator." },
            { word: "DISSIPATE", topic: "Life Cycle", hint: "Term for when a cyclone 'dies' out due to friction or lack of moisture." },
            { word: "EASTTOWEST", topic: "Movement", hint: "The general direction tropical cyclones travel." },
            { word: "STORM SURGE", topic: "Impact", hint: "A sudden rise in sea level caused by strong winds and low pressure." },
            { word: "CHOLERA", topic: "Impact", hint: "A water-borne disease that often breaks out after cyclone flooding." },
            { word: "FUNSO", topic: "Case Study", hint: "The name of the 2012 cyclone that affected Mozambique and Malawi." },
            { word: "HURRICANE", topic: "Terminology", hint: "The name for these storm systems in the Atlantic Ocean." },
            { word: "TYPHOON", topic: "Terminology", hint: "The name for these storm systems in the Pacific Ocean." },
            { word: "EVACUATION", topic: "Management", hint: "A strategy to move people away from high-risk areas before the storm." },
            { word: "VORTEX", topic: "Structure", hint: "The whirling mass of air at the center of the system." },
            { word: "CUMULONIMBUS", topic: "Weather", hint: "The type of clouds responsible for the heavy rainfall in the eyewall." },
            { word: "STABLE", topic: "Formation", hint: "Air must be UNSTABLE, not ____, for a cyclone to form." },
            { word: "MOISTURE", topic: "Formation", hint: "Cyclones dissipate over land because they lose their source of ____." },
            { word: "CLOCKWISE", topic: "Southern Hemisphere", hint: "Direction of wind spiral in the Southern Hemisphere." },
            { word: "ANTICLOCKWISE", topic: "Northern Hemisphere", hint: "Direction of wind spiral in the Northern Hemisphere." },
            { word: "TROPICAL", topic: "Areas", hint: "Latitudes between 5 and 30 degrees where these systems form." },
            { word: "INFRASTRUCTURE", topic: "Impact", hint: "General term for roads, bridges, and homes damaged by the storm." },
            { word: "SUBSIDING", topic: "Structure", hint: "The movement of air inside the eye (sinking air)." },
            { word: "ISOBARS", topic: "Synoptic Maps", hint: "In a tropical cyclone, these lines are circular and very close together." },
            { word: "LOWPRESSURE", topic: "Characteristics", hint: "The intensity of this system is measured by how low this is." },
            { word: "DEPRESSION", topic: "Stages", hint: "The initial low-pressure stage before it becomes a cyclone." },
            { word: "ALPHABETICAL", topic: "Naming", hint: "The order in which tropical cyclones are named for a season." },
            { word: "FRICTION", topic: "Dissipation", hint: "This increases when the storm moves over land, slowing it down." },
            { word: "PRECIPITATION", topic: "Weather", hint: "The formal term for the heavy rain brought by rain bands." },
            { word: "LANDFALL", topic: "Life Cycle", hint: "The moment a tropical cyclone moves from sea to land." },
            { word: "EARLYWARNING", topic: "Management", hint: "Using technology to inform people of an approaching storm." },
            { word: "RAINBANDS", topic: "Structure", hint: "Swirling bands of rain-filled clouds surrounding the eyewall." },
            { word: "EASTERLIES", topic: "Movement", hint: "The wind belt (Tropical ____) that moves these systems westwards." },
            { word: "INTENSITY", topic: "Characteristics", hint: "This refers to the strength of the winds and pressure drop." },
            { word: "ANOMALY", topic: "Naming", hint: "Names are chosen by the Weather Bureau; list excludes letters Q, U, X, Z." },
            { word: "DISRUPTION", topic: "Impact", hint: "When trade, tourism, and agriculture are stopped by the storm." },
            { word: "RESCUE", topic: "Management", hint: "Post-storm strategy involving emergency services saving survivors." },
            { word: "MALARIA", topic: "Impact", hint: "Disease that can increase due to stagnant water after floods." },
            { word: "MOZAMBIQUE", topic: "South Africa", hint: "A neighboring country frequently hit by cyclones in the Indian Ocean." },
            { word: "TURBULENCE", topic: "Weather", hint: "Extreme air movement causing danger to aircraft and shipping." },
            { word: "HPA", topic: "Measurement", hint: "The unit (Hectopascals) used to measure the central pressure." },
            { word: "DIVERGENCE", topic: "Upper Air", hint: "The spreading out of air at high altitudes that sustains the low." },
            { word: "CONVERGENCE", topic: "Surface Air", hint: "The inward movement of air at the surface toward the eye." },
            { word: "WARMSEA", topic: "Formation", hint: "Required sea temperature is above 26.5 degrees Celsius." },
            { word: "DEATHS", topic: "Impact", hint: "The most tragic human impact of these powerful storms." },
            { word: "TELECOMMUNICATIONS", topic: "Impact", hint: "Phones and internet services cut off during the storm." },
            { word: "RECONSTRUCTION", topic: "Management", hint: "The long-term process of rebuilding after the storm." },
            { word: "GRADIENT", topic: "Wind", hint: "The steep pressure ____ causes the very strong winds." },
            { word: "PARABOLA", topic: "Movement", hint: "The curved path a cyclone often takes as it moves away from tropics." },
            { word: "SATELLITE", topic: "Monitoring", hint: "Space-based technology used to track cyclone paths." },
            { word: "VISIBILITY", topic: "Weather", hint: "This becomes almost zero in the eyewall due to heavy rain." },
            { word: "STORM", topic: "Stages", hint: "The 'Tropical ____' stage is just before it reaches full cyclone status." },
            { word: "EQUATOR", topic: "Formation", hint: "Cyclones cannot form here (0 degrees) due to lack of Coriolis force." },
            { word: "SWOLLEN", topic: "Impact", hint: "Rivers become ____ and overflow, causing inland flooding." },
            { word: "CALM", topic: "Structure", hint: "Weather condition inside the eye." },
            { word: "SPEED", topic: "Characteristics", hint: "Tropical cyclones have wind ____ between 120 and 320 km/h." },
            { word: "DURATION", topic: "Characteristics", hint: "The lifespan of these systems is usually 4 to 7 days." },
            { word: "LIFESPAN", topic: "Characteristics", hint: "Another word for how long the cyclone lasts." },
            { word: "TROPICS", topic: "Areas", hint: "General region between 5 and 30 degrees North and South." },
            { word: "MADAGASCAR", topic: "Areas", hint: "Island that often acts as a buffer for Mozambique." },
            { word: "SURVIVAL", topic: "Management", hint: "The ultimate goal of early warning and evacuation strategies." },
            { word: "CYCLONE", topic: "Terminology", hint: "The specific name for these systems in the Indian Ocean." }
        ];

        let remainingWords = [...fullWordList];
        let chosenWordObj = {};
        let guessedLetters = [];
        let mistakes = 0;
        let completedCount = 0;
        const totalWords = 60;

        function updateProgressBar() {
            const percent = (completedCount / totalWords) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedCount} / ${totalWords} Words Completed`;
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement("button");
                b.innerText = l; b.classList.add("key"); b.id = `key-${l}`;
                b.onclick = () => handleGuess(l);
                kb.appendChild(b);
            });
        }

        function initGame() {
            if (remainingWords.length === 0) {
                showFinalScreen();
                return;
            }
            document.getElementById('gameModal').style.display = "none";
            guessedLetters = []; mistakes = 0;
            const index = Math.floor(Math.random() * remainingWords.length);
            chosenWordObj = remainingWords[index];
            document.getElementById('topicTag').innerText = chosenWordObj.topic;
            document.getElementById('hintBox').innerText = `Hint: ${chosenWordObj.hint}`;
            for(let i=0; i<6; i++) document.getElementById(`part-${i}`).style.display = 'none';
            createKeyboard();
            updateWordDisplay();
            updateProgressBar();
        }

        function updateWordDisplay() {
            const display = document.getElementById('wordDisplay');
            display.innerHTML = '';
            let won = true;
            // Handle spaces in phrases like "STORM SURGE"
            chosenWordObj.word.split('').forEach(l => {
                const box = document.createElement('div');
                box.classList.add('letter-box');
                if (l === ' ') {
                    box.style.borderBottom = 'none';
                    box.innerText = ' ';
                } else if (guessedLetters.includes(l)) {
                    box.innerText = l;
                } else {
                    box.innerText = '';
                    won = false;
                }
                display.appendChild(box);
            });
            if (won) endGame(true);
        }

        function handleGuess(l) {
            guessedLetters.push(l);
            const btn = document.getElementById(`key-${l}`);
            btn.disabled = true;
            if (chosenWordObj.word.includes(l)) {
                btn.classList.add('correct');
                updateWordDisplay();
            } else {
                btn.classList.add('incorrect');
                document.getElementById(`part-${mistakes}`).style.display = 'block';
                mistakes++;
                if (mistakes === 6) endGame(false);
            }
        }

        function endGame(isWin) {
            const modal = document.getElementById('gameModal');
            const title = document.getElementById('modalTitle');
            if (isWin) {
                title.innerText = "Correct!";
                title.style.color = "#28a745";
                completedCount++;
                remainingWords = remainingWords.filter(w => w.word !== chosenWordObj.word);
            } else {
                title.innerText = "Try Again!";
                title.style.color = "#dc3545";
            }
            document.getElementById('modalWord').innerText = chosenWordObj.word;
            setTimeout(() => modal.style.display = "flex", 400);
        }

        function nextWord() {
            initGame();
        }

        function showFinalScreen() {
            document.getElementById('gameModal').style.display = "flex";
            document.getElementById('modalTitle').innerText = "🏆 Cyclone Master!";
            document.getElementById('modalMsg').innerText = "You have mastered all 60 terms for Tropical Cyclones!";
            document.getElementById('modalWord').innerText = "EXCELLENT WORK";
            document.getElementById('modalBtn').innerText = "Restart Game";
            document.getElementById('modalBtn').onclick = () => location.reload();
        }

        initGame();
    </script>
</body>
</html>
